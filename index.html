<!DOCTYPE html>
<html lang="vi">
<!-- =============================================================================== -->
<!-- PHẦN 1: GIAO DIỆN & ĐỘNG CƠ HOẠT ĐỘNG (TÍCH HỢP VỞ Ô LY VECTOR & AUTO-FILL)   -->
<!-- =============================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ Thống Đề Thi Học Sinh Giỏi Toán Lớp 2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<style>
body { font-family: 'Nunito', sans-serif; background-color: #f3f4f6; }
.answer-explanation { display: none; }
.show-answers .answer-explanation { display: block; }
.show-answers .correct-option {
background-color: #d1fae5 !important;
border-color: #10b981 !important;
color: #065f46 !important;
font-weight: bold;
}
.selected-option {
background-color: #eff6ff !important;
border-color: #3b82f6 !important;
color: #1d4ed8 !important;
font-weight: bold;
}
.show-answers .selected-option:not(.correct-option) {
background-color: #fef2f2 !important;
border-color: #ef4444 !important;
color: #b91c1c !important;
}
.hint-content { display: none; }
.show-hints .hint-content { display: block; }
.testing-mode .option-btn:hover {
background-color: #e0e7ff !important;
}
.option-btn { line-height: 1.6; }
/* KHU VỰC VỞ Ô LY CHO TỰ LUẬN */
.student-workspace { display: none; margin-top: 1.5rem; }
.testing-mode .student-workspace,
.show-answers .student-workspace,
.show-hints .student-workspace { display: block; }
/* Ẩn lưới ô ly khi xem đáp án hoặc hướng dẫn */
.show-answers .empty-workspace,
.show-hints .empty-workspace { display: none !important; }
.oly-bg {
background-color: #fff;
position: relative;
border: 1px solid #545557;
border-radius: 4px;
width: 100%;
overflow: hidden;
}
/* Các class định dạng cho nét vẽ Vector DOM (Chống vỡ hạt khi zoom/print) */
.stroke-small { stroke: #E8E9EA; stroke-width: 0.5px; }
.stroke-large { stroke: #545557; stroke-width: 1px; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
-webkit-appearance: none; margin: 0;
}
input[type=number] { -moz-appearance: textfield; }
@media print {
body { background-color: white; padding: 0; }
#menu-view { display: none !important; }
#exam-view { display: block !important; }
.max-w-4xl { box-shadow: none !important; border-radius: 0; padding: 0; width: 100%; max-width: 100%; }
.no-print { display: none !important; }
* { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.page-break-avoid { break-inside: avoid; page-break-inside: avoid; }
/* Khi in: Chỉnh nét vẽ mỏng nhưng sử dụng màu TỐI HƠN để máy in không bị mất nét (Tăng sắc lẹm) */
.oly-bg { border: 0.5pt solid #545557 !important; }
.stroke-small { stroke: #cbd5e1 !important; stroke-width: 0.5pt !important; }
.stroke-large { stroke: #64748b !important; stroke-width: 0.75pt !important; }
/* CSS đặc biệt: Ép 1 bài trải dài full 1 trang A4 và lấp đầy ô ly */
body.print-full-page .tu-luan-item {
min-height: 245mm; /* Tương đương 1 trang A4 trừ lề */
display: flex;
flex-direction: column;
page-break-inside: avoid;
page-break-after: always;
break-after: page;
}
body.print-full-page .student-workspace {
flex-grow: 1;
display: flex;
flex-direction: column;
margin-bottom: 0;
}
/* Đảm bảo khung bọc 1 cột được giãn ra theo chiều dọc */
body.print-full-page .student-workspace > div {
flex-grow: 1;
display: flex;
align-items: stretch;
}
/* Từng cột bung ra */
body.print-full-page .student-workspace > div > div {
display: flex;
flex-direction: column;
flex-grow: 1;
}
/* Oly-bg xóa bỏ giới hạn chiều cao cũ để Flexbox kéo dài vô hạn */
body.print-full-page .oly-bg {
flex-grow: 1;
height: auto !important;
min-height: 0 !important;
}
}
.fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col items-center relative">
<!-- MÀN HÌNH MENU KHỞI ĐỘNG -->
<div id="menu-view" class="max-w-2xl w-[92%] md:w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in relative my-auto">
<div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-10 text-center text-white">
<h1 class="text-4xl font-extrabold mb-3 drop-shadow-lg">🌟 KHO ĐỀ THI TOÁN LỚP 2</h1>
<p class="text-lg font-semibold opacity-90">Bồi dưỡng Học Sinh Giỏi & Phát triển Tư Duy</p>
</div>
<div class="p-8 md:p-12 text-center">
<p class="text-gray-600 mb-8 text-lg">Bạn có thể chọn đề thi từ danh sách hoặc nhập trực tiếp số thứ tự đề.</p>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start text-left max-w-2xl mx-auto mb-6">
<!-- Cách 1: Dropdown -->
<div class="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-sm">
<label for="exam-select" class="block text-sm font-bold text-indigo-700 mb-3 uppercase tracking-wider">
Cách 1: Chọn từ danh sách
</label>
<div class="relative">
<select id="exam-select" onchange="syncInputs('select')" class="block appearance-none w-full bg-white border border-gray-300 text-gray-700 py-3 px-4 pr-8 rounded-xl leading-tight focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-colors cursor-pointer text-base font-medium">
<option value="" disabled selected>-- Đang tải danh sách... --</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
<svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
</div>
</div>
</div>
<!-- Cách 2: Input Number -->
<div class="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-sm relative">
<label for="exam-input" class="block text-sm font-bold text-indigo-700 mb-3 uppercase tracking-wider">
Cách 2: Nhập số thứ tự
</label>
<input type="number" id="exam-input" oninput="syncInputs('input')" placeholder="Ví dụ: 24..."
class="block w-full bg-white border border-gray-300 text-gray-700 py-3 px-4 rounded-xl leading-tight focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-colors text-base font-medium placeholder-gray-400"
onkeypress="handleEnter(event)">
</div>
</div>
<p id="exam-error" class="text-red-500 font-bold mt-3 min-h-[24px] opacity-0 transition-opacity">Không tìm thấy đề này!</p>
<button onclick="submitExamNumber()" class="mt-4 mx-auto w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xl px-12 py-4 rounded-full font-bold shadow-lg transform hover:-translate-y-1 transition-all flex justify-center items-center gap-2">
🚀 BẮT ĐẦU LÀM BÀI
</button>
<p class="mt-10 text-gray-500 font-medium bg-gray-50 inline-block px-4 py-2 rounded-lg border border-gray-200" id="total-exams-info">
Hệ thống đang tải dữ liệu...
</p>
</div>
</div>
<!-- MÀN HÌNH HIỂN THỊ ĐỀ THI -->
<div id="exam-view" class="hidden w-full max-w-4xl mx-auto bg-white shadow-xl relative fade-in md:mb-8 md:rounded-b-2xl md:border-x md:border-b border-gray-200">
<!-- Thanh công cụ (Nút bấm) -->
<div class="sticky top-0 z-50 bg-gray-100/95 backdrop-blur-sm px-4 md:px-6 py-3 flex flex-wrap gap-3 justify-between items-center no-print border-b border-gray-300 shadow-sm">
<button onclick="backToMenu()" class="bg-white hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg font-bold shadow transition-colors border border-gray-300">🔙 Menu</button>
<div class="flex flex-wrap items-center gap-3">
<!-- Nút Tùy chọn in Auto-Fill (Chỉ hiện khi Bật Làm Bài) -->
<label class="flex items-center space-x-2 text-sm font-bold text-gray-700 cursor-pointer select-none bg-white px-3 py-2 rounded-lg border border-gray-300 shadow-sm hover:bg-gray-50 transition hidden" id="printFullPageWrapper">
<input type="checkbox" id="fillPageToggle" class="w-4 h-4 text-indigo-600 rounded cursor-pointer" onchange="toggleFillPage()">
<span>📄 Lấp đầy trang in</span>
</label>
<button id="testingModeBtn" onclick="toggleTestingMode()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-purple-500">✍️ Làm Bài</button>
<button onclick="triggerPrint()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-gray-500">🖨️ In Đề</button>
<button id="toggleHintsBtn" onclick="toggleHints()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-yellow-400">💡 Hướng Dẫn</button>
<button id="toggleAnswersBtn" onclick="toggleAnswers()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-blue-500">👁️ Xem Đáp Án</button>
</div>
</div>
<!-- Header Đề thi -->
<div class="bg-white text-gray-800 p-6 md:p-8 text-center border-b-2 border-gray-200">
<h1 class="text-3xl font-extrabold uppercase tracking-wide mb-2 text-indigo-800">Đề Thi Học Sinh Giỏi Toán Lớp 2</h1>
<h2 id="exam-title-number" class="text-2xl font-bold mb-4 text-gray-700">ĐỀ SỐ ...</h2>
<div class="flex justify-center space-x-8 text-sm font-medium text-gray-600">
<span class="bg-gray-50 border border-gray-200 px-3 py-1 rounded-full shadow-sm" id="exam-time">⏱️ Thời gian</span>
<span class="bg-gray-50 border border-gray-200 px-3 py-1 rounded-full shadow-sm" id="exam-level">⭐ Mức độ</span>
</div>
</div>
<!-- Nơi JS vẽ Nội dung Đề Thi -->
<div id="exam-dynamic-content" class="p-8 pb-12"></div>
</div>
<!-- NÚT LÊN ĐẦU TRANG -->
<button id="backToTopBtn" onclick="scrollToTop()" class="fixed bottom-6 right-4 md:right-8 w-10 h-10 bg-white/90 backdrop-blur-sm border border-gray-200 text-indigo-600 hover:bg-indigo-50 hover:text-indigo-800 rounded-full shadow-lg flex justify-center items-center transition-all duration-300 opacity-0 pointer-events-none z-50 no-print" title="Lên đầu trang">
<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
<path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
</svg>
</button>
<!-- TOAST THÔNG BÁO -->
<div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-center flex items-center gap-2 no-print">
<span class="text-xl">💡</span> <span id="toast-message">Nhấn Ctrl + P để in.</span>
</div>
<script id="app-engine">
window.EXAM_DATA = window.EXAM_DATA || [];
function initApp() {
const total = window.EXAM_DATA.length;
document.getElementById('total-exams-info').innerHTML = `📌 Hệ thống hiện đang tích hợp <strong>${total}</strong> đề thi.`;
document.getElementById('exam-input').value = '';
document.getElementById('exam-error').classList.add('opacity-0');
const selectEl = document.getElementById('exam-select');
selectEl.innerHTML = '<option value="" disabled selected>-- Chọn đề thi --</option>';
window.EXAM_DATA.forEach(exam => {
const opt = document.createElement('option');
opt.value = exam.id;
opt.textContent = `Đề số ${exam.id}: ${exam.title}`;
selectEl.appendChild(opt);
});
}
function syncInputs(source) {
const select = document.getElementById('exam-select');
const input = document.getElementById('exam-input');
const errorEl = document.getElementById('exam-error');
errorEl.classList.add('opacity-0');
if (source === 'select') {
input.value = select.value;
} else if (source === 'input') {
const val = parseInt(input.value);
const exists = window.EXAM_DATA.find(e => e.id === val);
if (exists) {
select.value = val;
} else {
select.value = "";
}
}
}
function handleEnter(e) {
if (e.key === 'Enter') submitExamNumber();
}
function submitExamNumber() {
const inputVal = document.getElementById('exam-input').value.trim();
const selectVal = document.getElementById('exam-select').value;
const errorEl = document.getElementById('exam-error');
let finalId = inputVal || selectVal;
if (!finalId) {
errorEl.innerText = "❌ Vui lòng chọn hoặc nhập số thứ tự đề!";
errorEl.classList.remove('opacity-0');
return;
}
const id = parseInt(finalId);
const exam = window.EXAM_DATA.find(e => e.id === id);
if (!exam) {
errorEl.innerText = `❌ Không tìm thấy Đề số ${id}. Vui lòng nhập lại!`;
errorEl.classList.remove('opacity-0');
} else {
errorEl.classList.add('opacity-0');
openExam(id);
}
}
// KÍCH HOẠT CHẾ ĐỘ AUTO-FILL DÒNG KẺ IN ẤN
function toggleFillPage() {
const isChecked = document.getElementById('fillPageToggle').checked;
if (isChecked) {
document.body.classList.add('print-full-page');
} else {
document.body.classList.remove('print-full-page');
}
}
// HÀM TẠO LƯỚI VECTOR THỦ CÔNG (CHỐNG RASTERIZE 100% VÀ TƯƠNG THÍCH LẤP ĐẦY TRANG)
function generateVectorGrid(baseHeight) {
let pathSmall = "";
let pathLarge = "";
const gridWidth = 1200;
const gridHeight = Math.max(baseHeight, 1500);
for (let y = 10; y <= gridHeight; y += 10) {
if (y % 40 === 0) pathLarge += `M 0 ${y} H ${gridWidth} `;
else pathSmall += `M 0 ${y} H ${gridWidth} `;
}
for (let x = 10; x <= gridWidth; x += 10) {
if (x % 40 === 0) pathLarge += `M ${x} 0 V ${gridHeight} `;
else pathSmall += `M ${x} 0 V ${gridHeight} `;
}
return `<svg width="100%" height="100%" class="pointer-events-none absolute inset-0" xmlns="http://www.w3.org/2000/svg">
<path d="${pathSmall}" fill="none" class="stroke-small" />
<path d="${pathLarge}" fill="none" class="stroke-large" />
</svg>`;
}
function openExam(id) {
const exam = window.EXAM_DATA.find(e => e.id === id);
if(!exam) return;
document.getElementById('exam-title-number').innerText = exam.title;
document.getElementById('exam-time').innerText = '⏱️ ' + exam.time;
document.getElementById('exam-level').innerText = '⭐ ' + exam.level;
let htmlStr = "";
const hasTracNghiem = exam.trac_nghiem && exam.trac_nghiem.length > 0;
const hasTuLuan = exam.tu_luan && exam.tu_luan.length > 0;
// ================= RENDER TRẮC NGHIỆM =================
if (hasTracNghiem) {
htmlStr += `<div class="mb-10"><h3 class="text-2xl font-bold text-indigo-700 border-b-2 border-indigo-100 pb-2 mb-6 uppercase">Phần 1: Trắc nghiệm khách quan</h3>`;
exam.trac_nghiem.forEach((q, index) => {
let maxOptLen = Math.max(...q.options.map(opt => opt.length));
let gridCols = "grid-cols-2 md:grid-cols-4";
if (maxOptLen > 60) {
gridCols = "grid-cols-1";
} else if (maxOptLen > 22) {
gridCols = "grid-cols-1 md:grid-cols-2";
}
htmlStr += `<div class="mb-8 page-break-avoid"><p class="font-bold text-lg mb-3">${q.q_title}: <span class="font-normal">${q.q_content}</span></p><div class="grid ${gridCols} gap-4">`;
q.options.forEach((opt, optIndex) => {
let isCorrect = (optIndex === q.correct_idx) ? "correct-option" : "";
let displayOpt = opt.replace(/^([A-D]\.)\s*/, '<span class="font-bold text-indigo-700 mr-2">$1</span>');
htmlStr += `<div class="${isCorrect} option-btn border-2 border-gray-200 bg-white rounded-xl p-3 min-h-[3.5rem] text-center cursor-pointer transition flex items-center justify-center hover:bg-indigo-50" onclick="selectOption(this)">${displayOpt}</div>`;
});
htmlStr += `</div>`;
if(q.explain) htmlStr += `<div class="answer-explanation mt-3 p-3 bg-yellow-50 border-l-4 border-yellow-400 text-sm text-yellow-800 rounded">${q.explain}</div>`;
htmlStr += `</div>`;
});
htmlStr += `</div>`;
}
// ================= RENDER TỰ LUẬN KÈM VỞ Ô LY VECTOR =================
if (hasTuLuan) {
exam.tu_luan.forEach((t, index) => {
let totalLines = 4;
if (t.solution) {
// BƯỚC 1: XÁC ĐỊNH VỊ TRÍ BẮT ĐẦU ĐẾM DÒNG
let countString = t.solution || "";
let startIndex = 0;
const ttIndex = countString.search(/Tóm tắt/i);
if (ttIndex !== -1) {
startIndex = ttIndex;
} else {
const bgIndex = countString.search(/Bài giải/i);
if (bgIndex !== -1) startIndex = bgIndex;
}
countString = countString.substring(startIndex);
// BƯỚC 2: ĐẾM SỐ DÒNG THỰC TẾ (CẬP NHẬT THUẬT TOÁN CHUẨN)
// Nhận diện toàn bộ các thẻ kết thúc block hoặc ngắt dòng
const lineBreaks = (countString.match(/<br[^>]*>|<\/div>|<\/li>|<\/p>/gi) || []).length;
// Bù thêm 3 dòng không gian nếu phát hiện có phép đặt tính dọc
const mathPadding = /\\begin\{array\}/i.test(countString) ? 3 : 0;
let actualLines = lineBreaks + mathPadding + 1; // +1 làm dòng đệm
if (actualLines < 4) actualLines = 4; // Tối thiểu 4 dòng
totalLines = actualLines;
}
if (t.lines_needed) {
totalLines = t.lines_needed;
}
// Tính chiều cao tối thiểu cho khung trắng (dành cho chế độ in/làm bài)
const lineSize = 40;
const workspaceHeight = totalLines * lineSize;
const vectorGridHTML = generateVectorGrid(workspaceHeight);
// Giao diện tự luận mới: Khôi phục vở ô ly khi Làm bài/In đề, ẩn đi khi Xem đáp án
let workspaceHTML = `
<div class="flex flex-col w-full gap-4 mt-2">
<!-- Vùng để học sinh làm bài: Có lưới ô ly (ẩn khi xem đáp án) -->
<div class="empty-workspace oly-bg shadow-sm relative overflow-hidden" style="min-height: ${workspaceHeight}px;">
<!-- Lề đỏ -->
<div class="absolute top-0 left-0 w-12 md:w-16 h-full border-r-2 border-red-300 bg-red-50/10 z-0"></div>
${vectorGridHTML}
</div>
<!-- Chiến thuật (Chỉ hiện khi bấm Hướng Dẫn) -->
<div class="hint-content bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg shadow-sm">
<div class="font-bold text-yellow-800 mb-2 flex items-center gap-2">💡 CHIẾN THUẬT TƯ DUY:</div>
<div class="text-gray-700 text-sm md:text-base">${t.strategy}</div>
</div>
<!-- Nội dung giải (Hiện khi bấm Xem Đáp Án) -->
<div class="answer-explanation bg-green-50 border border-green-200 p-5 rounded-xl shadow-sm">
<div class="font-bold text-green-800 mb-3 flex items-center gap-2">📝 TRÌNH BÀY LỜI GIẢI:</div>
<div class="text-blue-900 text-lg md:text-xl font-medium leading-[2.2] tracking-wide w-full">
${t.solution}
</div>
</div>
</div>`;
// Gắn tiêu đề "Phần 2: Tự Luận" vào bài đầu tiên
let displayTitle = index === 0 ? `<span class="uppercase text-indigo-700 text-2xl font-bold block mb-4 border-b-2 border-indigo-100 pb-2">PHẦN 2: TỰ LUẬN</span>${t.t_title}` : t.t_title;
// GỠ BỎ LIST-DISC VÀ ML-5 ĐỂ LOẠI BỎ DẤU CHẤM TRÒN VÀ CĂN SÁT LỀ TRÁI
htmlStr += `
<div class="mb-12 page-break-avoid tu-luan-item">
<p class="font-bold text-lg mb-3">${displayTitle}:</p><div class="text-lg leading-relaxed">${t.t_content}</div>
<!-- Vùng vở ô ly 1 cột -->
<div class="student-workspace">
${workspaceHTML}
</div>
</div>`;
});
} else {
htmlStr += `<h3 class="text-2xl font-bold text-indigo-700 border-b-2 border-indigo-100 pb-2 mb-6 uppercase">Phần 2: Tự luận</h3><div class="text-gray-500 italic">Không có câu hỏi tự luận.</div>`;
}
document.getElementById('exam-dynamic-content').innerHTML = htmlStr;
// Khôi phục trạng thái
document.body.classList.remove('show-answers', 'show-hints', 'testing-mode', 'print-full-page');
const printToggleCb = document.getElementById('fillPageToggle');
if (printToggleCb) printToggleCb.checked = false;
resetAnswerBtn();
resetHintsBtn();
resetTestingBtn();
document.getElementById('menu-view').classList.add('hidden');
document.getElementById('exam-view').classList.remove('hidden');
const printToggle = document.getElementById('printFullPageWrapper');
if(printToggle) printToggle.classList.add('hidden');
window.scrollTo(0, 0);
renderMathInElement(document.getElementById('exam-dynamic-content'), {

{ q_title: "Câu 7", q_content: "Đĩa cân bên trái để $1$&nbsp;con ngỗng, đĩa cân bên phải để $2$&nbsp;con vịt thì cân thăng bằng. Biết mỗi con vịt cân nặng $3\\text{ kg}$. Hỏi con ngỗng cân nặng bao nhiêu ki-lô-gam?", options: ["A. $3\\text{ kg}$", "B. $5\\text{ kg}$", "C. $6\\text{ kg}$", "D. $9\\text{ kg}$"], correct_idx: 2, explain: "Cân thăng bằng nên: $1$&nbsp;Ngỗng = $2$&nbsp;Vịt. Mỗi con vịt nặng $3\\text{ kg}$, do đó $2$&nbsp;con vịt nặng: $3 + 3 = 6\\text{ (kg)}$. Vậy con ngỗng nặng $6\\text{ kg}$." },
{ q_title: "Câu 8", q_content: "Tìm số có hai chữ số, biết tổng hai chữ số bằng $9$ và hiệu hai chữ số bằng $3$. Số đó là (biết chữ số hàng chục lớn hơn chữ số hàng đơn vị):", options: ["A. $72$", "B. $63$", "C. $54$", "D. $81$"], correct_idx: 1, explain: "Thử chọn các đáp án: $7+2=9, 7-2=5$ (Loại); $6+3=9, 6-3=3$ (Thỏa mãn); $5+4=9, 5-4=1$ (Loại); $8+1=9, 8-1=7$ (Loại). Vậy số đó là $63$." },
{ q_title: "Câu 9", q_content: "Tìm $x$ là số tròn chục lớn nhất thỏa mãn điều kiện: $x < 55$.", options: ["A. $x = 54$", "B. $x = 60$", "C. $x = 40$", "D. $x = 50$"], correct_idx: 3, explain: "Các số tròn chục nhỏ hơn $55$ là: $10, 20, 30, 40, 50$. Trong đó số lớn nhất là $50$." },
{ q_title: "Câu 10", q_content: "Mai học bài lúc kim giờ chỉ qua số 8 một chút, kim phút chỉ số 6. Lúc đó là buổi tối. Hỏi Mai học bài lúc mấy giờ?", options: ["A. $8$&nbsp;giờ $30$&nbsp;phút tối", "B. $6$&nbsp;giờ $40$&nbsp;phút tối", "C. $8$&nbsp;giờ tối", "D. $9$&nbsp;giờ kém $30$&nbsp;phút tối"], correct_idx: 0, explain: "Kim giờ qua số 8 nên là 8 giờ hơn. Kim phút chỉ số 6 tương ứng với 30 phút. Ghép với thời điểm buổi tối, thời gian Mai học bài là $8$&nbsp;giờ $30$&nbsp;phút tối." },
{ q_title: "Câu 11", q_content: "Hai số có tổng là $45$. Nếu tăng số hạng thứ nhất lên $5$&nbsp;đơn vị và giảm số hạng thứ hai đi $2$&nbsp;đơn vị thì tổng mới là bao nhiêu?", options: ["A. $48$", "B. $42$", "C. $50$", "D. $45$"], correct_idx: 0, explain: "Khi tăng số hạng thứ nhất $5$&nbsp;đơn vị, tổng tăng $5$. Khi giảm số hạng thứ hai $2$&nbsp;đơn vị, tổng giảm $2$. Tổng mới là: $45 + 5 - 2 = 48$." },

{ t_title: "Bài 1", t_content: "Tính nhanh: <div class='text-center text-xl my-4'>$27 + 45 - 27 + 15$</div>", strategy: "WHAT (Điều gì đặc biệt trong phép tính này?): Hãy quan sát các số xuất hiện trong dãy tính. Có số nào lặp lại không? Đứng trước các số lặp lại đó là dấu gì?<br>HOW (Làm thế nào để tính nhanh?): Ta có thể nhóm cặp các số nào để triệt tiêu nhau? Phần còn lại ghép với nhau tạo ra số tròn chục không?", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>$27 + 45 - 27 + 15$<br>$= (27 - 27) + (45 + 15)$<br>$= 0 + 60$<br>$= 60$</div>" },
{ t_title: "Bài 2", t_content: "Tuấn có $1$&nbsp;tá bút chì. Tuấn có ít hơn Mai $3$&nbsp;cái bút chì. Hỏi cả hai bạn có tất cả bao nhiêu cái bút chì?", strategy: "WHAT (Dữ kiện đang bị ẩn là gì?): '1 tá' nghĩa là bao nhiêu chiếc bút? Hãy đổi đơn vị trước tiên.<br>WHO (Ai đang có nhiều bút hơn?): Câu 'Tuấn có ít hơn Mai' đồng nghĩa với việc Mai có nhiều hơn hay ít hơn Tuấn? Đừng để bẫy chữ 'ít hơn' lừa làm phép tính trừ nhé!<br>HOW (Tính tổng bằng cách nào?): Để tìm 'cả hai bạn', ta phải lấy số bút của Tuấn cộng với số bút của ai?", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Tuấn có: $1$&nbsp;tá bút chì.<br>Tuấn ít hơn Mai: $3$&nbsp;bút chì.<br>Cả hai bạn: $\\dots$&nbsp;bút chì?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Đổi: $1$&nbsp;tá bút chì = $12$&nbsp;cái bút chì.<br>Vì Tuấn có ít hơn Mai $3$&nbsp;cái bút chì nên Mai có nhiều hơn Tuấn $3$&nbsp;cái bút chì. Số bút chì của Mai là:<br>$12 + 3 = 15$&nbsp;(cái)<br>Cả hai bạn có tất cả số bút chì là:<br>$12 + 15 = 27$&nbsp;(cái)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $27$&nbsp;cái bút chì.</div>" },
{ t_title: "Bài 3", t_content: "Một mảnh giấy hình chữ nhật được cắt thành hai hình vuông giống hệt nhau. Biết chu vi của một hình vuông là $16\\text{ cm}$. Tính chu vi của mảnh giấy hình chữ nhật ban đầu.", strategy: "Khi một hình chữ nhật bị cắt đôi thành 2 hình vuông, thì chiều rộng của hình chữ nhật chính là cạnh của hình vuông, còn chiều dài của hình chữ nhật gấp đôi cạnh hình vuông. Hãy tính cạnh hình vuông trước (lấy chu vi chia 4), sau đó tính chiều dài và chiều rộng hình chữ nhật.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Cắt HCN thành 2 HV.<br>Chu vi 1 HV: $16\\text{ cm}$<br>Chu vi HCN: $\\dots\\text{ cm}$?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Độ dài một cạnh của hình vuông (cũng là chiều rộng hình chữ nhật) là:<br>$16 : 4 = 4$&nbsp;(cm)<br>Vì hình chữ nhật được ghép từ $2$&nbsp;hình vuông nên chiều dài hình chữ nhật là:<br>$4 \\times 2 = 8$&nbsp;(cm)<br>Chu vi của mảnh giấy hình chữ nhật ban đầu là:<br>$8 + 4 + 8 + 4 = 24$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $24\\text{ cm}$.</div>" },
{ t_title: "Bài 4", t_content: "Hai hộp bi có tất cả $40$&nbsp;viên bi. Nếu chuyển từ hộp thứ nhất sang hộp thứ hai $5$&nbsp;viên bi thì số bi ở hai hộp bằng nhau. Hỏi ban đầu hộp thứ nhất có bao nhiêu viên bi?", strategy: "WHAT (Cái gì không thay đổi?): Khi chuyển bi từ hộp này sang hộp kia, TỔNG số bi của cả hai hộp có bị thay đổi không?<br>HOW (Tính lúc sau thế nào?): Nếu tổng không đổi là 40 viên, mà lúc sau hai hộp 'bằng nhau', vậy lúc sau mỗi hộp có bao nhiêu viên? Phép chia nào được sử dụng?<br>WHEN (Lúc đầu thì sao?): Sau khi cho đi 5 viên thì hộp thứ nhất còn lại đúng bằng kết quả vừa tính. Vậy để tìm lúc đầu hộp thứ nhất, ta phải làm phép tính gì (cộng trả lại hay trừ đi)?", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Tổng $2$&nbsp;hộp: $40$&nbsp;viên.<br>Hộp 1 chuyển hộp 2: $5$&nbsp;viên $\\Rightarrow$ Hai hộp bằng nhau.<br>Hộp 1 lúc đầu: $\\dots$&nbsp;viên?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi chuyển bi từ hộp thứ nhất sang hộp thứ hai thì tổng số bi của cả hai hộp vẫn không thay đổi (vẫn là $40$&nbsp;viên bi).<br>Lúc sau, hai hộp có số bi bằng nhau nên lúc đó mỗi hộp có số viên bi là:<br>$40 : 2 = 20$&nbsp;(viên bi)<br>Vì hộp thứ nhất đã chuyển đi $5$&nbsp;viên bi thì mới còn $20$&nbsp;viên, nên ban đầu hộp thứ nhất có số viên bi là:<br>$20 + 5 = 25$&nbsp;(viên bi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $25$&nbsp;viên bi.</div>" },
{ t_title: "Bài 5", t_content: "Năm nay mẹ $32$&nbsp;tuổi, con $8$&nbsp;tuổi. Hỏi mấy năm nữa thì tuổi của mẹ sẽ bằng tổng số tuổi của hai mẹ con hiện nay?", strategy: "WHAT (Mục tiêu cần đạt là gì?): Bài toán yêu cầu mẹ phải đạt đến mốc tuổi bằng 'tổng số tuổi của hai mẹ con hiện nay'. Hãy tính cái tổng đó trước!<br>HOW (Tính số năm trôi qua như thế nào?): Hiện nay mẹ đang 32 tuổi. Để mẹ đạt được con số tổng vừa tính ở trên, mẹ phải tăng thêm bao nhiêu tuổi?<br>WHY (Tại sao không cần quan tâm tuổi con lúc sau?): Mỗi năm trôi qua mỗi người tăng 1 tuổi. Số tuổi mẹ cần tăng thêm chính là số năm cần chờ đợi. Không cần tính tuổi của con trong tương lai để giải bài này.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Hiện nay mẹ: $32$&nbsp;tuổi, con: $8$&nbsp;tuổi.<br>Tuổi mẹ = Tổng tuổi mẹ và con hiện nay sau: $\\dots$&nbsp;năm?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Tổng số tuổi của hai mẹ con hiện nay là:<br>$32 + 8 = 40$&nbsp;(tuổi)<br>Mẹ cần đạt đến số tuổi bằng tổng trên, tức là mẹ phải đạt $40$&nbsp;tuổi.<br>Số tuổi mẹ cần tăng thêm là:<br>$40 - 32 = 8$&nbsp;(tuổi)<br>Mỗi năm mẹ tăng thêm $1$&nbsp;tuổi, nên mẹ cần tăng thêm $8$&nbsp;tuổi tương ứng với $8$&nbsp;năm nữa.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $8$&nbsp;năm nữa.</div>" },
{ t_title: "Bài 6", t_content: "Bác thợ mộc cưa một khúc gỗ dài $10\\text{ dm}$ thành các đoạn nhỏ, mỗi đoạn dài $2\\text{ dm}$. Biết rằng mỗi nhát cưa bác cưa mất $5$&nbsp;phút, và cứ sau mỗi nhát cưa bác lại nghỉ tay $2$&nbsp;phút. Hỏi bác thợ mộc mất tất cả bao nhiêu phút để cưa xong khúc gỗ đó?", strategy: "WHAT (Có bao nhiêu đoạn gỗ?): Khúc gỗ dài 10dm, cắt thành đoạn 2dm. Cần dùng phép chia để xem khúc gỗ chia làm mấy đoạn.<br>WHY (Cưa gỗ có giống chia kẹo không?): Để cắt được 5 đoạn thẳng, ta cần mấy nhát cắt? (Nhớ quy tắc: Số vết cắt luôn ít hơn số đoạn là 1).<br>WHERE (Cái bẫy thời gian nằm ở đâu?): Ở nhát cưa cuối cùng, khúc gỗ đã bị đứt rời hoàn toàn, công việc đã 'xong'. Vậy bác thợ mộc có cần tính thời gian nghỉ 2 phút sau nhát cưa cuối cùng vào tổng thời gian làm việc không?<br>HOW (Tính tổng thời gian thế nào?): Tính tổng thời gian cưa của tất cả các nhát cưa. Sau đó tính tổng thời gian nghỉ (nhớ trừ đi lần nghỉ cuối). Cộng hai kết quả lại.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Gỗ dài: $10\\text{ dm}$. Cưa thành đoạn: $2\\text{ dm}$.<br>1 nhát cưa: $5$&nbsp;phút. Nghỉ: $2$&nbsp;phút.<br>Tổng thời gian: $\\dots$&nbsp;phút?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Bác thợ mộc cưa khúc gỗ thành số đoạn nhỏ là:<br>$10 : 2 = 5$&nbsp;(đoạn)<br>Để cưa khúc gỗ thành $5$&nbsp;đoạn, bác thợ mộc chỉ cần thực hiện số nhát cưa là:<br>$5 - 1 = 4$&nbsp;(nhát cưa)<br>Thời gian để thực hiện $4$&nbsp;nhát cưa (không tính lúc nghỉ) là:<br>$4 \\times 5 = 20$&nbsp;(phút)<br>Vì nhát cưa cuối cùng cưa xong là hoàn thành công việc, nên bác chỉ có $3$&nbsp;lần nghỉ giữa chừng. Thời gian nghỉ tay là:<br>$3 \\times 2 = 6$&nbsp;(phút)<br>Bác thợ mộc mất tất cả số thời gian để cưa xong khúc gỗ là:<br>$20 + 6 = 26$&nbsp;(phút)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $26$&nbsp;phút.</div>" }
]

{ t_title: "Bài 2", t_content: "Điền các số từ 1 đến 9 vào các ô trống trong hình vuông gồm 9 ô (3 hàng ngang, 3 hàng dọc) sao cho tổng 3 số theo hàng ngang, hàng dọc hay đường chéo đều bằng $15$. Biết rằng số 5 được đặt ở ô chính giữa, số 8 đặt ở góc trên bên trái, số 4 đặt ở góc trên bên phải.<br><div class='flex justify-center my-4'><svg width='150' height='150' viewBox='0 0 150 150'><rect x='10' y='10' width='130' height='130' fill='none' stroke='#1f2937' stroke-width='2'/><line x1='10' y1='53.3' x2='140' y2='53.3' stroke='#1f2937' stroke-width='2'/><line x1='10' y1='96.6' x2='140' y2='96.6' stroke='#1f2937' stroke-width='2'/><line x1='53.3' y1='10' x2='53.3' y2='140' stroke='#1f2937' stroke-width='2'/><line x1='96.6' y1='10' x2='96.6' y2='140' stroke='#1f2937' stroke-width='2'/><text x='31.6' y='40' font-size='24' font-weight='bold' text-anchor='middle'>8</text><text x='118.3' y='40' font-size='24' font-weight='bold' text-anchor='middle'>4</text><text x='75' y='83.3' font-size='24' font-weight='bold' text-anchor='middle'>5</text></svg></div>", strategy: "WHERE (Nên bắt đầu điền từ đâu?): Hàng hoặc cột nào đã có sẵn 2 số thì ta sẽ tính được ô thứ 3 ở hàng/cột đó đúng không?<br>HOW (Tính số còn thiếu bằng cách nào?): Đề bài yêu cầu tổng bằng 15. Lấy 15 trừ đi tổng của 2 số đã biết trên cùng 1 hàng/cột/đường chéo thì sẽ ra số cần tìm.<br>WHAT NEXT: Tìm ô góc dưới bên phải (theo đường chéo 8-5), sau đó tìm ô góc dưới bên trái (đường chéo 4-5). Cứ thế giải quyết các ô còn lại.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Tổng 3 số ở mỗi hàng, cột, đường chéo là $15$. Ta tính lần lượt các ô như sau:<br>- Ô giữa hàng ngang trên cùng: $15 - 8 - 4 = 3$<br>- Ô góc dưới bên phải (đường chéo đi qua $8$ và $5$): $15 - 8 - 5 = 2$<br>- Ô góc dưới bên trái (đường chéo đi qua $4$ và $5$): $15 - 4 - 5 = 6$<br>- Ô giữa hàng dọc bên trái: $15 - 8 - 6 = 1$<br>- Ô giữa hàng dọc bên phải: $15 - 4 - 2 = 9$<br>- Ô giữa hàng ngang dưới cùng: $15 - 6 - 2 = 7$<br>Ta được bảng hoàn chỉnh:</div><div class='flex justify-center mt-2'><svg width='150' height='150' viewBox='0 0 150 150'><rect x='10' y='10' width='130' height='130' fill='none' stroke='#1f2937' stroke-width='2'/><line x1='10' y1='53.3' x2='140' y2='53.3' stroke='#1f2937' stroke-width='2'/><line x1='10' y1='96.6' x2='140' y2='96.6' stroke='#1f2937' stroke-width='2'/><line x1='53.3' y1='10' x2='53.3' y2='140' stroke='#1f2937' stroke-width='2'/><line x1='96.6' y1='10' x2='96.6' y2='140' stroke='#1f2937' stroke-width='2'/><text x='31.6' y='40' font-size='24' font-weight='bold' text-anchor='middle'>8</text><text x='75' y='40' font-size='24' font-weight='bold' text-anchor='middle' fill='#dc2626'>3</text><text x='118.3' y='40' font-size='24' font-weight='bold' text-anchor='middle'>4</text><text x='31.6' y='83.3' font-size='24' font-weight='bold' text-anchor='middle' fill='#dc2626'>1</text><text x='75' y='83.3' font-size='24' font-weight='bold' text-anchor='middle'>5</text><text x='118.3' y='83.3' font-size='24' font-weight='bold' text-anchor='middle' fill='#dc2626'>9</text><text x='31.6' y='126.6' font-size='24' font-weight='bold' text-anchor='middle' fill='#dc2626'>6</text><text x='75' y='126.6' font-size='24' font-weight='bold' text-anchor='middle' fill='#dc2626'>7</text><text x='118.3' y='126.6' font-size='24' font-weight='bold' text-anchor='middle' fill='#dc2626'>2</text></svg></div>" },
{ t_title: "Bài 3", t_content: "Hiện nay anh $12$&nbsp;tuổi, em $7$&nbsp;tuổi. Hỏi khi tuổi anh bằng tuổi em hiện nay thì lúc đó em bao nhiêu tuổi?", strategy: "WHAT (Chìa khóa của bài toán tuổi là gì?): Hiệu số tuổi của hai anh em hiện nay là bao nhiêu? Khoảng cách này có bao giờ thay đổi không?<br>WHEN (Bài toán hỏi về quá khứ hay tương lai?): 'Khi tuổi anh bằng tuổi em hiện nay' (tức là khi anh 7 tuổi) - điều này đã xảy ra trong quá khứ hay chưa xảy ra?<br>HOW (Làm sao để biết lùi về mấy năm?): Từ 12 tuổi xuống 7 tuổi là cách đây mấy năm? Khi anh lùi từng đó năm thì tuổi em cũng phải lùi đi bao nhiêu năm?", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Hiện nay: Anh $12$&nbsp;tuổi, em $7$&nbsp;tuổi.<br>Khi anh $7$&nbsp;tuổi $\\Rightarrow$ Em: $\\dots$&nbsp;tuổi?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Hiệu số tuổi của hai anh em hiện nay là:<br>$12 - 7 = 5$&nbsp;(tuổi)<br>Vì hiệu số tuổi không bao giờ thay đổi nên anh luôn hơn em $5$&nbsp;tuổi.<br>Khi tuổi anh bằng tuổi em hiện nay tức là lúc anh $7$&nbsp;tuổi. Lúc đó số tuổi của em là:<br>$7 - 5 = 2$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $2$&nbsp;tuổi.</div>" },
{ t_title: "Bài 4", t_content: "Trong một hộp có $6$&nbsp;quả bóng đỏ và $4$&nbsp;quả bóng xanh. Minh nhắm mắt bốc bóng ra khỏi hộp. Hỏi Minh phải bốc ra ít nhất bao nhiêu quả bóng để CHẮC CHẮN trong số đó có $1$&nbsp;quả bóng đỏ?", strategy: "WHAT (Chắc chắn nghĩa là gì?): Chắc chắn tức là dù có xui xẻo đến mức nào đi nữa, cứ bốc lên là phải thỏa mãn điều kiện đề bài.<br>HOW (Lập luận trường hợp xui xẻo nhất như thế nào?): Nếu Minh cần bóng đỏ, thì trường hợp 'đen đủi' nhất là Minh bốc toàn trúng bóng màu gì trước?<br>WHY (Tại sao phải lấy hết số lượng màu không cần thiết?): Nếu bốc hết sạch số bóng xanh trong hộp, thì quả bóng bốc lên tiếp theo BẮT BUỘC phải là màu gì?", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Có: $6$&nbsp;bóng đỏ, $4$&nbsp;bóng xanh.<br>Bốc ít nhất: $\\dots$&nbsp;bóng $\\Rightarrow$ Chắc chắn có $1$&nbsp;bóng đỏ.</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Để chắc chắn bốc được $1$&nbsp;quả bóng đỏ, ta phải xét đến trường hợp rủi ro nhất (xui xẻo nhất).<br>Trường hợp rủi ro nhất là Minh nhắm mắt bốc lên toàn trúng bóng xanh. Vì trong hộp có $4$&nbsp;quả bóng xanh, nên Minh bốc $4$&nbsp;lần đầu tiên đều có thể là bóng xanh.<br>Lúc này, trong hộp đã hết bóng xanh, chỉ còn lại toàn bóng đỏ.<br>Vậy ở lần bốc tiếp theo (lần thứ $5$), chắc chắn Minh sẽ bốc được một quả bóng đỏ.<br>Số quả bóng Minh cần bốc ít nhất để chắc chắn có $1$&nbsp;quả bóng đỏ là:<br>$4 + 1 = 5$&nbsp;(quả bóng)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $5$&nbsp;quả bóng.</div>" },
{ t_title: "Bài 5", t_content: "Một khúc vải dài $15\\text{ m}$. Người thợ may cứ mỗi ngày cắt ra $3\\text{ m}$ để may quần áo. Hỏi người thợ may mất bao nhiêu ngày để cắt hết khúc vải đó?", strategy: "WHAT (Khúc vải bị cắt thành mấy đoạn?): Tổng độ dài là 15m, mỗi đoạn 3m. Hãy tính xem cắt được tất cả mấy đoạn vải.<br>WHEN (Lần cắt cuối cùng có gì đặc biệt?): Để cắt thành 2 đoạn vải, ta cần mấy nhát cắt? Vậy để cắt thành số đoạn vừa tính, ta cần mấy nhát cắt (số ngày cắt)? Nhát cắt cuối cùng khúc vải đứt ra làm đôi, phần còn lại có cần phải cắt vào ngày hôm sau nữa không?", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Khúc vải: $15\\text{ m}$. Mỗi ngày cắt: $3\\text{ m}$.<br>Cắt hết trong: $\\dots$&nbsp;ngày?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Người thợ cắt khúc vải đó thành số đoạn là:<br>$15 : 3 = 5$&nbsp;(đoạn)<br>Để cắt một khúc vải thành $5$&nbsp;đoạn, người thợ may cần thực hiện số lần cắt là:<br>$5 - 1 = 4$&nbsp;(lần cắt)<br>Vì mỗi ngày thợ may thực hiện $1$&nbsp;lần cắt (cắt ra $3\\text{m}$), nên số ngày cần thiết để cắt hết khúc vải là $4$&nbsp;ngày. (Lần cắt thứ $4$ đứt ra đoạn $3\\text{m}$ cuối cùng nên không mất thêm ngày thứ $5$).</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $4$&nbsp;ngày.</div>" },
{ t_title: "Bài 6", t_content: "Trên sân có một số con gà và chó. Nam đếm được tất cả có $5$&nbsp;cái đầu và $14$&nbsp;cái chân. Hỏi trên sân có bao nhiêu con gà và bao nhiêu con chó?", strategy: "WHAT (Dữ kiện cơ sở): Mỗi con gà có mấy cái chân? Mỗi con chó có mấy cái chân? 5 cái đầu nghĩa là tổng số con vật trên sân là mấy con?<br>WHAT IF (Giả sử toàn bộ là một loài): Hãy tưởng tượng nếu tất cả 5 con vật trên sân ĐỀU LÀ GÀ thì tổng số chân sẽ là bao nhiêu?<br>WHY (Tại sao có sự chênh lệch?): Số chân thực tế đề bài cho là 14 chân. Số chân ta vừa tính ở giả sử bị 'hụt' (thiếu) đi mấy chân? Tại sao lại thiếu? (Vì ta đã trót tính những con chó thành những con gà. Mỗi con chó bị tính hụt mất mấy chân?).<br>HOW (Tìm số lượng từng loài): Lấy tổng số chân bị thiếu chia cho số chân thiếu của mỗi con chó, ta sẽ ra số lượng chó. Có chó rồi, tìm gà thế nào?", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Gà và Chó: $5$&nbsp;cái đầu, $14$&nbsp;cái chân.<br>Gà: $\\dots$&nbsp;con? Chó: $\\dots$&nbsp;con?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Mỗi con gà có $2$&nbsp;chân, mỗi con chó có $4$&nbsp;chân. $5$&nbsp;cái đầu tương ứng với tổng cộng có $5$&nbsp;con vật trên sân.<br>Giả sử cả $5$&nbsp;con vật trên sân đều là gà. Khi đó tổng số chân là:<br>$2 \\times 5 = 10$&nbsp;(chân)<br>Số chân bị thiếu đi so với thực tế là:<br>$14 - 10 = 4$&nbsp;(chân)<br>Sở dĩ bị thiếu $4$&nbsp;chân là do ta đã tính những con chó như những con gà. Mỗi con chó khi bị coi là gà đã bị tính hụt đi số chân là:<br>$4 - 2 = 2$&nbsp;(chân)<br>Số con chó trên sân là:<br>$4 : 2 = 2$&nbsp;(con chó)<br>Số con gà trên sân là:<br>$5 - 2 = 3$&nbsp;(con gà)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $3$&nbsp;con gà, $2$&nbsp;con chó.</div>" }
]
});
</script>
