<!DOCTYPE html>
<html lang="vi">
<!-- =============================================================================== -->
<!-- PHẦN 1: GIAO DIỆN & ĐỘNG CƠ HOẠT ĐỘNG (TÍCH HỢP VỞ Ô LY VECTOR & AUTO-FILL)   -->
<!-- =============================================================================== -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ Thống Đề Thi Học Sinh Giỏi Toán Lớp 2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<style>
body { font-family: 'Nunito', sans-serif; background-color: #f3f4f6; }
.answer-explanation { display: none; }
.show-answers .answer-explanation { display: block; }
.show-answers .correct-option {
background-color: #d1fae5 !important;
border-color: #10b981 !important;
color: #065f46 !important;
font-weight: bold;
}
.selected-option {
background-color: #eff6ff !important;
border-color: #3b82f6 !important;
color: #1d4ed8 !important;
font-weight: bold;
}
.show-answers .selected-option:not(.correct-option) {
background-color: #fef2f2 !important;
border-color: #ef4444 !important;
color: #b91c1c !important;
}
.hint-content { display: none; }
.show-hints .hint-content { display: block; }
.testing-mode .option-btn:hover {
background-color: #e0e7ff !important;
}
.option-btn { line-height: 1.6; }
/* KHU VỰC VỞ Ô LY CHO TỰ LUẬN */
.student-workspace { display: none; margin-top: 1.5rem; }
.testing-mode .student-workspace,
.show-answers .student-workspace,
.show-hints .student-workspace { display: block; }
/* Ẩn lưới ô ly khi xem đáp án hoặc hướng dẫn */
.show-answers .empty-workspace,
.show-hints .empty-workspace { display: none !important; }
.oly-bg {
background-color: #fff;
position: relative;
border: 1px solid #545557;
border-radius: 4px;
width: 100%;
overflow: hidden;
}
/* Các class định dạng cho nét vẽ Vector DOM (Chống vỡ hạt khi zoom/print) */
.stroke-small { stroke: #E8E9EA; stroke-width: 0.5px; }
.stroke-large { stroke: #545557; stroke-width: 1px; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
-webkit-appearance: none; margin: 0;
}
input[type=number] { -moz-appearance: textfield; }
@media print {
body { background-color: white; padding: 0; }
#menu-view { display: none !important; }
#exam-view { display: block !important; }
.max-w-4xl { box-shadow: none !important; border-radius: 0; padding: 0; width: 100%; max-width: 100%; }
.no-print { display: none !important; }
* { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.page-break-avoid { break-inside: avoid; page-break-inside: avoid; }
/* Khi in: Chỉnh nét vẽ mỏng nhưng sử dụng màu TỐI HƠN để máy in không bị mất nét (Tăng sắc lẹm) */
.oly-bg { border: 0.5pt solid #545557 !important; }
.stroke-small { stroke: #cbd5e1 !important; stroke-width: 0.5pt !important; }
.stroke-large { stroke: #64748b !important; stroke-width: 0.75pt !important; }
/* CSS đặc biệt: Ép 1 bài trải dài full 1 trang A4 và lấp đầy ô ly */
body.print-full-page .tu-luan-item {
min-height: 245mm; /* Tương đương 1 trang A4 trừ lề */
display: flex;
flex-direction: column;
page-break-inside: avoid;
page-break-after: always;
break-after: page;
}
body.print-full-page .student-workspace {
flex-grow: 1;
display: flex;
flex-direction: column;
margin-bottom: 0;
}
/* Đảm bảo khung bọc 1 cột được giãn ra theo chiều dọc */
body.print-full-page .student-workspace > div {
flex-grow: 1;
display: flex;
align-items: stretch;
}
/* Từng cột bung ra */
body.print-full-page .student-workspace > div > div {
display: flex;
flex-direction: column;
flex-grow: 1;
}
/* Oly-bg xóa bỏ giới hạn chiều cao cũ để Flexbox kéo dài vô hạn */
body.print-full-page .oly-bg {
flex-grow: 1;
height: auto !important;
min-height: 0 !important;
}
}
.fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col items-center relative">
<!-- MÀN HÌNH MENU KHỞI ĐỘNG -->
<div id="menu-view" class="max-w-2xl w-[92%] md:w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in relative my-auto">
<div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-10 text-center text-white">
<h1 class="text-4xl font-extrabold mb-3 drop-shadow-lg">🌟 KHO ĐỀ THI TOÁN LỚP 2</h1>
<p class="text-lg font-semibold opacity-90">Bồi dưỡng Học Sinh Giỏi & Phát triển Tư Duy</p>
</div>
<div class="p-8 md:p-12 text-center">
<p class="text-gray-600 mb-8 text-lg">Bạn có thể chọn đề thi từ danh sách hoặc nhập trực tiếp số thứ tự đề.</p>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start text-left max-w-2xl mx-auto mb-6">
<!-- Cách 1: Dropdown -->
<div class="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-sm">
<label for="exam-select" class="block text-sm font-bold text-indigo-700 mb-3 uppercase tracking-wider">
Cách 1: Chọn từ danh sách
</label>
<div class="relative">
<select id="exam-select" onchange="syncInputs('select')" class="block appearance-none w-full bg-white border border-gray-300 text-gray-700 py-3 px-4 pr-8 rounded-xl leading-tight focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-colors cursor-pointer text-base font-medium">
<option value="" disabled selected>-- Đang tải danh sách... --</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
<svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
</div>
</div>
</div>
<!-- Cách 2: Input Number -->
<div class="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-sm relative">
<label for="exam-input" class="block text-sm font-bold text-indigo-700 mb-3 uppercase tracking-wider">
Cách 2: Nhập số thứ tự
</label>
<input type="number" id="exam-input" oninput="syncInputs('input')" placeholder="Ví dụ: 24..."
class="block w-full bg-white border border-gray-300 text-gray-700 py-3 px-4 rounded-xl leading-tight focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-colors text-base font-medium placeholder-gray-400"
onkeypress="handleEnter(event)">
</div>
</div>
<p id="exam-error" class="text-red-500 font-bold mt-3 min-h-[24px] opacity-0 transition-opacity">Không tìm thấy đề này!</p>
<button onclick="submitExamNumber()" class="mt-4 mx-auto w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xl px-12 py-4 rounded-full font-bold shadow-lg transform hover:-translate-y-1 transition-all flex justify-center items-center gap-2">
🚀 BẮT ĐẦU LÀM BÀI
</button>
<p class="mt-10 text-gray-500 font-medium bg-gray-50 inline-block px-4 py-2 rounded-lg border border-gray-200" id="total-exams-info">
Hệ thống đang tải dữ liệu...
</p>
</div>
</div>
<!-- MÀN HÌNH HIỂN THỊ ĐỀ THI -->
<div id="exam-view" class="hidden w-full max-w-4xl mx-auto bg-white shadow-xl relative fade-in md:mb-8 md:rounded-b-2xl md:border-x md:border-b border-gray-200">
<!-- Thanh công cụ (Nút bấm) -->
<div class="sticky top-0 z-50 bg-gray-100/95 backdrop-blur-sm px-4 md:px-6 py-3 flex flex-wrap gap-3 justify-between items-center no-print border-b border-gray-300 shadow-sm">
<button onclick="backToMenu()" class="bg-white hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg font-bold shadow transition-colors border border-gray-300">🔙 Menu</button>
<div class="flex flex-wrap items-center gap-3">
<!-- Nút Tùy chọn in Auto-Fill (Chỉ hiện khi Bật Làm Bài) -->
<label class="flex items-center space-x-2 text-sm font-bold text-gray-700 cursor-pointer select-none bg-white px-3 py-2 rounded-lg border border-gray-300 shadow-sm hover:bg-gray-50 transition hidden" id="printFullPageWrapper">
<input type="checkbox" id="fillPageToggle" class="w-4 h-4 text-indigo-600 rounded cursor-pointer" onchange="toggleFillPage()">
<span>📄 Lấp đầy trang in</span>
</label>
<button id="testingModeBtn" onclick="toggleTestingMode()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-purple-500">✍️ Làm Bài</button>
<button onclick="triggerPrint()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-gray-500">🖨️ In Đề</button>
<button id="toggleHintsBtn" onclick="toggleHints()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-yellow-400">💡 Hướng Dẫn</button>
<button id="toggleAnswersBtn" onclick="toggleAnswers()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors border border-blue-500">👁️ Xem Đáp Án</button>
</div>
</div>
<!-- Header Đề thi -->
<div class="bg-white text-gray-800 p-6 md:p-8 text-center border-b-2 border-gray-200">
<h1 class="text-3xl font-extrabold uppercase tracking-wide mb-2 text-indigo-800">Đề Thi Học Sinh Giỏi Toán Lớp 2</h1>
<h2 id="exam-title-number" class="text-2xl font-bold mb-4 text-gray-700">ĐỀ SỐ ...</h2>
<div class="flex justify-center space-x-8 text-sm font-medium text-gray-600">
<span class="bg-gray-50 border border-gray-200 px-3 py-1 rounded-full shadow-sm" id="exam-time">⏱️ Thời gian</span>
<span class="bg-gray-50 border border-gray-200 px-3 py-1 rounded-full shadow-sm" id="exam-level">⭐ Mức độ</span>
</div>
</div>
<!-- Nơi JS vẽ Nội dung Đề Thi -->
<div id="exam-dynamic-content" class="p-8 pb-12"></div>
</div>
<!-- NÚT LÊN ĐẦU TRANG -->
<button id="backToTopBtn" onclick="scrollToTop()" class="fixed bottom-6 right-4 md:right-8 w-10 h-10 bg-white/90 backdrop-blur-sm border border-gray-200 text-indigo-600 hover:bg-indigo-50 hover:text-indigo-800 rounded-full shadow-lg flex justify-center items-center transition-all duration-300 opacity-0 pointer-events-none z-50 no-print" title="Lên đầu trang">
<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
<path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
</svg>
</button>
<!-- TOAST THÔNG BÁO -->
<div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-center flex items-center gap-2 no-print">
<span class="text-xl">💡</span> <span id="toast-message">Nhấn Ctrl + P để in.</span>
</div>
<script id="app-engine">
window.EXAM_DATA = window.EXAM_DATA || [];
function initApp() {
const total = window.EXAM_DATA.length;
document.getElementById('total-exams-info').innerHTML = `📌 Hệ thống hiện đang tích hợp <strong>${total}</strong> đề thi.`;
document.getElementById('exam-input').value = '';
document.getElementById('exam-error').classList.add('opacity-0');
const selectEl = document.getElementById('exam-select');
selectEl.innerHTML = '<option value="" disabled selected>-- Chọn đề thi --</option>';
window.EXAM_DATA.forEach(exam => {
const opt = document.createElement('option');
opt.value = exam.id;
opt.textContent = `Đề số ${exam.id}: ${exam.title}`;
selectEl.appendChild(opt);
});
}
function syncInputs(source) {
const select = document.getElementById('exam-select');
const input = document.getElementById('exam-input');
const errorEl = document.getElementById('exam-error');
errorEl.classList.add('opacity-0');
if (source === 'select') {
input.value = select.value;
} else if (source === 'input') {
const val = parseInt(input.value);
const exists = window.EXAM_DATA.find(e => e.id === val);
if (exists) {
select.value = val;
} else {
select.value = "";
}
}
}
function handleEnter(e) {
if (e.key === 'Enter') submitExamNumber();
}
function submitExamNumber() {
const inputVal = document.getElementById('exam-input').value.trim();
const selectVal = document.getElementById('exam-select').value;
const errorEl = document.getElementById('exam-error');
let finalId = inputVal || selectVal;
if (!finalId) {
errorEl.innerText = "❌ Vui lòng chọn hoặc nhập số thứ tự đề!";
errorEl.classList.remove('opacity-0');
return;
}
const id = parseInt(finalId);
const exam = window.EXAM_DATA.find(e => e.id === id);
if (!exam) {
errorEl.innerText = `❌ Không tìm thấy Đề số ${id}. Vui lòng nhập lại!`;
errorEl.classList.remove('opacity-0');
} else {
errorEl.classList.add('opacity-0');
openExam(id);
}
}
// KÍCH HOẠT CHẾ ĐỘ AUTO-FILL DÒNG KẺ IN ẤN
function toggleFillPage() {
const isChecked = document.getElementById('fillPageToggle').checked;
if (isChecked) {
document.body.classList.add('print-full-page');
} else {
document.body.classList.remove('print-full-page');
}
}
// HÀM TẠO LƯỚI VECTOR THỦ CÔNG (CHỐNG RASTERIZE 100% VÀ TƯƠNG THÍCH LẤP ĐẦY TRANG)
function generateVectorGrid(baseHeight) {
let pathSmall = "";
let pathLarge = "";
const gridWidth = 1200;
const gridHeight = Math.max(baseHeight, 1500);
for (let y = 10; y <= gridHeight; y += 10) {
if (y % 40 === 0) pathLarge += `M 0 ${y} H ${gridWidth} `;
else pathSmall += `M 0 ${y} H ${gridWidth} `;
}
for (let x = 10; x <= gridWidth; x += 10) {
if (x % 40 === 0) pathLarge += `M ${x} 0 V ${gridHeight} `;
else pathSmall += `M ${x} 0 V ${gridHeight} `;
}
return `<svg width="100%" height="100%" class="pointer-events-none absolute inset-0" xmlns="http://www.w3.org/2000/svg">
<path d="${pathSmall}" fill="none" class="stroke-small" />
<path d="${pathLarge}" fill="none" class="stroke-large" />
</svg>`;
}
function openExam(id) {
const exam = window.EXAM_DATA.find(e => e.id === id);
if(!exam) return;
document.getElementById('exam-title-number').innerText = exam.title;
document.getElementById('exam-time').innerText = '⏱️ ' + exam.time;
document.getElementById('exam-level').innerText = '⭐ ' + exam.level;
let htmlStr = "";
const hasTracNghiem = exam.trac_nghiem && exam.trac_nghiem.length > 0;
const hasTuLuan = exam.tu_luan && exam.tu_luan.length > 0;
// ================= RENDER TRẮC NGHIỆM =================
if (hasTracNghiem) {
htmlStr += `<div class="mb-10"><h3 class="text-2xl font-bold text-indigo-700 border-b-2 border-indigo-100 pb-2 mb-6 uppercase">Phần 1: Trắc nghiệm khách quan</h3>`;
exam.trac_nghiem.forEach((q, index) => {
let maxOptLen = Math.max(...q.options.map(opt => opt.length));
let gridCols = "grid-cols-2 md:grid-cols-4";
if (maxOptLen > 60) {
gridCols = "grid-cols-1";
} else if (maxOptLen > 22) {
gridCols = "grid-cols-1 md:grid-cols-2";
}
htmlStr += `<div class="mb-8 page-break-avoid"><p class="font-bold text-lg mb-3">${q.q_title}: <span class="font-normal">${q.q_content}</span></p><div class="grid ${gridCols} gap-4">`;
q.options.forEach((opt, optIndex) => {
let isCorrect = (optIndex === q.correct_idx) ? "correct-option" : "";
let displayOpt = opt.replace(/^([A-D]\.)\s*/, '<span class="font-bold text-indigo-700 mr-2">$1</span>');
htmlStr += `<div class="${isCorrect} option-btn border-2 border-gray-200 bg-white rounded-xl p-3 min-h-[3.5rem] text-center cursor-pointer transition flex items-center justify-center hover:bg-indigo-50" onclick="selectOption(this)">${displayOpt}</div>`;
});
htmlStr += `</div>`;
if(q.explain) htmlStr += `<div class="answer-explanation mt-3 p-3 bg-yellow-50 border-l-4 border-yellow-400 text-sm text-yellow-800 rounded">${q.explain}</div>`;
htmlStr += `</div>`;
});
htmlStr += `</div>`;
}
// ================= RENDER TỰ LUẬN KÈM VỞ Ô LY VECTOR =================
if (hasTuLuan) {
exam.tu_luan.forEach((t, index) => {
let totalLines = 4;
if (t.solution) {
// BƯỚC 1: XÁC ĐỊNH VỊ TRÍ BẮT ĐẦU ĐẾM DÒNG
let countString = t.solution || "";
let startIndex = 0;
const ttIndex = countString.search(/Tóm tắt/i);
if (ttIndex !== -1) {
startIndex = ttIndex;
} else {
const bgIndex = countString.search(/Bài giải/i);
if (bgIndex !== -1) startIndex = bgIndex;
}
countString = countString.substring(startIndex);
// BƯỚC 2: ĐẾM SỐ DÒNG THỰC TẾ (CẬP NHẬT THUẬT TOÁN CHUẨN)
// Nhận diện toàn bộ các thẻ kết thúc block hoặc ngắt dòng
const lineBreaks = (countString.match(/<br[^>]*>|<\/div>|<\/li>|<\/p>/gi) || []).length;
// Bù thêm 3 dòng không gian nếu phát hiện có phép đặt tính dọc
const mathPadding = /\\begin\{array\}/i.test(countString) ? 3 : 0;
let actualLines = lineBreaks + mathPadding + 1; // +1 làm dòng đệm
if (actualLines < 4) actualLines = 4; // Tối thiểu 4 dòng
totalLines = actualLines;
}
if (t.lines_needed) {
totalLines = t.lines_needed;
}
// Tính chiều cao tối thiểu cho khung trắng (dành cho chế độ in/làm bài)
const lineSize = 40;
const workspaceHeight = totalLines * lineSize;
const vectorGridHTML = generateVectorGrid(workspaceHeight);
// Giao diện tự luận mới: Khôi phục vở ô ly khi Làm bài/In đề, ẩn đi khi Xem đáp án
let workspaceHTML = `
<div class="flex flex-col w-full gap-4 mt-2">
<!-- Vùng để học sinh làm bài: Có lưới ô ly (ẩn khi xem đáp án) -->
<div class="empty-workspace oly-bg shadow-sm relative overflow-hidden" style="min-height: ${workspaceHeight}px;">
<!-- Lề đỏ -->
<div class="absolute top-0 left-0 w-12 md:w-16 h-full border-r-2 border-red-300 bg-red-50/10 z-0"></div>
${vectorGridHTML}
</div>
<!-- Chiến thuật (Chỉ hiện khi bấm Hướng Dẫn) -->
<div class="hint-content bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg shadow-sm">
<div class="font-bold text-yellow-800 mb-2 flex items-center gap-2">💡 CHIẾN THUẬT TƯ DUY:</div>
<div class="text-gray-700 text-sm md:text-base">${t.strategy}</div>
</div>
<!-- Nội dung giải (Hiện khi bấm Xem Đáp Án) -->
<div class="answer-explanation bg-green-50 border border-green-200 p-5 rounded-xl shadow-sm">
<div class="font-bold text-green-800 mb-3 flex items-center gap-2">📝 TRÌNH BÀY LỜI GIẢI:</div>
<div class="text-blue-900 text-lg md:text-xl font-medium leading-[2.2] tracking-wide w-full">
${t.solution}
</div>
</div>
</div>`;
// Gắn tiêu đề "Phần 2: Tự Luận" vào bài đầu tiên
let displayTitle = index === 0 ? `<span class="uppercase text-indigo-700 text-2xl font-bold block mb-4 border-b-2 border-indigo-100 pb-2">PHẦN 2: TỰ LUẬN</span>${t.t_title}` : t.t_title;
// GỠ BỎ LIST-DISC VÀ ML-5 ĐỂ LOẠI BỎ DẤU CHẤM TRÒN VÀ CĂN SÁT LỀ TRÁI
htmlStr += `
<div class="mb-12 page-break-avoid tu-luan-item">
<p class="font-bold text-lg mb-3">${displayTitle}:</p><div class="text-lg leading-relaxed">${t.t_content}</div>
<!-- Vùng vở ô ly 1 cột -->
<div class="student-workspace">
${workspaceHTML}
</div>
</div>`;
});
} else {
htmlStr += `<h3 class="text-2xl font-bold text-indigo-700 border-b-2 border-indigo-100 pb-2 mb-6 uppercase">Phần 2: Tự luận</h3><div class="text-gray-500 italic">Không có câu hỏi tự luận.</div>`;
}
document.getElementById('exam-dynamic-content').innerHTML = htmlStr;
// Khôi phục trạng thái
document.body.classList.remove('show-answers', 'show-hints', 'testing-mode', 'print-full-page');
const printToggleCb = document.getElementById('fillPageToggle');
if (printToggleCb) printToggleCb.checked = false;
resetAnswerBtn();
resetHintsBtn();
resetTestingBtn();
document.getElementById('menu-view').classList.add('hidden');
document.getElementById('exam-view').classList.remove('hidden');
const printToggle = document.getElementById('printFullPageWrapper');
if(printToggle) printToggle.classList.add('hidden');
window.scrollTo(0, 0);
renderMathInElement(document.getElementById('exam-dynamic-content'), {

{ q_title: "Câu 5", q_content: "An đưa cô bán hàng $1$&nbsp;tờ $50 000$&nbsp;đồng để mua $2$&nbsp;quyển vở, mỗi quyển giá $15 000$&nbsp;đồng. Cô bán hàng thối lại An đúng $1$&nbsp;tờ tiền. Tờ tiền đó có mệnh giá là:", options: ["A. $10 000$&nbsp;đồng", "B. $20 000$&nbsp;đồng", "C. $30 000$&nbsp;đồng", "D. $5 000$&nbsp;đồng"], correct_idx: 1, explain: "Giá tiền $2$&nbsp;quyển vở là: $15 000 + 15 000 = 30 000$&nbsp;(đồng). Cô bán hàng thối lại số tiền là: $50 000 - 30 000 = 20 000$&nbsp;(đồng). Tờ tiền đó có mệnh giá $20 000$&nbsp;đồng." },

{ q_title: "Câu 9", q_content: "Cho dãy số: $2, 4, 8, 14, 22, \\dots$&nbsp;Số thích hợp điền vào chỗ chấm là:", options: ["A. $30$", "B. $32$", "C. $34$", "D. $28$"], correct_idx: 1, explain: "Khoảng cách giữa các số tăng dần thành dãy số chẵn: $+2, +4, +6, +8$. Số tiếp theo phải cộng thêm $10$, ta có: $22 + 10 = 32$." },
{ q_title: "Câu 10", q_content: "Bác thợ cắt một sợi dây dài $20\\text{ dm}$ thành các đoạn nhỏ, mỗi đoạn dài $4\\text{ dm}$. Biết mỗi lần cắt bác mất $3$&nbsp;phút. Hỏi bác thợ cắt xong sợi dây đó mất bao nhiêu phút?", options: ["A. $15$&nbsp;phút", "B. $12$&nbsp;phút", "C. $9$&nbsp;phút", "D. $20$&nbsp;phút"], correct_idx: 1, explain: "Bác thợ cắt sợi dây thành số đoạn là: $20 : 4 = 5$&nbsp;(đoạn). Bẫy cắt dây: Số lần cắt luôn ít hơn số đoạn là 1. Số lần cắt là: $5 - 1 = 4$&nbsp;(lần). Thời gian cắt xong sợi dây là: $4 \\times 3 = 12$&nbsp;(phút)." },
{ q_title: "Câu 11", q_content: "Trong giờ tập thể dục, các bạn học sinh xếp thành một hàng dọc. Bạn Mai đếm từ trên xuống thì thấy mình đứng thứ $4$. Đếm từ dưới lên Mai thấy mình đứng thứ $5$. Hỏi hàng dọc đó có tất cả bao nhiêu bạn?", options: ["A. $9$&nbsp;bạn", "B. $8$&nbsp;bạn", "C. $7$&nbsp;bạn", "D. $10$&nbsp;bạn"], correct_idx: 1, explain: "Mai đứng thứ 4 từ trên xuống, nghĩa là phía trước Mai có 3 bạn. Mai đứng thứ 5 từ dưới lên, nghĩa là phía sau Mai có 4 bạn. Tổng số bạn trong hàng là: $3\\text{ (trước)} + 4\\text{ (sau)} + 1\\text{ (Mai)} = 8$&nbsp;(bạn)." },
{ q_title: "Câu 12", q_content: "Hình vẽ dưới đây có bao nhiêu hình tam giác?<br><svg width='200' height='150' viewBox='0 0 160 100' class='mx-auto my-4'><polygon points='80,10 20,90 140,90' fill='none' stroke='#1e3a8a' stroke-width='2.5' stroke-linejoin='round'/><line x1='42.5' y1='60' x2='117.5' y2='60' stroke='#1e3a8a' stroke-width='2.5'/><line x1='80' y1='10' x2='60' y2='90' stroke='#1e3a8a' stroke-width='2.5'/><line x1='80' y1='10' x2='100' y2='90' stroke='#1e3a8a' stroke-width='2.5'/></svg>", options: ["A. $8$&nbsp;hình", "B. $10$&nbsp;hình", "C. $12$&nbsp;hình", "D. $14$&nbsp;hình"], correct_idx: 2, explain: "Đếm phân tầng: Nửa trên có cạnh đáy chia làm $3$&nbsp;đoạn, tạo ra $1 + 2 + 3 = 6$&nbsp;tam giác. Toàn bộ hình lớn cũng có cạnh đáy chia làm $3$&nbsp;đoạn, tạo ra thêm $6$&nbsp;tam giác lớn nữa. Tổng cộng: $6 + 6 = 12$&nbsp;hình tam giác." }

tu_luan: [
{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $457 + 368$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $902 - 145$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 83$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $59 + 784$", strategy: "Viết số thẳng cột hàng đơn vị, chục, trăm. Đặc biệt chú ý cách mượn ở phép trừ qua các số $0$ (câu c) và phép cộng số có $2$&nbsp;chữ số (câu d).", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 457 \\\\ + & 368 \\\\ \\hline & \\mathbf{\\color{red}{825}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 902 \\\\ - & 145 \\\\ \\hline & \\mathbf{\\color{red}{757}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 83 \\\\ \\hline & \\mathbf{\\color{red}{917}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 59 \\\\ + & 784 \\\\ \\hline & \\mathbf{\\color{red}{843}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Tính nhanh (bằng cách thuận tiện nhất):<br>$14 + 25 + 36 + 86 + 75 + 64$", strategy: "Quan sát chữ số hàng đơn vị. Nhóm các số có tổng chữ số hàng đơn vị bằng $10$ để tạo thành các số tròn chục, tròn trăm.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Ta có:</div><div>$14 + 25 + 36 + 86 + 75 + 64$</div><div>$= (14 + 86) + (25 + 75) + (36 + 64)$</div><div>$= 100 + 100 + 100$</div><div>$= 300$</div>" },
{ t_title: "Bài 3", t_content: "Điền chữ số thích hợp vào dấu $\\square$ trong phép tính sau:<br><div class='text-2xl text-center my-4'>$6\\square + \\square 8 = 92$</div>", strategy: "Sử dụng tính chất của phép cộng theo cột dọc để nhẩm ngược từ phải sang trái.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Nhẩm theo cột dọc từ phải sang trái:</div><div>- Cột đơn vị: Mấy cộng với $8$ để được tận cùng là $2$? Ta có $4 + 8 = 12$ (viết $2$ nhớ $1$). Vậy ô vuông ở số hạng thứ nhất điền <strong>$\\mathbf{\\color{red}{4}}$</strong>.</div><div>- Cột chục: $6$ cộng với ô vuông rồi cộng thêm phần nhớ là $1$ thì bằng $9$. Nghĩa là $7 + \\square = 9$. Vậy ô vuông ở số hạng thứ hai điền <strong>$\\mathbf{\\color{red}{2}}$</strong>.</div><div>Phép tính hoàn chỉnh là: <strong>$64 + 28 = 92$</strong>.</div>" },
{ t_title: "Bài 4", t_content: "Năm nay, nhà Mai thu hoạch được $350\\text{ kg}$ cam. Nhà Mai thu hoạch được nhiều hơn nhà Lan $50\\text{ kg}$ cam, nhưng lại ít hơn nhà Hoa $40\\text{ kg}$ cam. Hỏi nhà Hoa thu hoạch được bao nhiêu ki-lô-gam cam?", strategy: "Bài toán yêu cầu tính số cam của nhà Hoa. Dữ kiện nhà Lan là dữ kiện gây nhiễu, ta không cần dùng đến. Cần chú ý bẫy chữ: Nhà Mai 'ít hơn' nhà Hoa, tức là nhà Hoa 'nhiều hơn' nhà Mai.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span></div><div>Nhà Mai: $350\\text{ kg}$</div><div>Nhà Mai ít hơn nhà Hoa: $40\\text{ kg}$</div><div>Nhà Hoa: $\\dots\\text{ kg}$?</div><br><div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Vì nhà Mai thu hoạch được ít hơn nhà Hoa $40\\text{ kg}$, nên nhà Hoa thu hoạch được nhiều hơn nhà Mai $40\\text{ kg}$.</div><div>Nhà Hoa thu hoạch được số ki-lô-gam cam là:</div><div>$350 + 40 = 390$&nbsp;(kg)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $390\\text{ kg}$ cam.</span></div>" },
{ t_title: "Bài 5", t_content: "Người ta dùng một đoạn dây thép để uốn thành một hình tứ giác có $4$&nbsp;cạnh bằng nhau. Biết tổng độ dài của $2$&nbsp;cạnh là $20\\text{ cm}$. Tính độ dài của đoạn dây thép đó (chính là chu vi của hình tứ giác).", strategy: "Tính độ dài của $1$&nbsp;cạnh trước, sau đó nhân với $4$ để tìm chu vi (tổng $4$&nbsp;cạnh). Hoặc nhận thấy $4$&nbsp;cạnh bằng đúng $2$&nbsp;lần của (2 cạnh).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Độ dài của một cạnh hình tứ giác là:</div><div>$20 : 2 = 10$&nbsp;(cm)</div><div>Vì hình tứ giác có $4$&nbsp;cạnh bằng nhau nên chu vi của hình tứ giác (hay độ dài đoạn dây thép) là:</div><div>$10 \\times 4 = 40$&nbsp;(cm)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $40\\text{ cm}$.</span></div>" },
{ t_title: "Bài 6", t_content: "Tổng của hai số là $250$. Nếu tăng số hạng thứ nhất thêm $25$&nbsp;đơn vị và giảm số hạng thứ hai đi $40$&nbsp;đơn vị thì tổng mới sẽ là bao nhiêu?", strategy: "Sự thay đổi của Tổng: Khi số hạng tăng thì tổng tăng, khi số hạng giảm thì tổng giảm. Cứ tuần tự cộng/trừ số đơn vị đề cho trên cái tổng ban đầu.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Khi tăng số hạng thứ nhất thêm $25$&nbsp;đơn vị thì tổng sẽ tăng thêm $25$.</div><div>Khi giảm số hạng thứ hai đi $40$&nbsp;đơn vị thì tổng sẽ giảm đi $40$.</div><div>Tổng mới của hai số sẽ là:</div><div>$250 + 25 - 40 = 235$</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $235$.</span></div>" }
]

{ q_title: "Câu 7", q_content: "Trong một túi có $5$&nbsp;viên bi đỏ, $4$&nbsp;viên bi xanh và $3$&nbsp;viên bi vàng. Không nhìn vào túi, cần lấy ra <strong>ít nhất</strong> bao nhiêu viên bi để <strong>chắc chắn</strong> có $1$&nbsp;viên bi màu đỏ?", options: ["A. $6$&nbsp;viên", "B. $7$&nbsp;viên", "C. $8$&nbsp;viên", "D. $9$&nbsp;viên"], correct_idx: 2, explain: "Trường hợp xui xẻo nhất: Bốc toàn bộ bi xanh và bi vàng ($4 + 3 = 7$&nbsp;viên) mà vẫn chưa có bất kỳ bi đỏ nào. Viên thứ $8$&nbsp;bắt buộc phải là bi đỏ. Do đó cần lấy ít nhất $8$&nbsp;viên." },

{ q_title: "Câu 9", q_content: "Cho dãy số: $3, 6, 12, 24, 48, \\dots$&nbsp;Số thích hợp điền vào chỗ chấm là:", options: ["A. $96$", "B. $84$", "C. $72$", "D. $60$"], correct_idx: 0, explain: "Quy luật dãy số nhân đôi (gấp 2 lần): Số liền sau bằng số liền trước cộng với chính nó ($3+3=6$; $6+6=12$; $12+12=24$; $24+24=48$). Số tiếp theo là: $48 + 48 = 96$." },
{ q_title: "Câu 10", q_content: "Trong sân có $15$&nbsp;con gồm cả lợn và gà. Nam đếm được tất cả có $42$&nbsp;cái chân. Hỏi trong sân có bao nhiêu con lợn?", options: ["A. $6$&nbsp;con", "B. $7$&nbsp;con", "C. $8$&nbsp;con", "D. $9$&nbsp;con"], correct_idx: 0, explain: "Dùng phương pháp giả thiết tạm: Giả sử cả $15$&nbsp;con đều là gà thì có: $15 \\times 2 = 30$&nbsp;(chân). Hụt mất $42 - 30 = 12$&nbsp;(chân) so với thực tế. Mỗi con lợn nhiều hơn gà $2$&nbsp;chân. Số lợn bù vào số chân bị hụt là: $12 : 2 = 6$&nbsp;(con)." },
{ q_title: "Câu 11", q_content: "Hiện nay bố $38$&nbsp;tuổi, con $8$&nbsp;tuổi. Hỏi bao nhiêu năm nữa thì tuổi bố hơn tuổi con $30$&nbsp;tuổi?", options: ["A. $10$&nbsp;năm", "B. $5$&nbsp;năm", "C. Luôn luôn như vậy", "D. Không bao giờ"], correct_idx: 2, explain: "Bẫy logic tuổi tác: Hiệu số tuổi của hai người không bao giờ thay đổi theo thời gian. Hiện nay bố hơn con $38 - 8 = 30$&nbsp;(tuổi). Nên bất kì năm nào bố cũng hơn con $30$&nbsp;tuổi." },

{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $348 + 567$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $810 - 245$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 208$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $79 + 485$", strategy: "Viết số hạng/số trừ dưới số hạng/số bị trừ sao cho các chữ số ở cùng một hàng thẳng cột với nhau. Thực hiện phép tính từ phải sang trái.", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 348 \\\\ + & 567 \\\\ \\hline & \\mathbf{\\color{red}{915}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 810 \\\\ - & 245 \\\\ \\hline & \\mathbf{\\color{red}{565}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 208 \\\\ \\hline & \\mathbf{\\color{red}{792}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 79 \\\\ + & 485 \\\\ \\hline & \\mathbf{\\color{red}{564}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Tính giá trị của các biểu thức sau:<br>a) $5 \\times 9 - 18$<br>b) $45 : 5 + 128$", strategy: "Quy tắc: Nhân chia làm trước, cộng trừ làm sau. Viết đầy đủ từng bước thực hiện.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>a) $5 \\times 9 - 18$</div><div>$= 45 - 18$</div><div>$= 27$</div><br><div>b) $45 : 5 + 128$</div><div>$= 9 + 128$</div><div>$= 137$</div>" },
{ t_title: "Bài 3", t_content: "Điền chữ số thích hợp vào dấu $\\square$ trong phép tính sau:<br><div class='text-2xl text-center my-4'>$8\\square - 3\\square = 45$</div>", strategy: "Giải mã từ phải sang trái. Cột đơn vị: Số nào trừ đi số nào bằng $5$? Vì ta không biết cả $2$&nbsp;số, hãy nhìn sang cột chục. Cột chục: $8 - 3 = 5$, nhưng kết quả lại là $4$. Điều này chứng tỏ ở cột đơn vị đã <strong>phải mượn 1 chục</strong>. Vậy cột đơn vị là phép trừ có mượn: $10 + \\text{ô vuông 1} - \\text{ô vuông 2} = 5$. Ta chọn cặp số đơn giản nhất ví dụ ô vuông 1 là $2$, ô vuông 2 là $7$ (Vì $12 - 7 = 5$).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Nhẩm theo cột dọc từ phải sang trái:</div><div>- Cột chục: Ta thấy $8 - 3 = 5$, nhưng kết quả lại là $4$. Vậy ở hàng đơn vị chắc chắn đã mượn $1$&nbsp;chục.</div><div>- Cột đơn vị: Lấy một số trừ đi một số bằng $5$ (có nhớ). Ta có thể chọn $12 - 7 = 5$ (viết $5$ nhớ $1$). Vậy ô vuông ở số bị trừ là <strong>$\\mathbf{\\color{red}{2}}$</strong>, ô vuông ở số trừ là <strong>$\\mathbf{\\color{red}{7}}$</strong>.</div><div>Phép tính hoàn chỉnh có thể là: <strong>$82 - 37 = 45$</strong>.</div>" },
{ t_title: "Bài 4", t_content: "Cuộn dây điện màu xanh dài $150\\text{ m}$, cuộn dây điện màu vàng ngắn hơn cuộn dây điện màu xanh $25\\text{ m}$. Hỏi cả hai cuộn dây điện dài tất cả bao nhiêu mét?", strategy: "Bài toán móc xích $2$&nbsp;bước giải. Bước 1: Tính chiều dài cuộn màu vàng (ngắn hơn nên dùng phép trừ). Bước 2: Tính tổng chiều dài cả hai cuộn dây.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span></div><div>Dây xanh: $150\\text{ m}$</div><div>Dây vàng ngắn hơn dây xanh: $25\\text{ m}$</div><div>Cả hai dây: $\\dots\\text{ m}$?</div><br><div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Cuộn dây điện màu vàng dài số mét là:</div><div>$150 - 25 = 125$&nbsp;(m)</div><div>Cả hai cuộn dây điện dài tất cả số mét là:</div><div>$150 + 125 = 275$&nbsp;(m)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $275\\text{ m}$.</span></div>" },
{ t_title: "Bài 5", t_content: "Một mảnh vườn hình chữ nhật có chiều dài $25\\text{ m}$, chiều rộng $15\\text{ m}$. Bác nông dân muốn rào lưới xung quanh mảnh vườn đó và chừa ra $2\\text{ m}$ để làm cổng. Hỏi bác nông dân cần mua bao nhiêu mét lưới?", strategy: "Tổng chiều dài hàng rào bao quanh mảnh vườn chính là Chu vi hình chữ nhật. Do có chừa cổng nên số mét lưới cần mua = Chu vi - Chiều rộng cổng.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span></div><div>Chiều dài: $25\\text{ m}$</div><div>Chiều rộng: $15\\text{ m}$</div><div>Chừa cổng: $2\\text{ m}$</div><div>Số mét lưới: $\\dots\\text{ m}$?</div><br><div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Chu vi của mảnh vườn hình chữ nhật là:</div><div>$25 + 15 + 25 + 15 = 80$&nbsp;(m)</div><div>Số mét lưới bác nông dân cần mua là:</div><div>$80 - 2 = 78$&nbsp;(m)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $78\\text{ m}$ lưới.</span></div>" },
{ t_title: "Bài 6", t_content: "Tìm một số, biết rằng lấy số đó chia cho $5$ rồi cộng với $24$ thì được kết quả là $30$.", strategy: "Dạng toán thám tử - Dịch ngược phép tính. Bắt đầu từ kết quả cuối cùng ($30$), làm ngược lại các phép tính của đề bài (Cộng thành Trừ, Chia thành Nhân).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Giá trị của số đó sau khi chia cho $5$ (tức là trước khi cộng với $24$) là:</div><div>$30 - 24 = 6$</div><div>Số cần tìm là:</div><div>$6 \\times 5 = 30$</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $30$.</span></div>" }
]
});

{ q_title: "Câu 7", q_content: "Hình 3D dưới đây có bao nhiêu khối lập phương nhỏ?<br><svg width='120' height='120' viewBox='0 0 100 100' class='mx-auto my-4'><g transform='translate(0, 10)'><polygon points='30,65 40,60 30,55 20,60' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='20,60 30,65 30,75 20,70' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='40,60 50,55 40,50 30,55' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='30,55 40,60 40,70 30,65' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='40,60 50,55 50,65 40,70' fill='#2563eb' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='50,55 60,50 50,45 40,50' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='40,50 50,55 50,65 40,60' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='50,55 60,50 60,60 50,65' fill='#2563eb' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='30,55 40,50 30,45 20,50' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='20,50 30,55 30,65 20,60' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='30,45 40,40 30,35 20,40' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='20,40 30,45 30,55 20,50' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='30,45 40,40 40,50 30,55' fill='#2563eb' stroke='#1e3a8a' stroke-linejoin='round'/></g></svg>", options: ["A. $4$&nbsp;khối", "B. $5$&nbsp;khối", "C. $6$&nbsp;khối", "D. $7$&nbsp;khối"], correct_idx: 1, explain: "Đếm theo cột đứng: Cột đứng bên trái cao $3$&nbsp;tầng (3 khối). Hàng ngang sát đất vươn ra bên phải có thêm $2$&nbsp;khối. Tổng cộng: $3 + 2 = 5$&nbsp;khối." },

{ q_title: "Câu 9", q_content: "Người ta ghép $2$&nbsp;viên gạch hình vuông có cạnh $4\\text{ cm}$ lại với nhau để tạo thành một hình chữ nhật. Chu vi của hình chữ nhật đó là:", options: ["A. $32\\text{ cm}$", "B. $16\\text{ cm}$", "C. $24\\text{ cm}$", "D. $20\\text{ cm}$"], correct_idx: 2, explain: "Khi ghép 2 hình vuông cạnh 4cm, ta được hình chữ nhật có chiều rộng không đổi ($4\\text{ cm}$) nhưng chiều dài gấp đôi ($4+4=8\\text{ cm}$). Chu vi hình chữ nhật là: $8 + 4 + 8 + 4 = 24\\text{ (cm)}$." },
{ q_title: "Câu 10", q_content: "Trên một chiếc cân thăng bằng, đĩa trái có $1$&nbsp;con vịt và $1$&nbsp;quả cân $2\\text{ kg}$. Đĩa phải có $1$&nbsp;con ngỗng. Ở một chiếc cân khác, đĩa trái có $1$&nbsp;con ngỗng và đĩa phải có $2$&nbsp;con vịt giống hệt nhau. Hỏi một con vịt nặng bao nhiêu ki-lô-gam?", options: ["A. $2\\text{ kg}$", "B. $3\\text{ kg}$", "C. $4\\text{ kg}$", "D. $1\\text{ kg}$"], correct_idx: 0, explain: "Tư duy bắc cầu: Từ cân thứ hai, ta biết $1$&nbsp;Ngỗng nặng bằng $2$&nbsp;Vịt. Thay $1$&nbsp;Ngỗng ở cân thứ nhất bằng $2$&nbsp;Vịt, ta có: $1$&nbsp;Vịt + $2\\text{ kg}$ = $2$&nbsp;Vịt. Triệt tiêu 1 Vịt ở cả hai đĩa, ta còn lại: $2\\text{ kg}$ = $1$&nbsp;Vịt. Vậy vịt nặng $2\\text{ kg}$." },
{ q_title: "Câu 11", q_content: "Cho dãy số: $1, 1, 2, 3, 5, 8, \\dots$&nbsp;Số thích hợp điền vào chỗ chấm là:", options: ["A. $11$", "B. $12$", "C. $13$", "D. $14$"], correct_idx: 2, explain: "Dãy số cộng dồn (Fibonacci): Kể từ số thứ ba, mỗi số đều bằng tổng của hai số đứng liền trước nó ($1+1=2$; $1+2=3$; $2+3=5$; $3+5=8$). Số tiếp theo là: $5 + 8 = 13$." },
{ q_title: "Câu 12", q_content: "Dọc theo một đoạn đường dài $30\\text{ m}$, người ta trồng các cột đèn cách đều nhau, cứ $5\\text{ m}$&nbsp;lại trồng $1$&nbsp;cột đèn. Chỉ trồng cột đèn ở <strong>một đầu</strong> đoạn đường. Hỏi người ta đã trồng tất cả bao nhiêu cột đèn?", options: ["A. $6$&nbsp;cột", "B. $7$&nbsp;cột", "C. $5$&nbsp;cột", "D. $8$&nbsp;cột"], correct_idx: 0, explain: "Số khoảng cách là: $30 : 5 = 6$&nbsp;(khoảng). Bẫy trồng cây: Vì chỉ trồng ở MỘT ĐẦU đường nên số cột bằng đúng số khoảng. Vậy trồng được $6$&nbsp;cột đèn." }

{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $628 + 193$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $702 - 345$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 156$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $8 + 992$", strategy: "Viết số thẳng cột hàng đơn vị, chục, trăm. Đặc biệt chú ý cách mượn ở phép trừ qua các số $0$ (câu c) và phép cộng số có $1$&nbsp;chữ số (câu d).", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 628 \\\\ + & 193 \\\\ \\hline & \\mathbf{\\color{red}{821}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 702 \\\\ - & 345 \\\\ \\hline & \\mathbf{\\color{red}{357}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 156 \\\\ \\hline & \\mathbf{\\color{red}{844}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 8 \\\\ + & 992 \\\\ \\hline & \\mathbf{\\color{red}{1000}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Tính giá trị của biểu thức sau:<br><div class='text-xl text-center my-4'>$150 - 35 : 5 \\times 4$</div>", strategy: "Quy tắc ưu tiên: Nhân/chia làm trước, cộng/trừ làm sau. Có cả nhân và chia đứng sát nhau thì làm lần lượt từ trái sang phải.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>$150 - 35 : 5 \\times 4$<br>$= 150 - 7 \\times 4$<br>$= 150 - 28$<br>$= 122$</div>" },
{ t_title: "Bài 3", t_content: "Tổng của hai số là số lớn nhất có hai chữ số. Số hạng thứ nhất là số chẵn nhỏ nhất có hai chữ số giống nhau. Tìm số hạng thứ hai.", strategy: "Bóc tách các ẩn số thành số tự nhiên rõ ràng. Tổng = Số lớn nhất có $2$&nbsp;chữ số ($99$). Số hạng thứ nhất = Số chẵn nhỏ nhất có $2$&nbsp;chữ số giống nhau ($22$). Muốn tìm số hạng còn lại, ta làm phép trừ.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Số lớn nhất có hai chữ số là $99$. Vậy tổng của hai số là $99$.<br>Số chẵn nhỏ nhất có hai chữ số giống nhau là $22$. Vậy số hạng thứ nhất là $22$.<br>Số hạng thứ hai là:<br>$99 - 22 = 77$</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $77$.</div>" },
{ t_title: "Bài 4", t_content: "Lớp 2A có $32$&nbsp;học sinh đi tham quan. Cô giáo thuê các xe ô tô nhỏ, mỗi xe chở được đúng $5$&nbsp;học sinh. Hỏi cô giáo cần thuê <strong>ít nhất</strong> bao nhiêu chiếc xe để chở hết số học sinh của lớp?", strategy: "Bài toán chia có dư thực tế. Lấy $32$ chia $5$ để tìm số xe chở đầy. Đừng quên <strong>phần dư (học sinh bị lẻ)</strong> cũng cần thêm $1$&nbsp;chiếc xe nữa để chở, dù xe không đầy.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Lớp 2A: $32$&nbsp;học sinh<br>Mỗi xe: $5$&nbsp;học sinh<br>Cần ít nhất: $\\dots$&nbsp;xe?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta có phép chia: $32 : 5 = 6$ (dư $2$).<br>Như vậy, nếu dùng $6$&nbsp;chiếc xe thì chở được $30$&nbsp;học sinh, còn thừa ra $2$&nbsp;học sinh.<br>Để chở hết $2$&nbsp;học sinh này, cô giáo cần thuê thêm $1$&nbsp;chiếc xe nữa.<br>Số xe cô giáo cần thuê ít nhất là:<br>$6 + 1 = 7$&nbsp;(chiếc xe)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $7$&nbsp;chiếc xe.</div>" },
{ t_title: "Bài 5", t_content: "Một đường gấp khúc gồm $4$&nbsp;đoạn thẳng. Độ dài ba đoạn thẳng đầu tiên lần lượt là $12\\text{ cm}, 18\\text{ cm}, 20\\text{ cm}$. Biết tổng độ dài của cả đường gấp khúc là $7\\text{ dm}$. Tính độ dài của đoạn thẳng cuối cùng.", strategy: "Tổng độ dài đường gấp khúc là chuỗi cộng của 4 đoạn. Nhớ đổi $7\\text{ dm}$ ra $\\text{cm}$. Muốn tìm đoạn cuối, lấy Tổng trừ đi chiều dài của 3 đoạn đầu.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Đổi $7\\text{ dm} = 70\\text{ cm}$.<br>Tổng độ dài của $3$&nbsp;đoạn thẳng đầu tiên là:<br>$12 + 18 + 20 = 50$&nbsp;(cm)<br>Độ dài của đoạn thẳng cuối cùng là:<br>$70 - 50 = 20$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $20\\text{ cm}$.</div>" },
{ t_title: "Bài 6", t_content: "Năm nay, tổng số tuổi của hai anh em là $20$&nbsp;tuổi. Hỏi $3$&nbsp;năm trước, tổng số tuổi của hai anh em là bao nhiêu?", strategy: "Bẫy lùi tuổi: Lùi về quá khứ $3$&nbsp;năm, anh bị giảm $3$&nbsp;tuổi, em cũng bị giảm $3$&nbsp;tuổi. Do đó, TỔNG số tuổi của 2 anh em bị giảm tới $6$&nbsp;tuổi chứ không phải $3$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Cách đây $3$&nbsp;năm, người anh giảm đi $3$&nbsp;tuổi và người em cũng giảm đi $3$&nbsp;tuổi.<br>Tổng số tuổi của hai anh em phải giảm đi là:<br>$3 + 3 = 6$&nbsp;(tuổi)<br>Tổng số tuổi của hai anh em cách đây $3$&nbsp;năm là:<br>$20 - 6 = 14$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $14$&nbsp;tuổi.</div>" }
]

{ q_title: "Câu 5", q_content: "Một cốc nước ép có giá $15 000$&nbsp;đồng. Nam đưa cho cô bán hàng một tờ tiền $20 000$&nbsp;đồng. Để thối lại tiền thừa cho Nam, cô bán hàng chỉ có thể dùng tờ tiền nào dưới đây?", options: ["A. Tờ $10 000$&nbsp;đồng", "B. Tờ $5 000$&nbsp;đồng", "C. Tờ $2 000$&nbsp;đồng", "D. Tờ $1 000$&nbsp;đồng"], correct_idx: 1, explain: "Số tiền cô bán hàng cần thối lại là: $20 000 - 15 000 = 5 000$&nbsp;(đồng). Vậy cô sẽ đưa lại cho Nam 1 tờ $5 000$&nbsp;đồng." },

{ q_title: "Câu 11", q_content: "Tổng của hai số là $50$. Biết rằng nếu lấy số lớn trừ đi số bé thì kết quả bằng $0$. Số bé là:", options: ["A. $0$", "B. $50$", "C. $25$", "D. Không tìm được"], correct_idx: 2, explain: "Khi số lớn trừ đi số bé bằng $0$, điều đó chứng tỏ hai số đó hoàn toàn bằng nhau. Hai số giống nhau cộng lại bằng $50$ thì đó là $25$ và $25$. Vậy số bé là $25$." },

{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $584 + 237$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $902 - 156$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 45$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $89 + 714$", strategy: "Viết thẳng cột hàng đơn vị, chục, trăm. Đặc biệt chú ý cách mượn liên tiếp ở phép trừ qua các số $0$ (câu b, c).", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 584 \\\\ + & 237 \\\\ \\hline & \\mathbf{\\color{red}{821}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 902 \\\\ - & 156 \\\\ \\hline & \\mathbf{\\color{red}{746}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 45 \\\\ \\hline & \\mathbf{\\color{red}{955}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 89 \\\\ + & 714 \\\\ \\hline & \\mathbf{\\color{red}{803}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Tính giá trị của biểu thức sau:<br><div class='text-xl text-center my-4'>$100 - 5 \\times 8 + 32$</div>", strategy: "Biểu thức có chứa phép nhân và phép cộng/trừ. Phải thực hiện phép nhân trước. Sau đó tính lần lượt từ trái qua phải.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>$100 - 5 \\times 8 + 32$<br>$= 100 - 40 + 32$<br>$= 60 + 32$<br>$= 92$</div>" },
{ t_title: "Bài 3", t_content: "Điền chữ số thích hợp vào dấu $\\square$ trong phép tính sau:<br><div class='text-2xl text-center my-4'>$9\\square - \\square 8 = 37$</div>", strategy: "Giải mã phép trừ ẩn từ phải sang trái.<br>Cột đơn vị: Mấy trừ $8$ bằng $7$? Chỉ có $15 - 8 = 7$. Vậy ô vuông thứ nhất bằng $5$ (nhớ trả $1$ sang cột chục).<br>Cột chục: $9$ trừ ô vuông trừ $1$ (nhớ) bằng $3$. Tức là $8 - \\square = 3$. Vậy ô vuông thứ hai bằng $5$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Nhẩm theo cột dọc từ phải sang trái:<br>- Ở hàng đơn vị: Phải mượn $1$&nbsp;chục vì không có số nào trừ $8$ bằng $7$. Ta có $15 - 8 = 7$ (viết $7$ nhớ $1$). Vậy ô vuông thứ nhất (số bị trừ) điền <strong>$\\mathbf{\\color{red}{5}}$</strong>.<br>- Ở hàng chục: $9$ trừ đi ô vuông thứ hai rồi trừ tiếp $1$ (đã mượn) thì bằng $3$. Tức là $8 - \\square = 3$. Vậy ô vuông thứ hai điền <strong>$\\mathbf{\\color{red}{5}}$</strong>.<br>Phép tính hoàn chỉnh là: <strong>$95 - 58 = 37$</strong>.</div>" },
{ t_title: "Bài 4", t_content: "Một sợi dây dài $43\\text{ cm}$. Bác thợ cắt sợi dây đó thành $5$&nbsp;đoạn bằng nhau. Sau khi cắt xong, sợi dây vẫn còn thừa ra $3\\text{ cm}$. Hỏi mỗi đoạn dây bị cắt dài bao nhiêu xăng-ti-mét?", strategy: "Bài toán 2 bước. Bước 1: Tính chiều dài của phần dây ĐÃ BỊ CẮT (lấy tổng chiều dài trừ đi phần thừa). Bước 2: Lấy chiều dài phần dây đã cắt chia đều cho $5$&nbsp;đoạn.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Sợi dây dài: $43\\text{ cm}$<br>Cắt: $5$&nbsp;đoạn bằng nhau<br>Thừa ra: $3\\text{ cm}$<br>Mỗi đoạn: $\\dots\\text{ cm}$?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Chiều dài của phần sợi dây đã được mang đi cắt là:<br>$43 - 3 = 40$&nbsp;(cm)<br>Mỗi đoạn dây được cắt ra dài số xăng-ti-mét là:<br>$40 : 5 = 8$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $8\\text{ cm}$.</div>" },
{ t_title: "Bài 5", t_content: "Người ta ghép $4$&nbsp;viên gạch hình vuông giống hệt nhau, mỗi viên có cạnh $2\\text{ cm}$ để tạo thành một hình vuông lớn. Tính chu vi của hình vuông lớn đó.", strategy: "Khi ghép 4 hình vuông nhỏ (thành 2 hàng, 2 cột), cạnh của hình vuông lớn sẽ gấp đôi cạnh hình vuông nhỏ. Sau khi tìm được cạnh hình vuông lớn, tính chu vi bằng cách lấy cạnh cộng lại 4 lần.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi ghép $4$&nbsp;hình vuông nhỏ lại, độ dài một cạnh của hình vuông lớn tạo thành là:<br>$2 + 2 = 4$&nbsp;(cm)<br>Chu vi của hình vuông lớn đó là:<br>$4 + 4 + 4 + 4 = 16$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $16\\text{ cm}$.</div>" },
{ t_title: "Bài 6", t_content: "Đầu năm học, lớp 2A có $35$&nbsp;học sinh. Sang học kỳ hai, có $3$&nbsp;bạn nam chuyển sang lớp khác, nhưng lớp lại nhận thêm $5$&nbsp;bạn nữ từ trường khác chuyển tới. Hỏi hiện tại lớp 2A có bao nhiêu học sinh?", strategy: "Sự bù trừ tĩnh sĩ số. Chuyển đi là làm phép trừ, nhận thêm là làm phép cộng. Cứ tính toán tuần tự trên sĩ số ban đầu.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Đầu năm: $35$&nbsp;bạn<br>Chuyển đi: $3$&nbsp;bạn nam<br>Nhận thêm: $5$&nbsp;bạn nữ<br>Hiện tại: $\\dots$&nbsp;bạn?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Sau khi $3$&nbsp;bạn nam chuyển đi, lớp 2A còn lại số học sinh là:<br>$35 - 3 = 32$&nbsp;(học sinh)<br>Sau khi nhận thêm $5$&nbsp;bạn nữ, hiện tại lớp 2A có tất cả số học sinh là:<br>$32 + 5 = 37$&nbsp;(học sinh)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $37$&nbsp;học sinh.</div>" }
]
});

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Số tròn chục lớn nhất có ba chữ số khác nhau là:", options: ["A. $990$", "B. $980$", "C. $987$", "D. $900$"], correct_idx: 1, explain: "Để là số tròn chục, chữ số hàng đơn vị bắt buộc phải là $0$. Để số đó lớn nhất, hàng trăm là $9$. Vì yêu cầu 'các chữ số khác nhau', hàng chục phải là số lớn nhất khác $9$ và $0$, tức là $8$. Số cần tìm là $980$. ($990$ bị trùng chữ số 9)." },
{ q_title: "Câu 2", q_content: "Thay các hình biểu tượng bằng các con số thích hợp. Biết:<br>⭐ + ⭐ = $18$<br>⭐ - 🍎 = $4$<br>Giá trị của 🍎 $\\times 5$ là bao nhiêu?", options: ["A. $9$", "B. $5$", "C. $20$", "D. $25$"], correct_idx: 3, explain: "Từ phép tính đầu: Hai ngôi sao giống nhau cộng lại bằng 18 $\\Rightarrow$ ⭐ = $9$ (vì $9 + 9 = 18$). Thay vào phép tính thứ hai: $9$ - 🍎 = $4 \\Rightarrow$ 🍎 = $5$. Yêu cầu tính 🍎 $\\times 5 = 5 \\times 5 = 25$." },
{ q_title: "Câu 3", q_content: "Hai băng giấy màu xanh và màu đỏ có cùng độ dài là $45\\text{ cm}$. Bạn Hoa dán nối hai băng giấy đó lại với nhau thành một băng giấy dài. Phần giấy dán đè lên nhau dài $5\\text{ cm}$. Hỏi băng giấy mới dài bao nhiêu xăng-ti-mét?", options: ["A. $90\\text{ cm}$", "B. $85\\text{ cm}$", "C. $80\\text{ cm}$", "D. $40\\text{ cm}$"], correct_idx: 1, explain: "Nếu đặt nối tiếp không dán đè, tổng chiều dài là $45 + 45 = 90\\text{ (cm)}$. Vì có một phần dán đè lên nhau (chung nhau) dài $5\\text{ cm}$, nên chiều dài thực tế bị hao hụt đi $5\\text{ cm}$. Chiều dài băng giấy mới là: $90 - 5 = 85\\text{ (cm)}$." },
{ q_title: "Câu 4", q_content: "Sáng nay, Mai đi từ nhà lúc $7$&nbsp;giờ $15$&nbsp;phút và đến trường lúc $7$&nbsp;giờ rưỡi. Thời gian Mai đi từ nhà đến trường là:", options: ["A. $30$&nbsp;phút", "B. $15$&nbsp;phút", "C. $20$&nbsp;phút", "D. $45$&nbsp;phút"], correct_idx: 1, explain: "Đổi $7$&nbsp;giờ rưỡi = $7$&nbsp;giờ $30$&nbsp;phút. Thời gian Mai đi trên đường là khoảng cách từ $15$&nbsp;phút đến $30$&nbsp;phút. Ta có: $30 - 15 = 15$&nbsp;(phút)." },
{ q_title: "Câu 5", q_content: "Hình khối 3D dưới đây được xếp từ các khối lập phương nhỏ. Hỏi nếu nhìn từ <strong>trên đỉnh nhìn thẳng xuống</strong>, ta sẽ thấy bao nhiêu hình vuông?<br><svg width='150' height='150' viewBox='0 0 100 100' class='mx-auto my-4'><g transform='translate(10, 10)'><polygon points='30,65 40,60 30,55 20,60' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='20,60 30,65 30,75 20,70' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='30,65 40,60 40,70 30,75' fill='#2563eb' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='40,75 50,70 40,65 30,70' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='30,70 40,75 40,85 30,80' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='40,75 50,70 50,80 40,85' fill='#2563eb' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='40,35 50,30 40,25 30,30' fill='#93c5fd' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='30,30 40,35 40,65 30,60' fill='#60a5fa' stroke='#1e3a8a' stroke-linejoin='round'/><polygon points='40,35 50,30 50,60 40,65' fill='#2563eb' stroke='#1e3a8a' stroke-linejoin='round'/></g></svg>", options: ["A. $3$&nbsp;hình", "B. $5$&nbsp;hình", "C. $4$&nbsp;hình", "D. $1$&nbsp;hình"], correct_idx: 0, explain: "Nhìn từ trên đỉnh thẳng đứng hướng xuống mặt đất (Hình chiếu bằng), ta chỉ nhìn thấy 'các nắp' trên cùng của các cột. Khối này có $3$&nbsp;cột: 1 cột cao ở giữa, 1 cột bên trái, 1 cột phía trước. Dù độ cao khác nhau, từ trên nhìn xuống ta chỉ thấy $3$&nbsp;bề mặt hình vuông tương ứng với $3$&nbsp;cột." },
{ q_title: "Câu 6", q_content: "Có $3$&nbsp;bạn Thỏ, Sóc, Nhím đổi hạt dẻ cho nhau. Thỏ đưa cho Sóc $4$&nbsp;hạt dẻ. Sóc đưa cho Nhím $2$&nbsp;hạt dẻ. Nhím lại đưa cho Thỏ $5$&nbsp;hạt dẻ. Sau khi đổi, Thỏ có $15$&nbsp;hạt dẻ. Hỏi lúc đầu Thỏ có bao nhiêu hạt dẻ?", options: ["A. $14$&nbsp;hạt", "B. $16$&nbsp;hạt", "C. $15$&nbsp;hạt", "D. $18$&nbsp;hạt"], correct_idx: 0, explain: "Bài toán tính ngược từ cuối. Ta chỉ quan tâm đến Thỏ. Lúc cuối Thỏ có $15$&nbsp;hạt (số này là kết quả của việc Thỏ nhận $5$&nbsp;hạt từ Nhím). Vậy trước khi nhận của Nhím, Thỏ có: $15 - 5 = 10$&nbsp;(hạt). Ban đầu, Thỏ đã đem cho Sóc $4$&nbsp;hạt mới còn lại $10$&nbsp;hạt. Vậy lúc đầu Thỏ có: $10 + 4 = 14$&nbsp;(hạt)." },
{ q_title: "Câu 7", q_content: "Một tháng có nhiều nhất bao nhiêu ngày Chủ nhật là ngày chẵn?", options: ["A. $2$&nbsp;ngày", "B. $3$&nbsp;ngày", "C. $4$&nbsp;ngày", "D. $5$&nbsp;ngày"], correct_idx: 1, explain: "Các ngày Chủ nhật trong một tháng cách nhau $7$&nbsp;ngày. Dãy ngày sẽ luân phiên chẵn - lẻ - chẵn - lẻ... Ví dụ: Mùng 2 (chẵn), 9 (lẻ), 16 (chẵn), 23 (lẻ), 30 (chẵn). Dù tháng có bắt đầu bằng ngày nào đi nữa, số ngày Chủ nhật tối đa trong tháng là 5 ngày, và số ngày chẵn xen kẽ nhiều nhất chỉ có thể là 3 ngày." },
{ q_title: "Câu 8", q_content: "Điền số thích hợp vào chỗ chấm: $4\\text{ m } - 25\\text{ dm } = \\dots\\dots\\text{ cm}$", options: ["A. $15$", "B. $150$", "C. $425$", "D. $1500$"], correct_idx: 1, explain: "Đổi tất cả về xăng-ti-mét ($\\text{cm}$) theo yêu cầu đáp án. $4\\text{ m} = 400\\text{ cm}$. $25\\text{ dm} = 250\\text{ cm}$. Phép trừ: $400 - 250 = 150\\text{ (cm)}$." },
{ q_title: "Câu 9", q_content: "Dãy số sau có quy luật gì? $2, 6, 12, 20, 30, \\dots$", options: ["A. Mỗi số gấp 3 lần số đứng trước.", "B. Cộng thêm lần lượt $4, 6, 8, 10$.", "C. Cộng thêm $4$ vào mỗi số.", "D. Lấy số liền trước nhân với $2$."], correct_idx: 1, explain: "Kiểm tra khoảng cách: $6-2=4$; $12-6=6$; $20-12=8$; $30-20=10$. Khoảng cách tăng dần $2$&nbsp;đơn vị. Vậy quy luật đúng là cộng thêm lần lượt $4, 6, 8, 10$." },
{ q_title: "Câu 10", q_content: "Quanh một bồn hoa hình vuông, người ta đặt các chậu cây cảnh. Mỗi cạnh của bồn hoa đặt đúng $4$&nbsp;chậu cây (tính cả các góc). Hỏi người ta đã dùng tất cả bao nhiêu chậu cây?", options: ["A. $16$&nbsp;chậu", "B. $12$&nbsp;chậu", "C. $14$&nbsp;chậu", "D. $8$&nbsp;chậu"], correct_idx: 1, explain: "Hình vuông có 4 cạnh. Nếu đếm $4 \\times 4 = 16$ chậu là sai vì các chậu ở 4 góc bị đếm lặp 2 lần (mỗi góc thuộc về 2 cạnh). Do đó số chậu thực tế là: $16 - 4\\text{ (góc)} = 12$ chậu." },
{ q_title: "Câu 11", q_content: "Tổng hai số là $45$. Nếu thêm vào số lớn $10$&nbsp;đơn vị và bớt ở số bé đi $10$&nbsp;đơn vị thì tổng mới của hai số là bao nhiêu?", options: ["A. $65$", "B. $25$", "C. $45$", "D. $55$"], correct_idx: 2, explain: "Khi thêm vào một số hạng bao nhiêu đơn vị và bớt đi ở số hạng kia bấy nhiêu đơn vị thì Tổng của hai số KHÔNG THAY ĐỔI. Tổng mới vẫn là $45$." },
{ q_title: "Câu 12", q_content: "Hình dưới đây có bao nhiêu đoạn thẳng?<br><svg width='180' height='100' viewBox='0 0 160 100' class='mx-auto my-4'><polygon points='40,10 120,10 150,90 10,90' fill='none' stroke='#1d4ed8' stroke-width='2.5' stroke-linejoin='round'/><line x1='40' y1='10' x2='150' y2='90' stroke='#1d4ed8' stroke-width='2.5'/><line x1='120' y1='10' x2='10' y2='90' stroke='#1d4ed8' stroke-width='2.5'/></svg>", options: ["A. $6$&nbsp;đoạn", "B. $8$&nbsp;đoạn", "C. $10$&nbsp;đoạn", "D. $4$&nbsp;đoạn"], correct_idx: 2, explain: "Cạnh ngoài hình thang có 4 đoạn thẳng. Bên trong có 2 đường chéo cắt nhau tại 1 điểm. Mỗi đường chéo lớn bị giao điểm chia làm 2 đoạn nhỏ $\\Rightarrow$ 1 đường chéo lớn chứa (2 đoạn nhỏ + 1 đoạn lớn) = 3 đoạn thẳng. Cả 2 đường chéo tạo ra $3 \\times 2 = 6$ đoạn thẳng. Tổng số đoạn thẳng trong hình là: $4 + 6 = 10$&nbsp;đoạn." }
],
tu_luan: [
{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $457 + 382$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $804 - 265$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 9$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $78 + 922$", strategy: "Chú ý đặc biệt ở câu c (mượn qua hàng trăm và chục đều là số 0) và câu d (cộng số có 2 chữ số với số có 3 chữ số, phải đặt thẳng lề phải).", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 457 \\\\ + & 382 \\\\ \\hline & \\mathbf{\\color{red}{839}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 804 \\\\ - & 265 \\\\ \\hline & \\mathbf{\\color{red}{539}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 9 \\\\ \\hline & \\mathbf{\\color{red}{991}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 78 \\\\ + & 922 \\\\ \\hline & \\mathbf{\\color{red}{1000}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Điền các dấu phép tính $(+, -, \\times, :)$ thích hợp vào ô trống để được biểu thức đúng:<br><div class='text-2xl text-center my-4'>$5 \\ \\square\\  5 \\ \\square\\  5 = 20$</div>", strategy: "Thử các dấu phép tính từ ưu tiên nhân/chia trước. Nhẩm thấy kết quả là 20. Nếu có phép nhân $5 \\times 5 = 25$, ta cần trừ đi 5 để ra 20. Vậy dấu cần điền là $\\times$ và $-$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta có: $5 \\times 5 = 25$.<br>Để kết quả bằng $20$, ta tiếp tục làm phép trừ: $25 - 5 = 20$.<br>Dấu cần điền lần lượt là: $\\mathbf{\\color{red}{\\times}}$ và $\\mathbf{\\color{red}{-}}$.<br>Biểu thức đúng là: $5 \\times 5 - 5 = 20$.</div>" },
{ t_title: "Bài 3", t_content: "Một tờ giấy hình chữ nhật có chiều dài $15\\text{ cm}$, chiều rộng $8\\text{ cm}$. Bạn Lan dùng kéo cắt rời một hình vuông nhỏ có cạnh $3\\text{ cm}$ ở ngay một góc của tờ giấy đó. Hỏi chu vi của tờ giấy sau khi cắt thay đổi như thế nào so với lúc ban đầu?", strategy: "Đây là bài toán tư duy cực hay. Đừng vội tính toán chu vi. Khi cắt đi 1 hình vuông ở GÓC, ta làm mất đi 2 cạnh của hình vuông đó ở viền ngoài, nhưng lại tạo ra 2 cạnh mới thụt vào trong. Vì 4 cạnh hình vuông bằng nhau nên chu vi KHÔNG ĐỔI.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi cắt một hình vuông nhỏ ở góc, tờ giấy bị mất đi $2$&nbsp;đoạn thẳng ở mép ngoài (bằng đúng $2$&nbsp;cạnh hình vuông nhỏ).<br>Tuy nhiên, phần bị cắt lõm vào trong lại tạo ra $2$&nbsp;đoạn thẳng mới có độ dài y hệt như $2$&nbsp;cạnh vừa mất đi.<br>Do đó, đường viền bao quanh (chu vi) của tờ giấy được bù trừ cân bằng.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Chu vi của tờ giấy không thay đổi.</div>" },
{ t_title: "Bài 4", t_content: "Cô giáo có một túi kẹo. Cô chia đều cho $4$&nbsp;tổ, mỗi tổ được $5$&nbsp;viên kẹo thì trong túi cô vẫn còn dư lại $3$&nbsp;viên. Hỏi ban đầu trong túi cô giáo có tất cả bao nhiêu viên kẹo?", strategy: "Toán chia có dư giải ngược. Số kẹo ban đầu = Tổng số kẹo đã chia cho 4 tổ + Số kẹo còn dư lại.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Chia: $4$&nbsp;tổ<br>Mỗi tổ: $5$&nbsp;viên<br>Dư: $3$&nbsp;viên<br>Có tất cả: $\\dots$&nbsp;viên?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Tổng số kẹo cô giáo đã lấy ra chia cho $4$&nbsp;tổ là:<br>$5 \\times 4 = 20$&nbsp;(viên)<br>Ban đầu trong túi cô giáo có tất cả số viên kẹo là:<br>$20 + 3 = 23$&nbsp;(viên)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $23$&nbsp;viên kẹo.</div>" },
{ t_title: "Bài 5", t_content: "Hai năm trước, tổng số tuổi của bố và con là $40$&nbsp;tuổi. Hỏi hiện nay, tổng số tuổi của bố và con là bao nhiêu?", strategy: "Toán tính tổng tuổi tiến về tương lai. Sau $2$&nbsp;năm, bố tăng $2$&nbsp;tuổi, con cũng tăng $2$&nbsp;tuổi. Vậy TỔNG số tuổi của 2 người phải tăng $4$&nbsp;tuổi.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Từ $2$&nbsp;năm trước đến hiện nay, bố tăng thêm $2$&nbsp;tuổi và con cũng tăng thêm $2$&nbsp;tuổi.<br>Tổng số tuổi của hai bố con đã tăng thêm là:<br>$2 + 2 = 4$&nbsp;(tuổi)<br>Hiện nay, tổng số tuổi của bố và con là:<br>$40 + 4 = 44$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $44$&nbsp;tuổi.</div>" },
{ t_title: "Bài 6", t_content: "Để trang trí lớp học, các bạn học sinh nối $3$&nbsp;sợi dây ruy băng lại với nhau. Sợi màu xanh dài $45\\text{ cm}$, sợi màu đỏ dài $30\\text{ cm}$, sợi màu vàng dài $25\\text{ cm}$. Tại mỗi chỗ nối, các bạn phải thắt nút mất $2\\text{ cm}$ ruy băng. Hỏi sợi dây ruy băng sau khi nối xong dài bao nhiêu xăng-ti-mét?", strategy: "Toán nối dây có hao hụt. Nối 3 sợi dây sẽ tạo ra 2 mối nối. Mỗi mối nối mất $2\\text{ cm}$ của sợi này và $2\\text{ cm}$ của sợi kia (tức là 1 mối nối làm giảm $4\\text{ cm}$).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Tổng chiều dài của $3$&nbsp;sợi ruy băng nếu không nối là:<br>$45 + 30 + 25 = 100$&nbsp;(cm)<br>Nối $3$&nbsp;sợi dây lại với nhau sẽ tạo ra $2$&nbsp;chỗ thắt nút. Tại một chỗ thắt nút, hai đầu dây cùng bị cuộn lại nên chiều dài bị giảm đi là: $2 + 2 = 4$&nbsp;(cm).<br>Hai chỗ thắt nút làm chiều dài dây bị giảm đi tổng cộng là:<br>$4 + 4 = 8$&nbsp;(cm)<br>Chiều dài của sợi dây ruy băng sau khi nối xong là:<br>$100 - 8 = 92$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $92\\text{ cm}$.</div>" }
]
});

{ q_title: "Câu 2", q_content: "Tìm $x$, biết: $1000 - x \\times 4 = 960$", options: ["A. $40$", "B. $10$", "C. $15$", "D. $20$"], correct_idx: 1, explain: "Coi $(x \\times 4)$ là số trừ. Ta có: $x \\times 4 = 1000 - 960 = 40$. Tiếp tục tìm thừa số: $x = 40 : 4 = 10$." },

{ q_title: "Câu 4", q_content: "Cuốn truyện tranh của Nam có $40$&nbsp;trang. Nam đã đọc được $\\frac{1}{4}$ số trang của cuốn truyện đó. Hỏi Nam <strong>còn phải đọc</strong> bao nhiêu trang nữa thì mới hết cuốn truyện?", options: ["A. $10$&nbsp;trang", "B. $20$&nbsp;trang", "C. $30$&nbsp;trang", "D. $4$&nbsp;trang"], correct_idx: 2, explain: "Số trang Nam đã đọc là: $40 : 4 = 10$&nbsp;(trang). Số trang CÒN LẠI Nam phải đọc là: $40 - 10 = 30$&nbsp;(trang)." },

{ q_title: "Câu 6", q_content: "Trong hộp kín có $4$&nbsp;viên bi đỏ, $5$&nbsp;viên bi xanh và $6$&nbsp;viên bi vàng. Không nhìn vào hộp, lấy ra ít nhất bao nhiêu viên bi để <strong>chắc chắn</strong> có $2$&nbsp;viên bi <strong>cùng màu</strong>?", options: ["A. $2$&nbsp;viên", "B. $3$&nbsp;viên", "C. $4$&nbsp;viên", "D. $5$&nbsp;viên"], correct_idx: 2, explain: "Áp dụng nguyên lý Dirichlet: Ở trường hợp xui xẻo nhất, ta bốc được $3$&nbsp;viên bi có màu khác nhau hoàn toàn ($1$&nbsp;đỏ, $1$&nbsp;xanh, $1$&nbsp;vàng). Viên thứ $4$&nbsp;chắc chắn phải trùng với $1$&nbsp;trong $3$&nbsp;màu đã bốc. Vậy lấy ít nhất $4$&nbsp;viên." },
{ q_title: "Câu 7", q_content: "Quanh một hồ nước hình tròn có chu vi là $40\\text{ m}$, người ta trồng cây, cứ cách $8\\text{ m}$ thì trồng $1$&nbsp;cây. Hỏi đã trồng tất cả bao nhiêu cây?", options: ["A. $5$&nbsp;cây", "B. $6$&nbsp;cây", "C. $4$&nbsp;cây", "D. $7$&nbsp;cây"], correct_idx: 0, explain: "Dạng toán trồng cây trên đường khép kín (vòng tròn): Số cây trồng được luôn bằng đúng số khoảng cách. Số cây là: $40 : 8 = 5$&nbsp;(cây)." },
{ q_title: "Câu 8", q_content: "Hình vẽ dưới đây có bao nhiêu hình chữ nhật?<br><svg width='180' height='120' viewBox='0 0 160 100' class='mx-auto my-4'><rect x='20' y='10' width='120' height='80' fill='none' stroke='#166534' stroke-width='2.5'/><line x1='60' y1='10' x2='60' y2='90' stroke='#166534' stroke-width='2.5'/><line x1='100' y1='10' x2='100' y2='90' stroke='#166534' stroke-width='2.5'/><line x1='20' y1='50' x2='140' y2='50' stroke='#166534' stroke-width='2.5'/></svg>", options: ["A. $12$&nbsp;hình", "B. $14$&nbsp;hình", "C. $16$&nbsp;hình", "D. $18$&nbsp;hình"], correct_idx: 3, explain: "Lưới hình chữ nhật có $3$&nbsp;cột và $2$&nbsp;hàng. Số hình chữ nhật trên chiều ngang là $1+2+3 = 6$. Số hình chữ nhật trên chiều dọc là $1+2 = 3$. Tổng số hình chữ nhật là: $6 \\times 3 = 18$&nbsp;hình." },
{ q_title: "Câu 9", q_content: "Năm nhuận có $366$&nbsp;ngày, tháng $2$ có $29$&nbsp;ngày. Biết ngày $25$&nbsp;tháng $2$ là thứ Bảy. Hỏi ngày mùng $2$&nbsp;tháng $3$ cùng năm đó là thứ mấy?", options: ["A. Thứ Tư", "B. Thứ Năm", "C. Thứ Sáu", "D. Thứ Bảy"], correct_idx: 1, explain: "Đếm tiến lên: $25/2$ (Thứ Bảy), $26/2$ (CN), $27/2$ (Thứ Hai), $28/2$ (Thứ Ba), $29/2$ (Thứ Tư), $1/3$ (Thứ Năm). Vậy ngày mùng $2$&nbsp;tháng $3$ là thứ Năm." },
{ q_title: "Câu 10", q_content: "Cho dãy số Fibonacci mở rộng (mỗi số bằng tổng $3$&nbsp;số liền trước nó): $1, 1, 2, 4, 7, 13, \\dots$ Số thích hợp điền vào chỗ chấm là:", options: ["A. $24$", "B. $20$", "C. $25$", "D. $21$"], correct_idx: 0, explain: "Theo quy luật đề cho, số tiếp theo bằng tổng $3$&nbsp;số ngay trước nó: $4 + 7 + 13 = 24$." },
{ q_title: "Câu 11", q_content: "Một con ốc sên rơi xuống một cái hố sâu $8\\text{ m}$. Ban ngày ốc sên bò lên được $3\\text{ m}$, nhưng ban đêm ngủ quên lại bị tuột xuống mất $1\\text{ m}$. Hỏi sau mấy ngày đêm thì ốc sên bò lên tới miệng hố?", options: ["A. $8$&nbsp;ngày", "B. $6$&nbsp;ngày", "C. $4$&nbsp;ngày", "D. $5$&nbsp;ngày"], correct_idx: 2, explain: "Bài toán tính chu kỳ: Ngày $1$&nbsp;tiến lên $3\\text{ m}$, đêm lùi $1\\text{ m} \\Rightarrow$ Sau $1$&nbsp;ngày đêm lên được $2\\text{ m}$. Hết ngày đêm $1$: Đạt $2\\text{ m}$. Hết ngày đêm $2$: Đạt $4\\text{ m}$. Hết ngày đêm $3$: Đạt $6\\text{ m}$. Sang ban ngày của ngày thứ $4$: Ốc sên bò lên $3\\text{ m}$ (từ mức $6\\text{ m}$) $\\Rightarrow 6 + 3 = 9\\text{ (m)}$. Vượt qua miệng hố ($8\\text{ m}$) và thoát ra ngoài nên đêm không bị tuột xuống nữa. Do đó ốc sên mất $4$&nbsp;ngày." },
{ q_title: "Câu 12", q_content: "Trong một buổi sinh hoạt lớp, có $4$&nbsp;bạn nam và $3$&nbsp;bạn nữ. Biết rằng nam chỉ bắt tay với nữ, nữ không bắt tay với nữ, nam không bắt tay với nam. Mỗi người đều bắt tay với người khác đúng $1$&nbsp;lần. Hỏi có tất cả bao nhiêu cái bắt tay?", options: ["A. $7$&nbsp;cái", "B. $12$&nbsp;cái", "C. $21$&nbsp;cái", "D. $6$&nbsp;cái"], correct_idx: 1, explain: "Mỗi bạn nam (có $4$&nbsp;bạn) đều bắt tay với $3$&nbsp;bạn nữ. Vậy số cái bắt tay là: $4 \\times 3 = 12$&nbsp;(cái bắt tay)." }

{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $503 - 248$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $91 + 429$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 37$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $645 + 355$", strategy: "Viết thẳng cột hàng đơn vị, chục, trăm. Chú ý mượn liên tiếp qua các số $0$ ở câu (c) và phép cộng nhớ liên tiếp ở câu (d).", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 503 \\\\ - & 248 \\\\ \\hline & \\mathbf{\\color{red}{255}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 91 \\\\ + & 429 \\\\ \\hline & \\mathbf{\\color{red}{520}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 37 \\\\ \\hline & \\mathbf{\\color{red}{963}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 645 \\\\ + & 355 \\\\ \\hline & \\mathbf{\\color{red}{1000}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Tìm $x$ biết:<br><div class='text-xl text-center my-4'>$24 < x \\times 5 < 32$</div>", strategy: "Tìm các số tự nhiên nằm giữa $24$ và $32$ ($25, 26, 27, 28, 29, 30, 31$). Sau đó kiểm tra xem số nào trong các số này là kết quả của bảng nhân $5$. Từ đó tìm được $x$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Các số tự nhiên lớn hơn $24$ và bé hơn $32$ là: $25, 26, 27, 28, 29, 30, 31$.<br>Trong các số trên, chỉ có số $25$ và số $30$ là các số chia hết cho $5$.<br>Ta có hai trường hợp:<br>- Nếu $x \\times 5 = 25$ thì $x = 25 : 5 = 5$.<br>- Nếu $x \\times 5 = 30$ thì $x = 30 : 5 = 6$.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $x = 5$ hoặc $x = 6$.</div>" },
{ t_title: "Bài 3", t_content: "Điền chữ số thích hợp vào ô $\\square$ trong phép tính sau:<br><div class='text-2xl text-center my-4'>$\\square 2 \\square - 1 \\square 5 = 268$</div>", strategy: "Giải mã từ phải sang trái.<br>- Cột đơn vị: Mấy trừ $5$ bằng $8$? (Phải mượn $1$&nbsp;chục). Lấy $8+5 = 13$, vậy ô vuông thứ nhất bằng $3$.<br>- Cột chục: $2$ bị mượn $1$ còn $1$. Lấy $1 - \\square = 6$ (Lại mượn tiếp $1$&nbsp;trăm). $11 - \\square = 6 \\Rightarrow \\square = 5$.<br>- Cột trăm: Giải tiếp tương tự.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Nhẩm theo cột dọc từ phải sang trái:<br>- Hàng đơn vị: Phải mượn $1$&nbsp;chục vì không có số nào trừ $5$ bằng $8$. Ta có $13 - 5 = 8$. Vậy ô vuông ở số bị trừ là $\\mathbf{\\color{red}{3}}$ (nhớ trả $1$&nbsp;sang hàng chục).<br>- Hàng chục: $2$ bị mượn $1$ còn $1$. Ta phải mượn tiếp $1$&nbsp;trăm, $11$ trừ đi ô vuông bằng $6$. Tức là $11 - 5 = 6$. Vậy ô vuông ở số trừ là $\\mathbf{\\color{red}{5}}$ (nhớ trả $1$&nbsp;sang hàng trăm).<br>- Hàng trăm: Ô vuông trừ $1$, trừ tiếp $1$ (đã mượn) bằng $2$. Tức là $\\square - 2 = 2 \\Rightarrow \\square = 4$. Vậy ô vuông ở số bị trừ là $\\mathbf{\\color{red}{4}}$.<br>Phép tính hoàn chỉnh là: <strong>$423 - 155 = 268$</strong>.</div>" },
{ t_title: "Bài 4", t_content: "Lớp 2A có $32$&nbsp;học sinh, cô giáo xếp các bạn vào các bàn học, mỗi bàn có $4$&nbsp;bạn. Lớp 2B có $35$&nbsp;học sinh, cô giáo xếp mỗi bàn có $5$&nbsp;bạn. Hỏi lớp nào dùng nhiều bàn học hơn và nhiều hơn mấy cái?", strategy: "Thực hiện 2 phép tính chia để tìm số bàn học của mỗi lớp. Sau đó so sánh và làm phép trừ để tìm số bàn chênh lệch.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Lớp 2A: $32$&nbsp;bạn ($4$&nbsp;bạn/bàn)<br>Lớp 2B: $35$&nbsp;bạn ($5$&nbsp;bạn/bàn)<br>Lớp nào dùng nhiều bàn hơn?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Lớp 2A cần dùng số bàn học là:<br>$32 : 4 = 8$&nbsp;(cái bàn)<br>Lớp 2B cần dùng số bàn học là:<br>$35 : 5 = 7$&nbsp;(cái bàn)<br>Vì $8 > 7$ nên lớp 2A dùng nhiều bàn học hơn lớp 2B. Số bàn lớp 2A dùng nhiều hơn lớp 2B là:<br>$8 - 7 = 1$&nbsp;(cái bàn)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Lớp 2A cần nhiều hơn $1$&nbsp;cái bàn.</div>" },
{ t_title: "Bài 5", t_content: "Một mảnh vườn hình chữ nhật có chiều dài $15\\text{ m}$. Biết chiều rộng của mảnh vườn chỉ bằng $\\frac{1}{3}$ chiều dài. Tính chu vi của mảnh vườn đó.", strategy: "Tính chiều rộng trước (chia cho $3$). Chu vi hình chữ nhật = (Dài + Rộng) + (Dài + Rộng) hoặc tổng $4$&nbsp;cạnh.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Chiều rộng của mảnh vườn hình chữ nhật là:<br>$15 : 3 = 5\\text{ (m)}$<br>Chu vi của mảnh vườn đó là:<br>$15 + 5 + 15 + 5 = 40\\text{ (m)}$</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $40\\text{ m}$.</div>" },
{ t_title: "Bài 6", t_content: "Hiện nay anh $12$&nbsp;tuổi, em $7$&nbsp;tuổi. Hỏi khi tuổi anh bằng tuổi em hiện nay thì lúc đó em mấy tuổi?", strategy: "Bẫy tuổi lùi thời gian. Tìm hiệu số tuổi giữa anh và em. Hiệu số tuổi này chính là khoảng thời gian để anh 'lùi về' bằng tuổi em hiện tại. Tuổi em lúc đó = Tuổi em hiện tại trừ đi khoảng thời gian lùi về đó.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Anh hơn em số tuổi là:<br>$12 - 7 = 5$&nbsp;(tuổi)<br>Khi tuổi anh bằng tuổi em hiện nay (nghĩa là lùi lại $5$&nbsp;năm trước), thì số tuổi của em lúc đó là:<br>$7 - 5 = 2$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $2$&nbsp;tuổi.</div>" }
]
});
</script>

{ q_title: "Câu 5", q_content: "Ngày mùng $1$ của một tháng nào đó là Thứ Sáu. Biết tháng đó có $31$&nbsp;ngày. Hỏi ngày cuối cùng của tháng đó là thứ mấy?", options: ["A. Thứ Sáu", "B. Thứ Bảy", "C. Chủ Nhật", "D. Thứ Hai"], correct_idx: 2, explain: "Ta nhẩm theo tuần (cộng $7$&nbsp;ngày): Các ngày Thứ Sáu trong tháng là: $1, 8, 15, 22, 29$. Vì ngày $29$ là Thứ Sáu, đếm tiến lên: ngày $30$ là Thứ Bảy, ngày $31$ là Chủ Nhật. Vậy ngày cuối cùng của tháng là Chủ Nhật." },
{ q_title: "Câu 6", q_content: "Trong giờ tập thể dục, lớp 2A xếp thành các hàng ngang và hàng dọc đều nhau. Đứng ở vị trí của mình, bạn An thấy: phía trước có $2$&nbsp;bạn, phía sau có $2$&nbsp;bạn, bên trái có $2$&nbsp;bạn và bên phải cũng có $2$&nbsp;bạn. Hỏi lớp 2A có tất cả bao nhiêu học sinh?", options: ["A. $25$&nbsp;học sinh", "B. $20$&nbsp;học sinh", "C. $16$&nbsp;học sinh", "D. $30$&nbsp;học sinh"], correct_idx: 0, explain: "Đếm số bạn trên 1 cột dọc: Trước An có $2$&nbsp;bạn, sau An có $2$&nbsp;bạn $\\Rightarrow$ Cột dọc có $2 + 2 + 1\\text{ (An)} = 5$&nbsp;bạn. Đếm số bạn trên 1 hàng ngang: Trái An có $2$&nbsp;bạn, phải An có $2$&nbsp;bạn $\\Rightarrow$ Hàng ngang có $2 + 2 + 1\\text{ (An)} = 5$&nbsp;bạn. Lớp xếp thành hình vuông $5 \\times 5$. Tổng số học sinh là: $5 \\times 5 = 25$&nbsp;học sinh." },
{ q_title: "Câu 7", q_content: "Hai chiếc cân đang ở trạng thái thăng bằng. Ở chiếc cân thứ nhất: 1 quả Dưa hấu nặng bằng 2 quả Bưởi. Ở chiếc cân thứ hai: 1 quả Bưởi nặng bằng 3 quả Cam. Biết 1 quả Cam cân nặng $200\\text{ g}$. Hỏi quả Dưa hấu cân nặng bao nhiêu?", options: ["A. $600\\text{ g}$", "B. $1\\text{ kg } 200\\text{ g}$", "C. $800\\text{ g}$", "D. $1\\text{ kg}$"], correct_idx: 1, explain: "Bắc cầu cân nặng: 1 quả Bưởi nặng bằng 3 quả Cam, nên 1 Bưởi nặng: $200 \\times 3 = 600\\text{ (g)}$. Quả Dưa hấu nặng bằng 2 quả Bưởi, nên quả Dưa hấu nặng: $600 + 600 = 1200\\text{ (g)}$. Đổi $1200\\text{ g} = 1\\text{ kg } 200\\text{ g}$." },
{ q_title: "Câu 8", q_content: "Một tòa nhà có các tầng được xây cách đều nhau. Nam đi bộ từ tầng 1 lên tầng 3 phải bước qua $40$&nbsp;bậc thang. Hỏi nếu Nam đi bộ từ tầng 1 lên tầng 5 thì phải bước qua bao nhiêu bậc thang?", options: ["A. $60$&nbsp;bậc", "B. $100$&nbsp;bậc", "C. $80$&nbsp;bậc", "D. $120$&nbsp;bậc"], correct_idx: 2, explain: "Bẫy khoảng cách: Từ tầng 1 lên tầng 3 thực chất chỉ đi qua 2 khoảng cách (Tầng 1 $\\rightarrow$ 2 và Tầng 2 $\\rightarrow$ 3). Vậy 1 khoảng cách có số bậc thang là: $40 : 2 = 20$&nbsp;(bậc). Từ tầng 1 lên tầng 5 có 4 khoảng cách. Số bậc thang cần bước là: $20 \\times 4 = 80$&nbsp;(bậc)." },
{ q_title: "Câu 9", q_content: "Dãy số sau được viết theo quy luật nào? $1, 4, 9, 16, 25, \\dots$", options: ["A. Cộng thêm lần lượt $3, 4, 5, 6$.", "B. Cộng thêm lần lượt $3, 5, 7, 9$.", "C. Nhân đôi số liền trước.", "D. Mỗi số gấp 3 lần số đứng trước."], correct_idx: 1, explain: "Xét khoảng cách giữa các số: $4 - 1 = 3$; $9 - 4 = 5$; $16 - 9 = 7$; $25 - 16 = 9$. Khoảng cách tăng dần theo dãy số lẻ. Vậy quy luật là cộng thêm lần lượt $3, 5, 7, 9$. (Số tiếp theo sẽ là $25 + 11 = 36$)." },
