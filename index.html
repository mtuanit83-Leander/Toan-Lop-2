{ t_title: "Bài 4. Viết chữ số thích hợp vào ô trống:", t_content: "<div>a) Các phép tính cộng:</div><div class='flex flex-col md:flex-row justify-around items-center mt-2 mb-6 gap-4'><div>$$\\begin{array}{rccc} & 3 & 2 & \\square \\\\ + & 5 & \\square & 6 \\\\ \\hline & \\square & 7 & 8 \\end{array}$$</div><div>$$\\begin{array}{rccc} & 6 & \\square & 3 \\\\ + & \\square & 2 & 5 \\\\ \\hline & 8 & 7 & \\square \\end{array}$$</div><div>$$\\begin{array}{rccc} & \\square & 5 & 2 \\\\ + & 3 & 4 & \\square \\\\ \\hline & 9 & \\square & 1 \\end{array}$$</div></div><div>b) Các phép tính trừ:</div><div class='flex flex-col md:flex-row justify-around items-center mt-2 mb-2 gap-4'><div>$$\\begin{array}{rccc} & 8 & 7 & \\square \\\\ - & \\square & 5 & 7 \\\\ \\hline & 5 & \\square & 0 \\end{array}$$</div><div>$$\\begin{array}{rccc} & 4 & \\square & 9 \\\\ - & & 5 & \\square \\\\ \\hline & \\square & 7 & 6 \\end{array}$$</div><div>$$\\begin{array}{rccc} & \\square & 5 & 2 \\\\ - & 3 & 4 & \\square \\\\ \\hline & 1 & \\square & 3 \\end{array}$$</div></div>", strategy: "Phân tích từng hàng (đơn vị rồi đến hàng chục, hàng trăm) theo đúng quy tắc cộng trừ có nhớ. Ví dụ câu a phép 3: $2 + \\square$ có tận cùng là $1$ nên $\\square$ phải là $9$ (vì $2 + 9 = 11$, viết $1$ nhớ $1$).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br><strong>a) Phép cộng:</strong></li><div class='flex flex-col md:flex-row justify-around items-center mt-2 mb-6 gap-4'><div>$$\\begin{array}{rccc} & 3 & 2 & \\mathbf{\\color{red}{2}} \\\\ + & 5 & \\mathbf{\\color{red}{5}} & 6 \\\\ \\hline & \\mathbf{\\color{red}{8}} & 7 & 8 \\end{array}$$</div><div>$$\\begin{array}{rccc} & 6 & \\mathbf{\\color{red}{5}} & 3 \\\\ + & \\mathbf{\\color{red}{2}} & 2 & 5 \\\\ \\hline & 8 & 7 & \\mathbf{\\color{red}{8}} \\end{array}$$</div><div>$$\\begin{array}{rccc} & \\mathbf{\\color{red}{5}} & 5 & 2 \\\\ + & 3 & 4 & \\mathbf{\\color{red}{9}} \\\\ \\hline & 9 & \\mathbf{\\color{red}{0}} & 1 \\end{array}$$</div></div><li><strong>b) Phép trừ:</strong></li><div class='flex flex-col md:flex-row justify-around items-center mt-2 mb-2 gap-4'><div>$$\\begin{array}{rccc} & 8 & 7 & \\mathbf{\\color{red}{7}} \\\\ - & \\mathbf{\\color{red}{3}} & 5 & 7 \\\\ \\hline & 5 & \\mathbf{\\color{red}{2}} & 0 \\end{array}$$</div><div>$$\\begin{array}{rccc} & 4 & \\mathbf{\\color{red}{2}} & 9 \\\\ - & & 5 & \\mathbf{\\color{red}{3}} \\\\ \\hline & \\mathbf{\\color{red}{3}} & 7 & 6 \\end{array}$$</div><div>$$\\begin{array}{rccc} & \\mathbf{\\color{red}{4}} & 5 & 2 \\\\ - & 3 & 4 & \\mathbf{\\color{red}{9}} \\\\ \\hline & 1 & \\mathbf{\\color{red}{0}} & 3 \\end{array}$$</div></div><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền số vào ô trống.</li>" },
{ t_title: "Bài 5. Điền số thích hợp vào ô trống:", t_content: "<div>a) Tháp số (Quy luật: Tổng 2 ô liền kề ở dưới bằng ô ở trên):</div><div class='flex flex-col items-center gap-2 mt-4 mb-8'><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100'></div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>140</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>186</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>56</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>84</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100'></div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>26</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>30</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>54</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>48</div></div></div><div>b) Tháp số (Quy luật: Hiệu 2 ô liền kề ở trên bằng ô ở dưới):</div><div class='flex flex-col items-center gap-2 mt-4 mb-2'><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>588</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>330</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>254</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>218</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>258</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>76</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100'></div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>182</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100'></div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100'></div></div></div>", strategy: "Với tháp tổng: Ô trên bằng tổng hai ô dưới liền kề (Lấy $54 + 48 = 102$, Lấy $140 + 186 = 326$). Với tháp hiệu: Ô dưới bằng hiệu hai ô trên liền kề (Lấy $254 - 218 = 36$, Lấy $76 - 36 = 40$, Lấy $182 - 40 = 142$).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br><strong>a) Tháp tổng:</strong></li><div class='flex flex-col items-center gap-2 mt-4 mb-8'><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100 text-red-600'>326</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>140</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>186</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>56</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>84</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100 text-red-600'>102</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>26</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>30</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>54</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>48</div></div></div><li><strong>b) Tháp hiệu:</strong></li><div class='flex flex-col items-center gap-2 mt-4 mb-2'><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>588</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>330</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>254</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>218</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>258</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>76</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100 text-red-600'>36</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded'>182</div><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100 text-red-600'>40</div></div><div class='flex gap-2'><div class='w-14 h-10 border-2 border-gray-600 flex items-center justify-center font-bold rounded bg-yellow-100 text-red-600'>142</div></div></div>" },
{ t_title: "Bài 6. Thực hiện phép tính:", t_content: "$426 + 130 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $504 + 83 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $406 - 102 = \\dots$<br>$130 + 426 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $83 + 504 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $304 + 102 = \\dots$<br>$556 - 130 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $587 - 83 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $175 - 40 = \\dots$<br>$556 - 426 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $587 - 504 = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $135 + 40 = \\dots$", strategy: "Nhấn mạnh tính chất giao hoán của phép cộng và mối quan hệ giữa phép cộng - phép trừ.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Cột 1: $556$ ; $556$ ; $426$ ; $130$</li><li>Cột 2: $587$ ; $587$ ; $504$ ; $83$</li><li>Cột 3: $304$ ; $406$ ; $135$ ; $175$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 7. Điền số thích hợp vào chỗ chấm:", t_content: "$1\\text{ m } 2\\text{ dm} = \\dots\\text{ cm}$<br>$3\\text{ m } 3\\text{ cm} = \\dots\\text{ cm}$<br>$340\\text{ cm} = \\dots\\text{ m } \\dots\\text{ dm}$<br>$123\\text{ cm} = \\dots\\text{ m } \\dots\\text{ dm } \\dots\\text{ cm}$<br>$309\\text{ cm} = \\dots\\text{ dm } \\dots\\text{ cm}$<br>$450\\text{ dm} = \\dots\\text{ m}$", strategy: "Ghi nhớ bảng quy đổi: $1\\text{ m} = 10\\text{ dm} = 100\\text{ cm}$.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>$1\\text{ m } 2\\text{ dm} = 120\\text{ cm}$</li><li>$3\\text{ m } 3\\text{ cm} = 303\\text{ cm}$</li><li>$340\\text{ cm} = 3\\text{ m } 4\\text{ dm}$</li><li>$123\\text{ cm} = 1\\text{ m } 2\\text{ dm } 3\\text{ cm}$</li><li>$309\\text{ cm} = 30\\text{ dm } 9\\text{ cm}$</li><li>$450\\text{ dm} = 45\\text{ m}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền ở trên.</li>" },
{ t_title: "Bài 8. Viết kết quả tính:", t_content: "a) $25\\text{ m} + 8\\text{ m} + 7\\text{ m} = \\dots\\text{ m}$<br>$254\\text{ m} + 27\\text{ m} - 6\\text{ m} = \\dots\\text{ m}$<br>$630\\text{ m} - 26\\text{ m} - 8\\text{ m} = \\dots\\text{ m}$<br><br>b) $910\\text{ km} - 57\\text{ km} = \\dots\\text{ km}$<br>$27\\text{ km} + 138\\text{ km} = \\dots\\text{ km}$<br>$1\\text{ km} - 45\\text{ m} = \\dots\\text{ m}$<br><br>c) $35\\text{ m} : 5 = \\dots\\text{ m}$<br>$5\\text{ km} \\times 9 = \\dots\\text{ km}$<br>$18\\text{ km} : 2 = \\dots\\text{ km}$", strategy: "Thực hiện phép tính với các số và ghi kèm đơn vị. Chú ý phép trừ khác đơn vị: $1\\text{ km} - 45\\text{ m}$ phải đổi $1\\text{ km} = 1000\\text{ m}$ rồi mới trừ.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) $40\\text{ m}$ ; $275\\text{ m}$ ; $596\\text{ m}$</li><li>b) $853\\text{ km}$ ; $165\\text{ km}$ ; $955\\text{ m}$</li><li>c) $7\\text{ m}$ ; $45\\text{ km}$ ; $9\\text{ km}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 9. Tính theo mẫu:", t_content: "a) $5\\text{ giờ} + 3\\text{ giờ} = 8\\text{ giờ}$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $5\\text{ giờ} \\times 5 = \\dots$<br>$12\\text{ giờ} + 4\\text{ giờ} = \\dots$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $18\\text{ giờ} : 2 = \\dots$", strategy: "Thực hiện tính toán với phần số và giữ nguyên chữ 'giờ' ở đằng sau.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) $12\\text{ giờ} + 4\\text{ giờ} = 16\\text{ giờ}$</li><li>b) $5\\text{ giờ} \\times 5 = 25\\text{ giờ}$ ; $18\\text{ giờ} : 2 = 9\\text{ giờ}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 10.", t_content: "Cùng đi một quãng đường như nhau, anh Hòa đi hết 50 phút, anh Tùng đi hết 1 giờ, anh Bình đi hết 65 phút. Hỏi ai đi nhanh nhất?", strategy: "Thời gian và vận tốc tỉ lệ nghịch. Đổi về cùng đơn vị (phút), ai có số thời gian ít nhất thì đi nhanh nhất.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Anh Hòa: $50$ phút<br>Anh Tùng: $1$ giờ<br>Anh Bình: $65$ phút<br>Ai đi nhanh nhất?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Đổi $1$ giờ = $60$ phút.</li><li>Ta có: $50$ phút < $60$ phút < $65$ phút.</li><li>Vì anh Hòa tốn ít thời gian nhất nên anh Hòa đi nhanh nhất.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Anh Hòa.</li>" },
{ t_title: "Bài 11.", t_content: "a) Hà ngủ từ 9 giờ tối hôm trước đến 6 giờ sáng hôm sau. Hỏi Hà đã ngủ mấy giờ?<br>b) Công nhân làm việc từ 10 giờ sáng đến 5 giờ chiều. Hỏi công nhân làm việc trong mấy giờ?<br>c) Hàng ngày em học ở trường từ 7 giờ sáng đến 11 giờ trưa. Hỏi mỗi ngày em học mấy giờ?", strategy: "Sử dụng cách đổi giờ sang hệ 24 giờ (ví dụ: 5 giờ chiều = 17 giờ) rồi làm phép trừ, hoặc dùng phương pháp đếm nhẩm các khoảng giờ trên mặt đồng hồ.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Từ $9$ giờ tối đến $12$ giờ đêm là $3$ giờ. Từ $12$ giờ đêm đến $6$ giờ sáng là $6$ giờ. Vậy Hà đã ngủ: $3 + 6 = 9$ (giờ).</li><li>b) Đổi $5$ giờ chiều = $17$ giờ. Thời gian làm việc là: $17 - 10 = 7$ (giờ).</li><li>c) Thời gian em học là: $11 - 7 = 4$ (giờ).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $9$ giờ ; b) $7$ giờ ; c) $4$ giờ.</li>" },
{ t_title: "Bài 12.", t_content: "Biết tháng 10 có 31 ngày, tháng 11 có 30 ngày. Hôm nay là thứ năm ngày 25 tháng 10. Như vậy:<br>a) Thứ năm tuần trước là ngày .................................................<br>b) Chủ nhật tuần sau là ngày .................................................", strategy: "Mỗi tuần cách nhau 7 ngày. Tuần trước thì làm phép trừ (-7), tuần sau thì làm phép cộng (+7). <strong>Bẫy ở câu b:</strong> Cần chú ý khi cộng vượt qua số ngày của tháng 10 (31 ngày) thì phải tính sang các ngày đầu của tháng 11.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Thứ năm tuần trước là ngày: $25 - 7 = 18$. Vậy đó là <strong>ngày $18$ tháng $10$</strong>.</li><li>b) Thứ năm tuần sau là ngày: $25 + 7 = 32$. Nhưng tháng $10$ chỉ có $31$ ngày, nên ngày $32$ chính là ngày $1$ tháng $11$.</li><li>Thứ năm tuần sau là $1/11$, vậy thứ sáu là $2/11$, thứ bảy là $3/11$, Chủ nhật tuần sau là <strong>ngày $4$ tháng $11$</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) Ngày $18$ tháng $10$ ; b) Ngày $4$ tháng $11$.</li>" },
{ t_title: "Bài 13. Tính:", t_content: "a) $150\\text{ kg} + 30\\text{ kg} = \\dots\\text{ kg}$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $200\\text{ kg} - 45\\text{ kg} = \\dots\\text{ kg}$<br>b) $70\\text{ kg} + 30\\text{ kg} + 15\\text{ kg} = \\dots\\text{ kg}$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $1000\\text{ kg} - 23\\text{ kg} - 100\\text{ kg} = \\dots\\text{ kg}$", strategy: "Thực hiện phép tính lần lượt từ trái sang phải và giữ nguyên đơn vị 'kg'.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) $150\\text{ kg} + 30\\text{ kg} = 180\\text{ kg}$ ; $200\\text{ kg} - 45\\text{ kg} = 155\\text{ kg}$</li><li>b) $70\\text{ kg} + 30\\text{ kg} + 15\\text{ kg} = 115\\text{ kg}$ ; $1000\\text{ kg} - 23\\text{ kg} - 100\\text{ kg} = 877\\text{ kg}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 14. Tính:", t_content: "a) $2\\text{ kg} \\times 6 = \\dots\\text{ kg}$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $2\\text{ kg} \\times 9 = \\dots\\text{ kg}$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $20\\text{ kg} : 2 = \\dots\\text{ kg}$<br>b) $45\\text{ kg} : 5 = \\dots\\text{ kg}$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $15\\text{ kg} : 5 = \\dots\\text{ kg}$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; $5\\text{ kg} \\times 7 = \\dots\\text{ kg}$", strategy: "Nhẩm các bảng nhân, chia 2 và 5 đã học. Viết thêm đơn vị 'kg' vào sau kết quả.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) $12\\text{ kg}$ ; $18\\text{ kg}$ ; $10\\text{ kg}$</li><li>b) $9\\text{ kg}$ ; $3\\text{ kg}$ ; $35\\text{ kg}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 15. Điền số thích hợp vào chỗ chấm:", t_content: "a) $207\\text{ l} + 19\\text{ l} = \\dots\\text{ l}$ ;<br>$132\\text{ l} + 28\\text{ l} + 80\\text{ l} = \\dots\\text{ l}$ ;<br>$339\\text{ l} + 31\\text{ l} - 120\\text{ l} = \\dots\\text{ l}$ .<br><br>b) $20\\text{ l} : 2 = \\dots\\text{ l}$ ;<br>$40\\text{ l} : 5 = \\dots\\text{ l}$ ;<br>$9\\text{ l} \\times 5 = \\dots\\text{ l}$ .", strategy: "Cộng trừ nhân chia các số bình thường và ghi chú đơn vị lít (l).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) $207\\text{ l} + 19\\text{ l} = 226\\text{ l}$<br>$132\\text{ l} + 28\\text{ l} + 80\\text{ l} = 240\\text{ l}$<br>$339\\text{ l} + 31\\text{ l} - 120\\text{ l} = 250\\text{ l}$</li><li>b) $20\\text{ l} : 2 = 10\\text{ l}$<br>$40\\text{ l} : 5 = 8\\text{ l}$<br>$9\\text{ l} \\times 5 = 45\\text{ l}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 16. Tính:", t_content: "a) $100\\text{ đồng} + 400\\text{ đồng}$<br>$700\\text{ đồng} - 300\\text{ đồng}$<br><br>b) $500\\text{ đồng} + 200\\text{ đồng} + 300\\text{ đồng}$<br>$1000\\text{ đồng} - 300\\text{ đồng} - 100\\text{ đồng}$", strategy: "Tính toán nhẩm với các số tròn trăm. Kết quả luôn phải có chữ 'đồng'.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) $100\\text{ đồng} + 400\\text{ đồng} = 500\\text{ đồng}$<br>$700\\text{ đồng} - 300\\text{ đồng} = 400\\text{ đồng}$</li><li>b) $500\\text{ đồng} + 200\\text{ đồng} + 300\\text{ đồng} = 1000\\text{ đồng}$<br>$1000\\text{ đồng} - 300\\text{ đồng} - 100\\text{ đồng} = 600\\text{ đồng}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 17. Viết số thích hợp vào chỗ chấm:", t_content: "Khi mua một món đồ có giá 400 đồng, em đưa cho người bán hàng một tờ 1000 đồng. Người bán có thể trả lại tiền thừa cho em một trong các cách sau:<br>Cách 1: ....... tờ 500 đồng và .... tờ 100 đồng.<br>Cách 2: ....... tờ 200 đồng.<br>Cách 3: ....... tờ 100 đồng.", strategy: "Đầu tiên phải tính số tiền thừa mà người bán hàng cần trả lại là $1000 - 400 = 600$ (đồng). Sau đó nhẩm xem số tiền đó được tạo thành từ các tờ tiền mệnh giá nào để điền số lượng thích hợp.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Số tiền người bán hàng phải trả lại là: $1000 - 400 = 600$ (đồng).</li><li>Cách 1: Cần $600$ đồng, ta có $500 + 100 = 600$. Vậy trả lại <strong>1</strong> tờ 500 đồng và <strong>1</strong> tờ 100 đồng.</li><li>Cách 2: Ta có $200 + 200 + 200 = 600$. Vậy trả lại <strong>3</strong> tờ 200 đồng.</li><li>Cách 3: Cần 6 tờ 100 đồng ($100 \\times 6 = 600$). Vậy trả lại <strong>6</strong> tờ 100 đồng.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền ở trên.</li>" },
{ t_title: "Bài 18.", t_content: "Khi trả tiền mua rau, An đưa cho người bán rau 1000 đồng, người bán rau trả lại An 300 đồng. Hỏi An mua rau hết bao nhiêu tiền?", strategy: "Số tiền mua rau chính là số tiền An đưa trừ đi số tiền được thối lại.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Đưa: $1000$ đồng<br>Trả lại: $300$ đồng<br>Hết: $\\dots$ đồng?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>An mua rau hết số tiền là:<br>$1000 - 300 = 700$ (đồng)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $700$ đồng.</li>" },
{ t_title: "Bài 19.", t_content: "Cuộn dây điện màu xanh dài 145 m, cuộn dây điện màu vàng dài hơn cuộn dây điện màu xanh 17 m. Hỏi cuộn dây điện màu vàng dài bao nhiêu mét?", strategy: "Dạng toán 'Nhiều hơn'. Cuộn màu vàng dài hơn nên ta thực hiện phép tính cộng.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Màu xanh: $145\\text{ m}$<br>Màu vàng dài hơn màu xanh: $17\\text{ m}$<br>Màu vàng: $\\dots\\text{ m}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Cuộn dây điện màu vàng dài số mét là:<br>$145 + 17 = 162\\text{ (m)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $162\\text{ m}$.</li>" },
{ t_title: "Bài 20.", t_content: "Gia đình nhà Mai đi từ nhà đến thành phố Hạ Long bằng ô tô. Đến điểm dừng nghỉ trên đường đi, Mai thấy cột cây số bên đường ghi “Hạ Long 47 km”, bố nói với Mai: “Nhà mình đã đi được 45 km rồi”. Hỏi quãng đường từ nhà Mai đến thành phố Hạ Long dài bao nhiêu ki-lô-mét?", strategy: "Cột mốc 'Hạ Long 47 km' nghĩa là từ vị trí hiện tại đến Hạ Long còn đúng 47 km nữa. Để tính tổng quãng đường, ta lấy phần đường ĐÃ ĐI cộng với phần đường CÒN LẠI.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Đã đi: $45\\text{ km}$<br>Cột mốc (Còn lại): $47\\text{ km}$<br>Quãng đường: $\\dots\\text{ km}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Quãng đường từ nhà Mai đến thành phố Hạ Long dài số ki-lô-mét là:<br>$45 + 47 = 92\\text{ (km)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $92\\text{ km}$.</li>" },
{ t_title: "Bài 21.", t_content: "Đường từ nhà bác Hùng ra thành phố phải qua thị xã. Quãng đường từ nhà bác Hùng đến thị xã dài $15\\text{ km}$, quãng đường từ thị xã đến thành phố ngắn hơn quãng đường từ nhà bác Hùng đến thị xã $9\\text{ km}$. Tính:<br>a) Chiều dài quãng đường từ thị xã đến thành phố.<br>b) Chiều dài quãng đường từ nhà bác Hùng đến thành phố.", strategy: "Bài toán yêu cầu tính 2 bước. Câu a là dạng toán 'ngắn hơn' (làm phép trừ). Câu b là tính tổng độ dài của cả 2 đoạn đường (nhà -> thị xã -> thành phố).", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Nhà bác Hùng đến thị xã: $15\\text{ km}$<br>Thị xã đến thành phố ngắn hơn: $9\\text{ km}$<br>a) Thị xã đến thành phố: $\\dots\\text{ km}$?<br>b) Nhà bác Hùng đến thành phố: $\\dots\\text{ km}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Chiều dài quãng đường từ thị xã đến thành phố là:<br>$15 - 9 = 6\\text{ (km)}$</li><li>b) Chiều dài quãng đường từ nhà bác Hùng đến thành phố là:<br>$15 + 6 = 21\\text{ (km)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $6\\text{ km}$ ; b) $21\\text{ km}$.</li>" },
{ t_title: "Bài 22.", t_content: "Nhà Hoàng cách nhà Minh $280\\text{ m}$. Cùng một lúc hai bạn đi đến nhà nhau chơi. Hoàng đi được $135\\text{ m}$, Minh đi được nhiều hơn Hoàng $8\\text{ m}$. Hỏi:<br>a) Minh đi được bao nhiêu mét?<br>b) Khi đó hai bạn đã gặp nhau chưa?", strategy: "Câu a là dạng toán 'nhiều hơn' thông thường. <strong>Câu b yêu cầu tư duy:</strong> Tính TỔNG quãng đường hai bạn ĐÃ ĐI. Nếu tổng đã đi bằng hoặc lớn hơn khoảng cách hai nhà ($280\\text{ m}$) thì họ đã gặp nhau, nếu bé hơn thì chưa gặp.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Khoảng cách hai nhà: $280\\text{ m}$<br>Hoàng đi: $135\\text{ m}$<br>Minh đi nhiều hơn Hoàng: $8\\text{ m}$<br>a) Minh đi: $\\dots\\text{ m}$?<br>b) Đã gặp nhau chưa?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Minh đi được số mét là:<br>$135 + 8 = 143\\text{ (m)}$</li><li>b) Tổng quãng đường hai bạn đã đi được là:<br>$135 + 143 = 278\\text{ (m)}$</li><li>Vì $278\\text{ m} < 280\\text{ m}$ nên hai bạn <strong>chưa gặp nhau</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $143\\text{ m}$ ; b) Chưa gặp nhau.</li>" },
{ t_title: "Bài 23.", t_content: "Quãng đường Hà Nội – Hải Phòng dài $102\\text{ km}$. Quãng đường Hà Nội – Lạng Sơn dài hơn quãng đường Hà Nội – Hải Phòng là $67\\text{ km}$. Hỏi quãng đường Hà Nội – Lạng Sơn dài bao nhiêu ki-lô-mét?", strategy: "Dạng toán 'dài hơn' (nhiều hơn), ta thực hiện phép tính cộng.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Hà Nội – Hải Phòng: $102\\text{ km}$<br>Hà Nội – Lạng Sơn dài hơn: $67\\text{ km}$<br>Hà Nội – Lạng Sơn: $\\dots\\text{ km}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Quãng đường Hà Nội – Lạng Sơn dài số ki-lô-mét là:<br>$102 + 67 = 169\\text{ (km)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $169\\text{ km}$.</li>" },
{ t_title: "Bài 24.", t_content: "Có một số ki-lô-gam gạo, nếu đem chia số gạo đó cho $6$ người thì mỗi người được $5\\text{ kg}$ gạo. Hỏi:<br>a) Có tất cả bao nhiêu ki-lô-gam gạo?<br>b) Nếu chia số gạo đó cho $5$ người thì mỗi người được bao nhiêu ki-lô-gam gạo?", strategy: "Bài toán giải bằng 2 bước tính. Trước tiên phải tính xem có tất cả bao nhiêu kg gạo (Lấy số gạo 1 người nhân với 6), sau đó mới chia đều cho 5.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Chia $6$ người: mỗi người $5\\text{ kg}$<br>a) Có tất cả: $\\dots\\text{ kg}$?<br>b) Chia $5$ người: mỗi người $\\dots\\text{ kg}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Có tất cả số ki-lô-gam gạo là:<br>$5 \\times 6 = 30\\text{ (kg)}$</li><li>b) Nếu chia số gạo đó cho $5$ người thì mỗi người được số ki-lô-gam gạo là:<br>$30 : 5 = 6\\text{ (kg)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $30\\text{ kg}$ ; b) $6\\text{ kg}$.</li>" },
{ t_title: "Bài 25.", t_content: "Con bò cân nặng $205\\text{ kg}$. Con trâu cân nặng hơn con bò $23\\text{ kg}$. Hỏi con trâu cân nặng bao nhiêu ki-lô-gam?", strategy: "Dạng toán 'nặng hơn' (nhiều hơn), ta thực hiện phép tính cộng.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Con bò: $205\\text{ kg}$<br>Con trâu nặng hơn con bò: $23\\text{ kg}$<br>Con trâu: $\\dots\\text{ kg}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Con trâu cân nặng số ki-lô-gam là:<br>$205 + 23 = 228\\text{ (kg)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $228\\text{ kg}$.</li>" },
{ t_title: "Bài 26.", t_content: "Một cửa hàng buổi sáng bán được $350\\text{ kg}$ gạo. Buổi chiều cửa hàng bán được ít hơn buổi sáng là $120\\text{ kg}$. Hỏi buổi chiều cửa hàng bán được bao nhiêu ki-lô-gam gạo?", strategy: "Dạng toán 'ít hơn', ta thực hiện phép tính trừ.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Buổi sáng: $350\\text{ kg}$<br>Buổi chiều ít hơn buổi sáng: $120\\text{ kg}$<br>Buổi chiều: $\\dots\\text{ kg}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Buổi chiều cửa hàng bán được số ki-lô-gam gạo là:<br>$350 - 120 = 230\\text{ (kg)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $230\\text{ kg}$.</li>" },
{ t_title: "Bài 27.", t_content: "Thùng thứ nhất chứa $467$ lít dầu, thùng thứ hai chứa nhiều hơn thùng thứ nhất $35$ lít dầu. Hỏi thùng thứ hai chứa bao nhiêu lít dầu?", strategy: "Dạng toán 'nhiều hơn', ta thực hiện phép tính cộng.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Thùng thứ nhất: $467$ lít<br>Thùng thứ hai nhiều hơn thùng thứ nhất: $35$ lít<br>Thùng thứ hai: $\\dots$ lít?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Thùng thứ hai chứa số lít dầu là:<br>$467 + 35 = 502$ (lít)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $502$ lít dầu.</li>" },
{ t_title: "Bài 28.", t_content: "Có hai thùng dầu, thùng thứ nhất chứa $545$ lít dầu và chứa nhiều hơn thùng thứ hai $133$ lít dầu. Hỏi:<br>a) Thùng thứ hai chứa bao nhiêu lít dầu?<br>b) Cả hai thùng chứa bao nhiêu lít dầu?", strategy: "<strong>Bẫy câu chữ:</strong> Đề bài cho 'Thùng 1 chứa nhiều hơn thùng 2'. Điều này có nghĩa là Thùng 2 chứa ÍT HƠN thùng 1. Vậy để tìm thùng 2 ta phải làm phép TRỪ chứ không phải phép cộng.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Thùng thứ nhất: $545$ lít<br>Thùng thứ nhất nhiều hơn thùng thứ hai: $133$ lít<br>a) Thùng thứ hai: $\\dots$ lít?<br>b) Cả hai thùng: $\\dots$ lít?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Thùng thứ hai chứa số lít dầu là:<br>$545 - 133 = 412$ (lít)</li><li>b) Cả hai thùng chứa số lít dầu là:<br>$545 + 412 = 957$ (lít)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $412$ lít ; b) $957$ lít.</li>" },
{ t_title: "Bài 29.", t_content: "Có hai can đựng dầu, can lớn đựng $105$ lít dầu, nếu lấy ra từ can lớn $3$ lít dầu thì số lít dầu của hai can bằng nhau. Hỏi:<br>a) Can bé có bao nhiêu lít dầu?<br>b) Lúc đầu cả hai can có bao nhiêu lít dầu?", strategy: "Tư duy logic: Can lớn phải bỏ đi 3 lít thì mới bằng can bé. Điều đó chứng tỏ can bé ít hơn can lớn 3 lít. Ta dùng phép trừ để tìm can bé.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Can lớn: $105$ lít<br>Can lớn lấy ra $3$ lít thì bằng can bé<br>a) Can bé: $\\dots$ lít?<br>b) Cả hai can: $\\dots$ lít?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Can bé có số lít dầu là:<br>$105 - 3 = 102$ (lít)</li><li>b) Lúc đầu cả hai can có tổng số lít dầu là:<br>$105 + 102 = 207$ (lít)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $102$ lít ; b) $207$ lít.</li>" },
{ t_title: "Bài 30.", t_content: "Trại chăn nuôi có $485$ con gà mái, số gà trống ít hơn số gà mái là $150$ con. Hỏi trại chăn nuôi có bao nhiêu con gà trống?", strategy: "Dạng toán 'ít hơn', ta thực hiện phép tính trừ.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Gà mái: $485$ con<br>Gà trống ít hơn gà mái: $150$ con<br>Gà trống: $\\dots$ con?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Trại chăn nuôi có số con gà trống là:<br>$485 - 150 = 335$ (con)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $335$ con gà trống.</li>" },
{ t_title: "Bài 31.", t_content: "Trại chăn nuôi có $375$ con gà mái, số gà mái ít hơn số gà trống là $15$ con. Hỏi trại chăn nuôi đó có bao nhiêu con gà?", strategy: "Bài toán 2 bước tính. <strong>Bẫy chữ:</strong> 'Gà mái ít hơn gà trống' nghĩa là 'Gà trống nhiều hơn gà mái'. Do đó để tìm gà trống ta phải dùng phép cộng. Cuối cùng tính TỔNG số gà của cả trại.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Gà mái: $375$ con<br>Gà mái ít hơn gà trống: $15$ con<br>Tất cả có: $\\dots$ con?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Số con gà trống của trại chăn nuôi là:<br>$375 + 15 = 390$ (con)</li><li>Trại chăn nuôi đó có tất cả số con gà là:<br>$375 + 390 = 765$ (con)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $765$ con gà.</li>" },
{ t_title: "Bài 32. Trắc nghiệm Tư duy Xác suất", t_content: "Có $4$ bóng xanh, $5$ bóng đỏ, $6$ bóng vàng. Kim không nhìn vào túi lấy ra $2$ lần, mỗi lần $5$ quả bóng. Điền từ “Chắc chắn”, “Có thể”, “Không thể” vào chỗ chấm cho thích hợp:<br>a) ......................... lấy được 1 quả bóng vàng.<br>b) ......................... lấy được quả bóng đỏ.<br>c) ......................... lấy được quả bóng màu trắng.<br>d) ......................... lấy được quả bóng màu xanh.", strategy: "Tính tổng số bóng lấy ra: $5 \\times 2 = 10$ quả bóng. Luôn xét <strong>'trường hợp xui xẻo nhất'</strong>: Giả sử muốn lấy màu Vàng, xui nhất là bốc hết xanh và đỏ ($4 + 5 = 9$ quả). Nhưng ta bốc tận $10$ quả, nên quả thứ $10$ bắt buộc phải là Vàng (Chắc chắn). Ngược lại, nếu số lượng bốc nhỏ hơn tổng các màu khác, thì chỉ là 'Có thể'.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Tổng số bóng Kim lấy ra là $10$ quả.</li><li>a) Xui nhất bốc hết $4$ xanh + $5$ đỏ = $9$ quả. Quả thứ $10$ bắt buộc là vàng. Điền: <strong>Chắc chắn</strong>.</li><li>b) Có trường hợp Kim bốc được $4$ xanh + $6$ vàng = $10$ quả, không có bóng đỏ nào. Điền: <strong>Có thể</strong>.</li><li>c) Trong hộp không có bóng trắng. Điền: <strong>Không thể</strong>.</li><li>d) Có trường hợp Kim bốc được $5$ đỏ + $5$ vàng = $10$ quả, không có bóng xanh nào. Điền: <strong>Có thể</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền ở trên.</li>" },
{ t_title: "Bài 33. Trắc nghiệm Thẻ số", t_content: "Trong hộp có các tấm thẻ mang số $0; 1; 2; 3; 4; 5$. Bạn Mai nhắm mắt lấy ra một tấm thẻ. Điền từ “Chắc chắn”, “Có thể”, “Không thể” vào chỗ chấm cho thích hợp:<br>a. ......................... lấy được một tấm thẻ số $3$.<br>b. ......................... lấy được một tấm thẻ nhỏ hơn $6$.<br>c. ......................... lấy được một tấm thẻ số $8$.", strategy: "Dựa vào các số liệu có thực trên tấm thẻ để đưa ra suy luận logic.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a. Trong hộp có thẻ số $3$, nhưng bạn Mai cũng có thể bốc trúng số khác. Điền: <strong>Có thể</strong>.</li><li>b. Tất cả các thẻ ($0, 1, 2, 3, 4, 5$) đều nhỏ hơn $6$. Nên bốc thẻ nào cũng đúng yêu cầu. Điền: <strong>Chắc chắn</strong>.</li><li>c. Trong hộp không hề có thẻ mang số $8$. Điền: <strong>Không thể</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền ở trên.</li>" },
{ t_title: "Bài 34.", t_content: "Trong một hộp có $5$ viên bi xanh và $8$ viên bi đỏ. An không nhìn vào hộp lấy ra $2$ lần, mỗi lần $4$ viên. Hỏi có thể nói chắc chắn rằng trong số bi lấy ra đó có ít nhất ba viên bi đỏ không?", strategy: "Sử dụng chiến thuật 'Trường hợp rủi ro nhất'. Giả sử An bốc được nhiều bi xanh nhất có thể, nếu phần bi còn lại vẫn đủ 3 bi đỏ thì điều đó là chắc chắn.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Tổng số bi An lấy ra là: $4 \\times 2 = 8$ (viên bi).</li><li>Giả sử An lấy nhiều bi xanh nhất là $5$ viên.</li><li>Số bi còn lại bắt buộc phải là bi đỏ: $8 - 5 = 3$ (viên).</li><li>Vậy chắc chắn lấy được ít nhất $3$ viên bi đỏ.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Chắc chắn lấy được ít nhất $3$ viên bi đỏ.</li>" },
{ t_title: "Bài 35. Đếm hình mảnh ghép", t_content: "Quan sát hình sau rồi viết tiếp vào chỗ chấm cho thích hợp. Nam dùng các mảnh ghép để ghép thành một bức tranh dưới đây:<br><div class='flex justify-center my-6'><svg width='240' height='150' viewBox='0 0 240 150'><circle cx='200' cy='30' r='15' fill='#fde047' stroke='#ca8a04' stroke-width='1.5'/><rect x='20' y='60' width='60' height='50' fill='#86efac' stroke='#166534' stroke-width='1.5'/><rect x='90' y='60' width='60' height='50' fill='#93c5fd' stroke='#1e3a8a' stroke-width='1.5'/><rect x='160' y='60' width='50' height='50' fill='#fca5a5' stroke='#991b1b' stroke-width='1.5'/><rect x='160' y='20' width='40' height='40' fill='#d8b4fe' stroke='#6b21a8' stroke-width='1.5'/><polygon points='150,30 210,30 180,0' fill='#fdba74' stroke='#c2410c' stroke-width='1.5'/><rect x='190' y='40' width='10' height='20' fill='#9ca3af' stroke='#374151' stroke-width='1.5'/><circle cx='40' cy='110' r='12' fill='#374151'/><circle cx='70' cy='110' r='12' fill='#374151'/><circle cx='110' cy='110' r='12' fill='#374151'/><circle cx='140' cy='110' r='12' fill='#374151'/><circle cx='185' cy='110' r='15' fill='#1f2937'/></svg></div>a. Nam đã dùng số mảnh ghép mỗi loại là:<br>- Mảnh ghép hình tam giác: .... mảnh;<br>- Mảnh ghép hình tròn: .... mảnh;<br>- Mảnh ghép hình vuông: .... mảnh;<br>- Mảnh ghép hình chữ nhật: .... mảnh.<br><br>b. Nam đã dùng nhiều nhất là mảnh ghép hình .........<br>Nam đã dùng ít nhất mảnh ghép hình .........", strategy: "Học sinh cần phân loại rõ ràng: Hình vuông có 4 cạnh bằng nhau. Hình chữ nhật có 2 cạnh dài và 2 cạnh ngắn. Lưu ý đếm cả ông mặt trời.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a. Nam đã dùng:</li><li>- Mảnh ghép hình tam giác: <strong>1</strong> mảnh (Mái nhà của buồng lái)</li><li>- Mảnh ghép hình tròn: <strong>6</strong> mảnh (5 bánh xe + 1 mặt trời)</li><li>- Mảnh ghép hình vuông: <strong>2</strong> mảnh (Phần thân và cửa sổ buồng lái)</li><li>- Mảnh ghép hình chữ nhật: <strong>3</strong> mảnh (2 toa chở hàng + 1 ống khói)</li><li>b. Kết luận:</li><li>- Dùng nhiều nhất là mảnh ghép hình <strong>tròn</strong>.</li><li>- Dùng ít nhất là mảnh ghép hình <strong>tam giác</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền ở trên.</li>" },
{ t_title: "Bài 36. Đọc biểu đồ", t_content: "Viết tiếp vào chỗ chấm cho thích hợp. Biểu đồ sau biểu diễn số đồ chơi mà Mai vừa gấp được.<br><div class='border border-gray-800 max-w-[350px] mx-auto my-6 bg-white'><div class='grid grid-cols-3 min-h-[250px] pt-4'><div class='border-r border-gray-800 flex flex-col items-center justify-end pb-4 gap-3'><div class='w-12 h-12 rounded-full bg-red-600 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-red-600 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-red-600 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-red-600 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-red-600 border border-gray-800'></div></div><div class='border-r border-gray-800 flex flex-col items-center justify-end pb-4 gap-3'><div class='w-12 h-12 rounded-full bg-yellow-300 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-yellow-300 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-yellow-300 border border-gray-800'></div></div><div class='flex flex-col items-center justify-end pb-4 gap-3'><div class='w-12 h-12 rounded-full bg-purple-700 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-purple-700 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-purple-700 border border-gray-800'></div><div class='w-12 h-12 rounded-full bg-purple-700 border border-gray-800'></div></div></div><div class='grid grid-cols-3 border-t border-gray-800 text-center font-medium'><div class='border-r border-gray-800 py-2'>Máy bay giấy</div><div class='border-r border-gray-800 py-2'>Thuyền</div><div class='py-2'>Hạc giấy</div></div></div>a. Mai gấp được:<br>...... máy bay giấy;<br>...... thuyền giấy;<br>...... hạc giấy.<br><br>b. Mai đã gấp được tất cả ...... đồ chơi.", strategy: "Đếm số lượng hình tròn ở mỗi cột tương ứng với từng loại đồ chơi. Ở câu b, dùng phép cộng để tính tổng tất cả đồ chơi.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Quan sát biểu đồ tranh, ta đếm được:</li><li>Gấp được <strong>5</strong> máy bay giấy.</li><li>Gấp được <strong>3</strong> thuyền giấy.</li><li>Gấp được <strong>4</strong> hạc giấy.</li><li>b) Mai đã gấp được tất cả: $5 + 3 + 4 =$ <strong>12</strong> đồ chơi.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền ở trên.</li>" },
{ t_title: "Bài 37. Cấu tạo số (Tích)", t_content: "Tìm số lớn nhất có 3 chữ số khác nhau, biết tích ba chữ số của nó có kết quả là $8$.", strategy: "Tìm ba số khác nhau nhân lại bằng 8. Phân tích số 8 thành tích của 3 số khác nhau: $8 = 1 \\times 2 \\times 4$. Để tạo thành số lớn nhất, ta xếp chữ số lớn nhất ở hàng trăm.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta có: $8 = 1 \\times 2 \\times 4$.</li><li>Các chữ số để lập số là: $1, 2, 4$.</li><li>Số lớn nhất ghép được là $421$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $421$.</li>" },
{ t_title: "Bài 38. Tổ hợp số (Tích)", t_content: "Viết tất cả các số có ba chữ số khác nhau mà tích ba chữ số của nó bằng $6$.", strategy: "Tìm ba chữ số khác nhau nhân lại bằng 6. Phân tích số 6 thành tích của 3 số khác nhau: $6 = 1 \\times 2 \\times 3$. Đảo vị trí để liệt kê.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta có: $6 = 1 \\times 2 \\times 3$.</li><li>Các số có ba chữ số khác nhau ghép được là:</li><li>$123, 132, 213, 231, 312, 321$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $123, 132, 213, 231, 312, 321$.</li>" },
{ t_title: "Bài 39. Tổ hợp số (Tổng)", t_content: "Viết tất cả các số có ba chữ số khác nhau mà tổng ba chữ số của nó bằng $6$.", strategy: "Các bộ ba chữ số khác nhau có tổng bằng 6 là: $(0, 1, 5) ; (0, 2, 4) ; (1, 2, 3)$. Chú ý chữ số 0 không được đứng ở hàng trăm.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Từ bộ $(0, 1, 5)$ ta viết được: $105, 150, 501, 510$.</li><li>Từ bộ $(0, 2, 4)$ ta viết được: $204, 240, 402, 420$.</li><li>Từ bộ $(1, 2, 3)$ ta viết được: $123, 132, 213, 231, 312, 321$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Có $14$ số thỏa mãn.</li>" },
{ t_title: "Bài 40.", t_content: "Dùng ba thẻ số dưới đây để ghép thành các số có ba chữ số. Tính:<br><div class='flex gap-4 justify-center my-4'><div class='w-16 h-20 border-4 border-red-500 rounded-xl flex items-center justify-center text-4xl font-extrabold bg-white text-red-600 shadow-md'>5</div><div class='w-16 h-20 border-4 border-blue-500 rounded-xl flex items-center justify-center text-4xl font-extrabold bg-white text-blue-600 shadow-md'>0</div><div class='w-16 h-20 border-4 border-green-500 rounded-xl flex items-center justify-center text-4xl font-extrabold bg-white text-green-600 shadow-md'>2</div></div>a) Tổng của số lớn nhất và số bé nhất được ghép bởi các số trên.<br>b) Hiệu của số lớn nhất và số bé nhất được ghép bởi các số trên.", strategy: "Từ 3 thẻ, lập số lớn nhất (Xếp số lớn nhất ở hàng trăm) và số bé nhất (Xếp số bé nhất KHÁC 0 ở hàng trăm).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Số lớn nhất có 3 chữ số là: $520$.</li><li>Số bé nhất có 3 chữ số là: $205$.</li><li>a) Tổng là: $520 + 205 = 725$.</li><li>b) Hiệu là: $520 - 205 = 315$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $725$ ; b) $315$.</li>" },
{ t_title: "Bài 41. Nối mỗi hình với tên gọi thích hợp:", t_content: "<svg style='width:0;height:0;'><defs><marker id='arrow-head' viewBox='0 0 10 10' refX='5' refY='5' markerWidth='4' markerHeight='4' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='black'/></marker></defs></svg><div class='flex flex-col gap-6 mt-8 mb-8 overflow-x-auto'><div class='flex justify-around items-center min-w-[600px]'><div><svg width='120' height='60' viewBox='0 0 120 60'><line x1='15' y1='30' x2='105' y2='30' stroke='black' stroke-width='2.5' marker-start='url(#arrow-head)' marker-end='url(#arrow-head)'/><circle cx='35' cy='30' r='3.5' fill='black'/><circle cx='85' cy='30' r='3.5' fill='black'/></svg></div><div><svg width='120' height='60' viewBox='0 0 120 60'><path d='M 10 40 Q 30 10 60 35 T 110 25' fill='none' stroke='black' stroke-width='2.5'/></svg></div><div><svg width='120' height='60' viewBox='0 0 120 60'><polyline points='10,40 50,10 80,50 110,20' fill='none' stroke='black' stroke-width='2.5' stroke-linejoin='round'/></svg></div><div><svg width='120' height='60' viewBox='0 0 120 60'><line x1='20' y1='30' x2='100' y2='30' stroke='black' stroke-width='2.5'/><circle cx='20' cy='30' r='3.5' fill='black'/><circle cx='100' cy='30' r='3.5' fill='black'/></svg></div></div><div class='flex justify-around items-center text-lg font-bold min-w-[600px] pb-4'><div class='relative border-2 border-[#86efac] bg-[#dcfce7] text-black px-2 py-3 rounded-xl w-[140px] text-center shadow-sm'>Đường gấp khúc</div><div class='relative border-2 border-[#fdba74] bg-[#ffedd5] text-black px-2 py-3 rounded-xl w-[140px] text-center shadow-sm'>Đường thẳng</div><div class='relative border-2 border-[#fde047] bg-[#fef9c3] text-black px-2 py-3 rounded-xl w-[140px] text-center shadow-sm'>Đoạn thẳng</div><div class='relative border-2 border-[#93c5fd] bg-[#dbeafe] text-black px-2 py-3 rounded-xl w-[140px] text-center shadow-sm'>Đường cong</div></div></div>", strategy: "Quan sát kĩ đặc điểm của từng đường:<br>- <strong>Đường thẳng:</strong> Kéo dài mãi mãi (thường vẽ mũi tên ở 2 đầu).<br>- <strong>Đường cong:</strong> Uốn lượn mềm mại.<br>- <strong>Đường gấp khúc:</strong> Gồm nhiều đoạn thẳng nối tiếp nhau và bị gãy khúc.<br>- <strong>Đoạn thẳng:</strong> Bị giới hạn bởi 2 điểm ở 2 đầu.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br></li><div class='mt-4 overflow-x-auto flex justify-center'><svg width='600' height='180' viewBox='0 0 600 180' class='min-w-[600px]'><g transform='translate(15, 0) scale(0.7)'><line x1='15' y1='30' x2='105' y2='30' stroke='black' stroke-width='2.5' marker-start='url(#arrow-head)' marker-end='url(#arrow-head)'/><circle cx='35' cy='30' r='3.5' fill='black'/><circle cx='85' cy='30' r='3.5' fill='black'/></g><g transform='translate(165, 0) scale(0.7)'><path d='M 10 40 Q 30 10 60 35 T 110 25' fill='none' stroke='black' stroke-width='2.5'/></g><g transform='translate(315, 0) scale(0.7)'><polyline points='10,40 50,10 80,50 110,20' fill='none' stroke='black' stroke-width='2.5' stroke-linejoin='round'/></g><g transform='translate(465, 0) scale(0.7)'><line x1='20' y1='30' x2='100' y2='30' stroke='black' stroke-width='2.5'/><circle cx='20' cy='30' r='3.5' fill='black'/><circle cx='100' cy='30' r='3.5' fill='black'/></g><rect x='20' y='120' width='110' height='40' rx='10' fill='#dcfce7' stroke='#86efac' stroke-width='2'/><text x='75' y='145' text-anchor='middle' font-size='14' font-weight='bold'>Đường gấp khúc</text><rect x='170' y='120' width='110' height='40' rx='10' fill='#ffedd5' stroke='#fdba74' stroke-width='2'/><text x='225' y='145' text-anchor='middle' font-size='14' font-weight='bold'>Đường thẳng</text><rect x='320' y='120' width='110' height='40' rx='10' fill='#fef9c3' stroke='#fde047' stroke-width='2'/><text x='375' y='145' text-anchor='middle' font-size='14' font-weight='bold'>Đoạn thẳng</text><rect x='470' y='120' width='110' height='40' rx='10' fill='#dbeafe' stroke='#93c5fd' stroke-width='2'/><text x='525' y='145' text-anchor='middle' font-size='14' font-weight='bold'>Đường cong</text><defs><marker id='arrow-red' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='6' markerHeight='6' orient='auto'><path d='M 0 0 L 10 5 L 0 10 z' fill='#ef4444'/></marker></defs><line x1='75' y1='50' x2='225' y2='115' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red)'/><line x1='225' y1='50' x2='525' y2='115' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red)'/><line x1='375' y1='50' x2='75' y2='115' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red)'/><line x1='525' y1='50' x2='375' y2='115' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red)'/></svg></div><li class='font-bold mt-4 text-indigo-700'>Đáp số: Đã nối như hình vẽ.</li>" },
{ t_title: "Bài 42. Nối mỗi hình với tên gọi thích hợp:", t_content: "<div class='flex justify-around items-end mt-8 mb-8'><div class='flex flex-col items-center'><svg width='80' height='80' viewBox='0 0 60 80'><path d='M 10 20 L 10 70 A 20 8 0 0 0 50 70 L 50 20 Z' fill='#d97706' stroke='#9a3412' stroke-width='1.5'/><ellipse cx='30' cy='20' rx='20' ry='8' fill='#ea580c' stroke='#9a3412' stroke-width='1.5'/></svg></div><div class='flex flex-col items-center'><svg width='80' height='80' viewBox='0 0 60 60'><circle cx='30' cy='30' r='24' fill='#2563eb' stroke='#1e3a8a' stroke-width='1.5'/><circle cx='30' cy='30' r='22' fill='none' stroke='rgba(255,255,255,0.2)' stroke-width='2'/></svg></div><div class='flex flex-col items-center'><svg width='80' height='80' viewBox='0 0 60 60'><rect x='10' y='25' width='30' height='30' fill='#eab308' stroke='#713f12' stroke-width='1.5'/><polygon points='10,25 25,10 55,10 40,25' fill='#fde047' stroke='#713f12' stroke-width='1.5'/><polygon points='40,25 55,10 55,40 40,55' fill='#ca8a04' stroke='#713f12' stroke-width='1.5'/></svg></div><div class='flex flex-col items-center'><svg width='110' height='80' viewBox='0 0 90 60'><rect x='10' y='30' width='50' height='20' fill='#16a34a' stroke='#14532d' stroke-width='1.5'/><polygon points='10,30 25,15 75,15 60,30' fill='#4ade80' stroke='#14532d' stroke-width='1.5'/><polygon points='60,30 75,15 75,35 60,50' fill='#15803d' stroke='#14532d' stroke-width='1.5'/></svg></div></div><div class='flex justify-around items-center mb-8 gap-2 text-base font-medium'><div class='border border-black bg-[#fee2e2] text-black px-2 py-3 w-[120px] text-center shadow-sm'>Khối cầu</div><div class='border border-black bg-[#fee2e2] text-black px-2 py-3 w-[120px] text-center shadow-sm'>Khối trụ</div><div class='border border-black bg-[#fee2e2] text-black px-2 py-3 w-[160px] text-center shadow-sm'>Khối hộp chữ nhật</div><div class='border border-black bg-[#fee2e2] text-black px-2 py-3 w-[150px] text-center shadow-sm'>Khối lập phương</div></div>", strategy: "Học sinh nhận diện các đặc điểm cơ bản của hình khối không gian để nối đúng với tên gọi bên dưới.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br></li><div class='mt-4 overflow-x-auto flex justify-center'><svg width='600' height='180' viewBox='0 0 600 180' class='min-w-[600px]'><g transform='translate(35, 0) scale(0.8)'><path d='M 10 20 L 10 70 A 20 8 0 0 0 50 70 L 50 20 Z' fill='#d97706' stroke='#9a3412' stroke-width='1.5'/><ellipse cx='30' cy='20' rx='20' ry='8' fill='#ea580c' stroke='#9a3412' stroke-width='1.5'/></g><g transform='translate(185, 0) scale(0.8)'><circle cx='30' cy='30' r='24' fill='#2563eb' stroke='#1e3a8a' stroke-width='1.5'/><circle cx='30' cy='30' r='22' fill='none' stroke='rgba(255,255,255,0.2)' stroke-width='2'/></g><g transform='translate(335, 0) scale(0.8)'><rect x='10' y='25' width='30' height='30' fill='#eab308' stroke='#713f12' stroke-width='1.5'/><polygon points='10,25 25,10 55,10 40,25' fill='#fde047' stroke='#713f12' stroke-width='1.5'/><polygon points='40,25 55,10 55,40 40,55' fill='#ca8a04' stroke='#713f12' stroke-width='1.5'/></g><g transform='translate(470, 0) scale(0.8)'><rect x='10' y='30' width='50' height='20' fill='#16a34a' stroke='#14532d' stroke-width='1.5'/><polygon points='10,30 25,15 75,15 60,30' fill='#4ade80' stroke='#14532d' stroke-width='1.5'/><polygon points='60,30 75,15 75,35 60,50' fill='#15803d' stroke='#14532d' stroke-width='1.5'/></g><rect x='20' y='130' width='110' height='40' fill='#fee2e2' stroke='black' stroke-width='1'/><text x='75' y='155' text-anchor='middle' font-size='14' font-weight='bold'>Khối cầu</text><rect x='170' y='130' width='110' height='40' fill='#fee2e2' stroke='black' stroke-width='1'/><text x='225' y='155' text-anchor='middle' font-size='14' font-weight='bold'>Khối trụ</text><rect x='320' y='130' width='130' height='40' fill='#fee2e2' stroke='black' stroke-width='1'/><text x='385' y='155' text-anchor='middle' font-size='14' font-weight='bold'>Khối hộp CN</text><rect x='460' y='130' width='130' height='40' fill='#fee2e2' stroke='black' stroke-width='1'/><text x='525' y='155' text-anchor='middle' font-size='14' font-weight='bold'>Khối lập phương</text><defs><marker id='arrow-red-2' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='6' markerHeight='6' orient='auto'><path d='M 0 0 L 10 5 L 0 10 z' fill='#ef4444'/></marker></defs><line x1='75' y1='65' x2='225' y2='125' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red-2)'/><line x1='225' y1='65' x2='75' y2='125' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red-2)'/><line x1='385' y1='65' x2='525' y2='125' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red-2)'/><line x1='525' y1='65' x2='385' y2='125' stroke='#ef4444' stroke-width='3' stroke-dasharray='5,5' marker-end='url(#arrow-red-2)'/></svg></div><li class='font-bold mt-4 text-indigo-700'>Đáp số: Đã nối như hình vẽ.</li>" },
{ t_title: "Bài 43. Quan sát các hình vẽ bên cho biết: Có bao nhiêu hình tam giác?", t_content: "<div class='flex justify-around items-end my-6'><div><svg width='150' height='120' viewBox='0 0 100 100'><polygon points='50,10 10,90 90,90' fill='none' stroke='black' stroke-width='2.5'/><line x1='50' y1='10' x2='60' y2='90' stroke='black' stroke-width='2.5'/><circle cx='50' cy='10' r='1.5' fill='black'/><circle cx='10' cy='90' r='1.5' fill='black'/><circle cx='60' cy='90' r='1.5' fill='black'/><circle cx='90' cy='90' r='1.5' fill='black'/></svg><div class='text-center mt-2 font-bold'>a)</div></div><div><svg width='180' height='120' viewBox='0 0 140 100'><polygon points='40,10 10,90 130,90' fill='none' stroke='black' stroke-width='2.5'/><line x1='40' y1='10' x2='40' y2='90' stroke='black' stroke-width='2.5'/><line x1='40' y1='10' x2='70' y2='90' stroke='black' stroke-width='2.5'/><line x1='40' y1='10' x2='100' y2='90' stroke='black' stroke-width='2.5'/><circle cx='40' cy='10' r='1.5' fill='black'/><circle cx='10' cy='90' r='1.5' fill='black'/><circle cx='40' cy='90' r='1.5' fill='black'/><circle cx='70' cy='90' r='1.5' fill='black'/><circle cx='100' cy='90' r='1.5' fill='black'/><circle cx='130' cy='90' r='1.5' fill='black'/></svg><div class='text-center mt-2 font-bold'>b)</div></div></div>", strategy: "Sử dụng phương pháp đếm số đoạn thẳng nhỏ trên cạnh đáy. Số hình tam giác bằng tổng các số đếm từ 1 đến số đoạn thẳng đó.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br><strong>Hình a:</strong> Đáy bị chia làm 2 phần. Số tam giác là: $1 + 2 = 3$ hình.</li><li><strong>Hình b:</strong> Đáy bị chia làm 4 phần. Số tam giác là: $1 + 2 + 3 + 4 = 10$ hình.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $3$ hình ; b) $10$ hình.</li>" },
{ t_title: "Bài 44. Quan sát hình vẽ dưới đây cho biết có bao nhiêu hình tứ giác?", t_content: "<div class='flex justify-center my-6'><svg width='220' height='140' viewBox='0 0 160 100'><polygon points='30,80 110,80 130,30 50,30' fill='none' stroke='black' stroke-width='2.5' stroke-linejoin='round'/><line x1='70' y1='80' x2='50' y2='30' stroke='black' stroke-width='2.5'/><line x1='70' y1='80' x2='90' y2='30' stroke='black' stroke-width='2.5'/><line x1='110' y1='80' x2='90' y2='30' stroke='black' stroke-width='2.5'/><text x='50' y='65' font-size='14' text-anchor='middle'>1</text><text x='70' y='48' font-size='14' text-anchor='middle'>2</text><text x='90' y='65' font-size='14' text-anchor='middle'>3</text><text x='110' y='48' font-size='14' text-anchor='middle'>4</text></svg></div>", strategy: "Hình tứ giác là hình có 4 cạnh. Không có hình tứ giác đơn lẻ (1, 2, 3, 4 đều là tam giác). Hãy ghép các tam giác kề nhau để tạo thành tứ giác.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Tứ giác đơn: $0$ hình.</li><li>Tứ giác ghép 2 hình: $(1+2), (2+3), (3+4)$ => Có <strong>$3$</strong> hình.</li><li>Tứ giác ghép 3 hình: $(1+2+3), (2+3+4)$ => Có <strong>$2$</strong> hình.</li><li>Tứ giác ghép 4 hình (Toàn bộ hình lớn): $(1+2+3+4)$ => Có <strong>$1$</strong> hình.</li><li>Tổng số hình tứ giác là: $3 + 2 + 1 = 6$ hình.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $6$ hình tứ giác.</li>" },
{ t_title: "Bài 45. Quan sát hình vẽ dưới đây cho biết:", t_content: "<div class='flex flex-col md:flex-row items-center gap-8 my-6'><div class='flex-1 text-lg'>a) Có tất cả bao nhiêu hình tam giác có trong hình?<br><br>b) Có tất cả bao nhiêu hình tứ giác có trong hình?</div><div><svg width='160' height='160' viewBox='0 0 100 100'><polygon points='50,10 10,90 90,90' fill='none' stroke='black' stroke-width='2.5' stroke-linejoin='round'/><line x1='50' y1='10' x2='50' y2='90' stroke='black' stroke-width='2.5'/><line x1='30' y1='50' x2='70' y2='50' stroke='black' stroke-width='2.5'/></svg></div></div>", strategy: "Đếm có trật tự. <br>- Tam giác: Đếm các hình trên cùng, rồi đếm dọc, rồi đếm toàn hình.<br>- Tứ giác: Nhận diện các hình có 4 cạnh (ở phía nửa dưới).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br><strong>a) Hình tam giác:</strong><br>- Tam giác đơn (ở nửa trên): 2 hình.<br>- Tam giác ghép đôi nằm ngang (toàn bộ nửa trên): 1 hình.<br>- Tam giác lớn ghép dọc (nửa trái và nửa phải): 2 hình.<br>- Tam giác lớn nhất (toàn bộ bao ngoài): 1 hình.<br>=> Có tất cả: $2 + 1 + 2 + 1 = 6$ <strong>hình tam giác</strong>.</li><li><strong>b) Hình tứ giác:</strong><br>- Tứ giác đơn (nằm ở nửa dưới): 2 hình.<br>- Tứ giác lớn ghép ngang (toàn bộ nửa dưới): 1 hình.<br>=> Có tất cả: $2 + 1 = 3$ <strong>hình tứ giác</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $6$ tam giác ; b) $3$ tứ giác.</li>" },
{ t_title: "Bài 46. Đường gấp khúc", t_content: "Ghi tên các đường gấp khúc có trong hình vẽ sau:<br><div class='flex justify-center my-6 relative w-[250px] h-[150px]'><svg width='250' height='150' viewBox='0 0 250 150'><polyline points='20,120 70,30 130,120 180,30 230,120' fill='none' stroke='black' stroke-width='3'/><circle cx='20' cy='120' r='4' fill='black'/><text x='5' y='125' font-weight='bold'>A</text><circle cx='70' cy='30' r='4' fill='black'/><text x='65' y='20' font-weight='bold'>B</text><circle cx='130' cy='120' r='4' fill='black'/><text x='125' y='140' font-weight='bold'>C</text><circle cx='180' cy='30' r='4' fill='black'/><text x='175' y='20' font-weight='bold'>D</text><circle cx='230' cy='120' r='4' fill='black'/><text x='235' y='125' font-weight='bold'>E</text></svg></div>a) Đường gấp khúc gồm 4 đoạn thẳng.<br>b) Các đường gấp khúc gồm 3 đoạn thẳng.<br>c) Các đường gấp khúc gồm 2 đoạn thẳng.", strategy: "Đọc tên các điểm nối tiếp nhau. Số đoạn thẳng = Số chữ cái trừ đi 1.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Gồm 4 đoạn thẳng (Cần 5 chữ cái): <strong>ABCDE</strong></li><li>b) Gồm 3 đoạn thẳng (Cần 4 chữ cái): <strong>ABCD, BCDE</strong></li><li>c) Gồm 2 đoạn thẳng (Cần 3 chữ cái): <strong>ABC, BCD, CDE</strong></li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã liệt kê ở trên.</li>" },
{ t_title: "Bài 47. Đoạn dây hình ngôi sao", t_content: "Một đoạn dây đồng được uốn thành hình ngôi sao như hình vẽ bên. Tính độ dài đoạn dây đồng đó.<br><div class='flex justify-center items-center gap-6 my-4'><svg width='120' height='120' viewBox='0 0 100 100'><polygon points='50,5 61,39 98,39 68,61 79,95 50,75 21,95 32,61 2,39 39,39' fill='none' stroke='#b45309' stroke-width='3' stroke-linejoin='round'/></svg><div class='text-lg font-bold text-orange-800'>Biết mỗi đoạn viền ngoài dài $2\\text{ cm}$</div></div>", strategy: "Hình ngôi sao 5 cánh có tổng cộng 10 đoạn viền ngoài bằng nhau. Đoạn dây đồng uốn quanh viền ngoài nên độ dài đoạn dây chính là chu vi của ngôi sao.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Mỗi đoạn: $2\\text{ cm}$<br>Hình ngôi sao: $10$ đoạn<br>Độ dài dây: $\\dots\\text{ cm}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Đếm số cạnh (đoạn thẳng) tạo nên viền ngoài của ngôi sao 5 cánh ta thấy có $10$ đoạn.</li><li>Độ dài đoạn dây đồng đó là:<br>$2 \\times 10 = 20\\text{ (cm)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $20\\text{ cm}$.</li>" },

{ q_title: "Câu 7", q_content: "Khi mua một món đồ có giá $1000$ đồng, em chọn tờ tiền nào dưới đây để đưa cho người bán hàng?", options: ["A. Tờ 1000 đồng", "B. Tờ 500 đồng", "C. Tờ 200 đồng", "D. Tờ 100 đồng"], correct_idx: 0, explain: "Giá món đồ là $1000$ đồng, nên em cần đưa tờ tiền có mệnh giá tương ứng là $1000$ đồng." },

{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $665 + 37$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $317 - 45$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $567 - 368$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $289 + 456$", strategy: "Học sinh đặt tính dọc ra nháp, chú ý viết thẳng hàng: đơn vị thẳng đơn vị, chục thẳng chục, trăm thẳng trăm. Nhớ cộng/trừ phần nhớ vào hàng tiếp theo.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br><strong>Đặt tính rồi tính:</strong></li><div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 665 \\\\ + & 37 \\\\ \\hline & \\mathbf{\\color{red}{702}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 317 \\\\ - & 45 \\\\ \\hline & \\mathbf{\\color{red}{272}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 567 \\\\ - & 368 \\\\ \\hline & \\mathbf{\\color{red}{199}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 289 \\\\ + & 456 \\\\ \\hline & \\mathbf{\\color{red}{745}} \\end{array}$$</div></div><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 2", t_content: "Đúng ghi Đ, sai ghi S vào chỗ chấm:<br>a) Một bước chân của em không thể dài $2\\text{ m}$ ........<br>b) $930\\text{ m} + 70\\text{ m}$ chắc chắn lớn hơn $1\\text{ km}$ ........<br>c) Hiệu của hai số tròn chục có thể là một số không tròn chục ........", strategy: "Sử dụng kiến thức thực tế về độ dài và quy tắc cộng các số tròn chục. Bước chân học sinh tiểu học chỉ khoảng 30-50cm. $930 + 70 = 1000\\text{ m} = 1\\text{ km}$, không thể lớn hơn 1km. Số tròn chục trừ số tròn chục luôn ra số tròn chục.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Một bước chân của em không thể dài $2\\text{ m}$ <strong><span class='text-red-600'>Đ</span></strong></li><li>b) $930\\text{ m} + 70\\text{ m}$ chắc chắn lớn hơn $1\\text{ km}$ <strong><span class='text-red-600'>S</span></strong></li><li>c) Hiệu của hai số tròn chục có thể là một số không tròn chục <strong><span class='text-red-600'>S</span></strong></li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã điền ở trên.</li>" },
{ t_title: "Bài 3", t_content: "Điền số thích hợp vào chỗ chấm:<br>a) $288\\text{ km} + 421\\text{ km} - 356\\text{ km} = \\dots\\dots\\text{ km}$<br>b) $760\\text{ dm} - 35\\text{ dm} + 125\\text{ dm} = \\dots\\dots\\text{ m}$", strategy: "Thực hiện phép tính lần lượt từ trái sang phải. Ở câu b lưu ý đơn vị kết quả yêu cầu là mét (m). Ta có $725 + 125 = 850\\text{ dm}$. Đổi $850\\text{ dm} = 85\\text{ m}$.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) $288\\text{ km} + 421\\text{ km} - 356\\text{ km} =$ <strong><span class='text-red-600'>$353$</span></strong> $\\text{km}$</li><li>b) $760\\text{ dm} - 35\\text{ dm} + 125\\text{ dm} =$ <strong><span class='text-red-600'>$85$</span></strong> $\\text{m}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Đã tính ở trên.</li>" },
{ t_title: "Bài 4", t_content: "Số học sinh nam của khối lớp Hai là $145$ em, nhiều hơn số học sinh nữ $29$ em.<br>a) Hỏi khối lớp Hai có bao nhiêu học sinh nữ?<br>b) Để giúp đỡ các bạn nhỏ vùng cao, mỗi học sinh khối lớp Hai đã quyên góp 1 quyển vở. Hỏi khối lớp Hai quyên góp được bao nhiêu quyển vở?", strategy: "Tìm số học sinh nữ bằng phép trừ (vì nam nhiều hơn nữ nên nữ ít hơn nam). Sau đó tính tổng số học sinh của cả khối để biết số vở.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Nam: $145$ em<br>Nam nhiều hơn nữ: $29$ em<br>a) Nữ: $\\dots$ em?<br>b) Khối Hai quyên góp: $\\dots$ quyển vở?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Khối lớp Hai có số học sinh nữ là:<br>$145 - 29 = 116$ (em)</li><li>b) Tổng số học sinh khối lớp Hai là:<br>$145 + 116 = 261$ (em)</li><li>Vì mỗi học sinh quyên góp $1$ quyển vở nên khối lớp Hai quyên góp được $261$ quyển vở.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: a) $116$ em; b) $261$ quyển vở.</li>" },
