tu_luan: [
{ t_title: "Bài 1", t_content: "Hãy điền dấu phép tính $(+, -)$ thích hợp vào các ô trống để được một phép tính đúng:<br><div class='text-2xl text-center my-4 font-mono font-bold tracking-widest'>$15 \\ \\square\\  5 \\ \\square\\  10 = 20$</div>", strategy: "WHAT (Phân tích phép tính): Ta có các số 15, 5, 10 ở bên trái và kết quả mong muốn là 20 ở bên phải.<br>HOW (Thử nghiệm):<br>- Nếu dùng dấu (+): $15 + 5 = 20$. Ta đã đạt mốc 20, nhưng vẫn còn số 10 phía sau. Cộng hay trừ 10 đều không ra 20. Loại.<br>- Nếu dùng dấu (-): $15 - 5 = 10$. Kết hợp 10 với số 10 cuối cùng bằng dấu (+) sẽ ra 20.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta điền dấu lần lượt như sau:</li><li><strong>$15 \\ \\mathbf{\\color{red}{-}}\\  5 \\ \\mathbf{\\color{red}{+}}\\  10 = 20$</strong></li>" },
{ t_title: "Bài 2", t_content: "Hiệu của hai số là $45$. Nếu giữ nguyên số bị trừ và tăng số trừ thêm $10$ đơn vị thì hiệu mới sẽ là bao nhiêu?", strategy: "WHAT (Nguyên lý của phép trừ): Hiệu là kết quả của phép trừ (Phần còn lại sau khi lấy đi). Số trừ chính là phần MANG ĐI.<br>HOW (Tư duy thực tế): Con có một số kẹo. Con bị lấy đi một lượng (số trừ), con còn lại 45 cái (hiệu). Nếu con BỊ LẤY ĐI NHIỀU HƠN 10 cái (số trừ tăng lên), thì phần kẹo CÒN LẠI (hiệu) sẽ giảm đi.<br>WHY: Số trừ tăng thì Hiệu sẽ giảm đi đúng một lượng tương ứng.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Trong phép trừ, nếu số bị trừ giữ nguyên mà số trừ TĂNG thêm $10$ đơn vị thì phần còn lại (tức là Hiệu) sẽ GIẢM ĐI $10$ đơn vị.</li><li>Hiệu mới là:<br>$45 - 10 = 35$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $35$.</li>" },
{ t_title: "Bài 3", t_content: "Ba bạn An, Bình, Cường nuôi 3 con vật khác nhau: một con chó, một con mèo và một con thỏ. Biết rằng Bình không nuôi chó. Cường rất sợ chó và cũng bị dị ứng với lông mèo. Hỏi mỗi bạn đang nuôi con vật gì?", strategy: "WHO (Người nhiều dữ kiện nhất): Tìm xem bạn nào có nhiều từ \"không\", \"sợ\", \"dị ứng\" nhất để bắt đầu. Đó là Cường.<br>HOW (Loại trừ cho Cường): Cường sợ chó (không nuôi chó), Cường dị ứng lông mèo (không nuôi mèo). Vậy Cường chỉ có thể nuôi con gì?<br>WHAT NEXT: Đã chốt Cường, gạch con vật đó khỏi danh sách. Chuyển sang Bình...", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta sử dụng phương pháp suy luận loại trừ:</li><li>Bạn Cường sợ chó và bị dị ứng lông mèo nên Cường không nuôi chó và mèo. Suy ra <strong>Cường nuôi Thỏ</strong>.</li><li>Bạn Bình không nuôi chó, con thỏ thì Cường đã nuôi. Suy ra <strong>Bình nuôi Mèo</strong>.</li><li>Chỉ còn lại một con vật là con chó. Suy ra <strong>An nuôi Chó</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: An nuôi Chó, Bình nuôi Mèo, Cường nuôi Thỏ.</li>" },
{ t_title: "Bài 4", t_content: "Một bãi gửi xe có tất cả $10$ chiếc xe gồm hai loại: ô tô (loại $4$ bánh) và xe máy (loại $2$ bánh). Bác bảo vệ đếm được tổng cộng có $26$ chiếc bánh xe. Hỏi trong bãi xe đó có bao nhiêu chiếc ô tô, bao nhiêu chiếc xe máy?", strategy: "WHAT IF (Giả sử toàn bộ là xe máy): Hãy tưởng tượng nếu tất cả 10 chiếc xe trong bãi đều là xe máy thì tổng số bánh xe sẽ là bao nhiêu? ($2 \\times 10 = 20$ bánh).<br>WHY (Tìm sự chênh lệch): Thực tế có 26 bánh. Tại sao giả sử xong lại bị thiếu mất mấy bánh? (Thiếu 6 bánh).<br>HOW (Xác định số lượng): Vì ta đã coi ô tô thành xe máy, nên mỗi chiếc ô tô bị tính hụt mất 2 bánh. Lấy tổng số bánh bị thiếu chia cho 2 sẽ ra số ô tô.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Tổng xe: $10$ chiếc. Tổng bánh xe: $26$ chiếc.<br>Ô tô (4 bánh): $\\dots$ chiếc? Xe máy (2 bánh): $\\dots$ chiếc?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Mỗi chiếc ô tô có $4$ bánh, mỗi chiếc xe máy có $2$ bánh. Giả sử cả $10$ chiếc xe đều là xe máy. Khi đó tổng số bánh xe là:<br>$2 \\times 10 = 20$ (bánh xe)</li><li>Số bánh xe bị thiếu so với thực tế là:<br>$26 - 20 = 6$ (bánh xe)</li><li>Mỗi chiếc ô tô bị tính hụt đi số bánh xe là:<br>$4 - 2 = 2$ (bánh xe)</li><li>Số chiếc ô tô trong bãi là:<br>$6 : 2 = 3$ (chiếc)</li><li>Số chiếc xe máy trong bãi là:<br>$10 - 3 = 7$ (chiếc)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $3$ chiếc ô tô, $7$ chiếc xe máy.</li>" },
{ t_title: "Bài 5", t_content: "Mẹ cho Nam $3$ tờ tiền với các mệnh giá khác nhau: $1$ tờ $10$ nghìn, $1$ tờ $20$ nghìn và $1$ tờ $50$ nghìn. Từ $3$ tờ tiền này, Nam có thể tạo ra được tất cả bao nhiêu số tiền khác nhau (biết rằng Nam có thể sử dụng $1$ tờ, $2$ tờ hoặc cả $3$ tờ cùng lúc để tạo thành một số tiền)?", strategy: "HOW (Liệt kê có hệ thống): Để không bị sót, ta phân loại theo SỐ LƯỢNG tờ tiền được sử dụng.<br>- Dùng 1 tờ: Có các số tiền nào?<br>- Dùng 2 tờ: Ghép từng cặp (10+20; 10+50; 20+50).<br>- Dùng 3 tờ: Cộng cả ba.<br>WHAT NEXT: Đếm xem có bao nhiêu kết quả KHÁC NHAU.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta liệt kê các số tiền tạo được dựa vào số lượng tờ tiền Nam sử dụng:</li><li>- Dùng $1$ tờ tiền, Nam tạo được $3$ số tiền: $10$ nghìn, $20$ nghìn, $50$ nghìn.</li><li>- Dùng $2$ tờ tiền, Nam tạo được $3$ số tiền:<br>$10 + 20 = 30$ (nghìn)<br>$10 + 50 = 60$ (nghìn)<br>$20 + 50 = 70$ (nghìn)</li><li>- Dùng cả $3$ tờ tiền, Nam tạo được $1$ số tiền:<br>$10 + 20 + 50 = 80$ (nghìn)</li><li>Các số tiền tạo được là: $10, 20, 30, 50, 60, 70, 80$ nghìn. Tất cả đều khác nhau. Vậy Nam tạo được $7$ số tiền.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $7$ số tiền.</li>" },
{ t_title: "Bài 6", t_content: "Người ta cắt một mảnh giấy hình chữ nhật thành $3$ mảnh hình vuông nhỏ bằng nhau. Biết chu vi của $1$ mảnh hình vuông nhỏ là $16\\text{ cm}$. Tính chu vi của mảnh giấy hình chữ nhật ban đầu.<br><div class='flex justify-center my-4'><svg width='240' height='80' viewBox='0 0 240 80'><rect x='10' y='10' width='220' height='60' fill='none' stroke='#1e3a8a' stroke-width='2'/><line x1='83' y1='10' x2='83' y2='70' stroke='#1e3a8a' stroke-width='2' stroke-dasharray='5,5'/><line x1='156' y1='10' x2='156' y2='70' stroke='#1e3a8a' stroke-width='2' stroke-dasharray='5,5'/></svg></div>", strategy: "WHAT (Tìm cạnh hình vuông): Chu vi hình vuông là $16\\text{cm}$, lấy chu vi chia $4$ để tìm độ dài $1$ cạnh.<br>HOW (Cấu tạo hình chữ nhật): Hình chữ nhật được ghép từ $3$ hình vuông. Chiều rộng hình chữ nhật chính là $1$ cạnh hình vuông. Chiều dài hình chữ nhật là $3$ cạnh nối tiếp nhau.<br>WHAT NEXT: Tính chu vi hình chữ nhật.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Cắt HCN thành $3$ HV.<br>Chu vi $1$ HV: $16\\text{ cm}$.<br>Chu vi HCN: $\\dots\\text{ cm}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Chu vi của hình vuông nhỏ là $16\\text{ cm}$, mà hình vuông có $4$ cạnh bằng nhau nên độ dài $1$ cạnh của hình vuông là:<br>$16 : 4 = 4\\text{ (cm)}$</li><li>Mảnh giấy hình chữ nhật ban đầu được ghép bởi $3$ hình vuông đó nên chiều rộng của hình chữ nhật bằng $4\\text{ cm}$. Chiều dài của hình chữ nhật là:<br>$4 \\times 3 = 12\\text{ (cm)}$</li><li>Chu vi của mảnh giấy hình chữ nhật ban đầu là:<br>$12 + 12 + 4 + 4 = 32\\text{ (cm)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $32\\text{ cm}$.</li>" }
]
});
</script>

{ q_title: "Câu 8", q_content: "Nam có $2$ tờ tiền mệnh giá $10$ nghìn đồng. Nam mua kẹo hết $15$ nghìn đồng. Hỏi người bán hàng phải trả lại Nam bao nhiêu tiền?", options: ["A. $10$ nghìn đồng", "B. $5$ nghìn đồng", "C. $15$ nghìn đồng", "D. $2$ nghìn đồng"], correct_idx: 1, explain: "Tổng số tiền Nam có là $10 + 10 = 20$ (nghìn đồng). Người bán hàng phải trả lại số tiền là: $20 - 15 = 5$ (nghìn đồng)." },

{ q_title: "Câu 10", q_content: "Tổng của hai số là $30$. Nếu số hạng thứ nhất tăng thêm $5$ đơn vị và số hạng thứ hai giảm đi $2$ đơn vị thì tổng mới là bao nhiêu?", options: ["A. $35$", "B. $33$", "C. $27$", "D. $37$"], correct_idx: 1, explain: "Khi thêm vào một số hạng thì tổng tăng, khi giảm một số hạng thì tổng giảm. Tổng mới là: $30 + 5 - 2 = 33$." },

{ t_title: "Bài 1", t_content: "Tính nhanh:<br><div class='text-center text-xl my-4'>$10 + 12 + 14 + 16 - 9 - 11 - 13 - 15$</div>", strategy: "WHAT (Quan sát hai nhóm số): Có 4 số chẵn mang dấu cộng (10, 12, 14, 16) và 4 số lẻ mang dấu trừ (9, 11, 13, 15).<br>HOW (Bắt cặp ghép đôi): Thay vì cộng hết rồi mới trừ, hãy nhóm 1 số chẵn với số lẻ liền trước nó đứng ngay phía dưới.<br>WHY (Sự triệt tiêu): $10 - 9 = 1$; $12 - 11 = 1\\dots$ Phép tính dài sẽ biến thành phép cộng của những con số 1.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>$10 + 12 + 14 + 16 - 9 - 11 - 13 - 15$</li><li>$= (10 - 9) + (12 - 11) + (14 - 13) + (16 - 15)$</li><li>$= 1 + 1 + 1 + 1$</li><li>$= 4$</li>" },
{ t_title: "Bài 2", t_content: "Bạn Lan sinh vào đúng ngày $29$ tháng $2$ năm $2016$. Hỏi khi Lan tổ chức kỉ niệm ngày sinh nhật đúng vào ngày $29/2$ lần thứ $2$ trong đời thì lúc đó Lan bao nhiêu tuổi?", strategy: "WHAT (Đặc điểm lịch): Tháng 2 thông thường có 28 ngày. Ngày 29/2 là ngày của năm nhuận.<br>WHEN (Chu kỳ lặp lại): Bao nhiêu năm mới có một năm nhuận? (4 năm). Tức là phải đợi 4 năm Lan mới có một ngày sinh nhật đúng nghĩa.<br>HOW (Tính tiến lên):<br>- Kỉ niệm sinh nhật lần 1: Cần 4 năm trôi qua.<br>- Kỉ niệm sinh nhật lần 2: Cần thêm 4 năm nữa trôi qua.<br>Tổng số tuổi chính là tổng số năm đã trôi qua kể từ lúc sinh ra.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ngày $29$ tháng $2$ là ngày đặc biệt chỉ xuất hiện trong năm nhuận, cứ $4$ năm mới có $1$ lần.</li><li>Để đón ngày sinh nhật lần thứ nhất (đúng vào ngày $29/2$), Lan phải chờ $4$ năm. Khi đó Lan $4$ tuổi.</li><li>Để đón ngày sinh nhật lần thứ hai, Lan phải chờ thêm $4$ năm nữa.</li><li>Khi Lan tổ chức sinh nhật lần thứ $2$, số tuổi của Lan là:<br>$4 + 4 = 8$ (tuổi)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $8$ tuổi.</li>" },
{ t_title: "Bài 3", t_content: "Có một thùng chứa đầy nước ngọt. Trong tay em chỉ có $2$ chiếc can không: một can loại $5$ lít và một can loại $2$ lít (cả $2$ can đều không có vạch chia). Bằng cách múc và rót, em hãy trình bày cách để lấy ra được chính xác $1$ lít nước ngọt từ thùng.", strategy: "WHAT (Mục tiêu dung tích): Có số 5 và số 2. Cần tạo ra số 1.<br>HOW (Thiết lập phép tính): Làm thế nào dùng phép cộng/trừ với các số 5 và 2 để ra kết quả là 1? Ta có: $5 - 2 - 2 = 1$.<br>WHAT NEXT (Chuyển thành hành động rót):<br>- Số \"5\" đầu tiên nghĩa là phải múc đầy can 5L.<br>- Phép \"- 2\" thứ nhất: Rót từ can 5L sang cho đầy can 2L (can 5L bị vơi đi 2L).<br>- Phép \"- 2\" thứ hai: Can 2L đang đầy không rót thêm được, phải đổ hết can 2L trả lại thùng. Sau đó tiếp tục rót từ can 5L sang cho đầy can 2L lần nữa.<br>- Số nước thừa bị kẹt lại ở can 5L chính là 1L.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta có phép tính: $5 - 2 - 2 = 1$. Cách đong như sau:</li><li><strong>Bước 1:</strong> Múc đầy nước vào can $5$ lít.</li><li><strong>Bước 2:</strong> Rót nước từ can $5$ lít sang can $2$ lít cho đến khi can $2$ lít đầy. Lúc này can $5$ lít còn lại $3$ lít nước (vì $5 - 2 = 3$).</li><li><strong>Bước 3:</strong> Đổ hết nước từ can $2$ lít trở lại vào thùng lớn.</li><li><strong>Bước 4:</strong> Tiếp tục rót nước từ can $5$ lít (đang chứa $3$ lít) sang can $2$ lít cho đến khi can $2$ lít đầy. Lượng nước còn thừa lại bên trong can $5$ lít lúc này chính xác là $1$ lít (vì $3 - 2 = 1$).</li>" },
{ t_title: "Bài 4", t_content: "Ba bạn An, Bình và Cư mỗi người đều có $10$ viên bi. Sau đó:<br>- An cho Bình $2$ viên bi.<br>- Bình lại cho Cư $3$ viên bi.<br>- Cư lại lấy $1$ viên bi của mình cho An.<br>Hỏi sau khi cho và nhận xong, bạn nào có nhiều bi nhất và bạn nào có ít bi nhất?", strategy: "WHO (Theo dõi từng cá nhân): Tạo 3 cột nháp cho An, Bình, Cư. Ban đầu mỗi người đều viết số 10.<br>HOW (Cộng trừ theo diễn biến):<br>- \"An cho Bình 2\": An $-2$, Bình $+2$.<br>- \"Bình cho Cư 3\": Bình $-3$, Cư $+3$.<br>- \"Cư cho An 1\": Cư $-1$, An $+1$.<br>WHAT NEXT (Chốt sổ): Tính kết quả cuối cùng của từng cột và rút ra kết luận.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ban đầu, số bi của 3 bạn là: An có $10$ viên; Bình có $10$ viên; Cư có $10$ viên.</li><li>Sau khi An cho Bình $2$ viên:<br>An còn: $10 - 2 = 8$ (viên). Bình có: $10 + 2 = 12$ (viên).</li><li>Sau khi Bình cho Cư $3$ viên:<br>Bình còn: $12 - 3 = 9$ (viên). Cư có: $10 + 3 = 13$ (viên).</li><li>Sau khi Cư cho An $1$ viên:<br>Cư còn: $13 - 1 = 12$ (viên). An có: $8 + 1 = 9$ (viên).</li><li>Số bi cuối cùng: An có $9$ viên, Bình có $9$ viên, Cư có $12$ viên.</li><li class='font-bold mt-2 text-indigo-700'>Kết luận: Bạn Cư có nhiều bi nhất ($12$ viên), bạn An cùng bạn Bình có ít bi nhất ($9$ viên).</li>" },
{ t_title: "Bài 5", t_content: "Có $3$ đồng tiền vàng nhìn bề ngoài giống hệt nhau, nhưng trong đó có $1$ đồng là tiền giả nên nhẹ hơn $2$ đồng thật ($2$ đồng thật có cân nặng bằng nhau). Trong tay em có một chiếc cân đĩa thăng bằng (không có quả cân). Em hãy tìm cách chỉ cần cân <strong>đúng 1 lần</strong> là có thể chỉ ra ngay đồng tiền giả.", strategy: "WHAT (Giới hạn của bài toán): Cân đĩa có 2 bên, nhưng ta có 3 đồng tiền. Buộc phải chia làm 3 phần: 1 đồng ở đĩa trái, 1 đồng ở đĩa phải, và 1 đồng CẦM TRÊN TAY.<br>HOW (Xử lý các tình huống rẽ nhánh):<br>- Nếu 2 đĩa cân BẰNG NHAU (thăng bằng) thì 2 đồng trên đĩa là tiền gì? (Tiền thật vì nặng bằng nhau). Vậy đồng giả ở đâu?<br>- Nếu cân bị LỆCH thì sao? Đồng tiền giả nhẹ hơn sẽ BỊ HẤT LÊN CAO.<br>WHY (Kết luận): Dù cân thăng bằng hay lệch, ta đều lập tức biết được đồng giả ở đâu chỉ sau đúng 1 lần quan sát.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta chia $3$ đồng tiền ra làm ba: Đặt $1$ đồng lên đĩa cân bên trái, đặt $1$ đồng lên đĩa cân bên phải và cầm $1$ đồng ở ngoài. Sẽ xảy ra 1 trong 2 trường hợp sau:</li><li><strong>Trường hợp 1 (Cân thăng bằng):</strong> Nghĩa là $2$ đồng tiền trên đĩa cân nặng bằng nhau, đó chính là $2$ đồng tiền thật. Vậy <strong>đồng tiền cầm trên tay chính là đồng tiền giả</strong>.</li><li><strong>Trường hợp 2 (Cân không thăng bằng):</strong> Nghĩa là đồng tiền giả đang nằm trên đĩa cân. Vì đồng tiền giả nhẹ hơn nên đĩa chứa nó sẽ bị hất bổng lên. Vậy <strong>đồng tiền nằm ở đĩa cân bị đẩy lên cao chính là đồng tiền giả</strong>.</li><li>Chỉ với $1$ lần cân, ta luôn tìm ra được đồng tiền giả.</li>" },
{ t_title: "Bài 6", t_content: "Tìm một số có hai chữ số. Biết rằng nếu xóa đi chữ số hàng đơn vị của số đó thì ta được một số mới nhỏ hơn số ban đầu $41$ đơn vị.", strategy: "WHAT (Bản chất): Nếu một số có hai chữ số bị che mất hàng đơn vị đi, nó sẽ rớt xuống thành số có 1 chữ số, và số mới này chính là chữ số hàng chục của số cũ.<br>HOW (Biểu diễn bằng đặt tính): Gọi số ban đầu là $\\overline{ab}$. Số mới là $a$. Phép tính là: $\\overline{ab} - a = 41$. Đặt tính theo cột dọc.<br>WHERE (Cột hàng chục): Ở cột hàng chục, $a$ trừ đi khoảng trống (hoặc có cho mượn 1) bằng 4. Vậy $a$ có thể là 4 hoặc 5.<br>WHAT NEXT (Thử chọn): Nếu $a = 4$: $4b - 4 = 41 \\Rightarrow b - 4 = 1 \\Rightarrow b = 5$. Ta được số 45. Thử lại: $45 - 4 = 41$ (Đúng).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi xóa chữ số hàng đơn vị của một số có hai chữ số, ta sẽ được số mới có $1$ chữ số. Chữ số mới này chính là chữ số hàng chục của số ban đầu. Ta đặt tính theo cột dọc:</li><li>&nbsp;&nbsp;&nbsp; $\\square\\ \\bigcirc$<br>$-$ &nbsp;&nbsp;&nbsp; $\\square$<br>---------<br>&nbsp;&nbsp;&nbsp; $4\\ 1$<br>(Trong đó $\\square$ là chữ số hàng chục, $\\bigcirc$ là chữ số hàng đơn vị).</li><li>Ta xét hàng chục: $\\square$ không trừ đi số nào (có thể bị mượn 1) bằng $4$. Vậy $\\square$ có thể là $4$ hoặc $5$.</li><li>- Nếu $\\square = 4$: Ở hàng đơn vị ta có $\\bigcirc - 4 = 1$. Suy ra $\\bigcirc = 1 + 4 = 5$. Ta được số $45$. Thử lại: $45 - 4 = 41$ (Đúng).</li><li>- (Nếu $\\square = 5$, tức là phép trừ có mượn: $\\bigcirc$ nhỏ hơn $\\square$, mượn 10: $10 + \\bigcirc - 5 = 1 \\rightarrow \\bigcirc$ không có kết quả hợp lý).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $45$.</li>" }
]
});

{ q_title: "Câu 6", q_content: "Điền số thích hợp vào chỗ chấm trong dãy số sau: $1, 2, 4, 8, 16, \\dots$", options: ["A. $20$", "B. $24$", "C. $32$", "D. $18$"], correct_idx: 2, explain: "Quy luật dãy số là số liền sau gấp đôi số liền trước ($1 \\times 2 = 2$; $2 \\times 2 = 4\\dots$). Vậy số tiếp theo là $16 \\times 2 = 32$ (hoặc $16 + 16 = 32$)." },

{ t_title: "Bài 1", t_content: "Tính nhanh:<br><div class='text-center text-xl my-4'>$99 - 97 + 95 - 93 + 91 - 89$</div>", strategy: "WHAT (Quan sát dãy số): Dãy gồm 6 số lẻ liên tiếp xếp theo thứ tự giảm dần, dấu cộng và trừ đan xen.<br>HOW (Góp nhặt cặp đôi): Không thể cộng dồn vì số lớp 2 chưa học mượn nhiều. Hãy đóng ngoặc để bắt cặp hai số liền kề nhau: $(99 - 97)$, $(95 - 93)$, $(91 - 89)$.<br>WHY (Sự lặp lại): Khoảng cách giữa 2 số lẻ liên tiếp luôn bằng mấy? (Bằng 2). Vậy phép tính dài sẽ biến thành phép cộng của những con số 2.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>$99 - 97 + 95 - 93 + 91 - 89$</li><li>$= (99 - 97) + (95 - 93) + (91 - 89)$</li><li>$= 2 + 2 + 2$</li><li>$= 6$</li>" },
{ t_title: "Bài 2", t_content: "Em hãy điền các số chẵn (từ $2$ đến $18$) vào các ô trống còn lại trong lưới $3 \\times 3$ dưới đây sao cho tổng các số theo hàng ngang, hàng dọc, hay đường chéo đều bằng $30$.<br><div class='flex justify-center my-4'><div class='grid grid-cols-3 gap-0 border-2 border-indigo-800 bg-indigo-50 w-48 text-center text-xl font-bold'><div class='border border-indigo-800 p-4'>16</div><div class='border border-indigo-800 p-4'>?</div><div class='border border-indigo-800 p-4'>?</div><div class='border border-indigo-800 p-4'>?</div><div class='border border-indigo-800 p-4'>10</div><div class='border border-indigo-800 p-4'>?</div><div class='border border-indigo-800 p-4'>8</div><div class='border border-indigo-800 p-4'>?</div><div class='border border-indigo-800 p-4'>?</div></div></div>", strategy: "WHERE (Bắt đầu từ đâu?): Nguyên tắc giải ma phương là tìm hàng, cột hoặc đường chéo đã có sẵn 2 số để tính số thứ 3. Ở đây ta thấy Cột bên trái có số 16 và 8.<br>HOW (Tính số còn thiếu): Tổng yêu cầu là 30. Ở cột trái: $16 + 8 = 24$. Lấy $30 - 24 = 6$ điền vào ô giữa cột trái.<br>WHAT NEXT (Lần lượt giải mã):<br>- Đường chéo từ trái xuống phải: Đã có 16 và 10. Tìm ô góc dưới phải: $30 - (16 + 10) = 4$.<br>- Hàng ngang dưới cùng: Đã có 8 và 4. Tìm ô giữa dưới: $30 - (8 + 4) = 18$.<br>- Cứ tiếp tục như vậy cho đến hết bảng.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta tính lần lượt các ô như sau:</li><li>- Ô ở giữa của cột bên trái là: $30 - (16 + 8) = 6$.</li><li>- Ô góc dưới cùng bên phải (đường chéo đi qua 16 và 10) là: $30 - (16 + 10) = 4$.</li><li>- Ô ở giữa của hàng ngang dưới cùng là: $30 - (8 + 4) = 18$.</li><li>- Ô ở giữa của cột chính giữa là: $30 - (10 + 18) = 2$.</li><li>- Ô góc trên cùng bên phải là: $30 - (16 + 2) = 12$.</li><li>- Ô ở giữa của cột bên phải là: $30 - (12 + 4) = 14$.</li><li>Ta được bảng hoàn chỉnh:</li><div class='flex justify-center mt-2'><div class='grid grid-cols-3 gap-0 border-2 border-indigo-800 bg-white w-48 text-center text-xl font-bold'><div class='border border-indigo-800 p-4'>16</div><div class='border border-indigo-800 p-4 text-red-600'>2</div><div class='border border-indigo-800 p-4 text-red-600'>12</div><div class='border border-indigo-800 p-4 text-red-600'>6</div><div class='border border-indigo-800 p-4'>10</div><div class='border border-indigo-800 p-4 text-red-600'>14</div><div class='border border-indigo-800 p-4'>8</div><div class='border border-indigo-800 p-4 text-red-600'>18</div><div class='border border-indigo-800 p-4 text-red-600'>4</div></div></div>" },
{ t_title: "Bài 3", t_content: "Hiện nay tổng số tuổi của hai bố con là $45$ tuổi. Biết rằng năm nay bố $37$ tuổi. Hỏi khi con sinh ra thì bố bao nhiêu tuổi?", strategy: "WHAT (Chuyển ngữ ý nghĩa câu hỏi): Câu hỏi \"Khi con sinh ra thì bố bao nhiêu tuổi?\" thực chất là đang hỏi cái gì trong Toán học? (Chính là hỏi Hiệu số tuổi của bố và con).<br>HOW (Tìm dữ kiện còn thiếu): Để tìm được Hiệu số tuổi, ta cần biết tuổi của cả bố và con hiện nay. Đề đã cho tuổi bố (37). Tuổi con là bao nhiêu?<br>WHAT NEXT: Có Tổng (45), có Bố (37), ta lấy $45 - 37$ để ra tuổi con. Sau đó lấy tuổi bố trừ tuổi con để ra đáp án.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Tuổi của người con hiện nay là:<br>$45 - 37 = 8$ (tuổi)</li><li>Khoảng cách tuổi (hiệu số tuổi) giữa hai bố con là:<br>$37 - 8 = 29$ (tuổi)</li><li>Vì hiệu số tuổi không thay đổi theo thời gian, nên khi con vừa sinh ra (con $0$ tuổi), khoảng cách giữa bố và con vẫn là $29$ tuổi. Tức là khi con sinh ra, bố $29$ tuổi.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $29$ tuổi.</li>" },
{ t_title: "Bài 4", t_content: "Trong một nhóm học tập có $5$ bạn học sinh. Khi gặp nhau, mỗi bạn đều bắt tay với từng bạn khác đúng một lần. Hỏi có tất cả bao nhiêu cái bắt tay đã diễn ra?", strategy: "WHO (Đóng vai nhân vật): Hãy gọi 5 bạn là A, B, C, D, E.<br>HOW (Đếm theo nguyên tắc không lặp lại):<br>- Bạn A đi bắt tay với 4 bạn còn lại (B, C, D, E) $\\rightarrow$ được 4 cái bắt tay.<br>- Bạn B tiếp tục đi bắt tay. Lúc này B không cần bắt tay A nữa (vì đã bắt rồi). B chỉ bắt tay với C, D, E $\\rightarrow$ được 3 cái.<br>- Tương tự, bạn C còn 2 cái. Bạn D còn 1 cái. Bạn E đã bắt tay đủ với tất cả mọi người.<br>WHY (Phép tính tổng): Phép tính để đếm số vòng bắt tay luôn là dãy cộng lùi dần về 1.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta đánh số $5$ bạn học sinh lần lượt là: Bạn thứ 1, Bạn thứ 2, Bạn thứ 3, Bạn thứ 4, Bạn thứ 5.</li><li>- Bạn thứ 1 bắt tay với $4$ bạn còn lại, ta được $4$ cái bắt tay.</li><li>- Bạn thứ 2 bắt tay với $3$ bạn còn lại (không tính bạn thứ 1 vì đã bắt tay nhau rồi), ta được $3$ cái.</li><li>- Bạn thứ 3 bắt tay với $2$ bạn còn lại, ta được $2$ cái.</li><li>- Bạn thứ 4 bắt tay với bạn thứ 5, ta được $1$ cái.</li><li>- Bạn thứ 5 đã bắt tay với tất cả mọi người ở các lượt trên.</li><li>Tổng số cái bắt tay đã diễn ra là:<br>$4 + 3 + 2 + 1 = 10$ (cái bắt tay)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $10$ cái bắt tay.</li>" },
{ t_title: "Bài 5", t_content: "Bạn Nam mua một quyển truyện giá $34$ nghìn đồng. Nam đưa cho cô bán hàng $1$ tờ tiền mệnh giá $50$ nghìn đồng. Trùng hợp là trong quầy của cô bán hàng lúc này chỉ còn toàn loại tiền $2$ nghìn đồng và $5$ nghìn đồng. Hỏi cô bán hàng có những cách nào để trả lại tiền thừa cho Nam (kể rõ số lượng từng loại tiền trong mỗi cách)?", strategy: "WHAT (Xác định mục tiêu): Trước hết, phải tính xem cô bán hàng nợ Nam bao nhiêu tiền thối lại? ($50 - 34 = 16$ nghìn đồng).<br>HOW (Giải quyết tổ hợp bằng tính chẵn/lẻ): Số tiền cần trả là 16 (một số CHẴN). Tiền loại 2 nghìn luôn tạo ra số chẵn. Vậy số tờ 5 nghìn đồng bắt buộc phải xếp thành từng cặp (2 tờ, 4 tờ...) để tạo ra số chẵn (10, 20), vì nếu dùng 1 tờ 5k lẻ thì tổng tiền sẽ bị lẻ, không thể ghép với 2k để ra 16k được.<br>WHAT IF (Thử chọn từng trường hợp của tờ 5 nghìn):<br>- Trường hợp không dùng tờ 5k nào: Toàn bộ 16k trả bằng tờ 2k $\\rightarrow$ được không?<br>- Trường hợp dùng 2 tờ 5k ($=10k$): Phần còn lại ($16 - 10 = 6k$) có trả bằng tờ 2k được không?<br>- Trường hợp dùng 4 tờ 5k ($=20k$): Lớn hơn 16k $\\rightarrow$ Loại.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Số tiền cô bán hàng cần trả lại cho Nam là:<br>$50 - 34 = 16$ (nghìn đồng)</li><li>Cô bán hàng dùng loại tiền $5$ nghìn đồng và $2$ nghìn đồng để ghép thành $16$ nghìn đồng. Ta thử chọn các trường hợp dùng tờ $5$ nghìn:</li><li>- <strong>Cách 1: Không dùng tờ $5$ nghìn đồng nào ($0$ tờ).</strong> Tất cả $16$ nghìn đồng được trả bằng tờ $2$ nghìn đồng. Số tờ $2$ nghìn đồng cần dùng là: $16 : 2 = 8$ (tờ).</li><li>- <strong>Cách 2: Dùng $2$ tờ $5$ nghìn đồng.</strong> Số tiền trả bằng tờ $5$ nghìn là: $5 + 5 = 10$ (nghìn đồng). Số tiền còn thiếu phải trả bằng tờ $2$ nghìn là: $16 - 10 = 6$ (nghìn đồng). Số tờ $2$ nghìn đồng cần dùng là: $6 : 2 = 3$ (tờ).</li><li>(Không thể dùng $1$ tờ hoặc $3$ tờ $5$ nghìn đồng vì khi đó số dư còn lại là số lẻ $11$ nghìn hoặc $1$ nghìn, không thể ghép từ các tờ $2$ nghìn).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Có 2 cách trả lại tiền:<br>Cách 1: $0$ tờ $5$ nghìn đồng và $8$ tờ $2$ nghìn đồng.<br>Cách 2: $2$ tờ $5$ nghìn đồng và $3$ tờ $2$ nghìn đồng.</li>" },
{ t_title: "Bài 6", t_content: "Trên sân có một số con chó và một số con gà. Bạn Nam đếm được có tất cả $4$ con chó. Nam nhẩm tính thấy TỔNG số chân chó NHIỀU HƠN TỔNG số chân gà là $6$ cái chân. Hỏi trên sân có bao nhiêu con gà?", strategy: "WHAT (Tìm điểm tựa): Đề bài đã cho sẵn \"4 con chó\". Một con chó có mấy chân? Hãy tính tổng TẤT CẢ số chân của 4 con chó trên sân.<br>HOW (Sử dụng dữ kiện so sánh): Tổng chân chó NHIỀU HƠN tổng chân gà là 6 chân. Đã có chân chó, muốn tìm chân gà ta làm phép tính gì? (Lấy chân chó trừ đi 6).<br>WHAT NEXT (Chuyển đổi từ chân sang đầu): Tính được tổng số chân của bầy gà rồi, mà mỗi con gà có 2 chân. Lấy tổng số chân chia cho 2 sẽ ra số lượng con gà.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Mỗi con chó có $4$ chân. Tổng số chân của $4$ con chó trên sân là:<br>$4 \\times 4 = 16$ (cái chân)</li><li>Vì tổng số chân chó nhiều hơn tổng số chân gà là $6$ cái chân, nên tổng số chân của đàn gà là:<br>$16 - 6 = 10$ (cái chân)</li><li>Mỗi con gà có $2$ chân. Vậy số con gà trên sân là:<br>$10 : 2 = 5$ (con gà)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $5$ con gà.</li>" }
]
});
</script>

{ t_title: "Bài 1", t_content: "Tính nhanh:<br><div class='text-center text-xl my-4'>$24 + 36 + 48 + 52 + 76$</div>", strategy: "WHAT (Tìm cặp đôi hoàn hảo): Trong phép cộng, hãy nhìn vào chữ số hàng đơn vị. Số&nbsp;$4$&nbsp;ghép với số mấy để ra&nbsp;$10$? Số&nbsp;$8$&nbsp;ghép với số mấy?<br>HOW (Gộp số thành trăm):&nbsp;$24 + 76 = 100$;&nbsp;$48 + 52 = 100$. Còn thừa lại số&nbsp;$36$&nbsp;đứng một mình.<br>WHAT NEXT (Tính tổng cuối): Biểu thức sẽ trở thành&nbsp;$100 + 100 + 36$. Kết quả rất dễ nhẩm.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>$24 + 36 + 48 + 52 + 76$<br>$= (24 + 76) + (48 + 52) + 36$<br>$= 100 + 100 + 36$<br>$= 236$</div>" },
{ t_title: "Bài 2", t_content: "Bạn Mai vào hiệu sách. Nếu Mai mua&nbsp;$1$&nbsp;quyển vở và&nbsp;$1$&nbsp;cái bút thì cô bán hàng tính giá&nbsp;$12$&nbsp;nghìn đồng. Nếu Mai mua&nbsp;$1$&nbsp;quyển vở và&nbsp;$2$&nbsp;cái bút giống hệt như thế thì cô bán hàng tính giá&nbsp;$17$&nbsp;nghìn đồng. Em hãy tính xem giá tiền của&nbsp;$1$&nbsp;cái bút là bao nhiêu, và giá tiền của&nbsp;$1$&nbsp;quyển vở là bao nhiêu?", strategy: "WHAT (So sánh sự thay đổi): Hãy đối chiếu 2 lần mua đồ.<br>- Lần 1: Mua&nbsp;$1$&nbsp;Vở +&nbsp;$1$&nbsp;Bút =&nbsp;$12k$.<br>- Lần 2: Mua&nbsp;$1$&nbsp;Vở +&nbsp;$2$&nbsp;Bút =&nbsp;$17k$.<br>WHY (Tìm nguyên nhân chênh lệch giá): Tại sao lần mua thứ hai lại đắt hơn lần thứ nhất? Đắt hơn bao nhiêu tiền? Sự đắt hơn đó đổi lấy hiện vật gì? (Đổi lấy&nbsp;$1$&nbsp;cái bút mua dôi ra).<br>HOW (Kết luận): Số tiền chênh lệch giữa hai lần mua CHÍNH LÀ giá của&nbsp;$1$&nbsp;cái bút. Có giá bút rồi, lấy&nbsp;$12k$&nbsp;trừ đi giá bút sẽ ra giá quyển vở.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi mua&nbsp;$1$&nbsp;quyển vở và&nbsp;$2$&nbsp;cái bút, số tiền Mai phải trả nhiều hơn so với khi mua&nbsp;$1$&nbsp;quyển vở và&nbsp;$1$&nbsp;cái bút là:<br>$17 - 12 = 5$&nbsp;(nghìn đồng)<br><br>Sở dĩ số tiền nhiều hơn&nbsp;$5$&nbsp;nghìn đồng là vì lần thứ hai Mai đã mua nhiều hơn&nbsp;$1$&nbsp;cái bút. Vậy giá tiền của&nbsp;$1$&nbsp;cái bút là&nbsp;<strong>$5$&nbsp;nghìn đồng</strong>.<br><br>Giá tiền của&nbsp;$1$&nbsp;quyển vở là:<br>$12 - 5 = 7$&nbsp;(nghìn đồng)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số:&nbsp;$1$&nbsp;cái bút giá&nbsp;$5$&nbsp;nghìn đồng;&nbsp;$1$&nbsp;quyển vở giá&nbsp;$7$&nbsp;nghìn đồng.</div>" },
{ t_title: "Bài 3", t_content: "Có một đoạn bờ tường dài&nbsp;$20\\text{m}$. Ở hai đầu của đoạn tường đã được xây sẵn&nbsp;$2$&nbsp;cột điện. Người ta muốn trồng các cây hoa dọc theo đoạn tường đó sao cho khoảng cách giữa các cây với nhau, và từ cây đến cột điện đều là&nbsp;$5\\text{m}$. Hỏi người ta trồng được tất cả bao nhiêu cây hoa? (Biết không trồng cây ở vị trí cột điện).", strategy: "WHAT (Tìm số khoảng): Đoạn tường dài&nbsp;$20\\text{m}$, cứ&nbsp;$5\\text{m}$&nbsp;là&nbsp;$1$&nbsp;khoảng cách. Hãy làm phép chia để xem có bao nhiêu khoảng trống.<br>HOW (Xác định vị trí trồng): Giữa&nbsp;$4$&nbsp;khoảng trống sẽ có mấy điểm nối? (Hãy xòe&nbsp;$4$&nbsp;ngón tay ra, ở giữa&nbsp;$4$&nbsp;ngón tay có&nbsp;$3$&nbsp;kẽ hở).<br>WHY (Áp dụng quy tắc bị chặn 2 đầu): Hai đầu đã có cột điện (như những \"cây\" cố định), ta không trồng thêm được nữa. Do đó số cây thực tế được trồng chỉ nằm LỌT THỎM ở giữa các khoảng. Số cây = Số khoảng - 1.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Đoạn bờ tường được chia thành số khoảng cách là:<br>$20 : 5 = 4$&nbsp;(khoảng)<br><br>Vì hai đầu của bờ tường đã có sẵn cột điện, nên cây chỉ được trồng ở các vị trí nối giữa các khoảng. Số cây hoa trồng được là:<br>$4 - 1 = 3$&nbsp;(cây)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số:&nbsp;$3$&nbsp;cây hoa.</div>" },
{ t_title: "Bài 4", t_content: "Hiện nay anh hơn em&nbsp;$4$&nbsp;tuổi. Biết rằng&nbsp;$3$&nbsp;năm nữa, tổng số tuổi của hai anh em cộng lại sẽ là&nbsp;$20$&nbsp;tuổi. Hỏi hiện nay anh bao nhiêu tuổi, em bao nhiêu tuổi?", strategy: "WHEN (Đưa thời gian về cùng một hệ quy chiếu): Tổng&nbsp;$20$&nbsp;tuổi là của tương lai (&nbsp;$3$&nbsp;năm nữa). Hiệu&nbsp;$4$&nbsp;tuổi là của hiện tại. Hãy kéo \"Tổng\" về hiện tại.<br>HOW (Lùi tuổi thế nào?):&nbsp;$3$&nbsp;năm trước, anh trẻ hơn&nbsp;$3$&nbsp;tuổi, em cũng trẻ hơn&nbsp;$3$&nbsp;tuổi. Tức là CẢ HAI NGƯỜI giảm đi&nbsp;$3 \\times 2 = 6$&nbsp;tuổi. Lấy&nbsp;$20 - 6 = 14$&nbsp;để ra TỔNG SỐ TUỔI HIỆN NAY.<br>WHAT NEXT (Tư duy san bằng để chia): Hiện nay Tổng =&nbsp;$14$, Hiệu =&nbsp;$4$.<br>- Nếu anh bớt đi&nbsp;$4$&nbsp;tuổi của mình, anh sẽ BẰNG TUỔI EM.<br>- Lúc đó 2 người bằng nhau và tổng tuổi là&nbsp;$14 - 4 = 10$.<br>- Chia đôi&nbsp;$10$&nbsp;ra&nbsp;$5$. Đó là tuổi của em.<br>- Tuổi anh =&nbsp;$5 + 4 = 9$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Mỗi năm mỗi người đều tăng thêm&nbsp;$1$&nbsp;tuổi. Sau&nbsp;$3$&nbsp;năm, số tuổi của cả hai anh em cùng tăng thêm là:<br>$3 + 3 = 6$&nbsp;(tuổi)<br><br>Tổng số tuổi của hai anh em HIỆN NAY là:<br>$20 - 6 = 14$&nbsp;(tuổi)<br><br>Hiệu số tuổi không thay đổi theo thời gian, nên hiện nay anh vẫn hơn em&nbsp;$4$&nbsp;tuổi. Giả sử anh bớt đi&nbsp;$4$&nbsp;tuổi, thì tuổi anh sẽ bằng tuổi em. Lúc này tổng số tuổi của hai người là:<br>$14 - 4 = 10$&nbsp;(tuổi)<br><br>Tuổi của người em hiện nay là:<br>$10 : 2 = 5$&nbsp;(tuổi)<br><br>Tuổi của người anh hiện nay là:<br>$5 + 4 = 9$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Anh&nbsp;$9$&nbsp;tuổi; Em&nbsp;$5$&nbsp;tuổi.</div>" },
{ t_title: "Bài 5", t_content: "Ở một khu rừng, các con vật đang dùng chiếc cân đĩa thăng bằng để so sánh cân nặng.<br>- Lần thứ nhất, các bạn thấy&nbsp;$1$&nbsp;con Sói cân nặng đúng bằng&nbsp;$2$&nbsp;con Cáo.<br>- Lần thứ hai, khi đặt&nbsp;$2$&nbsp;con Sói và&nbsp;$3$&nbsp;con Cáo lên cùng một đĩa cân, thì phải dùng đúng quả cân&nbsp;$14\\text{kg}$&nbsp;ở đĩa bên kia mới thăng bằng.<br>Biết các con Sói nặng bằng nhau, các con Cáo nặng bằng nhau. Tính cân nặng của&nbsp;$1$&nbsp;con Cáo và&nbsp;$1$&nbsp;con Sói.", strategy: "WHAT (Nguyên lý thay thế - Toán Khử): Lần cân thứ nhất cho ta biết&nbsp;$1$&nbsp;Sói có giá trị đổi ngang bằng&nbsp;$2$&nbsp;Cáo.<br>HOW (Thực hiện việc thay thế): Ở lần cân thứ hai, ta có&nbsp;$2$&nbsp;Sói. Nếu muốn vứt&nbsp;$2$&nbsp;con Sói này đi và thế những con Cáo vào, ta phải thế mấy con Cáo? (&nbsp;$1$&nbsp;Sói =&nbsp;$2$&nbsp;Cáo, vậy&nbsp;$2$&nbsp;Sói =&nbsp;$4$&nbsp;Cáo).<br>WHY (Tính tổng cân nặng): Khi đó, trên đĩa cân toàn là Cáo (gồm&nbsp;$4$&nbsp;con thế vào +&nbsp;$3$&nbsp;con có sẵn =&nbsp;$7$&nbsp;con).&nbsp;$7$&nbsp;con Cáo nặng&nbsp;$14\\text{kg}$. Từ đó chia ra để tính&nbsp;$1$&nbsp;con Cáo.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Từ lần cân thứ nhất, ta biết:&nbsp;$1$&nbsp;con Sói nặng bằng&nbsp;$2$&nbsp;con Cáo. Do đó,&nbsp;$2$&nbsp;con Sói sẽ nặng bằng:<br>$2 \\times 2 = 4$&nbsp;(con Cáo)<br><br>Ở lần cân thứ hai, trên đĩa cân có \"$2$&nbsp;con Sói và&nbsp;$3$&nbsp;con Cáo\" nặng&nbsp;$14\\text{kg}$. Ta thay thế vị trí của&nbsp;$2$&nbsp;con Sói bằng&nbsp;$4$&nbsp;con Cáo. Lúc này trên đĩa cân sẽ chỉ có toàn là Cáo. Tổng số con Cáo trên đĩa cân là:<br>$4 + 3 = 7$&nbsp;(con)<br><br>Cân nặng của&nbsp;$7$&nbsp;con Cáo là&nbsp;$14\\text{kg}$. Vậy cân nặng của&nbsp;$1$&nbsp;con Cáo là:<br>$14 : 7 = 2$&nbsp;(kg)<br><br>Cân nặng của&nbsp;$1$&nbsp;con Sói là:<br>$2 \\times 2 = 4$&nbsp;(kg)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Sói nặng&nbsp;$4\\text{kg}$;&nbsp;Cáo nặng&nbsp;$2\\text{kg}$.</div>" },
{ t_title: "Bài 6", t_content: "Các bạn lớp 2A nắm tay nhau xếp thành một vòng tròn lớn để chơi trò chơi. Đứng từ vị trí của bạn Nam, nếu đếm theo chiều kim đồng hồ cho đến vị trí của bạn Việt thì thấy có&nbsp;$6$&nbsp;bạn đang đứng xen giữa. Còn nếu đếm ngược chiều kim đồng hồ (từ Nam đến Việt) thì thấy có&nbsp;$8$&nbsp;bạn đang đứng xen giữa. Hỏi vòng tròn đó có tất cả bao nhiêu bạn học sinh?", strategy: "WHAT (Hình dung cấu trúc vòng tròn): Bạn Nam và bạn Việt đứng ở 2 vị trí chia vòng tròn thành 2 nửa (giống như cắt bánh chưng).<br>WHO (Gồm những ai?): Có nửa bên trái, có nửa bên phải, và CÓ 2 ĐIỂM CHIA (chính là Nam và Việt). Rất nhiều học sinh cộng hai nửa lại nhưng Quyên đếm Nam và Việt.<br>HOW (Gộp tất cả lại):<br>- Nửa xuôi chiều kim đồng hồ có&nbsp;$6$&nbsp;người.<br>- Nửa ngược chiều kim đồng hồ có&nbsp;$8$&nbsp;người.<br>- Cộng thêm bạn Nam và bạn Việt (&nbsp;$2$&nbsp;người).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta chia vòng tròn thành các thành phần rời nhau (không trùng lặp) như sau:<br>- Nhóm các bạn đứng xen giữa Nam và Việt ở phía xuôi chiều kim đồng hồ:&nbsp;$6$&nbsp;bạn.<br>- Nhóm các bạn đứng xen giữa Nam và Việt ở phía ngược chiều kim đồng hồ:&nbsp;$8$&nbsp;bạn.<br>- Và&nbsp;$2$&nbsp;bạn đóng vai trò là cột mốc: bạn Nam và bạn Việt (&nbsp;$2$&nbsp;bạn).<br><br>Tổng số học sinh trong vòng tròn đó là:<br>$6 + 8 + 2 = 16$&nbsp;(bạn)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số:&nbsp;$16$&nbsp;bạn học sinh.</div>" }
]
});

{ q_title: "Câu 5", q_content: "Trong phép trừ, số bị trừ là&nbsp;$50$, số trừ là số liền trước của&nbsp;$50$. Hỏi hiệu là bao nhiêu?", options: ["A. $1$", "B. $0$", "C. $99$", "D. $2$"], correct_idx: 0, explain: "Số liền trước của&nbsp;$50$&nbsp;là&nbsp;$49$. Vậy số trừ là&nbsp;$49$. Hiệu là:&nbsp;$50 - 49 = 1$." },
{ q_title: "Câu 6", q_content: "Nam mua một cái bút giá&nbsp;$12$&nbsp;nghìn đồng. Nam đưa cho cô bán hàng&nbsp;$1$&nbsp;tờ&nbsp;$20$&nbsp;nghìn đồng. Hỏi cô bán hàng phải trả lại Nam bao nhiêu tiền?", options: ["A. $32$&nbsp;nghìn đồng", "B. $8$&nbsp;nghìn đồng", "C. $10$&nbsp;nghìn đồng", "D. $2$&nbsp;nghìn đồng"], correct_idx: 1, explain: "Số tiền cô bán hàng phải trả lại là:&nbsp;$20 - 12 = 8$&nbsp;(nghìn đồng)." },
{ q_title: "Câu 7", q_content: "Điền số thích hợp vào chỗ chấm:&nbsp;$3, 6, 9, 12, \\dots$", options: ["A. $13$", "B. $14$", "C. $15$", "D. $16$"], correct_idx: 2, explain: "Quy luật dãy số là cộng thêm&nbsp;$3$&nbsp;đơn vị. Số tiếp theo là:&nbsp;$12 + 3 = 15$." },

{ q_title: "Câu 9", q_content: "Có một sợi dây dài&nbsp;$20\\text{cm}$. Nếu gấp đôi sợi dây đó lại thì chiều dài của sợi dây lúc này là bao nhiêu?", options: ["A. $40\\text{ cm}$", "B. $10\\text{ cm}$", "C. $5\\text{ cm}$", "D. $15\\text{ cm}$"], correct_idx: 1, explain: "Khi gấp đôi sợi dây, chiều dài mới sẽ bằng một nửa chiều dài ban đầu. Vậy chiều dài lúc này là:&nbsp;$20 : 2 = 10\\text{ (cm)}$." },
{ q_title: "Câu 10", q_content: "Hiện nay, tổng số tuổi của hai anh em là&nbsp;$15$&nbsp;tuổi. Hỏi&nbsp;$2$&nbsp;năm nữa, tổng số tuổi của hai anh em sẽ là bao nhiêu?", options: ["A. $17$&nbsp;tuổi", "B. $19$&nbsp;tuổi", "C. $13$&nbsp;tuổi", "D. $20$&nbsp;tuổi"], correct_idx: 1, explain: "Mỗi năm mỗi người đều tăng&nbsp;$1$&nbsp;tuổi. Sau&nbsp;$2$&nbsp;năm, anh tăng&nbsp;$2$&nbsp;tuổi, em cũng tăng&nbsp;$2$&nbsp;tuổi. Tổng số tuổi tăng thêm là&nbsp;$4$&nbsp;tuổi. Tổng mới là:&nbsp;$15 + 4 = 19$&nbsp;(tuổi)." },
{ q_title: "Câu 11", q_content: "Trên đĩa cân thăng bằng,&nbsp;$1$&nbsp;quả cam nặng bằng&nbsp;$3$&nbsp;quả táo. Hỏi&nbsp;$2$&nbsp;quả cam nặng bằng bao nhiêu quả táo? (Biết các quả táo nặng bằng nhau, các quả cam nặng bằng nhau).", options: ["A. $5$&nbsp;quả", "B. $4$&nbsp;quả", "C. $6$&nbsp;quả", "D. $8$&nbsp;quả"], correct_idx: 2, explain: "Một quả cam bằng&nbsp;$3$&nbsp;quả táo, vậy&nbsp;$2$&nbsp;quả cam sẽ nặng bằng:&nbsp;$3 + 3 = 6$&nbsp;(quả táo)." },

{ t_title: "Bài 1", t_content: "Tính nhanh:<br><div class='text-center text-xl my-4'>$11 + 22 + 33 + 44 - 10 - 20 - 30 - 40$</div>", strategy: "WHAT (Có những nhóm số nào?): Trong dãy tính có các số mang dấu cộng&nbsp;$(11, 22, 33, 44)$&nbsp;và các số tròn chục mang dấu trừ&nbsp;$(10, 20, 30, 40)$.<br>HOW (Ghép cặp thế nào cho dễ tính?): Hãy bắt cặp một số bất kỳ với một số tròn chục tương ứng để thực hiện phép trừ. Ví dụ:&nbsp;$11 - 10$,&nbsp;$22 - 20$...<br>WHY (Sự thuận tiện): Phép trừ với số tròn chục vô cùng dễ nhẩm. Khi đó biểu thức dài sẽ biến thành phép cộng của những con số đếm cơ bản&nbsp;$1, 2, 3, 4$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>$11 + 22 + 33 + 44 - 10 - 20 - 30 - 40$<br>$= (11 - 10) + (22 - 20) + (33 - 30) + (44 - 40)$<br>$= 1 + 2 + 3 + 4$<br>$= 10$</div>" },
{ t_title: "Bài 2", t_content: "Phép cộng của hai số có tổng là&nbsp;$40$. Nếu tăng số hạng thứ nhất thêm&nbsp;$5$&nbsp;đơn vị và tăng số hạng thứ hai thêm&nbsp;$10$&nbsp;đơn vị thì tổng mới sẽ là bao nhiêu?", strategy: "WHAT (Khái niệm Tổng): Tổng là kết quả của phép tính cộng.<br>WHEN (Khi thành phần thay đổi): Nếu một số hạng được \"tăng thêm\" (cộng thêm vào), thì \"Tổng\" sẽ thay đổi như thế nào? (Tổng cũng sẽ phải phình to ra, tăng thêm đúng một lượng như vậy).<br>HOW (Tính tổng mới): Ở đây cả hai số hạng đều tăng. Vậy ta chỉ việc lấy cái Tổng cũ (&nbsp;$40$&nbsp;), cộng thêm phần tăng của số thứ nhất (&nbsp;$5$&nbsp;), rồi cộng tiếp phần tăng của số thứ hai (&nbsp;$10$&nbsp;).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Trong một phép cộng, nếu tăng các số hạng lên bao nhiêu đơn vị thì Tổng cũng sẽ tăng lên bấy nhiêu đơn vị. Khi tăng số hạng thứ nhất thêm&nbsp;$5$&nbsp;đơn vị và tăng số hạng thứ hai thêm&nbsp;$10$&nbsp;đơn vị, tổng mới sẽ tăng thêm tổng cộng là:<br>$5 + 10 = 15$&nbsp;(đơn vị)<br><br>Tổng mới của phép cộng đó là:<br>$40 + 15 = 55$</div><div class='font-bold mt-2 text-indigo-700'>Đáp số:&nbsp;$55$.</div>" },
{ t_title: "Bài 3", t_content: "Nam có&nbsp;$12$&nbsp;que diêm dài bằng nhau.<br>a) Nếu dùng toàn bộ số que diêm này để xếp các hình tam giác rời rạc (mỗi tam giác cần&nbsp;$3$&nbsp;que) thì Nam xếp được mấy hình tam giác?<br>b) Nếu dùng toàn bộ số que diêm này để xếp các hình vuông rời rạc (mỗi hình vuông cần&nbsp;$4$&nbsp;que) thì Nam xếp được mấy hình vuông?", strategy: "WHAT (Cấu tạo của các hình):<br>- Một hình tam giác cần dùng mấy que diêm? (&nbsp;$3$&nbsp;que).<br>- Một hình vuông cần dùng mấy que diêm? (&nbsp;$4$&nbsp;que).<br>HOW (Phân chia que diêm): Có&nbsp;$12$&nbsp;que diêm trong tay, muốn chia thành các nhóm&nbsp;$3$&nbsp;que (hoặc&nbsp;$4$&nbsp;que) thì ta dùng phép tính gì? (Phép chia).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>a) Mỗi hình tam giác rời rạc được xếp từ&nbsp;$3$&nbsp;que diêm. Nếu dùng&nbsp;$12$&nbsp;que diêm, Nam sẽ xếp được số hình tam giác là:<br>$12 : 3 = 4$&nbsp;(hình tam giác)<br><br>b) Mỗi hình vuông rời rạc được xếp từ&nbsp;$4$&nbsp;que diêm. Nếu dùng&nbsp;$12$&nbsp;que diêm, Nam sẽ xếp được số hình vuông là:<br>$12 : 4 = 3$&nbsp;(hình vuông)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: a)&nbsp;$4$&nbsp;hình tam giác; b)&nbsp;$3$&nbsp;hình vuông.</div>" },
{ t_title: "Bài 4", t_content: "Một chiếc đồng hồ bị hỏng, cứ chạy qua&nbsp;$1$&nbsp;giờ thực tế thì nó lại chạy CHẬM đi&nbsp;$3$&nbsp;phút. Lúc&nbsp;$6$&nbsp;giờ sáng, Nam đã vặn để chỉnh đồng hồ chạy đúng. Hỏi đến&nbsp;$9$&nbsp;giờ sáng cùng ngày, chiếc đồng hồ đó sẽ chỉ mấy giờ mấy phút?", strategy: "WHAT (Khoảng thời gian trôi qua): Từ&nbsp;$6$&nbsp;giờ sáng đến&nbsp;$9$&nbsp;giờ sáng là mấy tiếng đồng hồ? (&nbsp;$9 - 6 = 3$&nbsp;tiếng).<br>HOW (Tính thời gian bị sai lệch): Cứ&nbsp;$1$&nbsp;tiếng thì đồng hồ bị chậm mất&nbsp;$3$&nbsp;phút. Vậy&nbsp;$3$&nbsp;tiếng trôi qua, đồng hồ sẽ bị chậm tổng cộng bao nhiêu phút? (&nbsp;$3 \\times 3 = 9$&nbsp;phút).<br>WHY (Bản chất của \"Chạy chậm\"): Chạy chậm nghĩa là đồng hồ KHÔNG KỊP đi đến mốc giờ thực tế. Nó sẽ chỉ một khoảng thời gian NẰM TRƯỚC mốc&nbsp;$9$&nbsp;giờ. Ta phải làm phép tính trừ: Lấy mốc&nbsp;$9$&nbsp;giờ trừ lùi đi&nbsp;$9$&nbsp;phút.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Thời gian thực tế trôi qua từ&nbsp;$6$&nbsp;giờ sáng đến&nbsp;$9$&nbsp;giờ sáng là:<br>$9 - 6 = 3$&nbsp;(giờ)<br><br>Vì cứ&nbsp;$1$&nbsp;giờ đồng hồ chạy chậm đi&nbsp;$3$&nbsp;phút, nên sau&nbsp;$3$&nbsp;giờ, đồng hồ sẽ chạy chậm tổng cộng số phút là:<br>$3 \\times 3 = 9$&nbsp;(phút)<br><br>Lúc&nbsp;$9$&nbsp;giờ sáng (thời gian thực tế), do bị chạy chậm&nbsp;$9$&nbsp;phút nên chiếc đồng hồ đó sẽ chỉ số giờ là:<br>$9$&nbsp;giờ&nbsp;$-$ $9$&nbsp;phút&nbsp;$=$ $8$&nbsp;giờ&nbsp;$51$&nbsp;phút.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số:&nbsp;$8$&nbsp;giờ&nbsp;$51$&nbsp;phút.</div>" },
{ t_title: "Bài 5", t_content: "Bạn Lan đang đọc một cuốn truyện thiếu nhi. Lan đang đọc đến trang số&nbsp;$18$&nbsp;thì vô ý làm rách mất&nbsp;$1$&nbsp;tờ giấy ngay sau đó. Hỏi trang sách tiếp theo (sau tờ giấy bị rách) mà Lan đọc được là trang số mấy?", strategy: "WHAT (Cấu trúc của quyển sách): Sự khác nhau giữa \"Tờ\" giấy và \"Trang\" giấy là gì? (Một tờ giấy luôn luôn có&nbsp;$2$&nbsp;mặt, tương ứng với&nbsp;$2$&nbsp;trang sách in liên tiếp nhau).<br>WHERE (Xác định trang bị mất): Lan đang đọc đến trang&nbsp;$18$. Vậy tờ giấy ngay sau đó (bị rách) sẽ chứa&nbsp;$2$&nbsp;trang sách mang số thứ tự là bao nhiêu? (Là trang&nbsp;$19$&nbsp;và trang&nbsp;$20$).<br>WHAT NEXT (Sau chỗ rách): Tờ giấy chứa trang&nbsp;$19$&nbsp;và&nbsp;$20$&nbsp;đã bị mất. Vậy khi lật sang tờ tiếp theo, Lan sẽ nhìn thấy trang số mấy? (Là số liền sau của&nbsp;$20$).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Trong một cuốn sách, mỗi&nbsp;$1$&nbsp;tờ giấy sẽ gồm&nbsp;$2$&nbsp;mặt, tương ứng với&nbsp;$2$&nbsp;trang sách liên tiếp.<br><br>Lan đang đọc đến trang&nbsp;$18$. Tờ giấy ngay sau đó bị rách mất sẽ chứa&nbsp;$2$&nbsp;trang sách là: trang&nbsp;$19$&nbsp;và trang&nbsp;$20$.<br><br>Bỏ qua tờ giấy bị rách đó, trang sách tiếp theo mà Lan đọc được sẽ mang số liền sau của&nbsp;$20$, đó là trang&nbsp;$21$.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Trang&nbsp;$21$.</div>" },
{ t_title: "Bài 6", t_content: "Trong một chiếc hộp kín có&nbsp;$7$&nbsp;viên bi màu đỏ,&nbsp;$5$&nbsp;viên bi màu xanh và&nbsp;$3$&nbsp;viên bi màu vàng. Nếu không được nhìn vào hộp, em phải lấy ra ít nhất bao nhiêu viên bi để CHẮC CHẮN rằng trong số bi lấy ra có được ít nhất&nbsp;$2$&nbsp;viên bi màu Đỏ?", strategy: "WHAT (Mục tiêu bắt buộc): Đề bài yêu cầu lấy ra CHẮC CHẮN phải có được&nbsp;$2$&nbsp;viên bi Đỏ.<br>WHEN (Xây dựng kịch bản xui xẻo nhất): Tưởng tượng bạn bốc bi bị \"đen đủi\" vô cùng. Bạn muốn bốc bi đỏ, nhưng thò tay vào hộp bốc mãi chỉ ra bi Xanh và bi Vàng.<br>HOW (Tính toán số bi xui xẻo): Bạn bốc sạch toàn bộ bi Xanh (&nbsp;$5$&nbsp;viên) và bi Vàng (&nbsp;$3$&nbsp;viên). Lúc này trong tay có&nbsp;$5 + 3 = 8$&nbsp;viên bi, nhưng KHÔNG CÓ MỘT VIÊN BI ĐỎ NÀO CẢ!<br>WHAT NEXT (Điểm chốt hạ): Khi trong hộp đã hết sạch Xanh và Vàng, hộp chỉ còn lại toàn bi Đỏ. Bạn thò tay bốc thêm mấy viên nữa thì chắc chắn thỏa mãn yêu cầu là có&nbsp;$2$&nbsp;viên Đỏ? (Bốc thêm đúng&nbsp;$2$&nbsp;viên).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Để chắc chắn bốc được&nbsp;$2$&nbsp;viên bi màu đỏ, ta phải tính đến trường hợp rủi ro nhất (xui xẻo nhất). Trường hợp rủi ro nhất là ta bốc lên toàn những viên bi KHÔNG PHẢI màu đỏ. Tức là ta bốc toàn trúng bi xanh và bi vàng.<br><br>Số viên bi tối đa ta có thể bốc lên mà vẫn chưa có viên bi đỏ nào là:<br>$5\\text{ (xanh)} + 3\\text{ (vàng)} = 8$&nbsp;(viên bi)<br><br>Sau khi bốc&nbsp;$8$&nbsp;viên bi này, trong hộp đã hết sạch bi xanh và bi vàng, chỉ còn lại duy nhất bi màu đỏ. Để có được&nbsp;$2$&nbsp;viên bi màu đỏ, ta chỉ cần bốc thêm&nbsp;$2$&nbsp;viên bi nữa từ hộp.<br><br>Vậy số bi ít nhất cần lấy ra để chắc chắn thỏa mãn yêu cầu đề bài là:<br>$8 + 2 = 10$&nbsp;(viên bi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số:&nbsp;$10$&nbsp;viên bi.</div>" }
]

{ t_title: "Bài 1", t_content: "Tính nhanh: <div class='text-center text-xl my-4'>$85 - 24 - 15 - 36$</div>", strategy: "WHAT (Quan sát các số): Đề bài yêu cầu lấy $85$&nbsp;trừ liên tiếp đi $3$&nbsp;số $24, 15$&nbsp;và $36$.<br>HOW (Góp nhặt cặp tròn chục): Đuôi $5$ (của $85$) rất thích hợp để trừ đi đuôi $5$ (của $15$). Hai số bị trừ $24$&nbsp;và $36$&nbsp;nếu bị trừ liên tiếp thì có thể gộp lại thành TỔNG CÁC SỐ BỊ TRỪ. (Ví dụ: Mất 24k rồi mất tiếp 36k nghĩa là mất tổng cộng $24 + 36 = 60$k).<br>WHY (Cách trình bày): Dùng ngoặc để đổi chỗ hoặc tính từng phần cho tròn chục.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>$85 - 24 - 15 - 36$</div><div>$= (85 - 15) - (24 + 36)$</div><div>$= 70 - 60$</div><div>$= 10$</div>" },
{ t_title: "Bài 2", t_content: "Phân số $\\frac{1}{3}$ số kẹo của An là $6$&nbsp;cái kẹo. Phân số $\\frac{1}{4}$ số kẹo của Bình là $5$&nbsp;cái kẹo. Hỏi cả hai bạn có tất cả bao nhiêu cái kẹo?", strategy: "WHAT (Ý nghĩa của phân số lớp 2): $\\frac{1}{3}$ số kẹo của An là $6$&nbsp;cái. Nghĩa là số kẹo của An bị chia làm $3$&nbsp;phần bằng nhau thì $1$&nbsp;phần có $6$&nbsp;cái.<br>HOW (Tìm tổng số kẹo từng người): Muốn tìm toàn bộ số kẹo của An ($3$&nbsp;phần), ta phải lấy $1$&nbsp;phần nhân lên $3$&nbsp;lần ($6 \\times 3$). Tương tự, $\\frac{1}{4}$ kẹo của Bình là $5$&nbsp;cái, thì số kẹo của Bình bị chia $4$&nbsp;phần. Tìm toàn bộ kẹo của Bình bằng cách lấy $5 \\times 4$.<br>WHAT NEXT: Tính tổng số kẹo của cả hai bạn cộng lại.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Vì $\\frac{1}{3}$ số kẹo của An là $6$&nbsp;cái, nên toàn bộ số kẹo của An là:</div><div>$6 \\times 3 = 18$&nbsp;(cái kẹo)</div><div>Vì $\\frac{1}{4}$ số kẹo của Bình là $5$&nbsp;cái, nên toàn bộ số kẹo của Bình là:</div><div>$5 \\times 4 = 20$&nbsp;(cái kẹo)</div><div>Cả hai bạn có tất cả số kẹo là:</div><div>$18 + 20 = 38$&nbsp;(cái kẹo)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $38$&nbsp;cái kẹo.</span></div>" },
{ t_title: "Bài 3", t_content: "Bạn Lan có một tấm bìa hình chữ nhật. Lan dùng kéo cắt thẳng $1$&nbsp;nhát chia tấm bìa đó thành $2$&nbsp;hình vuông giống hệt nhau. Biết chu vi của $1$&nbsp;hình vuông là $12\\text{ cm}$. Hãy tính chu vi của tấm bìa hình chữ nhật lúc đầu.", strategy: "WHAT (Tìm cấu tạo hình vuông): Chu vi $1$&nbsp;hình vuông là $12\\text{ cm}$. Hình vuông có $4$&nbsp;cạnh bằng nhau. Lấy $12 : 4$ sẽ ra độ dài $1$&nbsp;cạnh ($= 3\\text{ cm}$).<br>HOW (Mô phỏng hình chữ nhật ghép lại): Hình chữ nhật ban đầu được ghép bởi $2$&nbsp;hình vuông này. Chiều rộng của hình chữ nhật chính là cạnh của hình vuông = $3\\text{ cm}$. Chiều dài của hình chữ nhật gồm $2$&nbsp;cạnh hình vuông ghép lại = $3 + 3 = 6\\text{ cm}$.<br>WHY (Tính chu vi tổng): Cạnh dài $6\\text{ cm}$, cạnh rộng $3\\text{ cm}$. Chu vi HCN = Chiều dài + Chiều rộng + Chiều dài + Chiều rộng.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Hình vuông có $4$&nbsp;cạnh bằng nhau. Độ dài một cạnh của hình vuông là:</div><div>$12 : 4 = 3$&nbsp;(cm)</div><div>Vì hình chữ nhật ban đầu được cắt thành $2$&nbsp;hình vuông bằng nhau, nên khi ghép lại ta thấy:</div><div>- Chiều rộng của hình chữ nhật chính là cạnh hình vuông, bằng $3\\text{ cm}$.</div><div>- Chiều dài của hình chữ nhật gấp đôi cạnh hình vuông, là:</div><div>$3 + 3 = 6$&nbsp;(cm)</div><div>Chu vi của tấm bìa hình chữ nhật lúc đầu là:</div><div>$6 + 6 + 3 + 3 = 18$&nbsp;(cm)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $18\\text{ cm}$.</span></div>" },
{ t_title: "Bài 4", t_content: "Tháng $5$&nbsp;có $31$&nbsp;ngày. Biết ngày mùng $1$&nbsp;tháng $5$&nbsp;là thứ Tư. Không cần dùng lịch, em hãy tính xem ngày mùng $1$&nbsp;tháng $6$&nbsp;của năm đó sẽ rơi vào thứ mấy?", strategy: "WHAT (Chu kỳ của 1 tuần): Một tuần có $7$&nbsp;ngày. Nếu hôm nay là thứ Tư, thì $7$&nbsp;ngày sau cũng là thứ Tư.<br>HOW (Bước nhảy ngày): Từ mùng $1$&nbsp;tháng $5$&nbsp;đến mùng $1$&nbsp;tháng $6$&nbsp;có bao nhiêu ngày? (Chính là số ngày trọn vẹn của tháng $5$, tức là $31$&nbsp;ngày).<br>WHY (Chia nhóm chu kỳ): Lấy $31 : 7$ để tìm xem có bao nhiêu tuần tròn và dư mấy ngày. $31 : 7 = 4$&nbsp;(tuần) và dư $3$&nbsp;ngày.<br>WHAT NEXT (Đếm tịnh tiến): $4$&nbsp;tuần trôi qua vẫn rơi vào thứ Tư. Còn dư $3$&nbsp;ngày, ta đếm tiến lên: Thứ Năm (dư 1), Thứ Sáu (dư 2), Thứ Bảy (dư 3).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Mỗi tuần lễ có $7$&nbsp;ngày. Từ ngày mùng $1$&nbsp;tháng $5$&nbsp;đến ngày mùng $1$&nbsp;tháng $6$&nbsp;sẽ trôi qua trọn vẹn số ngày của tháng $5$, tức là trải qua $31$&nbsp;ngày.</div><div>Ta có phép tính:</div><div>$31 : 7 = 4$&nbsp;(tuần) và dư $3$&nbsp;(ngày).</div><div>Sau $4$&nbsp;tuần trọn vẹn, ngày đó vẫn rơi vào thứ Tư. Do dư $3$&nbsp;ngày, ta đếm tiếp thêm $3$&nbsp;ngày nữa bắt đầu từ thứ Tư: Thứ Năm, Thứ Sáu, Thứ Bảy.</div><div>Vậy ngày $1$&nbsp;tháng $6$&nbsp;của năm đó sẽ rơi vào Thứ Bảy.</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: Thứ Bảy.</span></div>" },
{ t_title: "Bài 5", t_content: "Để đánh số thứ tự các trang của một cuốn sổ tay nhỏ từ trang $1$&nbsp;đến trang $25$, người ta phải viết chữ số $2$&nbsp;TẤT CẢ bao nhiêu lần? (Ghi rõ các trang có chứa chữ số $2$).", strategy: "WHAT (Tìm số chữ số, không phải số trang): Đề bài yêu cầu đếm TẦN SUẤT XUẤT HIỆN của chữ số $2$. Nghĩa là số $22$&nbsp;sẽ bị đếm $2$&nbsp;lần (vì nó có hai chữ số $2$).<br>HOW (Phân nhóm để khỏi sót): Nhóm chữ số $2$ ở hàng đơn vị: $2, 12, 22$. Nhóm chữ số $2$ ở hàng chục: $20, 21, 22, 23, 24, 25$.<br>WHY (Gộp và đếm): Viết liệt kê các trang ra và đếm tổng số lần tay ta phải viết chữ số $2$ xuống giấy.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Ta liệt kê các trang sách có chứa chữ số $2$&nbsp;từ trang $1$&nbsp;đến trang $25$:</div><div>- Các trang có chữ số $2$ ở hàng đơn vị là: $2, 12, 22$.</div><div>- Các trang có chữ số $2$ ở hàng chục là: $20, 21, 22, 23, 24, 25$.</div><div>Ta đếm số lần viết chữ số $2$:</div><div>- Trang $2$ ($1$&nbsp;lần)</div><div>- Trang $12$ ($1$&nbsp;lần)</div><div>- Trang $20, 21, 23, 24, 25$ (mỗi trang viết $1$&nbsp;lần, tổng là $5$&nbsp;lần)</div><div>- Riêng trang $22$ phải viết $2$&nbsp;lần chữ số $2$.</div><div>Tổng số lần người ta phải viết chữ số $2$&nbsp;là:</div><div>$1 + 1 + 5 + 2 = 9$&nbsp;(lần).</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $9$&nbsp;lần.</span></div>" },
{ t_title: "Bài 6", t_content: "Cho một hình tam giác có $3$&nbsp;đỉnh và $3$&nbsp;điểm nằm ở chính giữa của $3$&nbsp;cạnh (tổng cộng $6$&nbsp;vị trí). Em hãy điền các số từ $1$&nbsp;đến $6$&nbsp;vào $6$&nbsp;vị trí này (mỗi số chỉ được dùng $1$&nbsp;lần) sao cho tổng của $3$&nbsp;số nằm trên cùng một cạnh bất kỳ đều bằng $10$.<br>*(Yêu cầu: Chỉ rõ $3$&nbsp;số nào nằm ở $3$&nbsp;góc, và các số nào nằm ở giữa cạnh tương ứng).*", strategy: "WHAT (Bản chất Tam giác ma thuật): Tam giác có $3$&nbsp;cạnh, mỗi cạnh $3$&nbsp;số. Các số ở ĐỈNH TAM GIÁC bị đếm $2$&nbsp;lần (vì nó là giao điểm của $2$&nbsp;cạnh).<br>HOW (Kiểm tra tổng): Đề yêu cầu tổng $3$&nbsp;số trên mỗi cạnh = $10$. Tam giác có $3$&nbsp;cạnh nên tổng của $3$&nbsp;cạnh là $10 \\times 3 = 30$.<br>WHY (Sự chênh lệch): Tổng thực tế của $6$&nbsp;số từ $1$ đến $6$ là: $1+2+3+4+5+6 = 21$. Tại sao tổng $3$&nbsp;cạnh lại lên tới $30$? Vì $3$&nbsp;số ở $3$&nbsp;đỉnh bị tính lặp lại lần thứ $2$. Do đó, tổng của $3$&nbsp;số ở đỉnh chính là phần dôi ra: $30 - 21 = 9$.<br>WHAT NEXT (Chốt vị trí): Ba số từ $1$ đến $6$ cộng lại bằng $9$ chỉ có thể là nhóm $(1, 3, 5)$ hoặc $(2, 3, 4)$. Thử với nhóm $(1, 3, 5)$ đặt ở $3$&nbsp;đỉnh, sau đó lấy $10$ trừ đi $2$&nbsp;góc để tìm số ở giữa cạnh.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Gọi $3$&nbsp;vị trí ở góc (đỉnh) tam giác là các số bị lặp lại $2$&nbsp;lần khi tính tổng các cạnh.</div><div>Tổng của $6$&nbsp;số từ $1$&nbsp;đến $6$&nbsp;là: $1 + 2 + 3 + 4 + 5 + 6 = 21$.</div><div>Tổng của $3$&nbsp;cạnh tam giác theo yêu cầu đề bài là: $10 \\times 3 = 30$.</div><div>Phần chênh lệch chính là tổng của $3$&nbsp;số nằm ở $3$&nbsp;đỉnh: $30 - 21 = 9$.</div><div>Trong các số từ $1$&nbsp;đến $6$, chỉ có bộ $3$&nbsp;số <strong>$1, 3, 5$</strong> cộng lại bằng $9$ (và bộ $2, 3, 4$). Ta chọn bộ <strong>$1, 3, 5$</strong> đặt vào $3$&nbsp;đỉnh của tam giác.</div><div>- Cạnh thứ nhất nối giữa đỉnh $1$&nbsp;và đỉnh $3$. Để cạnh này có tổng bằng $10$, số ở giữa phải là: $10 - (1 + 3) = 6$.</div><div>- Cạnh thứ hai nối giữa đỉnh $3$&nbsp;và đỉnh $5$. Số ở giữa phải là: $10 - (3 + 5) = 2$.</div><div>- Cạnh thứ ba nối giữa đỉnh $5$&nbsp;và đỉnh $1$. Số ở giữa phải là: $10 - (5 + 1) = 4$.</div><div>Các số điền vào giữa cạnh ($6, 2, 4$) hoàn toàn khớp với các số còn lại trong dãy $1$&nbsp;đến $6$.</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: Ba số ở đỉnh là: $1, 3, 5$. Giữa $1$ và $3$ là $6$. Giữa $3$ và $5$ là $2$. Giữa $5$ và $1$ là $4$.</span></div>" }
]

{ t_title: "Bài 1", t_content: "Tính nhanh: <div class='text-center text-xl my-4'>$82 + 15 + 18 - 5$</div>", strategy: "WHAT (Quan sát các số): Đuôi $2$ của số $82$&nbsp;rất thích hợp ghép với đuôi $8$ của số $18$. Số $15$&nbsp;mang dấu cộng và số $5$&nbsp;mang dấu trừ rất hợp để triệt tiêu đuôi $5$.<br>HOW (Góp nhặt): Hãy thay đổi vị trí các số (mang theo dấu của chúng) để ghép thành các cụm tính nhẩm.<br>WHY (Sự tròn chục): $(82 + 18)$ sẽ tròn trăm. $(15 - 5)$ sẽ tròn chục.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>$82 + 15 + 18 - 5$</div><div>$= (82 + 18) + (15 - 5)$</div><div>$= 100 + 10$</div><div>$= 110$</div>" },
{ t_title: "Bài 2", t_content: "Tìm các chữ số $A$ và $B$ thích hợp để khôi phục lại phép tính cộng theo cột dọc dưới đây:<br><div class='font-mono font-bold text-2xl w-24 mx-auto mt-4'>&nbsp;&nbsp;A&nbsp;5<br>+&nbsp;2&nbsp;B<br>-----<br>&nbsp;&nbsp;7&nbsp;3</div>", strategy: "WHAT (Phân tích cột đơn vị): Cột đơn vị có $5 + B = 3$. Một phép cộng của số dương sao có thể ra kết quả nhỏ hơn số ban đầu? Chỉ có thể là phép cộng CÓ NHỚ. Tức là $5 + B = 13$.<br>HOW (Tìm B): Từ $5 + B = 13$, nhẩm ngay ra $B = 8$. Vì là phép cộng có nhớ, ta phải 'nhớ 1' sang cột hàng chục.<br>WHERE (Phân tích cột hàng chục): Cột hàng chục là $A + 2$ và được 'nhớ thêm 1' nữa thì mới bằng $7$. Tức là $A + 2 + 1 = 7$.<br>WHAT NEXT (Tìm A): Từ $A + 3 = 7$, suy ra $A = 4$. Thử lại $45 + 28 = 73$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Ta xét phép cộng theo cột dọc từ phải sang trái:</div><div>- Ở cột hàng đơn vị: $5 + B$ cho kết quả có chữ số tận cùng là $3$. Do $5 > 3$ nên đây là phép cộng qua $10$&nbsp;(có nhớ). Ta có: $5 + B = 13$. Suy ra $B = 8$. Nhớ $1$&nbsp;sang hàng chục.</div><div>- Ở cột hàng chục: $A + 2$ thêm $1$&nbsp;(điểm nhớ) bằng $7$. Ta có biểu thức: $A + 2 + 1 = 7$, hay $A + 3 = 7$. Suy ra $A = 4$.</div><div>Thử lại: $45 + 28 = 73$&nbsp;(Đúng).</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $A = 4, B = 8$.</span></div>" },
{ t_title: "Bài 3", t_content: "Một khúc gỗ dài $12\\text{ dm}$. Bác thợ mộc cưa khúc gỗ đó thành các đoạn ngắn, mỗi đoạn dài $3\\text{ dm}$. Biết mỗi nhát cưa bác làm mất $4$&nbsp;phút và sau khi cưa xong đoạn cuối cùng, bác đi làm việc khác ngay. Hỏi bác thợ mộc mất tất cả bao nhiêu phút để cưa xong khúc gỗ?", strategy: "WHAT (Khúc gỗ bị chia làm mấy đoạn?): Tổng độ dài là $12\\text{ dm}$, mỗi đoạn $3\\text{ dm}$. Lấy $12 : 3$ để tìm số đoạn gỗ được tạo ra.<br>WHY (Bẫy số nhát cưa): Để chia thành $4$&nbsp;đoạn gỗ thì cần mấy lần kéo cưa? (Hãy tưởng tượng nhát cưa cuối cùng sẽ tách phần gỗ còn lại thành $2$&nbsp;đoạn rời nhau. Vậy số nhát cưa luôn ÍT HƠN số đoạn là $1$).<br>HOW (Tính thời gian): Có số nhát cưa thực tế rồi, nhân với thời gian của $1$&nbsp;nhát ($4$&nbsp;phút). Đề bài ghi rõ 'không nghỉ' nên không phải cộng thêm thời gian chờ.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Khúc gỗ được cưa thành số đoạn là:</div><div>$12 : 3 = 4$&nbsp;(đoạn)</div><div>Để cưa khúc gỗ thành $4$&nbsp;đoạn, bác thợ mộc chỉ cần thực hiện số nhát cưa là:</div><div>$4 - 1 = 3$&nbsp;(nhát cưa)</div><div>Thời gian để bác thợ mộc cưa xong khúc gỗ đó là:</div><div>$4 \\times 3 = 12$&nbsp;(phút)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $12$&nbsp;phút.</span></div>" },
{ t_title: "Bài 4", t_content: "Cách đây $2$&nbsp;năm, anh hơn em $5$&nbsp;tuổi. Hiện nay tổng số tuổi của hai anh em cộng lại là $21$&nbsp;tuổi. Hỏi hiện nay anh bao nhiêu tuổi, em bao nhiêu tuổi?", strategy: "WHAT (Nguyên lý bất biến): 'Cách đây $2$&nbsp;năm anh hơn em $5$&nbsp;tuổi'. Thời gian lùi về quá khứ nhưng khoảng cách sinh ra giữa hai người có thay đổi không? Không. Hiệu số tuổi luôn là $5$.<br>WHEN (Đưa về hiện tại): Hiện nay, tổng số tuổi là $21$, hiệu số tuổi là $5$.<br>HOW (Áp dụng tư duy san bằng): Nếu anh bớt đi $5$&nbsp;tuổi của mình thì anh sẽ BẰNG TUỔI EM.<br>WHAT NEXT (Tính toán): Khi anh bớt đi $5$&nbsp;tuổi, tổng tuổi của hai người cũng bị giảm đi $5$, tức là $21 - 5 = 16$. Lúc này hai người bằng tuổi nhau nên lấy $16 : 2 = 8$ sẽ ra tuổi của em.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Vì khoảng cách tuổi tác giữa hai người không bao giờ thay đổi, nên cách đây $2$&nbsp;năm anh hơn em $5$&nbsp;tuổi thì HIỆN NAY anh vẫn hơn em $5$&nbsp;tuổi.</div><div>Giả sử hiện nay anh bớt đi $5$&nbsp;tuổi thì tuổi anh sẽ bằng tuổi em. Lúc này tổng số tuổi của hai anh em là:</div><div>$21 - 5 = 16$&nbsp;(tuổi)</div><div>Tuổi của em hiện nay là:</div><div>$16 : 2 = 8$&nbsp;(tuổi)</div><div>Tuổi của anh hiện nay là:</div><div>$8 + 5 = 13$&nbsp;(tuổi)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: Anh $13$&nbsp;tuổi, em $8$&nbsp;tuổi.</span></div>" },
{ t_title: "Bài 5", t_content: "Trong một cái chuồng có tất cả $9$&nbsp;con gồm gà và chó. Bạn Nam đếm được tổng số chân của chúng là $26$&nbsp;chân. Bằng cách suy luận, em hãy tìm xem trong chuồng có bao nhiêu con gà, bao nhiêu con chó?", strategy: "WHAT (Dữ kiện cơ sở): Có $9$&nbsp;con vật. Chó có $4$&nbsp;chân, gà có $2$&nbsp;chân.<br>WHAT IF (Giả sử toàn bộ là gà): Hãy tưởng tượng nếu tất cả $9$&nbsp;con trong chuồng đều là gà thì tổng số chân sẽ là bao nhiêu? ($2 \\times 9 = 18$ chân).<br>WHY (Sự chênh lệch): Thực tế có $26$&nbsp;chân. Số chân bị thiếu đi là $26 - 18 = 8$ chân. Tại sao lại thiếu? Vì ta đã biến những con chó $4$&nbsp;chân thành con gà $2$&nbsp;chân, mỗi con chó bị thu hẹp đi $2$&nbsp;chân.<br>HOW (Tìm chó): Lấy số chân bị thiếu ($8$) chia cho số chân bị tụt của mỗi con chó ($2$) sẽ ra số chó thực tế.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Mỗi con chó có $4$&nbsp;chân, mỗi con gà có $2$&nbsp;chân. Giả sử cả $9$&nbsp;con trong chuồng đều là con gà. Khi đó tổng số chân là:</div><div>$2 \\times 9 = 18$&nbsp;(chân)</div><div>Số chân bị thiếu so với thực tế là:</div><div>$26 - 18 = 8$&nbsp;(chân)</div><div>Sở dĩ bị thiếu $8$&nbsp;chân là do ta đã tính những con chó giống như gà. Mỗi con chó đã bị tính hụt đi số chân là:</div><div>$4 - 2 = 2$&nbsp;(chân)</div><div>Số con chó có trong chuồng là:</div><div>$8 : 2 = 4$&nbsp;(con)</div><div>Số con gà có trong chuồng là:</div><div>$9 - 4 = 5$&nbsp;(con)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $4$&nbsp;con chó, $5$&nbsp;con gà.</span></div>" },
{ t_title: "Bài 6", t_content: "Nam xếp các que diêm để tạo thành phép tính: <b>$9 + 3 = 5$</b><br>(Số $9$&nbsp;xếp bằng $6$&nbsp;que diêm, dấu cộng xếp bằng $2$&nbsp;que chéo nhau hoặc dọc/ngang, số $3$&nbsp;xếp bằng $5$&nbsp;que, dấu bằng $2$&nbsp;que, số $5$&nbsp;xếp bằng $5$&nbsp;que).<br>Phép tính này đang bị sai. Em hãy chỉ ra cách di chuyển <b>ĐÚNG MỘT</b> que diêm để biến phép tính trên thành phép tính đúng. Giải thích cách làm của em.", strategy: "WHAT (Phân tích phép tính sai): $9 + 3 = 12$, nhưng vế phải đang là $5$. Phép cộng này đang chênh lệch quá xa.<br>HOW (Tìm hướng thay đổi dấu): Vì kết quả là $5$ (số nhỏ hơn $9$), nên ta nên đổi dấu cộng (+) thành dấu trừ (-).<br>WHERE (Lấy que diêm ở đâu?): Nếu ta lấy $1$&nbsp;que diêm dọc của dấu (+) đi, dấu cộng biến thành dấu (-). Ta dư ra $1$&nbsp;que diêm.<br>WHAT NEXT (Ghép que dư): Phép tính bây giờ có dạng: <b>$9 - 3 = 5$</b> (dư $1$&nbsp;que). Phép tính này sai vì $9 - 3 = 6$. Vậy ta phải đắp $1$&nbsp;que dư đó vào số nào?<br>WHY (Hoàn thiện): Số $9$ có một khoảng hở ở phía dưới bên trái. Nếu nhét $1$&nbsp;que diêm dọc vào đó, số $9$ sẽ khép kín và biến thành số $8$. Phép tính trở thành <b>$8 - 3 = 5$</b> (Đúng hoàn toàn).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Phép tính ban đầu: <b>$9 + 3 = 5$</b> (Sai).</div><div>Cách di chuyển $1$&nbsp;que diêm để tạo thành phép tính đúng như sau:</div><div>- <b>Bước 1:</b> Lấy $1$&nbsp;que diêm đặt dọc của dấu cộng (+). Lúc này, dấu cộng sẽ biến thành dấu trừ (-). Ta đang cầm trên tay $1$&nbsp;que diêm dư.</div><div>- <b>Bước 2:</b> Đem que diêm đó ghép vào khoảng hở ở phía dưới bên trái của chữ số $9$. Lúc này, chữ số $9$ sẽ khép kín và biến thành chữ số $8$.</div><div>Phép tính mới được tạo thành là:</div><div><b class='text-xl text-red-600'>$8 - 3 = 5$</b></div><div>Đây là một phép tính hoàn toàn đúng.</div>" }
]
});

{ t_title: "Bài 1", t_content: "Tính nhanh biểu thức sau: <div class='text-center text-xl my-4'>$45 + 37 + 55 - 17$</div>", strategy: "WHAT (Quan sát các con số): Có các số mang dấu cộng $(45, 37, 55)$ và một số mang dấu trừ $(-17)$.<br>HOW (Bắt cặp tròn chục): Đuôi $5$ của số $45$&nbsp;và đuôi $5$ của số $55$&nbsp;cộng lại sẽ tròn chục (tròn trăm). Đuôi $7$ của số $37$&nbsp;mang dấu cộng, và đuôi $7$ của số $17$&nbsp;mang dấu trừ. Ghép chúng lại để triệt tiêu cho nhau $(37 - 17)$.<br>WHY (Thực thi): Biểu thức sẽ biến thành phép tính nhẩm cực kỳ đơn giản giữa các số tròn chục.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>$45 + 37 + 55 - 17$</div><div>$= (45 + 55) + (37 - 17)$</div><div>$= 100 + 20$</div><div>$= 120$</div>" },
{ t_title: "Bài 2", t_content: "Ba bạn Hồng, Lan, Cúc đang mặc $3$&nbsp;chiếc váy có màu sắc khác nhau: Trắng, Xanh và Đỏ. Biết rằng Hồng không mặc chiếc váy màu Xanh. Bạn Cúc không mặc váy màu Đỏ và cũng không mặc váy màu Xanh. Bằng cách suy luận, em hãy cho biết mỗi bạn đang mặc chiếc váy màu gì?", strategy: "WHO (Tìm người có nhiều dữ kiện nhất): Bạn Cúc có nhiều từ 'không' nhất. Cúc không mặc Đỏ, cũng không mặc Xanh.<br>HOW (Suy luận loại trừ): Vì Cúc không Đỏ, không Xanh, nên Cúc bắt buộc phải mặc màu còn lại là Trắng.<br>Gạch màu Trắng khỏi danh sách. Còn lại Xanh và Đỏ. Bạn Hồng không mặc màu Xanh, nên Hồng bắt buộc phải mặc màu Đỏ.<br>Cuối cùng, bạn Lan sẽ mặc chiếc váy màu Xanh.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Ta sử dụng phương pháp suy luận loại trừ:</div><div>- Bạn Cúc không mặc váy Đỏ và cũng không mặc váy Xanh. Suy ra <strong>Cúc mặc váy Trắng</strong>.</div><div>- Chỉ còn lại váy Đỏ và váy Xanh. Bạn Hồng không mặc váy Xanh. Suy ra <strong>Hồng mặc váy Đỏ</strong>.</div><div>- Chiếc váy cuối cùng màu Xanh chắc chắn thuộc về Lan. Vậy <strong>Lan mặc váy Xanh</strong>.</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: Cúc mặc Trắng; Hồng mặc Đỏ; Lan mặc Xanh.</span></div>" },
{ t_title: "Bài 3", t_content: "Tại một khu vườn phép thuật, người ta dùng chiếc cân đĩa để đổi quả. Cứ $1$&nbsp;quả Dưa Hấu thì cân nặng bằng $3$&nbsp;quả Bưởi. Khi người ta đặt $2$&nbsp;quả Dưa Hấu và $2$&nbsp;quả Bưởi lên đĩa cân bên trái thì phải đặt quả cân $16\\text{kg}$ lên đĩa bên phải cân mới thăng bằng. Hỏi $1$&nbsp;quả Bưởi nặng bao nhiêu ki-lô-gam? (Biết các quả cùng loại đều nặng bằng nhau).", strategy: "WHAT (Nguyên lý Toán Khử): Đề bài cho biết $1$&nbsp;Dưa Hấu đổi được $3$&nbsp;Bưởi.<br>HOW (Thực hiện thay thế): Trên đĩa cân đang có '$2$&nbsp;Dưa Hấu và $2$&nbsp;Bưởi' nặng $16\\text{kg}$. Hãy vứt $2$&nbsp;quả Dưa Hấu đi và đặt Bưởi vào thay thế. $1$&nbsp;Dưa Hấu = $3$&nbsp;Bưởi. Vậy $2$&nbsp;Dưa Hấu = $6$&nbsp;Bưởi.<br>WHY (Tính tổng một loại quả): Khi thay xong, trên đĩa cân chỉ toàn là Bưởi. Gồm $6$&nbsp;Bưởi mới thay + $2$&nbsp;Bưởi cũ = $8$&nbsp;Bưởi.<br>WHAT NEXT: $8$&nbsp;quả Bưởi nặng $16\\text{kg}$, dùng phép chia để tìm $1$&nbsp;quả.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Vì $1$&nbsp;quả Dưa Hấu nặng bằng $3$&nbsp;quả Bưởi, nên $2$&nbsp;quả Dưa Hấu sẽ nặng bằng:</div><div>$3 + 3 = 6$&nbsp;(quả Bưởi)</div><div>Ta thay thế $2$&nbsp;quả Dưa Hấu trên đĩa cân bằng $6$&nbsp;quả Bưởi. Lúc này trên đĩa cân chỉ còn toàn là Bưởi. Tổng số quả Bưởi trên đĩa cân là:</div><div>$6 + 2 = 8$&nbsp;(quả Bưởi)</div><div>Cân nặng của $8$&nbsp;quả Bưởi là $16\\text{kg}$. Vậy cân nặng của $1$&nbsp;quả Bưởi là:</div><div>$16 : 8 = 2$&nbsp;(kg)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $1$&nbsp;quả Bưởi nặng $2\\text{ kg}$.</span></div>" },
{ t_title: "Bài 4", t_content: "Tìm một số có hai chữ số. Biết rằng chữ số hàng chục gấp $4$&nbsp;lần chữ số hàng đơn vị, và hiệu của hai chữ số đó là $6$.", strategy: "WHAT (Điều kiện 'gấp 4 lần'): Chữ số hàng chục gấp $4$&nbsp;lần chữ số hàng đơn vị. Các cặp số nào thỏa mãn điều này?<br>- Hàng chục là $4$, hàng đơn vị là $1$.<br>- Hàng chục là $8$, hàng đơn vị là $2$.<br>HOW (Sử dụng điều kiện 'Hiệu bằng 6'):<br>- Thử cặp thứ nhất: $4 - 1 = 3$ (Không thỏa mãn vì hiệu phải bằng $6$).<br>- Thử cặp thứ hai: $8 - 2 = 6$ (Thỏa mãn).<br>WHAT NEXT (Chốt số): Ghép hàng chục là $8$, hàng đơn vị là $2$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Gọi số cần tìm có hai chữ số. Chữ số hàng chục gấp $4$&nbsp;lần chữ số hàng đơn vị. Ta liệt kê các cặp chữ số thỏa mãn điều kiện này:</div><div>- Nếu chữ số hàng đơn vị là $1$, thì chữ số hàng chục là $4$. Ta được số $41$.</div><div>- Nếu chữ số hàng đơn vị là $2$, thì chữ số hàng chục là $8$. Ta được số $82$.</div><div>*(Không thể lấy hàng đơn vị là $3$ vì $3 \\times 4 = 12$ không phải là số có $1$&nbsp;chữ số).*</div><div>Đề bài yêu cầu hiệu của hai chữ số bằng $6$. Ta kiểm tra:</div><div>- Ở số $41$: $4 - 1 = 3$&nbsp;(Loại).</div><div>- Ở số $82$: $8 - 2 = 6$&nbsp;(Thỏa mãn).</div><div>Vậy số cần tìm là $82$.</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $82$.</span></div>" },
{ t_title: "Bài 5", t_content: "Bác nông dân rào một khu vườn hình vuông có độ dài $1$&nbsp;cạnh là $10\\text{m}$. Bác đóng các cọc gỗ xung quanh vườn, cứ $2\\text{m}$ bác lại đóng $1$&nbsp;cái cọc. Hỏi bác nông dân cần chuẩn bị tất cả bao nhiêu cái cọc để rào kín khu vườn đó?", strategy: "WHAT (Tìm tổng chiều dài hàng rào): Khu vườn hình vuông có $4$&nbsp;cạnh, mỗi cạnh $10\\text{m}$. Tính chu vi để biết hàng rào dài bao nhiêu mét ($10 \\times 4 = 40\\text{m}$).<br>HOW (Tìm số khoảng cách): Có chiều dài $40\\text{m}$, cứ $2\\text{m}$ đóng $1$&nbsp;cọc. Phép chia $40 : 2 = 20$&nbsp;khoảng cách.<br>WHY (Cái bẫy vòng khép kín): Bình thường trồng cây trên đường thẳng thì Số cây = Số khoảng + 1 (hoặc - 1). Nhưng khu vườn là một vòng KHÉP KÍN (điểm đầu nối liền điểm cuối). Ở vòng khép kín, SỐ CỌC LUÔN BẰNG ĐÚNG SỐ KHOẢNG CÁCH.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Chu vi của khu vườn hình vuông đó là:</div><div>$10 \\times 4 = 40$&nbsp;(m)</div><div>Số khoảng cách $2\\text{m}$ dọc theo chu vi khu vườn là:</div><div>$40 : 2 = 20$&nbsp;(khoảng)</div><div>Vì khu vườn được rào kín xung quanh tạo thành một vòng khép kín, nên số lượng cọc gỗ cần dùng bằng ĐÚNG VỚI số khoảng cách. Vậy bác nông dân cần tất cả số cọc gỗ là $20$&nbsp;cái.</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $20$&nbsp;cái cọc gỗ.</span></div>" },
{ t_title: "Bài 6", t_content: "Bố giao cho Nam một thử thách: Trước mặt Nam là một cái bồn chứa rất nhiều nước, một cái can rỗng loại $8$&nbsp;lít và một cái can rỗng loại $3$&nbsp;lít (cả $2$&nbsp;can đều không có vạch chia). Bằng cách múc và rót nước, em hãy giúp Nam tìm ra cách để lấy được ĐÚNG $2$&nbsp;lít nước.", strategy: "WHAT (Mục tiêu): Dùng số $8$ và số $3$ để làm phép tính ra kết quả là $2$.<br>HOW (Lập phép tính): Nhẩm trong đầu: $8 - 3 = 5$; $5 - 3 = 2$. Vậy ta cần lấy $8 - 3 - 3 = 2$.<br>WHAT NEXT (Chuyển thành thao tác rót):<br>- Số '$8$' đầu tiên: Múc đầy can $8\\text{L}$.<br>- '$-3$' lần thứ nhất: Rót từ can $8\\text{L}$ cho đầy can $3\\text{L}$. Lúc này can $8\\text{L}$ còn $5\\text{L}$. Đổ bỏ nước trong can $3\\text{L}$ đi.<br>- '$-3$' lần thứ hai: Tiếp tục rót từ can $8\\text{L}$ (đang chứa $5\\text{L}$) cho đầy can $3\\text{L}$ một lần nữa. Số nước còn đọng lại trong can $8\\text{L}$ chính là $2\\text{L}$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Ta thấy phép tính: $8 - 3 - 3 = 2$. Nam có thể đong nước theo các bước sau:</div><div><strong>Bước 1:</strong> Múc đầy nước vào chiếc can $8$&nbsp;lít.</div><div><strong>Bước 2:</strong> Rót nước từ can $8$&nbsp;lít sang chiếc can $3$&nbsp;lít cho đến khi can $3$&nbsp;lít đầy. Lúc này, lượng nước còn lại trong can $8$&nbsp;lít là: $8 - 3 = 5$&nbsp;(lít).</div><div><strong>Bước 3:</strong> Đổ hết nước trong chiếc can $3$&nbsp;lít ra ngoài (trả lại bồn).</div><div><strong>Bước 4:</strong> Tiếp tục rót nước từ can $8$&nbsp;lít (đang chứa $5$&nbsp;lít) sang chiếc can $3$&nbsp;lít cho đến khi đầy. Lúc này, lượng nước còn lại trong can $8$&nbsp;lít chính xác là $2$&nbsp;lít (vì $5 - 3 = 2$).</div><div>Nam đã lấy được đúng $2$&nbsp;lít nước theo yêu cầu của bố.</div>" }
]

{ t_title: "Bài 1", t_content: "Tính nhanh biểu thức sau: <div class='text-center text-xl my-4'>$54 + 27 + 46 - 17$</div>", strategy: "WHAT (Quan sát đuôi số): Đuôi $4$ (của $54$) hợp với đuôi $6$ (của $46$). Đuôi $7$ mang dấu cộng (của $27$) hợp với đuôi $7$ mang dấu trừ (của $17$).<br>HOW (Góp nhặt lại gần): Đổi vị trí các số để tạo thành $2$&nbsp;cụm tính nhẩm. Chú ý bê nguyên dấu của số đó đi theo.<br>WHY (Thực thi): $(54 + 46)$ ra số tròn trăm. $(27 - 17)$ ra số tròn chục.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>$54 + 27 + 46 - 17$</div><div>$= (54 + 46) + (27 - 17)$</div><div>$= 100 + 10$</div><div>$= 110$</div>" },
{ t_title: "Bài 2", t_content: "Một phép trừ có hiệu là $60$. Nếu ta giữ nguyên số trừ và giảm số bị trừ đi $5$&nbsp;đơn vị thì hiệu mới sẽ là bao nhiêu?", strategy: "WHAT (Nguyên lý của phép trừ): Số bị trừ (số to ban đầu) $-$ Số trừ (phần bị lấy đi) = Hiệu (phần còn lại).<br>HOW (Tư duy thực tế): Con có một rổ táo (số bị trừ). Mẹ lấy đi một số quả (số trừ), trong rổ còn lại $60$&nbsp;quả (Hiệu).<br>WHY (Sự biến đổi): Nếu rổ táo ban đầu của con BỊ ÍT ĐI $5$&nbsp;quả (giảm số bị trừ đi $5$), thì sau khi mẹ lấy phần của mẹ, phần giữ lại của con sẽ nhiều lên hay ít đi? (Chắc chắn phải ít đi $5$&nbsp;quả).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Trong một phép trừ, nếu số trừ giữ nguyên mà số bị trừ GIẢM ĐI bao nhiêu đơn vị thì Hiệu cũng sẽ GIẢM ĐI bấy nhiêu đơn vị.</div><div>Nếu giảm số bị trừ đi $5$&nbsp;đơn vị thì hiệu mới sẽ là:</div><div>$60 - 5 = 55$</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $55$.</span></div>" },
{ t_title: "Bài 3", t_content: "Bố giao cho Nam một thử thách: Trước mặt Nam là một cái bể đầy nước, một cái can rỗng loại $9$&nbsp;lít và một cái can rỗng loại $4$&nbsp;lít (cả $2$&nbsp;can đều không có vạch chia). Bằng cách múc và rót nước, em hãy giúp Nam tìm ra cách để lấy được ĐÚNG $1$&nbsp;lít nước.", strategy: "WHAT (Mục tiêu): Dùng số $9$ và số $4$ để làm phép tính ra kết quả là $1$.<br>HOW (Lập phép tính): Nhẩm: $9 - 4 = 5$. Vẫn chưa ra $1$. Trừ tiếp đi $4$: $5 - 4 = 1$. Vậy phép tính là $9 - 4 - 4 = 1$.<br>WHAT NEXT (Chuyển thành thao tác rót):<br>- Số '$9$' là múc đầy can $9\\text{L}$.<br>- Trừ đi $4$ lần $1$: Rót từ can $9\\text{L}$ sang cho đầy can $4\\text{L}$. Đổ bỏ can $4\\text{L}$.<br>- Trừ đi $4$ lần $2$: Lại rót từ can $9\\text{L}$ sang đầy can $4\\text{L}$ lần nữa. Nước dư ra ở can to chính là $1$&nbsp;lít.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Ta thấy phép tính: $9 - 4 - 4 = 1$. Nam có thể đong nước theo các bước sau:</div><div><strong>Bước 1:</strong> Múc đầy nước vào chiếc can $9$&nbsp;lít.</div><div><strong>Bước 2:</strong> Rót nước từ can $9$&nbsp;lít sang chiếc can $4$&nbsp;lít cho đến khi can $4$&nbsp;lít đầy. Lúc này, lượng nước còn lại trong can $9$&nbsp;lít là: $9 - 4 = 5$&nbsp;(lít).</div><div><strong>Bước 3:</strong> Đổ hết nước trong chiếc can $4$&nbsp;lít ra ngoài (trả lại bể).</div><div><strong>Bước 4:</strong> Tiếp tục rót nước từ can $9$&nbsp;lít (đang chứa $5$&nbsp;lít) sang chiếc can $4$&nbsp;lít cho đến khi đầy. Lúc này, lượng nước còn lại trong can $9$&nbsp;lít chính xác là $1$&nbsp;lít (vì $5 - 4 = 1$).</div><div>Nam đã lấy được đúng $1$&nbsp;lít nước theo yêu cầu.</div>" },
{ t_title: "Bài 4", t_content: "Trong một chiếc hộp kín có $6$&nbsp;viên bi màu xanh, $5$&nbsp;viên bi màu đỏ và $4$&nbsp;viên bi màu vàng. Nếu không được nhìn vào hộp, em phải lấy ra ít nhất bao nhiêu viên bi để CHẮC CHẮN rằng trong số bi lấy ra có $2$&nbsp;viên bi CÙNG MÀU?", strategy: "WHAT (Xác định mục tiêu): Bài toán YÊU CẦU có $2$&nbsp;viên CÙNG MÀU (bất kể là màu gì).<br>WHEN (Kịch bản rủi ro nhất): Bạn muốn bốc $2$&nbsp;viên giống màu nhau. Nhưng xui xẻo thay, bạn bốc viên thứ nhất màu Xanh, viên thứ hai màu Đỏ, viên thứ ba lại ra màu Vàng.<br>HOW (Tính số lượng rủi ro): Bạn đã bốc $3$&nbsp;viên và cả $3$&nbsp;viên đều khác màu nhau hoàn toàn (không có cặp nào).<br>WHY (Điểm phá vỡ): Trong hộp chỉ có $3$&nbsp;loại màu. Khi bạn đã cầm $3$&nbsp;viên $3$&nbsp;màu rồi, thì viên thứ $4$ bốc lên BẮT BUỘC phải là Xanh, Đỏ hoặc Vàng. Dù nó rơi vào màu nào thì nó cũng sẽ ghép cặp với viên có sẵn trên tay bạn để tạo thành $2$&nbsp;viên CÙNG MÀU.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Để chắc chắn lấy được $2$&nbsp;viên bi CÙNG MÀU, ta phải xét trường hợp rủi ro nhất (xui xẻo nhất). Trường hợp rủi ro nhất là ta bốc lên các viên bi mà không có viên nào trùng màu với viên nào.</div><div>Vì trong hộp chỉ có $3$&nbsp;màu (xanh, đỏ, vàng), nên ta bốc nhiều nhất là $3$&nbsp;viên bi với $3$&nbsp;màu khác nhau ($1$&nbsp;xanh, $1$&nbsp;đỏ, $1$&nbsp;vàng). Lúc này trên tay vẫn chưa có $2$&nbsp;viên nào cùng màu.</div><div>Tuy nhiên, đến lần bốc tiếp theo (viên thứ $4$), viên bi lấy ra chắc chắn sẽ phải mang $1$&nbsp;trong $3$&nbsp;màu (xanh, đỏ hoặc vàng) và sẽ ghép thành một cặp cùng màu với viên bi đã lấy ra trước đó.</div><div>Vậy số bi ít nhất cần lấy ra là:</div><div>$3 + 1 = 4$&nbsp;(viên bi)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $4$&nbsp;viên bi.</span></div>" },
{ t_title: "Bài 5", t_content: "Bạn Mai có một tờ giấy hình chữ nhật. Mai gập đôi tờ giấy đó lại thì vừa vặn tạo thành một hình vuông. Biết chu vi của hình vuông lúc gập lại là $20\\text{ cm}$. Em hãy tính chu vi của tờ giấy hình chữ nhật lúc chưa gập.", strategy: "WHAT (Phân tích hình vuông): Hình vuông lúc gập lại có chu vi $20\\text{ cm}$. Chu vi là $4$&nbsp;cạnh cộng lại. Vậy $1$&nbsp;cạnh hình vuông dài bao nhiêu? ($20 : 4 = 5\\text{ cm}$).<br>HOW (Mở tờ giấy ra): Hình chữ nhật được gập đôi lại thành hình vuông. Nghĩa là hình chữ nhật ban đầu TO GẤP ĐÔI hình vuông.<br>- Khi mở ra, Chiều Rộng của nó chính là cạnh hình vuông ($5\\text{ cm}$).<br>- Chiều Dài của nó được trải dài ra gấp đôi, tức là $5 + 5 = 10\\text{ cm}$.<br>WHAT NEXT (Tính chu vi): Có chiều dài $10\\text{ cm}$, chiều rộng $5\\text{ cm}$. Cộng tổng các viền ngoài lại sẽ ra chu vi.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Hình vuông có $4$&nbsp;cạnh bằng nhau. Chu vi hình vuông là $20\\text{ cm}$ nên độ dài một cạnh của hình vuông là:</div><div>$20 : 4 = 5$&nbsp;(cm)</div><div>Khi mở mảnh giấy hình vuông ra, ta được hình chữ nhật ban đầu. Hình chữ nhật này có:</div><div>- Chiều rộng bằng đúng độ dài cạnh hình vuông, là $5\\text{ cm}$.</div><div>- Chiều dài gấp $2$&nbsp;lần cạnh hình vuông, là:</div><div>$5 \\times 2 = 10$&nbsp;(cm)</div><div>Chu vi của tờ giấy hình chữ nhật lúc chưa gập là:</div><div>$10 + 10 + 5 + 5 = 30$&nbsp;(cm)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $30\\text{ cm}$.</span></div>" },
{ t_title: "Bài 6", t_content: "Năm nay mẹ $30$&nbsp;tuổi, con $6$&nbsp;tuổi. Hỏi sau bao nhiêu năm nữa thì tuổi của mẹ sẽ bằng ĐÚNG TỔNG SỐ TUỔI của hai mẹ con hiện nay?", strategy: "WHAT (Tìm Mục Tiêu): Đề bài nhắc đến 'Tổng số tuổi của hai mẹ con HIỆN NAY'. Hãy tính con số này ra trước ($30 + 6 = 36$).<br>HOW (Hiểu yêu cầu): Đề hỏi 'Sau bao nhiêu năm nữa thì tuổi CỦA MẸ sẽ bằng...' con số $36$&nbsp;đó. Nghĩa là bài toán muốn hỏi: Mẹ phải tốn bao nhiêu năm nữa để đạt mốc $36$&nbsp;tuổi?<br>WHY (Thực hiện): Mẹ đang $30$&nbsp;tuổi. Muốn lên $36$&nbsp;tuổi thì lấy $36 - 30$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Tổng số tuổi của hai mẹ con hiện nay là:</div><div>$30 + 6 = 36$&nbsp;(tuổi)</div><div>Đề bài yêu cầu tìm thời gian để 'tuổi của mẹ' bằng 'tổng số tuổi hiện nay' (tức là bằng $36$&nbsp;tuổi).</div><div>Hiện nay mẹ đang $30$&nbsp;tuổi. Số năm cần thiết để mẹ đạt được $36$&nbsp;tuổi là:</div><div>$36 - 30 = 6$&nbsp;(năm)</div><div><span class='font-bold mt-2 text-indigo-700 block'>Đáp số: $6$&nbsp;năm nữa.</span></div>" }
]
