{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $356 + 189$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $700 - 243$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 92$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $65 + 387$", strategy: "Viết thẳng cột hàng đơn vị, chục, trăm. Đặc biệt chú ý ở câu c (mượn qua 2 chữ số 0) và câu d (đặt tính số có 2 chữ số với số có 3 chữ số).", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 356 \\\\ + & 189 \\\\ \\hline & \\mathbf{\\color{red}{545}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 700 \\\\ - & 243 \\\\ \\hline & \\mathbf{\\color{red}{457}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 92 \\\\ \\hline & \\mathbf{\\color{red}{908}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 65 \\\\ + & 387 \\\\ \\hline & \\mathbf{\\color{red}{452}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Điền chữ số thích hợp vào dấu $\\square$ trong phép tính sau:<br><div class='text-2xl text-center my-4'>$7 \\square 3 - \\square 4 \\square = 286$</div>", strategy: "Dịch ngược từ phải sang trái.<br>- Cột đơn vị: 3 trừ mấy bằng 6? Lấy $13 - 6 = 7$. Vậy ô vuông ở hàng đơn vị là 7. (Nhớ 1).<br>- Cột chục: $\\square - 4 - 1\\text{ (nhớ)} = 8 \\Rightarrow \\square - 5 = 8 \\Rightarrow \\square = 13$ (Ghi 3 nhớ 1). Vậy ô vuông hàng chục là 3.<br>- Cột trăm: $7 - \\square - 1\\text{ (nhớ)} = 2 \\Rightarrow 6 - \\square = 2 \\Rightarrow \\square = 4$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Nhẩm theo cột dọc từ phải sang trái:<br>- Hàng đơn vị: Không có số tự nhiên nào thỏa mãn $3 - \\dots = 6$, phải mượn 1 chục. Ta có $13 - 7 = 6$. Vậy ô vuông ở số trừ điền $\\mathbf{\\color{red}{7}}$ (nhớ 1 sang hàng chục).<br>- Hàng chục: Ô vuông thứ nhất trừ đi 4, rồi trừ tiếp 1 (đã mượn) thì bằng 8. Tức là $\\square - 5 = 8$. Để có 8, ta lấy $13 - 5 = 8$. Vậy ô vuông ở số bị trừ điền $\\mathbf{\\color{red}{3}}$ (nhớ 1 sang hàng trăm).<br>- Hàng trăm: $7$ trừ ô vuông thứ hai, trừ tiếp 1 (đã mượn) thì bằng $2$. Tức là $6 - \\square = 2 \\Rightarrow \\square = 4$. Vậy ô vuông ở số trừ điền $\\mathbf{\\color{red}{4}}$.<br>Phép tính hoàn chỉnh là: <strong>$733 - 447 = 286$</strong>.</div>" },
{ t_title: "Bài 3", t_content: "Tổng số tuổi của mẹ và con hiện nay là $42$&nbsp;tuổi. Biết rằng mẹ sinh con năm mẹ $28$&nbsp;tuổi. Tính tuổi của mỗi người hiện nay.", strategy: "Bài toán Tổng - Hiệu ẩn. 'Mẹ sinh con năm 28 tuổi' nghĩa là mẹ lớn hơn con 28 tuổi (Hiệu số tuổi luôn không đổi là 28). Lớp 2 có thể giải bằng cách nhẩm: (Tuổi con + 28) + Tuổi con = 42. Suy ra 2 lần tuổi con là $42 - 28 = 14$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Vì mẹ sinh con năm mẹ $28$&nbsp;tuổi nên mẹ hơn con $28$&nbsp;tuổi.<br>Hai lần tuổi của con là:<br>$42 - 28 = 14$&nbsp;(tuổi)<br>Tuổi của con hiện nay là:<br>$14 : 2 = 7$&nbsp;(tuổi)<br>Tuổi của mẹ hiện nay là:<br>$7 + 28 = 35$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Mẹ $35$&nbsp;tuổi, con $7$&nbsp;tuổi.</div>" },
{ t_title: "Bài 4", t_content: "Một cửa hàng buổi sáng bán được $120\\text{ kg}$ gạo. Buổi chiều bán được nhiều hơn buổi sáng $45\\text{ kg}$ nhưng lại ít hơn buổi tối $30\\text{ kg}$. Hỏi cả ba buổi cửa hàng bán được bao nhiêu ki-lô-gam gạo?", strategy: "Bài toán móc xích 3 bước. Bước 1: Tính số gạo bán buổi chiều (Phép cộng). Bước 2: Tính số gạo bán buổi tối (Bẫy: Chiều ÍT HƠN tối, tức là Tối NHIỀU HƠN chiều $\\Rightarrow$ Phép cộng). Bước 3: Tính tổng cả 3 buổi.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Buổi chiều cửa hàng bán được số ki-lô-gam gạo là:<br>$120 + 45 = 165$&nbsp;(kg)<br>Vì buổi chiều bán ít hơn buổi tối nên buổi tối bán được nhiều hơn buổi chiều. Buổi tối cửa hàng bán được số ki-lô-gam gạo là:<br>$165 + 30 = 195$&nbsp;(kg)<br>Cả ba buổi cửa hàng bán được tất cả số ki-lô-gam gạo là:<br>$120 + 165 + 195 = 480$&nbsp;(kg)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $480\\text{ kg}$.</div>" },
{ t_title: "Bài 5", t_content: "Người ta ghép $3$&nbsp;viên gạch hình chữ nhật giống hệt nhau để tạo thành một hình vuông lớn có cạnh là $12\\text{ cm}$. Tính chu vi của một viên gạch hình chữ nhật đó.", strategy: "Tư duy hình học cắt ghép. Ghép 3 viên gạch hình chữ nhật thành hình vuông cạnh 12cm. Điều đó có nghĩa là: Chiều dài của hình chữ nhật bằng đúng cạnh hình vuông ($12\\text{ cm}$). Chiều rộng của hình chữ nhật bị chia 3, bằng $12 : 3 = 4\\text{ cm}$. Chu vi = Tổng 4 cạnh.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi ghép $3$&nbsp;viên gạch hình chữ nhật thành một hình vuông cạnh $12\\text{ cm}$, mỗi viên gạch hình chữ nhật sẽ có:<br>- Chiều dài bằng đúng cạnh hình vuông là: $12\\text{ cm}$.<br>- Chiều rộng bằng một phần ba cạnh hình vuông là: $12 : 3 = 4$&nbsp;(cm).<br>Chu vi của một viên gạch hình chữ nhật đó là:<br>$12 + 4 + 12 + 4 = 32$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $32\\text{ cm}$.</div>" }
]
});

{ q_title: "Câu 1", q_content: "Số tự nhiên lớn nhất có ba chữ số khác nhau mà tổng các chữ số bằng $10$ là:", options: ["A. $910$", "B. $820$", "C. $730$", "D. $901$"], correct_idx: 0, explain: "Để số là lớn nhất, hàng trăm phải lớn nhất là 9. Tổng chục và đơn vị là $10 - 9 = 1$. Các cặp tổng bằng 1 là $(1, 0)$ và $(0, 1)$. Ghép lại ta có $910$ và $901$. Số lớn hơn là $910$." },
{ q_title: "Câu 2", q_content: "Tìm $x$, biết: $x \\times 2 + x \\times 3 = 40$", options: ["A. $10$", "B. $8$", "C. $6$", "D. $5$"], correct_idx: 1, explain: "$x$ được lấy $2$&nbsp;lần, rồi lại cộng thêm $x$ được lấy $3$&nbsp;lần. Vậy tổng cộng $x$ được lấy $5$&nbsp;lần. Ta có: $x \\times 5 = 40$. Suy ra $x = 40 : 5 = 8$." },
{ q_title: "Câu 3", q_content: "Hình khối nào dưới đây có 6 mặt đều là hình vuông bằng nhau?", options: ["A. Khối trụ", "B. Khối lập phương", "C. Khối hộp chữ nhật", "D. Khối cầu"], correct_idx: 1, explain: "Khối hộp chữ nhật có 6 mặt nhưng là các hình chữ nhật. Chỉ có khối lập phương (giống hình viên xúc xắc) mới có 6 mặt là các hình vuông hoàn toàn bằng nhau." },
{ q_title: "Câu 4", q_content: "Để lấy được đúng $2\\text{ lít}$ nước từ một cái bể lớn, Nam chỉ có trong tay hai chiếc can rỗng: một can loại $5\\text{ lít}$ và một can loại $3\\text{ lít}$. Nam có thể làm theo cách nào dưới đây?", options: ["A. Múc đầy can 5 lít, rồi đổ bớt đi một nửa.", "B. Múc đầy can 3 lít, rồi đổ sang can 5 lít. Múc thêm 1 lần nữa cho đầy.", "C. Múc đầy can 5 lít, rồi đổ từ can 5 lít sang cho đầy can 3 lít. Phần nước còn lại trong can 5 lít chính là 2 lít.", "D. Không thể đong được chính xác 2 lít."], correct_idx: 2, explain: "Bài toán đong nước kinh điển: Lấy can 5 lít đổ đầy nước. Từ can 5 lít, rót qua can 3 lít cho đến khi can 3 lít đầy. Số nước bị rót đi là $3\\text{ lít}$. Lượng nước còn giữ lại trong can 5 lít là: $5 - 3 = 2\\text{ (lít)}$." },
{ q_title: "Câu 5", q_content: "Hình nào dưới đây đã tô màu $\\frac{1}{5}$ diện tích của nó?<br><svg width='120' height='120' viewBox='0 0 100 100' class='mx-auto my-4'><polygon points='50,10 90,38 75,85 25,85 10,38' fill='none' stroke='#047857' stroke-width='2.5'/><polygon points='50,10 90,38 50,52' fill='#6ee7b7' stroke='#047857' stroke-width='2.5'/><polygon points='90,38 75,85 50,52' fill='none' stroke='#047857' stroke-width='2.5'/><polygon points='75,85 25,85 50,52' fill='none' stroke='#047857' stroke-width='2.5'/><polygon points='25,85 10,38 50,52' fill='none' stroke='#047857' stroke-width='2.5'/><polygon points='10,38 50,10 50,52' fill='none' stroke='#047857' stroke-width='2.5'/></svg>", options: ["A. Hình chia làm 5 phần không bằng nhau, tô 1 phần.", "B. Hình chia làm 4 phần bằng nhau, tô 1 phần.", "C. Hình chia làm 10 phần bằng nhau, tô 2 phần.", "D. Hình ngũ giác đều chia làm 5 phần bằng nhau, tô 1 phần."], correct_idx: 3, explain: "Phân số $1/5$ nghĩa là hình phải được chia làm 5 phần chính xác bằng nhau, sau đó tô màu 1 phần. (Lưu ý: Nếu hình chia 10 phần bằng nhau và tô 2 phần thì nó cũng có giá trị bằng $1/5$, nhưng đối với lớp 2, chọn hình gốc chia 5 phần là tường minh nhất)." },
{ q_title: "Câu 6", q_content: "Bố đi làm ca đêm từ $22$&nbsp;giờ hôm trước đến $6$&nbsp;giờ sáng hôm sau. Hỏi bố đã làm việc bao nhiêu giờ?", options: ["A. $16$&nbsp;giờ", "B. $8$&nbsp;giờ", "C. $4$&nbsp;giờ", "D. $12$&nbsp;giờ"], correct_idx: 1, explain: "Từ $22$&nbsp;giờ (10 giờ đêm) đến $24$&nbsp;giờ (12 giờ đêm) là $2$&nbsp;giờ. Từ $12$&nbsp;giờ đêm đến $6$&nbsp;giờ sáng là $6$&nbsp;giờ. Tổng cộng: $2 + 6 = 8$&nbsp;(giờ)." },
{ q_title: "Câu 7", q_content: "Trên bàn có 3 con vật đồ chơi: Chó, Mèo và Thỏ. Biết rằng Chó và Mèo cân nặng tổng cộng $5\\text{ kg}$. Mèo và Thỏ cân nặng tổng cộng $4\\text{ kg}$. Chó và Thỏ cân nặng tổng cộng $7\\text{ kg}$. Hỏi con Chó cân nặng bao nhiêu ki-lô-gam?", options: ["A. $3\\text{ kg}$", "B. $4\\text{ kg}$", "C. $2\\text{ kg}$", "D. $5\\text{ kg}$"], correct_idx: 1, explain: "Ta có: Chó + Mèo = 5, Mèo + Thỏ = 4. Suy ra Chó nặng hơn Thỏ 1kg (vì $5 - 4 = 1$). Ta lại có Chó + Thỏ = 7. Tìm hai số có tổng là 7 và hiệu là 1. Đó là 4 và 3. Vậy Chó = $4\\text{ kg}$, Thỏ = $3\\text{ kg}$." },
{ q_title: "Câu 8", q_content: "Dãy số sau có quy luật xen kẽ: $1, 10, 2, 9, 3, 8, \\dots, \\dots$. Hai số tiếp theo là:", options: ["A. $4, 7$", "B. $7, 4$", "C. $4, 8$", "D. $5, 6$"], correct_idx: 0, explain: "Dãy số gồm 2 chuỗi đan xen nhau. Chuỗi ở vị trí lẻ ($1, 3, 5\\dots$): $1, 2, 3 \\rightarrow$ số tiếp theo sẽ là $4$. Chuỗi ở vị trí chẵn ($2, 4, 6\\dots$): $10, 9, 8 \\rightarrow$ số tiếp theo sẽ lùi đi 1 là $7$." },
{ q_title: "Câu 9", q_content: "Ngày mùng $3$ của một tháng nào đó là thứ Ba. Hỏi ngày thứ $25$ của tháng đó là thứ mấy?", options: ["A. Thứ Ba", "B. Thứ Tư", "C. Thứ Năm", "D. Thứ Hai"], correct_idx: 1, explain: "Cứ cộng thêm 7 ngày thì thứ sẽ lặp lại. Các ngày thứ Ba trong tháng là: $3, 10, 17, 24$. Vì ngày 24 là thứ Ba, nên ngày liền sau (ngày 25) sẽ là thứ Tư." },
{ q_title: "Câu 10", q_content: "Các bạn học sinh lớp 2A xếp thành một hàng dọc. Đứng ở trong hàng, Nam đếm thấy mình đứng thứ $8$ từ trên xuống và đứng thứ $12$ từ dưới lên. Hỏi hàng dọc đó có tất cả bao nhiêu bạn?", options: ["A. $20$&nbsp;bạn", "B. $21$&nbsp;bạn", "C. $19$&nbsp;bạn", "D. $18$&nbsp;bạn"], correct_idx: 2, explain: "Đứng thứ 8 từ trên xuống nghĩa là phía trước Nam có $7$&nbsp;bạn. Đứng thứ 12 từ dưới lên nghĩa là phía sau Nam có $11$&nbsp;bạn. Tổng số bạn trong hàng là: $7\\text{ (trước)} + 11\\text{ (sau)} + 1\\text{ (Nam)} = 19$&nbsp;(bạn). (Hoặc tính nhanh: $8 + 12 - 1 = 19$)." },
{ q_title: "Câu 11", q_content: "Lan có 3 sợi dây ruy băng lần lượt dài $10\\text{ cm}, 15\\text{ cm}$ và $20\\text{ cm}$. Lan dùng keo dán nối 3 sợi dây này lại với nhau thành một dải dài. Biết rằng mỗi chỗ dán đè lên nhau làm mất đi $2\\text{ cm}$ chiều dài. Hỏi dải ruy băng mới dài bao nhiêu xăng-ti-mét?", options: ["A. $45\\text{ cm}$", "B. $41\\text{ cm}$", "C. $43\\text{ cm}$", "D. $39\\text{ cm}$"], correct_idx: 1, explain: "Tổng chiều dài 3 sợi ruy băng lúc đầu là: $10 + 15 + 20 = 45\\text{ (cm)}$. Khi nối 3 sợi dây lại với nhau, ta sẽ có 2 mối nối ở giữa. Mỗi mối nối mất đi $2\\text{ cm} \\Rightarrow$ Tổng độ dài bị hao hụt là $2 \\times 2 = 4\\text{ (cm)}$. Chiều dài dải ruy băng mới là: $45 - 4 = 41\\text{ (cm)}$." },
{ q_title: "Câu 12", q_content: "Tính hiệu của số liền sau số $500$ và số liền trước số $100$.", options: ["A. $400$", "B. $402$", "C. $398$", "D. $401$"], correct_idx: 1, explain: "Số liền sau $500$ là $501$. Số liền trước $100$ là $99$. Hiệu của hai số là: $501 - 99 = 402$." }
],

{ t_title: "Bài 1", t_content: "Đặt tính rồi tính:<br>a) $345 + 567$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; b) $802 - 156$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; c) $1000 - 89$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; d) $68 + 743$", strategy: "Viết thẳng cột hàng đơn vị, chục, trăm. Chú ý phép trừ mượn liên tiếp qua các số 0 (câu c) và phép cộng nhớ liên tiếp (câu a).", solution: "<div class='flex flex-wrap gap-8 justify-around my-4 text-lg'><div>$$\\begin{array}{rr} & 345 \\\\ + & 567 \\\\ \\hline & \\mathbf{\\color{red}{912}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 802 \\\\ - & 156 \\\\ \\hline & \\mathbf{\\color{red}{646}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 1000 \\\\ - & 89 \\\\ \\hline & \\mathbf{\\color{red}{911}} \\end{array}$$</div><div>$$\\begin{array}{rr} & 68 \\\\ + & 743 \\\\ \\hline & \\mathbf{\\color{red}{811}} \\end{array}$$</div></div>" },
{ t_title: "Bài 2", t_content: "Tính nhanh (bằng cách thuận tiện):<br><div class='text-center my-4 text-xl'>$20 - 18 + 16 - 14 + 12 - 10 + 8 - 6$</div>", strategy: "Dãy tính gồm các phép cộng trừ đan xen. Hãy quan sát từng cặp số đứng liền nhau. Cứ lấy số lớn trừ số bé sát nó sẽ ra một kết quả không đổi.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta nhóm các cặp số lại với nhau:<br>$= (20 - 18) + (16 - 14) + (12 - 10) + (8 - 6)$<br>$= 2 + 2 + 2 + 2$<br>$= 8$</div>" },
{ t_title: "Bài 3", t_content: "Điền các số còn thiếu vào tháp số dưới đây, biết rằng: Tổng của hai ô liền kề ở hàng dưới bằng ô nằm ngay phía trên chúng.<br><svg width='200' height='140' viewBox='0 0 200 140' class='mx-auto my-4'><g transform='translate(0, 105)'><rect x='10' y='0' width='40' height='25' fill='#fef08a' stroke='#a16207' stroke-width='2'/><text x='30' y='18' text-anchor='middle' font-weight='bold'>3</text><rect x='55' y='0' width='40' height='25' fill='#fef08a' stroke='#a16207' stroke-width='2'/><text x='75' y='18' text-anchor='middle' font-weight='bold'>5</text><rect x='100' y='0' width='40' height='25' fill='#fef08a' stroke='#a16207' stroke-width='2'/><text x='120' y='18' text-anchor='middle' font-weight='bold'>2</text><rect x='145' y='0' width='40' height='25' fill='#fef08a' stroke='#a16207' stroke-width='2'/><text x='165' y='18' text-anchor='middle' font-weight='bold'>6</text></g><g transform='translate(0, 75)'><rect x='32.5' y='0' width='40' height='25' fill='none' stroke='#a16207' stroke-width='2'/><rect x='77.5' y='0' width='40' height='25' fill='#fef08a' stroke='#a16207' stroke-width='2'/><text x='97.5' y='18' text-anchor='middle' font-weight='bold'>7</text><rect x='122.5' y='0' width='40' height='25' fill='none' stroke='#a16207' stroke-width='2'/></g><g transform='translate(0, 45)'><rect x='55' y='0' width='40' height='25' fill='none' stroke='#a16207' stroke-width='2'/><rect x='100' y='0' width='40' height='25' fill='none' stroke='#a16207' stroke-width='2'/></g><g transform='translate(0, 15)'><rect x='77.5' y='0' width='40' height='25' fill='none' stroke='#a16207' stroke-width='2'/></g></svg>", strategy: "Vận dụng quy luật 'Tổng hai ô dưới bằng ô trên'. Tính dần từ tầng thấp nhất lên tầng cao nhất.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Tính từ tầng đáy lên:<br>- Hàng thứ hai: Ô bên trái là $3 + 5 = 8$; Ô giữa là $5 + 2 = 7$ (đề đã cho); Ô bên phải là $2 + 6 = 8$.<br>- Hàng thứ ba: Ô bên trái là $8 + 7 = 15$; Ô bên phải là $7 + 8 = 15$.<br>- Hàng trên cùng (Đỉnh tháp): Lấy $15 + 15 = 30$.<br>Vậy số cần điền lên đỉnh tháp là <strong>$\\mathbf{\\color{red}{30}}$</strong>.</div>" },
{ t_title: "Bài 4", t_content: "Dọc theo hai bên của một con đường dài $30\\text{ m}$, người ta trồng các cột cờ. Cứ $5\\text{ m}$ lại trồng $1$ cột. Biết cả hai đầu đoạn đường đều có cột cờ. Hỏi người ta đã trồng tất cả bao nhiêu cột cờ?", strategy: "Bài toán trồng cây 2 bên đường. Tính số cột ở 1 bên (Số khoảng + 1), sau đó nhớ nhân đôi kết quả.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Hai bên đường: $30\\text{ m}$<br>Cách nhau: $5\\text{ m}$<br>Hai đầu: Có cột cờ<br>Tất cả: $\\dots$&nbsp;cột cờ?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Số khoảng cách trên đoạn đường đó là:<br>$30 : 5 = 6$&nbsp;(khoảng)<br>Vì hai đầu đều có cột cờ nên số cột cờ trồng ở một bên đường là:<br>$6 + 1 = 7$&nbsp;(cột)<br>Số cột cờ trồng ở cả hai bên đường là:<br>$7 \\times 2 = 14$&nbsp;(cột)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $14$&nbsp;cột cờ.</div>" },
{ t_title: "Bài 5", t_content: "Hiện nay, Minh $8$&nbsp;tuổi. Tuổi của mẹ Minh là số lớn nhất có hai chữ số mà hiệu hai chữ số đó bằng $5$. Hỏi khi Minh sinh ra, mẹ bao nhiêu tuổi?", strategy: "Bài toán gồm 2 bước. Bước 1: Dựa vào cấu tạo số để giải mã tuổi mẹ hiện nay. Bước 2: 'Khi Minh sinh ra' tức là lùi về quá khứ 8 năm trước. Lấy tuổi mẹ hiện tại trừ đi tuổi của Minh.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Số lớn nhất có hai chữ số là số có hàng chục là $9$. Vì hiệu hai chữ số bằng $5$ nên chữ số hàng đơn vị là $9 - 5 = 4$.<br>Số lớn nhất có hai chữ số mà hiệu hai chữ số bằng $5$ là $94$. Vậy hiện nay mẹ $94$&nbsp;tuổi.<br>Tuổi của mẹ khi sinh Minh ra là:<br>$94 - 8 = 86$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Mẹ $86$&nbsp;tuổi.</div>" },
{ t_title: "Bài 6", t_content: "Trong một chiếc hộp có ba loại bi: xanh, đỏ và vàng. Biết tổng số bi xanh và bi đỏ là $20$&nbsp;viên. Tổng số bi đỏ và bi vàng là $25$&nbsp;viên. Tổng số bi của cả ba loại trong hộp là $32$&nbsp;viên. Tính số bi mỗi loại có trong hộp.", strategy: "Sử dụng phương pháp bù trừ nhóm: Lấy tổng của cả 3 loại bi trừ đi tổng của 2 loại (xanh và đỏ) thì sẽ ra loại còn lại (vàng). Làm tương tự cho các màu khác.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Xanh + Đỏ = $20$&nbsp;viên<br>Đỏ + Vàng = $25$&nbsp;viên<br>Xanh + Đỏ + Vàng = $32$&nbsp;viên<br>Xanh: $\\dots$? Đỏ: $\\dots$? Vàng: $\\dots$?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Số viên bi vàng có trong hộp là:<br>$32 - 20 = 12$&nbsp;(viên)<br>Số viên bi đỏ có trong hộp là:<br>$25 - 12 = 13$&nbsp;(viên)<br>Số viên bi xanh có trong hộp là:<br>$20 - 13 = 7$&nbsp;(viên)<br>(Hoặc $32 - 25 = 7$ viên xanh)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Vàng: $12$&nbsp;viên, Đỏ: $13$&nbsp;viên, Xanh: $7$&nbsp;viên.</div>" }
]
});
