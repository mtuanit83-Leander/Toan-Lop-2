{ q_title: "Câu 6", q_content: "Tìm $x$, biết: $x - 12 = 45 + 5$.", options: ["A. $x = 50$", "B. $x = 62$", "C. $x = 38$", "D. $x = 40$"], correct_idx: 1, explain: "Tính vế phải trước: $45 + 5 = 50$. Ta có bài toán tìm số bị trừ: $x - 12 = 50 \\Rightarrow x = 50 + 12 = 62$." },
{ q_title: "Câu 7", q_content: "Hôm nay là Chủ nhật, ngày $12$ của tháng. Hỏi thứ Ba tuần sau là ngày mấy của tháng đó?", options: ["A. Ngày $14$", "B. Ngày $19$", "C. Ngày $21$", "D. Ngày $20$"], correct_idx: 2, explain: "Tuần này Chủ nhật là 12, vậy Chủ nhật tuần sau là $12 + 7 = 19$. Đếm tiến lên: Thứ Hai tuần sau là 20, thứ Ba tuần sau là ngày $21$." },
{ q_title: "Câu 8", q_content: "Hoa có $12$&nbsp;nhãn vở. Hoa có NHIỀU HƠN Hồng $4$&nbsp;nhãn vở. Hỏi Hồng có bao nhiêu nhãn vở?", options: ["A. $16$&nbsp;nhãn vở", "B. $8$&nbsp;nhãn vở", "C. $4$&nbsp;nhãn vở", "D. $10$&nbsp;nhãn vở"], correct_idx: 1, explain: "Bẫy câu chữ: Hoa 'nhiều hơn' Hồng nghĩa là Hồng 'ít hơn' Hoa. Vậy số nhãn vở của Hồng là: $12 - 4 = 8$&nbsp;(nhãn vở)." },
{ q_title: "Câu 9", q_content: "Nếu viết thêm một chữ số $0$ vào bên phải số $5$ thì số đó sẽ tăng thêm bao nhiêu đơn vị?", options: ["A. $50$&nbsp;đơn vị", "B. $0$&nbsp;đơn vị", "C. $45$&nbsp;đơn vị", "D. $10$&nbsp;đơn vị"], correct_idx: 2, explain: "Khi viết thêm số 0 vào bên phải số 5, ta được số $50$. So với số ban đầu, số đó đã tăng thêm lượng đơn vị là: $50 - 5 = 45$&nbsp;(đơn vị)." },
{ q_title: "Câu 10", q_content: "Tổng của số lớn nhất có $1$&nbsp;chữ số và số bé nhất có $2$&nbsp;chữ số KHÁC NHAU là:", options: ["A. $19$", "B. $20$", "C. $18$", "D. $109$"], correct_idx: 0, explain: "Số lớn nhất có 1 chữ số là 9. Số bé nhất có 2 chữ số KHÁC NHAU là 10. Tổng của hai số là: $9 + 10 = 19$." },
{ q_title: "Câu 11", q_content: "Một sợi dây dài $1\\text{ m}$. Bố cắt đi $2\\text{ dm}$ để buộc hàng. Hỏi sợi dây còn lại dài bao nhiêu xăng-ti-mét?", options: ["A. $80\\text{ cm}$", "B. $8\\text{ cm}$", "C. $12\\text{ cm}$", "D. $98\\text{ cm}$"], correct_idx: 0, explain: "Đổi về cùng đơn vị cm: $1\\text{ m} = 100\\text{ cm}$; $2\\text{ dm} = 20\\text{ cm}$. Đoạn dây còn lại là: $100 - 20 = 80\\text{ (cm)}$." },
{ q_title: "Câu 12", q_content: "Tìm quy luật và điền số thích hợp vào chỗ chấm: $1, 4, 7, 10, \\dots$", options: ["A. $11$", "B. $12$", "C. $13$", "D. $14$"], correct_idx: 2, explain: "Khoảng cách giữa các số tăng đều $+3$ đơn vị ($1+3=4; 4+3=7; 7+3=10$). Số tiếp theo là: $10 + 3 = 13$." }
],
tu_luan: [
{ t_title: "Bài 1", t_content: "Tính nhanh:<br><div class='text-xl text-center my-4'>$12 + 14 + 16 + 18$</div>", strategy: "WHAT (Đặc điểm các con số): Đây là dãy $4$&nbsp;số chẵn liên tiếp. Chữ số tận cùng là $2, 4, 6, 8$.<br>HOW (Ghép cặp tròn chục): Chữ số $2$ ghép với chữ số nào để tạo thành $10$? (Số $8$). Chữ số $4$ ghép với chữ số nào? (Số $6$).<br>WHY (Cách nhóm): Đảo vị trí và mở ngoặc để cộng các cặp tương ứng, biến bài toán thành phép cộng các số tròn chục.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>$12 + 14 + 16 + 18$</div><div>$= (12 + 18) + (14 + 16)$</div><div>$= 30 + 30$</div><div>$= 60$</div>" },
{ t_title: "Bài 2", t_content: "Tìm một số có hai chữ số. Biết rằng chữ số hàng chục gấp $3$&nbsp;lần chữ số hàng đơn vị và tổng của hai chữ số đó bằng $8$.", strategy: "WHAT (Dữ kiện thứ nhất): 'Chữ số hàng chục gấp 3 lần chữ số hàng đơn vị'. Hãy liệt kê các cặp số thoả mãn. (Ví dụ: Đơn vị là $1$ thì chục là $3$. Đơn vị là $2$ thì chục là $6\\dots$).<br>HOW (Kiểm tra dữ kiện thứ hai): Trong các cặp số vừa liệt kê, cộng chúng lại xem cặp nào có tổng bằng $8$?<br>WHAT NEXT (Chốt số): Khi đã tìm được cặp chữ số đúng, nhớ đặt đúng vị trí hàng chục và hàng đơn vị.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Vì chữ số hàng chục gấp $3$&nbsp;lần chữ số hàng đơn vị, nên ta thử các trường hợp:</div><div>- Nếu chữ số hàng đơn vị là $1$ thì chữ số hàng chục là $1 \\times 3 = 3$. Tổng: $3 + 1 = 4$ (Loại vì không bằng $8$).</div><div>- Nếu chữ số hàng đơn vị là $2$ thì chữ số hàng chục là $2 \\times 3 = 6$. Tổng: $6 + 2 = 8$ (Thoả mãn).</div><div>- Nếu chữ số hàng đơn vị là $3$ thì chữ số hàng chục là $3 \\times 3 = 9$. Tổng: $9 + 3 = 12$ (Loại).</div><div>Vậy chữ số hàng chục là $6$, chữ số hàng đơn vị là $2$.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: Số cần tìm là $62$.</div>" },
{ t_title: "Bài 3", t_content: "Dọc theo một đoạn đường dài $20\\text{ m}$, người ta trồng các cây bóng mát cách đều nhau. Cứ $5\\text{ m}$ lại có một cây. Hỏi người ta đã trồng tất cả bao nhiêu cây, biết rằng ở cả hai đầu của đoạn đường đều có cây?", strategy: "WHAT (Đoạn đường bị chia làm mấy khúc?): Đường dài $20\\text{m}$, mỗi khúc (khoảng cách) dài $5\\text{m}$. Hãy làm phép chia để tìm số khúc cây.<br>WHY (Tại sao số cây không bằng số khúc?): Hãy xoè bàn tay ra. Giữa 5 ngón tay có mấy khoảng trống? (4 khoảng). Vậy nếu trồng cây ở cả 2 đầu, số lượng cây bao giờ cũng phải nhiều hơn số khoảng trống là mấy?<br>HOW (Quy tắc): Lấy số khoảng trống cộng thêm $1$ sẽ ra số cây.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span></div><div>Đoạn đường dài: $20\\text{ m}$</div><div>Cách nhau: $5\\text{ m}$</div><div>Hai đầu đường: Đều có cây</div><div>Trồng tất cả: $\\dots$&nbsp;cây?</div><br><div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Đoạn đường được chia thành số khoảng cách là:</div><div>$20 : 5 = 4$&nbsp;(khoảng)</div><div>Vì trồng cây ở cả hai đầu đoạn đường, nên số cây luôn nhiều hơn số khoảng là $1$. Số cây đã được trồng là:</div><div>$4 + 1 = 5$&nbsp;(cây)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $5$&nbsp;cây.</div>" },
{ t_title: "Bài 4", t_content: "An có nhiều hơn Bình $8$&nbsp;viên bi. Nếu An lấy $3$&nbsp;viên bi của mình cho Bình thì bây giờ An còn nhiều hơn Bình bao nhiêu viên bi?", strategy: "WHAT (Bài toán thiếu gì?): Đề không cho An có bao nhiêu bi, Bình có bao nhiêu bi. Đề chỉ cho mức chênh lệch là $8$&nbsp;viên.<br>HOW (Sự thay đổi của người cho): Khi An cho đi $3$&nbsp;viên, khoảng cách chênh lệch ban đầu sẽ bị hụt mất $3$&nbsp;viên.<br>HOW (Sự thay đổi của người nhận): Khi Bình nhận thêm $3$&nbsp;viên, Bình lại tiến lên thu hẹp khoảng cách thêm $3$&nbsp;viên nữa.<br>WHY (Gộp biến động): Một lần chuyển bi làm ảnh hưởng đến TẢI TRỌNG CỦA CẢ HAI BÊN. Khoảng cách thực tế bị thu hẹp bằng hai lần số bi đem cho. (Lấy Hiệu ban đầu trừ đi số bi An mất, trừ tiếp số bi Bình được nhận).", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span></div><div>An hơn Bình: $8$&nbsp;viên bi.</div><div>An cho Bình: $3$&nbsp;viên bi.</div><div>Bây giờ An hơn Bình: $\\dots$&nbsp;viên bi?</div><br><div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Ban đầu An có nhiều hơn Bình $8$&nbsp;viên bi.</div><div>Khi An lấy $3$&nbsp;viên bi của mình cho Bình, thì số bi của An giảm đi $3$&nbsp;viên, đồng thời số bi của Bình tăng thêm $3$&nbsp;viên.</div><div>Lúc này, khoảng cách chênh lệch giữa hai bạn bị rút ngắn lại là:</div><div>$3 + 3 = 6$&nbsp;(viên bi)</div><div>Hiện tại, An còn nhiều hơn Bình số viên bi là:</div><div>$8 - 6 = 2$&nbsp;(viên bi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $2$&nbsp;viên bi.</div>" },
{ t_title: "Bài 5", t_content: "Một mảnh giấy hình chữ nhật có chiều dài $8\\text{ cm}$, chiều rộng $4\\text{ cm}$. Bạn Mai kẻ một đường thẳng cắt mảnh giấy đó thành hai mảnh hình vuông bằng nhau. Em hãy tính tổng chu vi của cả hai mảnh giấy hình vuông đó.", strategy: "WHAT (Cắt hình như thế nào?): Một hình chữ nhật $8 \\times 4$ cắt thành 2 hình vuông. Chiều dài $8\\text{cm}$ bị chia đôi thành $8 : 2 = 4\\text{ cm}$. Vậy ta có 2 hình vuông cạnh $4\\text{cm}$.<br>HOW (Tính chu vi 1 hình vuông): Hình vuông cạnh $4\\text{cm}$ có chu vi là bao nhiêu? (Lấy 4 cạnh cộng lại với nhau).<br>WHAT NEXT (Tính tổng chu vi 2 hình): Lấy chu vi 1 hình nhân đôi (hoặc cộng với chính nó).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Mảnh giấy hình chữ nhật có chiều dài $8\\text{ cm}$, khi cắt thành hai hình vuông bằng nhau thì chiều dài bị chia làm $2$&nbsp;phần. Độ dài cạnh của mỗi hình vuông là:</div><div>$8 : 2 = 4$&nbsp;(cm)</div><div>(Hình vuông tạo ra có cạnh $4\\text{ cm}$ bằng đúng với chiều rộng của hình chữ nhật, thoả mãn).</div><div>Chu vi của một mảnh giấy hình vuông là:</div><div>$4 + 4 + 4 + 4 = 16$&nbsp;(cm)</div><div>Tổng chu vi của cả hai mảnh giấy hình vuông là:</div><div>$16 + 16 = 32$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $32\\text{ cm}$.</div>" },
{ t_title: "Bài 6", t_content: "Nam có $6$&nbsp;tờ tiền gồm hai loại: loại $1$&nbsp;nghìn đồng và loại $2$&nbsp;nghìn đồng. Tổng số tiền Nam có là $9$&nbsp;nghìn đồng. Hỏi Nam có mấy tờ tiền $1$&nbsp;nghìn đồng, mấy tờ tiền $2$&nbsp;nghìn đồng?", strategy: "WHAT (Nếu tất cả là tờ tiền mệnh giá lớn nhất thì sao?): Hãy giả sử cả $6$&nbsp;tờ tiền Nam có ĐỀU LÀ loại $2$&nbsp;nghìn đồng. Khi đó Nam sẽ có tất cả bao nhiêu tiền?<br>WHY (Xuất hiện sự chênh lệch): Tính xem số tiền giả sử đó bị dôi ra (thừa ra) bao nhiêu so với con số $9$&nbsp;nghìn thực tế?<br>HOW (Đổi tiền để cân bằng): Tại sao lại bị thừa tiền? Vì ta đã biến những tờ $1$&nbsp;nghìn thành $2$&nbsp;nghìn. Mỗi lần biến 1 tờ như vậy, ta làm đội lên mấy nghìn? Lấy tổng số tiền dôi ra chia cho độ chênh của từng tờ, ta sẽ tìm được số tờ $1$&nbsp;nghìn.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>Giả sử cả $6$&nbsp;tờ tiền Nam có đều là loại $2$&nbsp;nghìn đồng. Lúc đó tổng số tiền là:</div><div>$2 \\times 6 = 12$&nbsp;(nghìn đồng)</div><div>Số tiền bị thừa ra so với thực tế là:</div><div>$12 - 9 = 3$&nbsp;(nghìn đồng)</div><div>Sở dĩ bị thừa $3$&nbsp;nghìn đồng là vì ta đã coi những tờ $1$&nbsp;nghìn đồng thành loại $2$&nbsp;nghìn đồng. Mỗi tờ $1$&nbsp;nghìn đồng bị tính đội lên số tiền là:</div><div>$2 - 1 = 1$&nbsp;(nghìn đồng)</div><div>Số tờ tiền loại $1$&nbsp;nghìn đồng là:</div><div>$3 : 1 = 3$&nbsp;(tờ)</div><div>Số tờ tiền loại $2$&nbsp;nghìn đồng là:</div><div>$6 - 3 = 3$&nbsp;(tờ)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $3$&nbsp;tờ loại $1$&nbsp;nghìn đồng; $3$&nbsp;tờ loại $2$&nbsp;nghìn đồng.</div>" }
]
});
</script>

{ q_title: "Câu 1", q_content: "Tìm $x$, biết: $20 : x = 4$.", options: ["A. $x = 16$", "B. $x = 24$", "C. $x = 5$", "D. $x = 6$"], correct_idx: 2, explain: "Muốn tìm số chia, ta lấy số bị chia chia cho thương. $x = 20 : 4 = 5$." },

{ q_title: "Câu 3", q_content: "Số bé nhất có ba chữ số KHÁC NHAU là số nào?", options: ["A. $100$", "B. $111$", "C. $123$", "D. $102$"], correct_idx: 3, explain: "Hàng trăm nhỏ nhất là 1, hàng chục nhỏ nhất là 0. Do chữ số phải khác nhau nên hàng đơn vị nhỏ nhất tiếp theo là 2. Vậy số đó là 102." },
{ q_title: "Câu 4", q_content: "Một hình tam giác lớn được kẻ $2$&nbsp;đường thẳng từ một đỉnh xuống cạnh đáy. Hỏi hình đó được chia thành tất cả bao nhiêu hình tam giác?<br><svg width='150' height='120' viewBox='0 0 100 86' class='mx-auto my-4'><polygon points='50,10 10,79 90,79' fill='none' stroke='#1d4ed8' stroke-width='2.5' stroke-linejoin='round'/><line x1='50' y1='10' x2='35' y2='79' stroke='#1d4ed8' stroke-width='2.5'/><line x1='50' y1='10' x2='65' y2='79' stroke='#1d4ed8' stroke-width='2.5'/></svg>", options: ["A. $3$&nbsp;hình", "B. $5$&nbsp;hình", "C. $6$&nbsp;hình", "D. $4$&nbsp;hình"], correct_idx: 2, explain: "Một tam giác bị cắt bởi 2 đường thẳng từ 1 đỉnh xuống đáy sẽ tạo ra 3 tam giác nhỏ đơn lẻ. Kéo theo 2 tam giác ghép đôi và 1 tam giác to nhất. Tổng: $3+2+1 = 6$&nbsp;hình." },
{ q_title: "Câu 5", q_content: "Hôm nay là thứ Năm, ngày mùng $8$. Hỏi thứ Năm tuần sau là ngày mùng mấy?", options: ["A. Ngày $14$", "B. Ngày $15$", "C. Ngày $16$", "D. Ngày $10$"], correct_idx: 1, explain: "Khoảng cách giữa hai thứ giống nhau trong hai tuần liên tiếp là 7 ngày. $8 + 7 = 15$. Vậy thứ Năm tuần sau là ngày 15." },
{ q_title: "Câu 6", q_content: "Lớp 2A có $30$&nbsp;học sinh. Lớp 2A có ÍT HƠN lớp 2B là $5$&nbsp;học sinh. Hỏi lớp 2B có bao nhiêu học sinh?", options: ["A. $25$&nbsp;học sinh", "B. $30$&nbsp;học sinh", "C. $35$&nbsp;học sinh", "D. $20$&nbsp;học sinh"], correct_idx: 2, explain: "Lớp 2A ít hơn lớp 2B, tức là lớp 2B nhiều hơn lớp 2A. Số học sinh lớp 2B là: $30 + 5 = 35$&nbsp;(học sinh)." },
{ q_title: "Câu 7", q_content: "Tìm số có hai chữ số, biết chữ số hàng chục là $7$ và chữ số hàng đơn vị kém chữ số hàng chục $3$&nbsp;đơn vị.", options: ["A. $73$", "B. $47$", "C. $74$", "D. $37$"], correct_idx: 2, explain: "Chữ số hàng chục là 7. Chữ số hàng đơn vị kém chữ số hàng chục 3 đơn vị nên là: $7 - 3 = 4$. Vậy số đó là 74." },
{ q_title: "Câu 8", q_content: "Trong một phép trừ, nếu ta giữ nguyên số trừ và TĂNG số bị trừ thêm $10$&nbsp;đơn vị thì hiệu mới sẽ thay đổi như thế nào?", options: ["A. Giảm đi $10$&nbsp;đơn vị", "B. Tăng thêm $10$&nbsp;đơn vị", "C. Không thay đổi", "D. Tăng thêm $5$&nbsp;đơn vị"], correct_idx: 1, explain: "Số bị trừ đóng vai trò như 'số vốn ban đầu'. Khi số bị trừ tăng thì kết quả (hiệu) cũng sẽ tăng lên một lượng tương ứng. Vậy hiệu mới tăng thêm 10 đơn vị." },
{ q_title: "Câu 9", q_content: "Một ngày có $24$&nbsp;giờ. Hỏi $\\frac{1}{3}$ ngày là bao nhiêu giờ?", options: ["A. $3$&nbsp;giờ", "B. $6$&nbsp;giờ", "C. $12$&nbsp;giờ", "D. $8$&nbsp;giờ"], correct_idx: 3, explain: "Lấy tổng số giờ của 1 ngày chia cho 3: $24 : 3 = 8$&nbsp;(giờ)." },
{ q_title: "Câu 10", q_content: "Điền số thích hợp vào chỗ chấm: $5, 10, 15, \\dots, 25$.", options: ["A. $16$", "B. $18$", "C. $20$", "D. $24$"], correct_idx: 2, explain: "Đây là dãy số đếm thêm 5. Số đứng trước 25 và đứng sau 15 là 20." },
{ q_title: "Câu 11", q_content: "Trong nhóm trẻ, có $10$&nbsp;bé thích ăn kem, $8$&nbsp;bé thích ăn kẹo. Trong đó có $3$&nbsp;bé thích ăn CẢ kem và kẹo. Hỏi nhóm đó có tất cả bao nhiêu bé (biết bé nào cũng thích ít nhất 1 món)?", options: ["A. $18$&nbsp;bé", "B. $15$&nbsp;bé", "C. $21$&nbsp;bé", "D. $11$&nbsp;bé"], correct_idx: 1, explain: "Lấy tổng số bé thích kem cộng số bé thích kẹo rồi trừ đi số bé trùng lặp (thích cả hai): $10 + 8 - 3 = 15$&nbsp;(bé)." },
{ q_title: "Câu 12", q_content: "Bạn Lan cao hơn bạn Hoa. Bạn Hoa cao hơn bạn Mai. Bạn Bình lại cao hơn bạn Lan. Hỏi trong 4 bạn, ai là người thấp nhất?", options: ["A. Bạn Hoa", "B. Bạn Bình", "C. Bạn Lan", "D. Bạn Mai"], correct_idx: 3, explain: "Dùng sơ đồ sắp xếp chiều cao từ thấp đến cao: Mai < Hoa < Lan < Bình. Vậy Mai là người thấp nhất." }

tu_luan: [
{ t_title: "Bài 1", t_content: "Tính nhanh biểu thức sau: <div class='text-center text-xl my-4'>$45 + 35 + 25 + 15 - 5 - 15 - 25 - 35$</div>", strategy: "WHAT (Có những cặp số nào giống nhau?): Hãy nhìn vào các số mang dấu cộng và các số mang dấu trừ. Ta thấy sự xuất hiện của 35, 25, 15 ở cả hai bên.<br>HOW (Triệt tiêu như thế nào?): Ta có thể nhóm các số bị trừ và số trừ giống nhau lại thành từng cặp (Ví dụ: $35 - 35 = 0$).<br>WHAT NEXT (Số nào bị thừa ra?): Có số 45 mang dấu cộng, nhưng số trừ đi lại là số 5. Hãy nhóm chúng lại thành phép tính cuối cùng.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>$45 + 35 + 25 + 15 - 5 - 15 - 25 - 35$<br>$= (45 - 5) + (35 - 35) + (25 - 25) + (15 - 15)$<br>$= 40 + 0 + 0 + 0$<br>$= 40$</div>" },
{ t_title: "Bài 2", t_content: "Cách đây $3$&nbsp;năm, bố hơn con $28$&nbsp;tuổi. Hiện nay con $8$&nbsp;tuổi. Hỏi hiện nay bố bao nhiêu tuổi?", strategy: "WHAT (Cái bẫy thời gian là gì?): Đề bài cho biết 'Cách đây 3 năm, bố hơn con 28 tuổi'. Liệu hiện nay khoảng cách tuổi đó có bị thay đổi không?<br>WHY (Nguyên lý bất biến): Khoảng cách tuổi giữa hai người luôn giữ nguyên dù là 3 năm trước, hiện tại hay 10 năm sau.<br>HOW (Tìm tuổi bố hiện tại): Ta đã biết hiện nay con 8 tuổi, và bố luôn luôn hơn con 28 tuổi. Ta làm phép tính gì để ra tuổi bố?", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Hiệu số tuổi của hai người không bao giờ thay đổi theo thời gian. Dù là cách đây $3$&nbsp;năm hay hiện nay thì bố vẫn luôn luôn hơn con $28$&nbsp;tuổi.<br>Hiện nay con $8$&nbsp;tuổi, vậy tuổi của bố hiện nay là:<br>$8 + 28 = 36$&nbsp;(tuổi)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $36$&nbsp;tuổi.</div>" },
{ t_title: "Bài 3", t_content: "Giá sách có $2$&nbsp;ngăn. Ngăn trên có $28$&nbsp;quyển sách, ngăn dưới có $16$&nbsp;quyển sách. Hỏi phải chuyển bao nhiêu quyển sách từ ngăn trên xuống ngăn dưới để ngăn trên CHỈ CÒN nhiều hơn ngăn dưới đúng $2$&nbsp;quyển sách?", strategy: "WHAT (Khoảng cách hiện tại là bao nhiêu?): Ngăn trên 28, ngăn dưới 16. Khoảng cách đang là $28 - 16 = 12$ quyển.<br>WHERE (Mục tiêu cần đạt): Chúng ta muốn khoảng cách chênh lệch này tụt xuống chỉ còn 2 quyển. Tức là khoảng cách phải 'bị tiêu diệt' mất bao nhiêu quyển? ($12 - 2 = 10$ quyển).<br>HOW (Mỗi quyển sách chuyển đi có sức mạnh gì?): Khi lấy 1 quyển ở trên đưa xuống dưới, ngăn trên mất đi 1, ngăn dưới lại tăng 1. Vậy khoảng cách giữa 2 ngăn sẽ được thu hẹp mấy quyển? (Thu hẹp 2 quyển).<br>WHAT NEXT: Để thu hẹp 10 quyển chênh lệch, ta cần chuyển bao nhiêu lần 2 quyển như thế?", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Hiện tại, ngăn trên đang nhiều hơn ngăn dưới số quyển sách là:<br>$28 - 16 = 12$&nbsp;(quyển)<br>Đề bài yêu cầu ngăn trên chỉ còn nhiều hơn ngăn dưới $2$&nbsp;quyển. Vậy số lượng sách chênh lệch cần phải bị triệt tiêu đi là:<br>$12 - 2 = 10$&nbsp;(quyển)<br>Cứ chuyển $1$&nbsp;quyển sách từ ngăn trên xuống ngăn dưới thì khoảng cách chênh lệch giữa hai ngăn sẽ bị rút ngắn đi $2$&nbsp;quyển. Số quyển sách cần phải chuyển đi là:<br>$10 : 2 = 5$&nbsp;(quyển)<br><em>(Kiểm tra lại: Ngăn trên còn $28 - 5 = 23$. Ngăn dưới thành $16 + 5 = 21$. $23 - 21 = 2$. Thoả mãn!)</em></div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $5$&nbsp;quyển sách.</div>" },
{ t_title: "Bài 4", t_content: "Tìm một số có hai chữ số, biết rằng tổng hai chữ số của số đó bằng $10$. Nếu đổi chỗ hai chữ số cho nhau thì ta được một số mới lớn hơn số ban đầu $36$&nbsp;đơn vị.", strategy: "WHAT (Tìm danh sách ứng viên): Tổng hai chữ số bằng 10, vậy có những số có hai chữ số nào thoả mãn? (Liệt kê: 19, 28, 37, 46, 55, 64, 73, 82, 91).<br>HOW (Loại trừ dần): Nếu số mới LỚN HƠN số cũ, thì chữ số hàng chục ban đầu phải BÉ HƠN chữ số hàng đơn vị. Vậy ta chỉ cần giữ lại: 19, 28, 37, 46.<br>WHEN (Thử nghiệm tìm đáp án):<br>- Lấy 19, đổi thành 91. Thử trừ: $91 - 19 = 72$ (Loại vì cần bằng 36).<br>- Lấy 28, đổi thành 82. Thử trừ: $82 - 28 = 54$ (Loại).<br>- Hãy thử tiếp với 37 xem sao?", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Các số có hai chữ số mà tổng các chữ số bằng $10$ là: $19, 28, 37, 46, 55, 64, 73, 82, 91$.<br>Vì khi đổi chỗ hai chữ số ta được số mới lớn hơn số ban đầu, nên chữ số hàng chục phải nhỏ hơn chữ số hàng đơn vị. Các số thoả mãn là: $19, 28, 37, 46$.<br>Ta thử từng trường hợp:<br>- Nếu là số $19$: Số mới là $91$. $91 - 19 = 72$ (Loại)<br>- Nếu là số $28$: Số mới là $82$. $82 - 28 = 54$ (Loại)<br>- Nếu là số $37$: Số mới là $73$. $73 - 37 = 36$ (Đúng với yêu cầu đề bài).<br>Vậy số ban đầu cần tìm là $37$.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $37$.</div>" },
{ t_title: "Bài 5", t_content: "Bác thợ in dùng các chữ số bằng chì để đánh số thứ tự các trang của một cuốn vở mỏng. Bác đã phải dùng tất cả $39$&nbsp;chữ số. Hỏi cuốn vở đó có bao nhiêu trang? (Biết trang đầu tiên đánh số 1).", strategy: "WHAT (Phân loại trang sách): Từ trang 1 đến trang 9 là những trang chỉ dùng 1 chữ số. Từ trang 10 trở đi là những trang dùng 2 chữ số.<br>HOW (Tính số lượng chữ số đã dùng cho nhóm đầu tiên): Từ trang 1 đến trang 9 có 9 trang. Vậy tốn bao nhiêu chữ số?<br>WHAT NEXT (Xử lý phần còn lại): Bác thợ in có tổng cộng 39 chữ số. Bác đã dùng 9 chữ số cho 9 trang đầu. Bác còn lại bao nhiêu chữ số?<br>WHY (Tính số trang nhóm 2): Các chữ số còn lại đều bị ghép đôi (2 chữ số 1 trang). Vậy với số chữ số còn lại đó, bác in được bao nhiêu trang nữa? Cộng 9 trang đầu với số trang in thêm sẽ ra tổng số trang.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Từ trang $1$ đến trang $9$ có $9$&nbsp;trang. Số chữ số cần dùng là:<br>$9 \\times 1 = 9$&nbsp;(chữ số)<br>Số chữ số còn lại để đánh các trang có hai chữ số (từ trang $10$ trở đi) là:<br>$39 - 9 = 30$&nbsp;(chữ số)<br>Vì mỗi trang này cần dùng $2$&nbsp;chữ số, nên số trang có hai chữ số là:<br>$30 : 2 = 15$&nbsp;(trang)<br>Tổng số trang của cuốn vở đó là:<br>$9 + 15 = 24$&nbsp;(trang)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $24$&nbsp;trang.</div>" },
{ t_title: "Bài 6", t_content: "Các bạn học sinh lớp 2A xếp thành một hàng dọc để vào lớp. Bạn Nam đếm thấy mình đứng thứ $10$ từ trên xuống. Bạn Hùng lại đếm thấy mình đứng thứ $9$ từ dưới lên. Biết rằng hàng dọc đó có tất cả $15$&nbsp;bạn. Hỏi có bao nhiêu bạn đang đứng ở giữa Nam và Hùng?", strategy: "WHAT (Cái bẫy là gì?): Có 15 bạn mà Nam đứng thứ 10 từ trên xuống, Hùng đứng thứ 9 từ dưới lên. Chú ý: $10 + 9 = 19$, vượt quá số lượng 15 bạn. Chứng tỏ vị trí của Nam và Hùng bị 'đan chéo' (chồng lấn) lên nhau! Hùng đã đứng vượt lên trên Nam.<br>HOW (Dịch vị trí của Hùng về cùng 1 hệ quy chiếu): Hùng đứng thứ 9 từ dưới lên. Vậy đằng sau Hùng có 8 bạn. Phía trước Hùng sẽ có bao nhiêu bạn? Lấy 15 (tổng) trừ đi 8 bạn phía sau, trừ đi 1 (chính là Hùng), ta sẽ biết Hùng đứng thứ mấy từ trên xuống.<br>WHAT NEXT (Đếm số người kẹp giữa): Khi đã biết vị trí của cả Nam và Hùng tính từ đầu hàng, hãy liệt kê các số nằm kẹp giữa 2 bạn đó.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Bạn Nam đứng thứ $10$ từ trên xuống.<br>Bạn Hùng đứng thứ $9$ từ dưới lên. Tức là đằng sau bạn Hùng có $8$&nbsp;bạn. Vị trí của bạn Hùng nếu tính từ trên xuống là:<br>$15 - 8 = 7$ (Tức là Hùng đứng thứ $7$ từ trên xuống).<br>Ta vẽ sơ đồ vị trí từ đầu hàng: ... (vị trí 7: Hùng) - (vị trí 8) - (vị trí 9) - (vị trí 10: Nam) ...<br>Nhìn vào sơ đồ, ta thấy nằm kẹp giữa Hùng (vị trí 7) và Nam (vị trí 10) là vị trí số $8$ và vị trí số $9$.<br>Vậy có tất cả $2$&nbsp;bạn đang đứng ở giữa Nam và Hùng.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $2$&nbsp;bạn.</div>" }
]

{ t_title: "Bài 1", t_content: "Tính nhanh biểu thức sau: <div class='text-center text-xl my-4'>$100 - 12 - 18 - 24 - 26$</div>", strategy: "WHAT (Quan sát dãy số): Đây là một số $100$ trừ liên tiếp cho $4$&nbsp;con số nhỏ. Các con số nhỏ này có đặc điểm gì ở hàng đơn vị? ($2$ ghép với $8$; $4$ ghép với $6$).<br>HOW (Cách nhóm để trừ nhẩm): Ta không thể tự ý đổi dấu trừ thành cộng bừa bãi. Hãy trừ lần lượt từng cụm tròn chục.<br>WHAT NEXT: Tính $(100 - 12 - 18)$ trước. Bản chất là lấy $100$ trừ đi tổng của $(12 + 18)$. Sau đó lấy kết quả trừ tiếp cho $(24 + 26)$.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>$100 - 12 - 18 - 24 - 26$<br>$= 100 - (12 + 18) - (24 + 26)$<br>$= 100 - 30 - 50$<br>$= 70 - 50$<br>$= 20$</div>" },
{ t_title: "Bài 2", t_content: "Tìm một số có ba chữ số. Biết rằng chữ số hàng trăm gấp đôi chữ số hàng chục, và chữ số hàng chục lại gấp $3$&nbsp;lần chữ số hàng đơn vị.", strategy: "WHERE (Bắt đầu từ đâu?): Cấu tạo số gồm Trăm - Chục - Đơn vị. Mối quan hệ được đẩy dần từ Đơn vị lên Chục, rồi từ Chục lên Trăm. Hãy chọn hàng Đơn vị làm gốc để thử nghiệm.<br>HOW (Thử nghiệm các trường hợp):<br>- Nếu hàng đơn vị là $1 \\rightarrow$ Hàng chục là mấy? Hàng trăm là mấy?<br>- Nếu hàng đơn vị là $2 \\rightarrow$ Hàng chục là $2 \\times 3 = 6$. Hàng trăm là $6 \\times 2 = 12$. Chữ số hàng trăm có thể là $12$ được không?<br>WHY: Tại sao chỉ có 1 đáp án duy nhất? Vì nếu hàng đơn vị vượt quá 1 thì hàng trăm sẽ lớn hơn 9 (không còn là chữ số nữa).", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta xét chữ số từ hàng đơn vị:<br>- Nếu chữ số hàng đơn vị là $1$: Chữ số hàng chục gấp $3$&nbsp;lần hàng đơn vị nên là: $1 \\times 3 = 3$. Chữ số hàng trăm gấp đôi hàng chục nên là: $3 \\times 2 = 6$. Ta được số: <strong>$631$</strong> (Hợp lý).<br>- Nếu chữ số hàng đơn vị là $2$: Chữ số hàng chục là: $2 \\times 3 = 6$. Chữ số hàng trăm là: $6 \\times 2 = 12$. (Không hợp lý vì $12$ không phải là chữ số có $1$&nbsp;chữ số).<br>Vậy số có ba chữ số duy nhất thỏa mãn đề bài là $631$.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $631$.</div>" },
{ t_title: "Bài 3", t_content: "Bác thợ mộc ghép $3$&nbsp;mảnh gỗ hình vuông nhỏ bằng nhau thành một hình chữ nhật dài (các mảnh gỗ ghép nối tiếp nhau thành 1 hàng). Biết cạnh của mỗi hình vuông nhỏ là $5\\text{cm}$. Em hãy tính chu vi của hình chữ nhật vừa được ghép thành.", strategy: "WHAT (Tưởng tượng hình ghép): Khi xếp $3$&nbsp;hình vuông sát vào nhau thành $1$&nbsp;hàng ngang, ta sẽ được một hình chữ nhật dài.<br>HOW (Tính kích thước hình chữ nhật):<br>- Chiều rộng của hình chữ nhật này chính là cạnh của 1 hình vuông ($5\\text{cm}$).<br>- Chiều dài của hình chữ nhật này là 3 cạnh hình vuông ghép lại. Vậy chiều dài là bao nhiêu? ($5 + 5 + 5$).<br>WHAT NEXT (Tính chu vi): Đã có chiều dài và chiều rộng, hãy lấy (dài + rộng) $\\times 2$. Hoặc cộng $4$&nbsp;cạnh xung quanh lại.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi ghép $3$&nbsp;hình vuông thành 1 hàng, ta được hình chữ nhật có chiều rộng bằng cạnh của hình vuông là $5\\text{cm}$.<br>Chiều dài của hình chữ nhật được ghép từ 3 cạnh hình vuông nên có độ dài là:<br>$5 + 5 + 5 = 15$&nbsp;(cm)<br>Chu vi của hình chữ nhật đó là:<br>$15 + 5 + 15 + 5 = 40$&nbsp;(cm)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $40\\text{ cm}$.</div>" },
{ t_title: "Bài 4", t_content: "Hai rổ cam có tổng cộng $50$&nbsp;quả. Nếu chuyển $5$&nbsp;quả từ rổ thứ nhất sang rổ thứ hai thì rổ thứ nhất VẪN nhiều hơn rổ thứ hai $2$&nbsp;quả. Hỏi lúc đầu rổ thứ nhất có bao nhiêu quả cam?", strategy: "WHAT (Bài toán LÚC SAU): Dù có chuyển cam qua lại, thì TỔNG số cam của hai rổ vẫn luôn là 50 quả.<br>HOW (Tìm số cam lúc sau): Lúc sau, rổ 1 nhiều hơn rổ 2 là 2 quả, mà tổng là 50. Ta có thể suy luận: Nếu lấy tổng (50) trừ đi phần hơn (2), ta sẽ ra 2 phần bằng nhau của rổ nhỏ. Lấy số đó chia đôi ra số rổ 2 lúc sau.<br>WHEN (Quay về lúc đầu): Tìm được rổ 1 lúc sau, ta CỘNG TRẢ LẠI 5 quả đã cho đi thì sẽ ra rổ 1 lúc đầu.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi chuyển cam qua lại, tổng số cam của hai rổ luôn không đổi và bằng $50$&nbsp;quả.<br>Lúc sau, rổ thứ nhất nhiều hơn rổ thứ hai $2$&nbsp;quả. Nếu ta bỏ bớt $2$&nbsp;quả ở rổ thứ nhất ra ngoài thì số cam ở hai rổ sẽ bằng nhau. Lúc đó tổng số cam là:<br>$50 - 2 = 48$&nbsp;(quả)<br>Lúc sau, rổ thứ hai có số quả cam là:<br>$48 : 2 = 24$&nbsp;(quả)<br>Lúc sau, rổ thứ nhất có số quả cam là:<br>$24 + 2 = 26$&nbsp;(quả)<br>Vì rổ thứ nhất đã chuyển đi $5$&nbsp;quả mới còn $26$&nbsp;quả, nên lúc đầu rổ thứ nhất có số quả cam là:<br>$26 + 5 = 31$&nbsp;(quả)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $31$&nbsp;quả cam.</div>" },
{ t_title: "Bài 5", t_content: "Một bãi xe có $12$&nbsp;chiếc xe gồm hai loại: xe đạp (mỗi xe có $2$&nbsp;bánh) và xe xích lô (mỗi xe có $3$&nbsp;bánh). Bác bảo vệ đếm được tất cả có $28$&nbsp;chiếc bánh xe. Hỏi trong bãi có bao nhiêu chiếc xe đạp, bao nhiêu chiếc xe xích lô?", strategy: "WHAT IF (Giả sử toàn bộ là 1 loại): Bãi xe có 12 chiếc. Hãy thử tưởng tượng nếu TẤT CẢ 12 chiếc đều là xe đạp (mỗi xe 2 bánh) thì bãi xe đó sẽ có tổng cộng bao nhiêu bánh?<br>WHY (Sự chênh lệch): Tính ra sẽ thấy số bánh xe giả sử ít hơn số bánh xe thực tế (28 bánh). Tại sao lại bị thiếu (hụt)?<br>HOW (Bù đắp sự thiếu hụt): Bị thiếu bánh là vì ta đã lỡ ép những chiếc xích lô (3 bánh) hóa thành xe đạp (2 bánh). Mỗi chiếc xích lô bị ta 'làm mất' mấy bánh? Lấy tổng số bánh bị hụt chia cho số bánh hụt của 1 xe, ta sẽ ra số xe xích lô.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Giả sử cả $12$&nbsp;chiếc xe trong bãi đều là xe đạp. Khi đó tổng số bánh xe là:<br>$12 \\times 2 = 24$&nbsp;(bánh xe)<br>Số bánh xe bị thiếu so với thực tế là:<br>$28 - 24 = 4$&nbsp;(bánh xe)<br>Sở dĩ bị thiếu $4$&nbsp;bánh xe là do ta đã tính những chiếc xe xích lô thành xe đạp. Mỗi chiếc xe xích lô bị tính hụt đi số bánh là:<br>$3 - 2 = 1$&nbsp;(bánh xe)<br>Số chiếc xe xích lô trong bãi là:<br>$4 : 1 = 4$&nbsp;(chiếc)<br>Số chiếc xe đạp trong bãi là:<br>$12 - 4 = 8$&nbsp;(chiếc)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $8$&nbsp;xe đạp, $4$&nbsp;xe xích lô.</div>" },
{ t_title: "Bài 6", t_content: "Một con ốc sên rơi xuống một cái hố sâu $8\\text{m}$. Ban ngày ốc sên cố gắng bò lên được $3\\text{m}$, nhưng ban đêm ngủ quên nên bị tuột xuống $2\\text{m}$. Hỏi sau bao nhiêu ngày đêm thì ốc sên mới bò lên được đến miệng hố? (Biết ốc sên bắt đầu bò từ lúc sáng sớm).", strategy: "WHAT (Tốc độ thực tế mỗi ngày): Ban ngày bò lên $3\\text{m}$, đêm tụt xuống $2\\text{m}$. Vậy sau trọn vẹn 1 ngày đêm, ốc sên chỉ nhích lên được thực tế là bao nhiêu mét? ($3 - 2 = 1\\text{m}$).<br>WHERE (Cái bẫy thời gian nằm ở đâu?): Đừng lấy $8 : 1 = 8$&nbsp;ngày! Hãy cẩn thận. Ở một ngày nào đó gần đỉnh, khi ốc sên bò lên $3\\text{m}$ vào ban ngày, nó ĐÃ CHẠM ĐẾN MIỆNG HỐ. Khi đã lên tới miệng hố thì nó bò ra ngoài luôn, không bị tụt xuống vào ban đêm nữa.<br>HOW (Mô phỏng từng ngày):<br>- Hết ngày đêm 1: Lên được $1\\text{m}$.<br>- Hết ngày đêm 2: Lên được $2\\text{m}$... Hãy lập bảng hoặc suy luận điểm xuất phát của ngày cuối cùng.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span><br>Cứ sau $1$&nbsp;ngày và $1$&nbsp;đêm, thực tế ốc sên bò lên được số mét là:<br>$3 - 2 = 1$&nbsp;(m)<br>Ta xét hành trình của ốc sên:<br>- Sau $5$&nbsp;ngày và $5$&nbsp;đêm, ốc sên ở độ cao: $1 \\times 5 = 5$&nbsp;(m).<br>- Đến sáng ngày thứ 6, ốc sên bắt đầu bò từ vạch $5\\text{m}$. Trong ban ngày, ốc sên bò lên được $3\\text{m}$. Nó đạt tới độ cao:<br>$5 + 3 = 8$&nbsp;(m).<br>Vì cái hố sâu $8\\text{m}$, nên ngay trong ban ngày của ngày thứ 6, ốc sên đã bò lên đến miệng hố và thoát ra ngoài. Nó không bị tụt xuống vào ban đêm nữa.<br>Vậy ốc sên mất $5$&nbsp;ngày rưỡi (chính xác là 6 ban ngày và 5 ban đêm) để thoát ra. Tính theo đơn vị ngày thì là chạm mốc ngày thứ 6.</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $6$&nbsp;ngày.</div>" }
]
});
</script>

tu_luan: [
{ t_title: "Bài 1", t_content: "Tính nhanh biểu thức sau: $11 + 13 + 15 + 17 + 19$", strategy: "Quan sát dãy số, đây là 5 số lẻ liên tiếp. Hãy bắt cặp số đầu với số cuối để tạo thành số tròn chục.", solution: "<div><span class='font-bold text-blue-700'>Bài giải:</span></div><div>$11 + 13 + 15 + 17 + 19$</div><div>$= (11 + 19) + (13 + 17) + 15$</div><div>$= 30 + 30 + 15$</div><div>$= 75$</div>" },
{ t_title: "Bài 2", t_content: "Bạn Nam có $15$&nbsp;viên bi. Bạn Nam có nhiều hơn Bình $5$&nbsp;viên bi, nhưng lại có ít hơn Hoa $3$&nbsp;viên bi. Hỏi cả ba bạn có tất cả bao nhiêu viên bi?", strategy: "Mọi sự so sánh đều lấy bạn Nam làm gốc. Tính số bi của Bình và Hoa dựa trên Nam.", solution: "<div><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Nam: $15$&nbsp;viên bi.<br>Bình ít hơn Nam: $5$&nbsp;viên.<br>Hoa nhiều hơn Nam: $3$&nbsp;viên.<br>Tổng: $\\dots$&nbsp;viên?</div><div class='mt-4'><span class='font-bold text-blue-700'>Bài giải:</span><br>Bình có số viên bi là:<br>$15 - 5 = 10$&nbsp;(viên)<br>Hoa có số viên bi là:<br>$15 + 3 = 18$&nbsp;(viên)<br>Cả ba bạn có tất cả số viên bi là:<br>$15 + 10 + 18 = 43$&nbsp;(viên)</div><div class='font-bold mt-2 text-indigo-700'>Đáp số: $43$&nbsp;viên bi.</div>" },

{ t_title: "Bài 1", t_content: "Tính nhanh: <div class='text-center text-xl my-4'>$1 + 2 + 3 + 4 + 5 + 6 + 7 + 8 + 9$</div>", strategy: "WHAT (Quan sát dãy số): Đây là các số tăng dần từ 1 đến 9.<br>HOW (Góp nhặt cặp 10): Số đầu tiên (1) cộng với số cuối cùng (9) bằng bao nhiêu? Số (2) cộng với số gần cuối (8) bằng bao nhiêu?<br>WHERE (Ai bị lẻ loi?): Nếu cứ ghép cặp 2 số từ ngoài vào trong, số nào sẽ đứng chơ vơ ở giữa không được ghép? (Số 5).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>$1 + 2 + 3 + 4 + 5 + 6 + 7 + 8 + 9$<br>$= (1 + 9) + (2 + 8) + (3 + 7) + (4 + 6) + 5$<br>$= 10 + 10 + 10 + 10 + 5$<br>$= 40 + 5 = 45$</li>" },
{ t_title: "Bài 2", t_content: "Tìm một số có một chữ số. Biết rằng nếu viết thêm chữ số $2$ vào bên phải số đó thì ta được một số mới lớn hơn số ban đầu $38$ đơn vị.", strategy: "WHAT (Viết số): Số cần tìm có 1 chữ số (gọi là $\\square$). Khi viết thêm chữ số 2 vào bên phải, ta được $\\square 2$.<br>HOW (Phép trừ đặt tính): Số mới LỚN HƠN số cũ 38 đơn vị. Ta có phép trừ $\\square 2 - \\square = 38$.<br>WHY (Tính hàng đơn vị trước): Ở hàng đơn vị, $2$ trừ $\\square$ bằng $8$. Không trừ được, lấy $12 - \\square = 8 \\Rightarrow \\square = 4$. Thử lại $42 - 4 = 38$ (Đúng).", solution: "<li>Gọi số có một chữ số cần tìm là $\\square$. Khi viết thêm chữ số $2$ vào bên phải, ta được số mới có dạng: $\\square 2$.</li><li>Số mới lớn hơn số cũ $38$ đơn vị, ta có phép tính: $\\square 2 - \\square = 38$.</li><li>Nhẩm theo cột dọc ở hàng đơn vị: $2$ không trừ được một số để bằng $8$. Ta lấy $12$ trừ đi $\\square$ bằng $8$. Vậy $\\square = 12 - 8 = 4$. Số cần tìm là $4$.</li><li>Thử lại: $42 - 4 = 38$ (Thỏa mãn).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $4$.</li>" },
{ t_title: "Bài 3", t_content: "Tháng Hai của một năm thường có $28$ ngày. Em hãy tính xem tháng Hai đó có chính xác bao nhiêu ngày Chủ nhật?", strategy: "WHAT (Kiến thức thời gian): Một tuần lễ có tất cả bao nhiêu ngày? (7 ngày). Trong 1 tuần lễ có mấy ngày Chủ nhật? (Chỉ có 1 ngày).<br>HOW (Chia nhóm): Tháng Hai có 28 ngày. Ta hãy gom 28 ngày này thành các tuần. Làm phép tính chia $28 : 7$ để xem 28 ngày được chia thành đúng bao nhiêu tuần.", solution: "<li>Một tuần lễ có $7$ ngày và mỗi tuần lễ có đúng $1$ ngày Chủ nhật.</li><li>Tháng Hai có $28$ ngày. Số tuần lễ trong tháng Hai đó là:<br>$28 : 7 = 4$ (tuần lễ).</li><li>Tháng Hai có đúng $4$ tuần lễ trọn vẹn, do đó tháng đó có chính xác $4$ ngày Chủ nhật.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $4$ ngày Chủ nhật.</li>" },
{ t_title: "Bài 4", t_content: "Cô giáo có một túi kẹo. Cô đem chia cho $5$ bạn học sinh, mỗi bạn được nhận $4$ chiếc kẹo thì trong túi cô vẫn còn thừa lại $2$ chiếc kẹo. Hỏi lúc đầu trong túi cô giáo có tất cả bao nhiêu chiếc kẹo?", strategy: "WHAT (Xác định các thành phần): Số kẹo lúc đầu = Số kẹo ĐÃ CHIA + Số kẹo CÒN THỪA.<br>HOW (Tính phần đã cho đi): Có 5 bạn, mỗi bạn 4 chiếc. Để tính tổng số kẹo đã chia ta làm phép tính nhân ($4 \\times 5$).", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Chia: $5$ bạn.<br>Mỗi bạn: $4$ chiếc kẹo.<br>Thừa: $2$ chiếc.<br>Lúc đầu có: $\\dots$ chiếc kẹo?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Số chiếc kẹo cô giáo đã chia cho $5$ bạn học sinh là:<br>$4 \\times 5 = 20$ (chiếc kẹo)</li><li>Lúc đầu trong túi cô giáo có tất cả số chiếc kẹo là:<br>$20 + 2 = 22$ (chiếc kẹo)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $22$ chiếc kẹo.</li>" },
{ t_title: "Bài 5", t_content: "Bố có một sợi dây thép dài $40\\text{ cm}$. Ban đầu, bố uốn sợi dây đó thành một hình vuông. Sau đó, bố tháo sợi dây ra và uốn lại thành một hình chữ nhật. Biết hình chữ nhật này có chiều rộng là $5\\text{ cm}$. Hỏi chiều dài của hình chữ nhật bố vừa uốn là bao nhiêu xăng-ti-mét?", strategy: "WHAT (Bảo toàn chu vi): Dù uốn thành hình gì thì tổng độ dài các cạnh bao quanh (Chu vi) luôn bằng đúng chiều dài sợi dây ($40\\text{ cm}$).<br>HOW (Cấu tạo chu vi hình chữ nhật): Hình chữ nhật gồm 2 Chiều Dài và 2 Chiều Rộng cộng lại bằng 40cm. Hãy lấy 40cm trừ đi 2 cái chiều rộng, rồi chia đôi để ra chiều dài.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Chu vi HCN (dây thép): $40\\text{ cm}$.<br>Chiều rộng: $5\\text{ cm}$.<br>Chiều dài: $\\dots\\text{ cm}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Khi uốn sợi dây dài $40\\text{ cm}$ thành hình chữ nhật, thì chu vi của hình chữ nhật đó chính bằng chiều dài của sợi dây, tức là bằng $40\\text{ cm}$.</li><li>Chu vi hình chữ nhật bằng tổng độ dài của $2$ chiều dài và $2$ chiều rộng. Tổng độ dài của $2$ chiều rộng là: $5 + 5 = 10\\text{ (cm)}$.</li><li>Tổng độ dài của $2$ chiều dài là: $40 - 10 = 30\\text{ (cm)}$.</li><li>Chiều dài của hình chữ nhật là: $30 : 2 = 15\\text{ (cm)}$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $15\\text{ cm}$.</li>" },
{ t_title: "Bài 6", t_content: "Một dải băng rôn dài được cắt thành $5$ đoạn nhỏ bằng nhau, mỗi đoạn dài $4\\text{ cm}$, cắt xong không dư ra mẩu nào. Hỏi nếu muốn cắt dải băng rôn đó thành các đoạn ngắn hơn, mỗi đoạn dài $2\\text{ cm}$ thì người ta phải thực hiện tất cả bao nhiêu nhát cắt?", strategy: "WHAT (Tìm điểm mấu chốt): Đừng vội chia đoạn 2cm. Phải tính được dải băng rôn CŨ dài bao nhiêu đã!<br>WHY (Cái bẫy nhát cắt): Muốn cắt một sợi dây thành 10 đoạn, ta cần cắt mấy nhát? Nhớ quy tắc: Số nhát cắt luôn ÍT HƠN số đoạn là 1.", solution: "<li>Chiều dài của dải băng rôn đó là:<br>$4 \\times 5 = 20\\text{ (cm)}$</li><li>Nếu cắt dải băng rôn đó thành các đoạn dài $2\\text{ cm}$, thì số đoạn cắt được là:<br>$20 : 2 = 10$ (đoạn)</li><li>Để cắt được $10$ đoạn băng rôn, người ta cần thực hiện số nhát cắt là:<br>$10 - 1 = 9$ (nhát cắt)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $9$ nhát cắt.</li>" }
]
});

{ q_title: "Câu 7", q_content: "Số có hai chữ số lớn nhất mà tổng hai chữ số của nó bằng $12$ là số nào?", options: ["A. $39$", "B. $84$", "C. $93$", "D. $75$"], correct_idx: 2, explain: "Để tạo số lớn nhất, chữ số hàng chục phải lớn nhất có thể ($9$). Khi đó hàng đơn vị là $12 - 9 = 3$. Vậy số đó là $93$." },
{ q_title: "Câu 8", q_content: "Trên đĩa cân thăng bằng, đĩa bên trái có $1$ con gà và đĩa bên phải có $3$ con thỏ. Biết $1$ con gà cân nặng $6\\text{ kg}$. Hỏi $1$ con thỏ cân nặng bao nhiêu? (Biết các con thỏ nặng bằng nhau).", options: ["A. $2\\text{ kg}$", "B. $3\\text{ kg}$", "C. $18\\text{ kg}$", "D. $4\\text{ kg}$"], correct_idx: 0, explain: "Vì 1 gà = 3 thỏ nên 3 thỏ có tổng cân nặng là $6\\text{ kg}$. Mỗi con thỏ nặng: $6 : 3 = 2\\text{ (kg)}$." },
{ q_title: "Câu 9", q_content: "Một hình chữ nhật có chiều dài $10\\text{ cm}$, chiều dài gấp đôi chiều rộng. Chu vi của hình chữ nhật đó là:", options: ["A. $30\\text{ cm}$", "B. $20\\text{ cm}$", "C. $15\\text{ cm}$", "D. $60\\text{ cm}$"], correct_idx: 0, explain: "Chiều rộng hình chữ nhật là: $10 : 2 = 5\\text{ (cm)}$. Chu vi là: $10 + 5 + 10 + 5 = 30\\text{ (cm)}$." },
{ q_title: "Câu 10", q_content: "Có bao nhiêu số có $2$ chữ số mà cả hai chữ số đều là số LẺ?", options: ["A. $10$ số", "B. $25$ số", "C. $20$ số", "D. $15$ số"], correct_idx: 1, explain: "Các chữ số lẻ là 1, 3, 5, 7, 9 (có 5 chữ số). Chọn hàng chục có 5 cách. Chọn hàng đơn vị có 5 cách. Tổng số ghép được là $5 \\times 5 = 25$&nbsp;số." },
{ q_title: "Câu 11", q_content: "Từ trang $1$ đến trang $9$ của một cuốn truyện, người ta phải dùng bao nhiêu chữ số để đánh số trang?", options: ["A. $9$ chữ số", "B. $18$ chữ số", "C. $10$ chữ số", "D. $11$ chữ số"], correct_idx: 0, explain: "Các trang từ 1 đến 9 là các trang có 1 chữ số. Có 9 trang như vậy nên cần dùng $9 \\times 1 = 9$ chữ số." },

tu_luan: [
{ t_title: "Bài 1", t_content: "Tính nhanh: <div class='text-center text-xl my-4'>$100 - 15 - 25 - 12 - 28$</div>", strategy: "WHAT (Quan sát dãy số): Đây là một phép tính mà số 100 bị trừ đi liên tiếp 4 con số nhỏ.<br>HOW (Góp nhặt cặp chục): Thay vì lấy 100 trừ lắt nhắt từng số, hãy nhìn xem các số bị trừ có cặp nào ghép với nhau thành số tròn chục không? (15 và 25; 12 và 28).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>$100 - 15 - 25 - 12 - 28$<br>$= 100 - (15 + 25) - (12 + 28)$<br>$= 100 - 40 - 40$<br>$= 60 - 40 = 20$</li>" },
{ t_title: "Bài 2", t_content: "Một can đầy dầu cân nặng $12\\text{ kg}$. Nếu chắt đi một nửa số dầu trong can đó thì phần can và số dầu còn lại cân nặng $7\\text{ kg}$. Hỏi chiếc can không (khi không chứa dầu) cân nặng bao nhiêu ki-lô-gam?", strategy: "WHAT (Thành phần của 12kg): Cả cái can dầu 12kg gồm khối lượng vỏ can + toàn bộ dầu.<br>HOW (Sự chênh lệch): Khi chắt đi một nửa số dầu, trọng lượng tụt từ 12kg xuống 7kg. Khối lượng bị tụt đi đó chính là MỘT NỬA lượng dầu.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Can đầy dầu: $12\\text{ kg}$.<br>Đổ đi một nửa $\\Rightarrow$ Can + dầu còn: $7\\text{ kg}$.<br>Can rỗng: $\\dots\\text{ kg}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Một nửa lượng dầu có trong can cân nặng là: $12 - 7 = 5\\text{ (kg)}$.</li><li>Tổng cân nặng của toàn bộ lượng dầu có trong can (khi chưa chắt đi) là: $5 + 5 = 10\\text{ (kg)}$.</li><li>Chiếc can rỗng (vỏ can) cân nặng là: $12 - 10 = 2\\text{ (kg)}$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $2\\text{ kg}$.</li>" },
{ t_title: "Bài 3", t_content: "Người thợ làm bánh nướng được $26$ chiếc bánh quy. Người đó muốn xếp số bánh này vào các hộp, mỗi hộp chỉ xếp được đúng $4$ chiếc bánh. Hỏi người thợ cần chuẩn bị ÍT NHẤT bao nhiêu chiếc hộp để xếp hết số bánh trên?", strategy: "WHAT (Chia đều): 26 chiếc bánh chia vào các hộp 4 chiếc. Dùng phép chia để tìm số hộp.<br>WHY (Cái bẫy thực tế): Phép chia có dư. Bánh dư ra không được vứt đi, phải cất vào hộp nên cần thêm 1 hộp nữa.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Có: $26$ bánh.<br>Mỗi hộp: $4$ bánh.<br>Ít nhất: $\\dots$ hộp?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta có phép chia: $26 : 4 = 6$ (dư $2$).</li><li>Như vậy, khi xếp $26$ chiếc bánh vào các hộp, mỗi hộp $4$ chiếc thì ta xếp được ĐẦY $6$ hộp và CÒN THỪA $2$ chiếc bánh.</li><li>Để đựng hết $2$ chiếc bánh thừa này, người thợ cần dùng thêm $1$ chiếc hộp nữa.</li><li>Vậy số hộp ít nhất cần phải chuẩn bị là: $6 + 1 = 7$ (hộp).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $7$ hộp.</li>" },
{ t_title: "Bài 4", t_content: "Lớp 2A xếp thành một hàng dọc để tập thể dục. Bạn Hùng đứng thứ $4$ từ trên đếm xuống. Bạn Dũng đứng thứ $5$ từ dưới đếm lên. Biết rằng giữa bạn Hùng và bạn Dũng có đúng $3$ bạn nữa. Hỏi hàng dọc đó có tất cả bao nhiêu học sinh?", strategy: "WHAT (Đọc vị trí): Bài toán chia hàng thành 3 đoạn không trùng lặp: Đoạn 1 là từ đầu hàng đến Hùng, Đoạn 2 là khúc kẹp giữa 2 người, Đoạn 3 là từ Dũng đến cuối hàng.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Hùng thứ $4$ (từ trên). Dũng thứ $5$ (từ dưới).<br>Giữa: $3$ bạn.<br>Tất cả: $\\dots$ học sinh?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta chia hàng dọc thành $3$ phần không trùng lặp:</li><li>- Số bạn tính từ đầu hàng đến vị trí của Hùng (bao gồm cả Hùng) là $4$ bạn.</li><li>- Số bạn đứng giữa Hùng và Dũng là $3$ bạn.</li><li>- Số bạn tính từ cuối hàng đến vị trí của Dũng (bao gồm cả Dũng) là $5$ bạn.</li><li>Hàng dọc đó có tất cả số học sinh là: $4 + 3 + 5 = 12$ (học sinh).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $12$ học sinh.</li>" },
{ t_title: "Bài 5", t_content: "Trong một chiếc hộp kín có $6$ viên bi màu xanh, $5$ viên bi màu đỏ và $4$ viên bi màu vàng. Nếu không được nhìn vào hộp, em phải lấy ra ít nhất bao nhiêu viên bi để CHẮC CHẮN rằng trong số bi lấy ra có đủ cả $3$ màu?", strategy: "WHAT (Nguyên lý Dirichlet/Trường hợp rủi ro): Để 'chắc chắn', ta phải xét trường hợp xui xẻo nhất: bốc mãi chỉ ra 2 màu có số lượng nhiều nhất.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Để chắc chắn bốc được đủ $3$ màu, ta phải xét trường hợp rủi ro nhất (xui xẻo nhất).</li><li>Trường hợp rủi ro nhất là ta bốc toàn trúng $2$ màu có số lượng nhiều nhất, đó là bốc phải toàn bi màu xanh và bi màu đỏ.</li><li>Lúc này, số bi lấy ra mà vẫn CHƯA đủ $3$ màu là: $6 + 5 = 11$ (viên bi).</li><li>Vì trong hộp chỉ còn lại toàn bi màu vàng, nên ở lần bốc tiếp theo (viên thứ $12$), viên bi được lấy ra chắc chắn phải là màu vàng.</li><li>Vậy số bi ít nhất cần lấy ra để chắc chắn có đủ $3$ màu là: $11 + 1 = 12$ (viên bi).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $12$ viên bi.</li>" },
{ t_title: "Bài 6", t_content: "Ba anh em Hưng, Quân và Đạt sinh cách nhau đều đặn $2$ năm (Hưng lớn tuổi nhất, Đạt nhỏ tuổi nhất). Biết tổng số tuổi của ba anh em hiện nay là $24$ tuổi. Hỏi năm nay mỗi người bao nhiêu tuổi?", strategy: "HOW (San bằng khoảng cách - Tư duy Trung bình cộng): Hưng lớn hơn Quân 2 tuổi, Đạt kém Quân 2 tuổi. Nếu Hưng cho Đạt 2 tuổi thì cả 3 anh em sẽ bằng tuổi nhau (và bằng tuổi Quân).", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Hưng, Quân, Đạt cách nhau $2$ năm.<br>Tổng tuổi: $24$ tuổi.<br>Tuổi mỗi người: $\\dots$ tuổi?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ba anh em sinh cách đều nhau $2$ năm. Ta thấy Quân là người ở giữa. Hưng lớn hơn Quân $2$ tuổi; Đạt nhỏ hơn Quân $2$ tuổi.</li><li>Giả sử Hưng bớt đi $2$ tuổi của mình và bù $2$ tuổi đó cho Đạt. Khi đó, cả $3$ anh em lúc này đều có số tuổi bằng nhau và bằng tuổi Quân.</li><li>Trong quá trình bù trừ đó, tổng số tuổi của $3$ anh em vẫn không thay đổi và bằng $24$ tuổi.</li><li>Tuổi của Quân hiện nay là: $24 : 3 = 8$ (tuổi).</li><li>Tuổi của người anh lớn (Hưng) hiện nay là: $8 + 2 = 10$ (tuổi). Tuổi của người em út (Đạt) hiện nay là: $8 - 2 = 6$ (tuổi).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Hưng: $10$ tuổi; Quân: $8$ tuổi; Đạt: $6$ tuổi.</li>" }
]
});
</script>

{ q_title: "Câu 2", q_content: "Kết quả của phép tính: $5 \\times 6 - 12$ là bao nhiêu?", options: ["A. $42$", "B. $30$", "C. $18$", "D. $28$"], correct_idx: 2, explain: "Thực hiện phép nhân trước: $5 \\times 6 = 30$. Sau đó làm phép trừ: $30 - 12 = 18$." },

{ q_title: "Câu 4", q_content: "Kết quả của phép tính $1\\text{ m} - 40\\text{ cm}$ bằng bao nhiêu?", options: ["A. $60\\text{ cm}$", "B. $50\\text{ cm}$", "C. $6\\text{ cm}$", "D. $40\\text{ cm}$"], correct_idx: 0, explain: "Đổi $1\\text{ m} = 100\\text{ cm}$. Ta có: $100\\text{ cm} - 40\\text{ cm} = 60\\text{ cm}$." },
{ q_title: "Câu 5", q_content: "Hộp thứ nhất có $20$ viên bi. Hộp thứ nhất có ÍT HƠN hộp thứ hai $5$ viên bi. Hỏi hộp thứ hai có bao nhiêu viên bi?", options: ["A. $15$ viên bi", "B. $25$ viên bi", "C. $20$ viên bi", "D. $30$ viên bi"], correct_idx: 1, explain: "Hộp thứ nhất ít hơn hộp thứ hai, tức là hộp thứ hai nhiều hơn hộp thứ nhất. Số bi ở hộp thứ hai là: $20 + 5 = 25$ (viên)." },
{ q_title: "Câu 6", q_content: "Tìm $x$, biết: $x - 15 = 20$", options: ["A. $x = 5$", "B. $x = 15$", "C. $x = 45$", "D. $x = 35$"], correct_idx: 3, explain: "$x$ là số bị trừ. Muốn tìm số bị trừ ta lấy hiệu cộng số trừ: $x = 20 + 15 = 35$." },
{ q_title: "Câu 7", q_content: "Số tiếp theo trong dãy số: $3, 7, 11, 15, \\dots$ là số nào?", options: ["A. $16$", "B. $18$", "C. $19$", "D. $20$"], correct_idx: 2, explain: "Khoảng cách giữa các số đều tăng $4$ đơn vị ($3+4=7; 7+4=11; 11+4=15$). Số tiếp theo là: $15 + 4 = 19$." },
{ q_title: "Câu 8", q_content: "Từ $2$ đến $10$ có tất cả bao nhiêu số chẵn?", options: ["A. $4$ số", "B. $5$ số", "C. $6$ số", "D. $8$ số"], correct_idx: 1, explain: "Các số chẵn từ 2 đến 10 là: 2, 4, 6, 8, 10. Tổng cộng có 5 số." },
{ q_title: "Câu 9", q_content: "Một hình tam giác có $3$ cạnh dài bằng nhau, biết một cạnh dài $6\\text{ cm}$. Chu vi của hình tam giác đó là:", options: ["A. $18\\text{ cm}$", "B. $12\\text{ cm}$", "C. $24\\text{ cm}$", "D. $9\\text{ cm}$"], correct_idx: 0, explain: "Chu vi hình tam giác bằng tổng độ dài ba cạnh: $6 + 6 + 6 = 18\\text{ (cm)}$." },
{ q_title: "Câu 10", q_content: "Chị năm nay $12$ tuổi, em $8$ tuổi. Hỏi $5$ năm nữa chị sẽ hơn em bao nhiêu tuổi?", options: ["A. $4$ tuổi", "B. $9$ tuổi", "C. $10$ tuổi", "D. $5$ tuổi"], correct_idx: 0, explain: "Hiệu số tuổi luôn không đổi. Hiện tại chị hơn em $12 - 8 = 4$ tuổi, thì 5 năm nữa hay bao nhiêu năm đi nữa chị vẫn hơn em 4 tuổi." },
{ q_title: "Câu 11", q_content: "Bác thợ mộc cưa một khúc gỗ thành $3$ đoạn nhỏ mất $10$ phút. Nếu bác cưa đều tay và không nghỉ, hỏi bác cưa $1$ nhát mất bao nhiêu phút?", options: ["A. $10$ phút", "B. $5$ phút", "C. $3$ phút", "D. $4$ phút"], correct_idx: 1, explain: "Để cưa khúc gỗ thành 3 đoạn, bác thợ chỉ cần cắt $3 - 1 = 2$ nhát. Cưa 2 nhát mất 10 phút, nên 1 nhát mất: $10 : 2 = 5$ (phút)." },

{ t_title: "Bài 1", t_content: "Tính nhanh:<br><div class='text-xl text-center my-4'>$35 + 35 + 35 - 15 - 15 - 15$</div>", strategy: "WHAT (Quan sát các số liệu): Dãy tính gồm ba số 35 cộng với nhau và bị trừ đi ba số 15.<br>HOW (Góp nhặt cặp đôi): Ta có 3 \"đứa con\" 35 và 3 \"đứa con\" 15 mang dấu trừ. Hãy bắt cặp từng số 35 với từng số 15 để trừ cho nhau.<br>WHY (Triệt tiêu): Cứ một cặp (35 - 15) sẽ cho ra kết quả tròn chục rất đẹp là 20. Ta sẽ có mấy số 20 cộng lại?", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>$35 + 35 + 35 - 15 - 15 - 15$</li><li>$= (35 - 15) + (35 - 15) + (35 - 15)$</li><li>$= 20 + 20 + 20$</li><li>$= 60$</li>" },
{ t_title: "Bài 2", t_content: "Tìm một số có hai chữ số. Biết rằng chữ số hàng chục gấp đôi chữ số hàng đơn vị và tích của hai chữ số đó bằng $8$.", strategy: "WHAT (Tích bằng 8): Hãy nhớ lại bảng nhân. Hai số nào nhân với nhau bằng 8? (Có thể là $1 \\times 8 = 8$ hoặc $2 \\times 4 = 8$).<br>HOW (Chữ số hàng chục gấp đôi đơn vị): Trong các cặp số vừa tìm được, cặp nào có số này gấp đôi số kia? (Cặp 2 và 4).<br>WHAT NEXT (Chốt số): Hàng chục gấp đôi hàng đơn vị nên hàng chục phải là số lớn, hàng đơn vị là số bé.", solution: "<li>Ta tìm các cặp hai chữ số nhân với nhau bằng $8$ trong bảng nhân:</li><li>$1 \\times 8 = 8$ (Trong cặp này, số 8 gấp 8 lần số 1, không thoả mãn).</li><li>$2 \\times 4 = 8$ (Trong cặp này, số 4 gấp đôi số 2, thoả mãn điều kiện đề bài).</li><li>Vậy hai chữ số cấu tạo nên số cần tìm là $2$ và $4$.</li><li>Vì chữ số hàng chục gấp đôi chữ số hàng đơn vị nên chữ số hàng chục lớn hơn, đó là chữ số $4$. Chữ số hàng đơn vị là $2$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $42$.</li>" },
{ t_title: "Bài 3", t_content: "Một chiếc đồng hồ bị hỏng, cứ chạy được $1$ giờ thì nó lại chạy NHANH thêm $2$ phút. Lúc $7$ giờ sáng nay, Nam đã chỉnh cho đồng hồ chạy đúng giờ. Hỏi đến $10$ giờ sáng cùng ngày, chiếc đồng hồ đó chỉ mấy giờ mấy phút?", strategy: "WHAT (Khoảng thời gian trôi qua): Từ 7 giờ sáng đến 10 giờ sáng là bao nhiêu tiếng đồng hồ?<br>HOW (Tính thời gian chạy sai): Cứ 1 giờ thì đồng hồ nhanh thêm 2 phút. Vậy số giờ trôi qua thì nó sẽ nhanh thêm bao nhiêu phút?<br>WHY (Đồng hồ nhanh là thế nào?): Chạy nhanh nghĩa là nó sẽ chỉ vượt qua mốc thời gian thực tế. Thời gian thực là 10 giờ tròn, cộng thêm phần chạy nhanh bị dư ra sẽ ra số giờ hiển thị trên mặt đồng hồ.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Từ $7$ giờ sáng đến $10$ giờ sáng, thời gian thực tế đã trôi qua là:<br>$10 - 7 = 3$ (giờ)</li><li>Vì cứ $1$ giờ đồng hồ chạy nhanh thêm $2$ phút, nên sau $3$ giờ, đồng hồ đã chạy nhanh thêm số phút là:<br>$2 \\times 3 = 6$ (phút)</li><li>Lúc $10$ giờ sáng, đồng hồ đó sẽ chỉ số giờ là:<br>$10\\text{ giờ} + 6\\text{ phút} = 10\\text{ giờ } 6\\text{ phút}$.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $10$ giờ $6$ phút.</li>" },
{ t_title: "Bài 4", t_content: "Trên một chiếc cân thăng bằng, đĩa cân bên trái đặt $2$ quả dưa hấu và $1$ quả bưởi. Đĩa cân bên phải đặt $7$ quả bưởi. Biết rằng các quả dưa hấu nặng bằng nhau, các quả bưởi nặng bằng nhau. Hỏi $1$ quả dưa hấu cân nặng bằng mấy quả bưởi?", strategy: "WHAT (Nguyên lý triệt tiêu): Hai đĩa cân đang thăng bằng. Nếu ta lấy bớt ở đĩa bên trái một món đồ, và cũng lấy bớt ở đĩa bên phải MỘT MÓN ĐỒ Y HỆT, thì cân vẫn thăng bằng.<br>HOW (Cùng bớt bưởi): Đĩa trái có 1 bưởi, đĩa phải có 7 bưởi. Ta hãy bỏ 1 quả bưởi ra khỏi cả hai đĩa.<br>WHAT NEXT (Chia đều): Lúc này đĩa trái còn 2 dưa, đĩa phải còn 6 bưởi. 2 quả dưa nặng bằng 6 quả bưởi. Tìm 1 quả dưa bằng phép chia.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Đĩa cân bên trái có $2$ quả dưa hấu và $1$ quả bưởi. Đĩa cân bên phải có $7$ quả bưởi. Nếu ta cùng lấy đi $1$ quả bưởi ở cả hai đĩa cân thì cân vẫn thăng bằng.</li><li>Lúc này:<br>Đĩa cân bên trái còn lại: $2$ quả dưa hấu.<br>Đĩa cân bên phải còn lại: $7 - 1 = 6$ (quả bưởi).</li><li>Như vậy, $2$ quả dưa hấu cân nặng bằng $6$ quả bưởi.</li><li>$1$ quả dưa hấu cân nặng bằng số quả bưởi là:<br>$6 : 2 = 3$ (quả bưởi)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $3$ quả bưởi.</li>" },
{ t_title: "Bài 5", t_content: "Một mô hình bậc thang được ghép bởi các khối lập phương nhỏ bằng nhau. Bậc thứ nhất (thấp nhất) có $3$ khối xếp chồng lên nhau; bậc thứ hai có $2$ khối xếp chồng lên nhau; bậc thứ ba (cao nhất) có $1$ khối. (Các cột khối này xếp sát cạnh nhau để tạo thành hình cái cầu thang).<br>Hỏi mô hình này có tất cả bao nhiêu khối lập phương? Có bao nhiêu khối lập phương bị che khuất không nhìn thấy (từ góc nhìn phía trên)?<br><div class='flex justify-center my-4'><svg width='180' height='150' viewBox='0 0 120 100'><rect x='20' y='60' width='25' height='25' fill='#93c5fd' stroke='#1e3a8a'/><rect x='20' y='35' width='25' height='25' fill='#60a5fa' stroke='#1e3a8a'/><rect x='20' y='10' width='25' height='25' fill='#3b82f6' stroke='#1e3a8a'/><rect x='45' y='60' width='25' height='25' fill='#93c5fd' stroke='#1e3a8a'/><rect x='45' y='35' width='25' height='25' fill='#60a5fa' stroke='#1e3a8a'/><rect x='70' y='60' width='25' height='25' fill='#93c5fd' stroke='#1e3a8a'/></svg></div>", strategy: "WHAT (Đếm tổng số khối): Tính số khối lập phương của từng bậc thang rồi cộng lại.<br>HOW (Tìm khối bị che khuất): Khi nhìn từ trên xuống, ta chỉ thấy khối trên cùng của mỗi cột. Các khối nằm bên dưới sẽ bị khối trên cùng đè lên (che khuất).", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Mô hình bậc thang gồm 3 cột khối:<br>- Cột cao nhất có $3$ khối.<br>- Cột cao thứ nhì có $2$ khối.<br>- Cột thấp nhất có $1$ khối.</li><li>Tổng số khối lập phương của cả mô hình là:<br>$3 + 2 + 1 = 6$ (khối)</li><li>Các khối lập phương bị che khuất (những khối bị đè bên dưới) nhìn từ trên xuống là:<br>- Ở cột 3 khối: Có $2$ khối bị đè.<br>- Ở cột 2 khối: Có $1$ khối bị đè.<br>Tổng số khối bị che khuất là: $2 + 1 = 3$ (khối).</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: Tất cả $6$ khối; Có $3$ khối bị che khuất.</li>" },
{ t_title: "Bài 6", t_content: "Có một phép tính sai được xếp bằng các que diêm như sau: <br><div class='text-center my-4 font-mono font-bold text-2xl tracking-widest text-red-600 bg-red-50 p-2 rounded inline-block'>6 - 4 = 4</div><br>Em hãy di chuyển vị trí của <strong>ĐÚNG MỘT</strong> que diêm để tạo thành một phép tính đúng. Trình bày cách di chuyển của em.", strategy: "WHAT (Phân tích que diêm): Phép tính $6 - 4 = 4$ đang sai vì $6 - 4$ chỉ bằng $2$.<br>HOW (Tìm kiếm sự thay đổi):<br>- Nếu đổi dấu `-` thành `+`: Ta phải mượn 1 que diêm đắp vào thành dấu cộng (+). Que diêm đó lấy từ đâu? Thử lấy 1 que ở nét ngang giữa của số 6.<br>- Số 6 khi bị rút mất 1 que ở giữa sẽ biến thành số mấy? (Số 0).<br>WHY (Kết quả): Phép tính mới sẽ là $0 + 4 = 4$.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Phép tính ban đầu: $6 - 4 = 4$ (Sai).</li><li>Cách di chuyển 1 que diêm để tạo thành phép tính đúng là:<br>Lấy $1$ que diêm nằm ngang ở vị trí chính giữa của số $6$. Khi đó, số $6$ sẽ biến thành số $0$.</li><li>Đem que diêm vừa lấy ra đặt dọc chéo lên trên dấu trừ ($-$) để biến nó thành dấu cộng ($+$).</li><li>Ta được phép tính mới là: <strong>$\\mathbf{\\color{red}{0 + 4 = 4}}$</strong>.</li><li>Phép tính này là một phép tính đúng.</li>" }
]

{ q_title: "Câu 5", q_content: "Năm nay anh $10$ tuổi, em $6$ tuổi. Hỏi $4$ năm nữa, anh sẽ hơn em bao nhiêu tuổi?", options: ["A. $8$ tuổi", "B. $14$ tuổi", "C. $4$ tuổi", "D. $10$ tuổi"], correct_idx: 2, explain: "Hiệu số tuổi không thay đổi theo thời gian. Hiện tại anh hơn em: $10 - 6 = 4$ (tuổi). Vậy 4 năm nữa anh vẫn hơn em $4$ tuổi." },
{ q_title: "Câu 6", q_content: "Hai đoạn dây dài bằng nhau, mỗi đoạn dài $15\\text{ cm}$. Nếu nối hai đoạn dây đó lại với nhau thì được một đoạn dây dài bao nhiêu đề-xi-mét?", options: ["A. $30\\text{ dm}$", "B. $3\\text{ dm}$", "C. $300\\text{ dm}$", "D. $20\\text{ dm}$"], correct_idx: 1, explain: "Tổng chiều dài 2 đoạn dây là: $15 + 15 = 30\\text{ (cm)}$. Đổi $30\\text{ cm} = 3\\text{ dm}$." },
{ q_title: "Câu 7", q_content: "Trên đĩa cân thăng bằng, đĩa bên trái có $1$ con mèo và $1$ quả cân $2\\text{ kg}$. Đĩa bên phải có $1$ quả cân $5\\text{ kg}$. Hỏi con mèo cân nặng bao nhiêu ki-lô-gam?", options: ["A. $7\\text{ kg}$", "B. $3\\text{ kg}$", "C. $5\\text{ kg}$", "D. $2\\text{ kg}$"], correct_idx: 1, explain: "Cân thăng bằng nên: Mèo + $2\\text{ kg} = 5\\text{ kg}$. Mèo nặng: $5 - 2 = 3\\text{ (kg)}$." },
{ q_title: "Câu 8", q_content: "Tìm $x$, biết: $50 - x = 12 + 8$", options: ["A. $x = 30$", "B. $x = 70$", "C. $x = 20$", "D. $x = 40$"], correct_idx: 0, explain: "Tính vế phải: $12 + 8 = 20$. Ta có: $50 - x = 20$. $x = 50 - 20 = 30$." },
{ q_title: "Câu 9", q_content: "Trong một hộp có $5$ viên bi xanh và $8$ viên bi đỏ. Lấy ra tất cả các viên bi xanh và $3$ viên bi đỏ. Trong hộp còn lại bao nhiêu viên bi?", options: ["A. $13$ viên", "B. $10$ viên", "C. $5$ viên", "D. $2$ viên"], correct_idx: 2, explain: "Lấy hết bi xanh nên hộp không còn bi xanh. Bi đỏ có 8 viên, lấy đi 3 viên còn: $8 - 3 = 5$ (viên). Tổng cộng hộp còn 5 viên bi đỏ." },
{ q_title: "Câu 10", q_content: "Hai dải băng giấy mỗi dải dài $10\\text{ cm}$. Người ta dán nối hai dải băng lại với nhau, phần giấy dán chồng lên nhau dài $2\\text{ cm}$. Dải băng giấy mới tạo thành dài bao nhiêu xăng-ti-mét?", options: ["A. $20\\text{ cm}$", "B. $22\\text{ cm}$", "C. $18\\text{ cm}$", "D. $16\\text{ cm}$"], correct_idx: 2, explain: "Nếu không nối chồng, tổng chiều dài là $10 + 10 = 20\\text{ (cm)}$. Vì phần dán chồng dài $2\\text{ cm}$ bị tính hao hụt đi, nên dải băng mới dài: $20 - 2 = 18\\text{ (cm)}$." },
{ q_title: "Câu 11", q_content: "Một nửa của $18$ là số $A$. Vậy $A + 5$ bằng bao nhiêu?", options: ["A. $14$", "B. $13$", "C. $9$", "D. $23$"], correct_idx: 0, explain: "Một nửa của $18$ là $18 : 2 = 9$. Vậy $A = 9$. Tính $A + 5 = 9 + 5 = 14$." },
{ q_title: "Câu 12", q_content: "Số hình tứ giác có trong hình vẽ bên là bao nhiêu? (Gợi ý: Một hình chữ nhật bị gạch 1 đường chéo chia thành 2 hình tam giác).<br><svg width='180' height='100' viewBox='0 0 160 100' class='mx-auto my-4'><rect x='20' y='20' width='120' height='60' fill='none' stroke='#1e3a8a' stroke-width='2.5'/><line x1='20' y1='20' x2='140' y2='80' stroke='#1e3a8a' stroke-width='2.5'/></svg>", options: ["A. $1$ hình", "B. $2$ hình", "C. $3$ hình", "D. $0$ hình"], correct_idx: 0, explain: "Đường chéo chia hình chữ nhật thành 2 hình tam giác nhỏ. Bản thân hình chữ nhật bao ngoài là 1 hình tứ giác. Không có hình tứ giác nào khác được tạo thành. Vậy có 1 hình tứ giác." }

tu_luan: [
{ t_title: "Bài 1", t_content: "Hãy điền dấu phép tính $(+, -)$ thích hợp vào các ô trống để được một phép tính đúng:<br><div class='text-2xl text-center my-4 font-mono font-bold tracking-widest'>$15 \\ \\square\\  5 \\ \\square\\  10 = 20$</div>", strategy: "WHAT (Phân tích phép tính): Ta có các số 15, 5, 10 ở bên trái và kết quả mong muốn là 20 ở bên phải.<br>HOW (Thử nghiệm):<br>- Nếu dùng dấu (+): $15 + 5 = 20$. Ta đã đạt mốc 20, nhưng vẫn còn số 10 phía sau. Cộng hay trừ 10 đều không ra 20. Loại.<br>- Nếu dùng dấu (-): $15 - 5 = 10$. Kết hợp 10 với số 10 cuối cùng bằng dấu (+) sẽ ra 20.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta điền dấu lần lượt như sau:</li><li><strong>$15 \\ \\mathbf{\\color{red}{-}}\\  5 \\ \\mathbf{\\color{red}{+}}\\  10 = 20$</strong></li>" },
{ t_title: "Bài 2", t_content: "Hiệu của hai số là $45$. Nếu giữ nguyên số bị trừ và tăng số trừ thêm $10$ đơn vị thì hiệu mới sẽ là bao nhiêu?", strategy: "WHAT (Nguyên lý của phép trừ): Hiệu là kết quả của phép trừ (Phần còn lại sau khi lấy đi). Số trừ chính là phần MANG ĐI.<br>HOW (Tư duy thực tế): Con có một số kẹo. Con bị lấy đi một lượng (số trừ), con còn lại 45 cái (hiệu). Nếu con BỊ LẤY ĐI NHIỀU HƠN 10 cái (số trừ tăng lên), thì phần kẹo CÒN LẠI (hiệu) sẽ giảm đi.<br>WHY: Số trừ tăng thì Hiệu sẽ giảm đi đúng một lượng tương ứng.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Trong phép trừ, nếu số bị trừ giữ nguyên mà số trừ TĂNG thêm $10$ đơn vị thì phần còn lại (tức là Hiệu) sẽ GIẢM ĐI $10$ đơn vị.</li><li>Hiệu mới là:<br>$45 - 10 = 35$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $35$.</li>" },
{ t_title: "Bài 3", t_content: "Ba bạn An, Bình, Cường nuôi 3 con vật khác nhau: một con chó, một con mèo và một con thỏ. Biết rằng Bình không nuôi chó. Cường rất sợ chó và cũng bị dị ứng với lông mèo. Hỏi mỗi bạn đang nuôi con vật gì?", strategy: "WHO (Người nhiều dữ kiện nhất): Tìm xem bạn nào có nhiều từ \"không\", \"sợ\", \"dị ứng\" nhất để bắt đầu. Đó là Cường.<br>HOW (Loại trừ cho Cường): Cường sợ chó (không nuôi chó), Cường dị ứng lông mèo (không nuôi mèo). Vậy Cường chỉ có thể nuôi con gì?<br>WHAT NEXT: Đã chốt Cường, gạch con vật đó khỏi danh sách. Chuyển sang Bình...", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta sử dụng phương pháp suy luận loại trừ:</li><li>Bạn Cường sợ chó và bị dị ứng lông mèo nên Cường không nuôi chó và mèo. Suy ra <strong>Cường nuôi Thỏ</strong>.</li><li>Bạn Bình không nuôi chó, con thỏ thì Cường đã nuôi. Suy ra <strong>Bình nuôi Mèo</strong>.</li><li>Chỉ còn lại một con vật là con chó. Suy ra <strong>An nuôi Chó</strong>.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: An nuôi Chó, Bình nuôi Mèo, Cường nuôi Thỏ.</li>" },
{ t_title: "Bài 4", t_content: "Một bãi gửi xe có tất cả $10$ chiếc xe gồm hai loại: ô tô (loại $4$ bánh) và xe máy (loại $2$ bánh). Bác bảo vệ đếm được tổng cộng có $26$ chiếc bánh xe. Hỏi trong bãi xe đó có bao nhiêu chiếc ô tô, bao nhiêu chiếc xe máy?", strategy: "WHAT IF (Giả sử toàn bộ là xe máy): Hãy tưởng tượng nếu tất cả 10 chiếc xe trong bãi đều là xe máy thì tổng số bánh xe sẽ là bao nhiêu? ($2 \\times 10 = 20$ bánh).<br>WHY (Tìm sự chênh lệch): Thực tế có 26 bánh. Tại sao giả sử xong lại bị thiếu mất mấy bánh? (Thiếu 6 bánh).<br>HOW (Xác định số lượng): Vì ta đã coi ô tô thành xe máy, nên mỗi chiếc ô tô bị tính hụt mất 2 bánh. Lấy tổng số bánh bị thiếu chia cho 2 sẽ ra số ô tô.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Tổng xe: $10$ chiếc. Tổng bánh xe: $26$ chiếc.<br>Ô tô (4 bánh): $\\dots$ chiếc? Xe máy (2 bánh): $\\dots$ chiếc?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Mỗi chiếc ô tô có $4$ bánh, mỗi chiếc xe máy có $2$ bánh. Giả sử cả $10$ chiếc xe đều là xe máy. Khi đó tổng số bánh xe là:<br>$2 \\times 10 = 20$ (bánh xe)</li><li>Số bánh xe bị thiếu so với thực tế là:<br>$26 - 20 = 6$ (bánh xe)</li><li>Mỗi chiếc ô tô bị tính hụt đi số bánh xe là:<br>$4 - 2 = 2$ (bánh xe)</li><li>Số chiếc ô tô trong bãi là:<br>$6 : 2 = 3$ (chiếc)</li><li>Số chiếc xe máy trong bãi là:<br>$10 - 3 = 7$ (chiếc)</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $3$ chiếc ô tô, $7$ chiếc xe máy.</li>" },
{ t_title: "Bài 5", t_content: "Mẹ cho Nam $3$ tờ tiền với các mệnh giá khác nhau: $1$ tờ $10$ nghìn, $1$ tờ $20$ nghìn và $1$ tờ $50$ nghìn. Từ $3$ tờ tiền này, Nam có thể tạo ra được tất cả bao nhiêu số tiền khác nhau (biết rằng Nam có thể sử dụng $1$ tờ, $2$ tờ hoặc cả $3$ tờ cùng lúc để tạo thành một số tiền)?", strategy: "HOW (Liệt kê có hệ thống): Để không bị sót, ta phân loại theo SỐ LƯỢNG tờ tiền được sử dụng.<br>- Dùng 1 tờ: Có các số tiền nào?<br>- Dùng 2 tờ: Ghép từng cặp (10+20; 10+50; 20+50).<br>- Dùng 3 tờ: Cộng cả ba.<br>WHAT NEXT: Đếm xem có bao nhiêu kết quả KHÁC NHAU.", solution: "<li><span class='font-bold text-blue-700'>Bài giải:</span><br>Ta liệt kê các số tiền tạo được dựa vào số lượng tờ tiền Nam sử dụng:</li><li>- Dùng $1$ tờ tiền, Nam tạo được $3$ số tiền: $10$ nghìn, $20$ nghìn, $50$ nghìn.</li><li>- Dùng $2$ tờ tiền, Nam tạo được $3$ số tiền:<br>$10 + 20 = 30$ (nghìn)<br>$10 + 50 = 60$ (nghìn)<br>$20 + 50 = 70$ (nghìn)</li><li>- Dùng cả $3$ tờ tiền, Nam tạo được $1$ số tiền:<br>$10 + 20 + 50 = 80$ (nghìn)</li><li>Các số tiền tạo được là: $10, 20, 30, 50, 60, 70, 80$ nghìn. Tất cả đều khác nhau. Vậy Nam tạo được $7$ số tiền.</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $7$ số tiền.</li>" },
{ t_title: "Bài 6", t_content: "Người ta cắt một mảnh giấy hình chữ nhật thành $3$ mảnh hình vuông nhỏ bằng nhau. Biết chu vi của $1$ mảnh hình vuông nhỏ là $16\\text{ cm}$. Tính chu vi của mảnh giấy hình chữ nhật ban đầu.<br><div class='flex justify-center my-4'><svg width='240' height='80' viewBox='0 0 240 80'><rect x='10' y='10' width='220' height='60' fill='none' stroke='#1e3a8a' stroke-width='2'/><line x1='83' y1='10' x2='83' y2='70' stroke='#1e3a8a' stroke-width='2' stroke-dasharray='5,5'/><line x1='156' y1='10' x2='156' y2='70' stroke='#1e3a8a' stroke-width='2' stroke-dasharray='5,5'/></svg></div>", strategy: "WHAT (Tìm cạnh hình vuông): Chu vi hình vuông là $16\\text{cm}$, lấy chu vi chia $4$ để tìm độ dài $1$ cạnh.<br>HOW (Cấu tạo hình chữ nhật): Hình chữ nhật được ghép từ $3$ hình vuông. Chiều rộng hình chữ nhật chính là $1$ cạnh hình vuông. Chiều dài hình chữ nhật là $3$ cạnh nối tiếp nhau.<br>WHAT NEXT: Tính chu vi hình chữ nhật.", solution: "<li><span class='font-bold text-blue-700'>Tóm tắt:</span><br>Cắt HCN thành $3$ HV.<br>Chu vi $1$ HV: $16\\text{ cm}$.<br>Chu vi HCN: $\\dots\\text{ cm}$?</li><li><span class='font-bold text-blue-700'>Bài giải:</span><br>Chu vi của hình vuông nhỏ là $16\\text{ cm}$, mà hình vuông có $4$ cạnh bằng nhau nên độ dài $1$ cạnh của hình vuông là:<br>$16 : 4 = 4\\text{ (cm)}$</li><li>Mảnh giấy hình chữ nhật ban đầu được ghép bởi $3$ hình vuông đó nên chiều rộng của hình chữ nhật bằng $4\\text{ cm}$. Chiều dài của hình chữ nhật là:<br>$4 \\times 3 = 12\\text{ (cm)}$</li><li>Chu vi của mảnh giấy hình chữ nhật ban đầu là:<br>$12 + 12 + 4 + 4 = 32\\text{ (cm)}$</li><li class='font-bold mt-2 text-indigo-700'>Đáp số: $32\\text{ cm}$.</li>" }
]
});
</script>
